body:
  text: 莊渠遺書卷四明魏校撰書與顧禹錫榮行偵候失期弗及攀送中心缺然涖政已久民情事體應副得何如傳曰如保赤子心誠求之雖不中不逺矣校昔少年入官懵於民情事體此心惻怛惟恐有寃人也不憚屈已求教於前輩長者識與年長漸覺展拓得開雖然每至疑獄未嘗不寢食俱廢而為之反覆思惟也校愚鈍所經厯如此髙明之資固不在此例然或者亦可少禆萬分也嶺南之事盜賊為重願密與程參戎謀之使胸中常有一定經畫而又隨時善為之區處詩云謀夫孔多是用不集發言盈庭誰敢執其咎古今以此僨事者多矣程金玉君子其言決可信也與程本虛聞汝赤心為國只欲救安蒼生甚善甚善於赫上帝實鑒此心吾知其必助信矣但恐立本不固世俗功名富貴之念乘間發生起來其初只是些兒不曽斬截其後便突兀漸大恰如漫天雲霧一般矣宜常自猛省不知不覺容易喪了初心也與薛僑聞汝南征跂余望之久矣及過余而余乃在海上歸而悵然收鈔細務何足以溷汝然潔廉惠愛使行旅欣欣然咸願出於其塗則其益亦非小也不寧惟是縉紳過者日得相親其善者可為吾法其不善者可為吾鑒且得廣詢博訪開拓胸襟人有未同勿強聒與之講學我之虛憍與謙抑與只接物間亦自可驗也昔曽寓一書至京師不識己達左右否惟中愷悌君子而為姦民所誣願為世道計力扶公論幸甚幸甚便中草此尚容後布與李子庸緬惟吾兄孝心純篤夙喪慈母哀恫終身弗弔昊天胡今奪先公之遽曾不憖遺以慰孝子之思未審自罹荼毒氣體何似校卧病空谷中山川阻修既弗獲趨弔比於執紼之役又弗克以時奉慰下忱曷勝惓惓素帛一匹奉致几筵少充賻儀鑒納是荷嗟乎吾兄純孝今而後無可以報二親矣惟專勤精進自致其身於聖賢則可以顯親為聖賢之親啓聖太中所以流光百世也傳曰大孝尊親吾兄之力足以企此故為執事誦之昔者承諭今之講聖學者其説似若易簡與世俗之支離者不同夷考其行顧反不逮噫非吾兄之力學不能為此言也昔者舜戒禹以人心惟危孔子告顔子以克已顔亦自病仰鑽瞻忽之難而今之講學者其説太易易然只因不曽真切用功日用間雖有窒礙處不自知也夫子曰為之難言之得無訒乎又曰其言之不怍則為之也難只此二説真偽判矣淺陋之見髙明以為何如與霍渭先别久瞻仰髙風曷勝引領聞寓書懋貞自言死期且至屬以墓銘想天祐吉人病今有瘳矣嗟乎自古豈有不死之人哉而衆庶每生故常怛化吾兄達生如此足以占灑落胸襟矣死生大事既己勘破此關則人間世寵辱利鈍又何足以芥蒂哉雖然校猶有疑也吾兄既齊死生其於身後名何有而奚以墓銘為哉乾之姤曰不易乎世不成乎名遁世無悶不見是而無悶此其超然為何如也吾兄之力足以企此故為執事誦之别紙崆洞集奉覽其文學史記學選最後學子惜其未嘗反而求之六經也蓋晚而與校論學自悔見道不明且曰昔吾汩於辭章今而厭矣靜中時恍有見意味逈其不同則從而録之校曰録後意味何如獻吉默然良久驚而問曰吾實不自知才劄記後意味漸散不能如初何也校因與之極言天根之學須培養深沈切忌漏泄因問平生大病安在曰公才甚髙但虗志與驕氣此害道之甚者也獻吉曰天使吾早見二十年詎若是哉與李敉令先公安厝不知卜以何日是新阡穴是附舊塋山川阻修吾病不獲執紼言之痛心汝少不更事凡事只遵照令先公舊規咨稟於令堂及謀於族中諸尊長易曰藉用白茅無咎寧過於謹畏毋得輕忽也待人接物常宜謙恭此須出於誠篤若裏面驕肆視人莫己若而外面作如此聲音笑貌却是詐矣傲固凶德詐尤賊德之大者近世講學好説大話欺人固為可惡然俗學卑陋沈溺科舉中只要做好官不思量做好人尤可厭鄙也令郎長養想能行久矣慎勿姑息太過愛之適以害之胡純家貧族中尊長又多聒擾儘能撑持靜菴有子矣余杰驕惰慣了聞甚不肖未免為訒齋身後憂奈何奈何答王直夫承諭持敬主靜恐流於禪隨事磨礪又恐無本今且從事四勿愚謂此三言者若實用功則固合一也人之一心貫串千事百事若不立箇主宰則終日營營凡事都無統攝不知從何處用功又有兀坐以收放心事至不管是自隔絶道理如何貫串得來如愚見日用間不問有事無事常存此心有箇主宰在此事來就此事上用功直截依著道理行莫要被私欲遮障纒繞如此才能貫串得過夫子贊易曰敬以直內義以方外而又曰六二之動直以方也愚見如此不識髙明以為何如答季明德承示學問主宰全在忠信而其樞機自不妄語始若匪鞭辟功深何以能如是欽仰欽仰但觀論學二書言之又太易易似與聖賢訥言敏行相反恐非所謂立誠也大抵吾兄天資過人不患見不能及只患守不能堅不患不能發揮只患不能檢束詩云采葑采菲毋以下體惟髙明擇之答歐陽崇一純甫聞至南雍甚為吾道喜但未知彼此能虛心相從否邇來講學者衆吾道其復興乎但往往好為空言與晉清談何異昔者禹陳克艱舜不敢當而歸之堯臯陳知人安民禹歎雖堯猶難只此可見唐虞氣象若在後世便只管説去更不顧行矣回狂瀾於既倒障百川而東之繄吾兄是望與王純甫嗟夫世道之衰極矣人才至於今每下則以科舉壞之也而邇來講學者衆天其將興斯文乎而又往往好為大言太朴愈散徒長驕肆不知天意終當何如而兄適為大司成此誠一大機會也願兄以興起斯文為已任夫子循循善誘人所願惓惓汲引使人才丕變一畨慎毋髙亢自居則物情不通多士無緣興起以吾兄之才之行而不篤意於斯文校將何望焉崇一賢寮也而講學似訥行敏言者願兄積誠以動之則所助必多矣答利賓仕宦而能廟食百世者惟守令為然耳以實惠易及民也汝莫嫌自才短亦莫怨他民頑只要積一箇誠若真能愛民如子民亦真愛我如父母矣切忌不可用術民至愚而神爭以詐術應我一不成而萬有餘喪矣才髙之人往往坐此而敗况才短者乎行有不得者皆反求諸已汝但憂誠之未至不憂民之未孚也嗟乎今世吏道多汚此與盜賊何别豈盡亡羞惡之心哉良由義利大界限不明便因循墮落至此汝素能立身決為清白吏無疑然亦不可不常勵志中心如自固外物豈能侵卓立故也誰道百鍊鋼化作繞指柔頽塌故也承問紀兒邇來多病今小瘳矣只為才髙易肆也詩云溫溫恭人如集於木惴惴小心如臨於谷旨哉言乎答徐伯仁慨自聖學不明吾民久不蒙至治之澤矣汝小試一邑毋曰民寡是即孔門之為邦也若誠心惻怛子惠我民民欣戴之真如父母只此便是三代矣所示鄉約諭民條章俱惇本善俗憂深思逺之事但須先有一假誠意感孚於民然後因機導之庶幾不為文具言不必文亦不必繁只須直説使婦人孺子皆可通曉保障一節上下恐難行此實有聨絡氣勢而隱然無迹乃善耳海鹽吳布政昻循良吏也地近凡事可以咨詢天氣漸熱願靖共自愛答林相故人貽我書恍如對靣語甚慰甚慰今學者立腳跟不定只為義利大界限不能直截分明汝能固窮凛凛松柏之操足以風勵諸生更須直以師道為己任先求諸我身合於聖賢者益勉之背於聖賢者亟懲創之鞭辟近裏著已朝夕以古之學誨諸生振起俗學之卑陋使各以聖賢自期待讀聖賢之書句句就自己身上體認踐行氣質有長處則與成就其美短處則與匡救其偏信吾者交相切磋疑信且半者更相誘掖弗信者姑俟之其尤弗率教者勿遽怒之姑惟教之不悛而後警之必自引咎自警省待之如初庶其改之陽信而陰自恣者宜照察之勿為所欺察而知之容蓄勿露又有一種好髙自大以聖賢自命而實虗志驕氣使之者此不必輕與辨論須就其日用行事處細與點檢彼若自覺過差肯實用功夫却儘可望也義利辨别貴嚴又須渾厚不露圭角乃善虗以受人謙以自牧此不是強為須真箇欿然不敢自是不敢自足乃能日新耳與王純甫聞將移疾歸寓書問候無何而留别書至矣天假邱壑匪欲以安佚遺兄固將望之以完養厥德大庇斯民耳願勿虗送日月昔嵗校夢孫真人問余養生之道答以飯後當為言之既而悔過請教真人贈余茯苓盈斛其中有如貫珠者余頓還赤子乍有知識以前真境吾兄在旁真人呼將與語未及而覺校於養生茫然弗知何故乃有斯夢兄昔抱竒疾究心於此願有以教我與劉汝楠子曰才難不其然乎匪天不降才良由人多不能自成其才耳故人佐郡無以相告惟曰天下之寶當為天下惜之校昔少年筮仕刑曹人情物理懵然不通惟惻怛憂民之寃每訊一重獄必夢先祖告誡以故日惕一日不敢任血氣輕易箠撻人有訴不平者雖甚喧聒必盡其辭時多病或厭則自責曰問事兢挽鬚誰能即瞋喝盍不推是心此皆拙者所經厯故為髙明誦之與聞人提學頃承使節辱於敝邑考校士類惟公惟明而復崇奬實才表章遺烈甚盛德也疇不祗服但彭烈婦入祠一節尚以傳文未詳致厪明慮而未允某等義不容默輒敢誦其所聞昔烈婦之喪其夫也其時家業陵夷無以糊口而舅姑並沒煢煢靡依雖存夫兄六人雅不讀書識禮况有贅姑意若氷炭而居烈婦度物審時灼見其有不可久存之勢而秉心塞淵又篤守夫親沒不復歸寧之節且知其兄介菴鄭公之賢真可以託其孤是故以義自裁先託其孤於舅氏然後從容就死死出於正夫豈泥愛夫婦而忍情於母子間哉嘗聞其遣婢抱子以適舅氏時飲乳其子出而復召召更乳之撫摩良久如是者三戀戀然而不舍訣則其託孤處死實出於萬萬不得已之情可以質諸鬼神而無疑也使當其時家雖貧而舅姑未亡亡矣而其家守禮或烈婦之兄弗存存而未必賢孤不可託如是而死猶為可訾今既自全其烈而又善遺其孤孤卒賴舅氏以有立及今子孫為良醫於藩府則烈婦之奇節逺識殆無間然矣比之見祠三貞豈相上下彼既已尸而祝之烈婦乃不得爼豆於其間其於缺典為何如也某等不佞謹稽諸舊乘參以故老之言直陳如是伏惟執事詳而察之俯賜俞允若夫鄭節婦之孀居七十三年白甌自保始終一節可與秋霜烈日爭嚴者執事固已諒之矣不敢贅辭亦惟早賜施行使一節一烈隆然並祠匹夫匹婦有所觀感其有功於名教豈小小哉某等辱在下風不任惓惓瞻望之至與聞靜中戴司冦亦近時名卿也御屬嚴然乏知人之鑒諸曹濁甚而多髙才上之人倚信焉負其勢劫持同寮使從已胡希曾以一廉處羣汚中上下交遍摧之屹不易節既而胡永清李立卿至部中若增而重才高足以壓制小人也及得余子積張時峻善類益多而朋黨分矣校入官時小人道消久遂不復有黨今吾兄為司冦子部多賢昔是昔非又何足論但希曽一時矯廉之功不可忘也故為吾兄誦之校觀近世士大夫爭以文學議論相髙而莫肯事事何異於晉人之清談哉矧所謂學當務有本有用若詩文已耳則適足以長傲竟何益哉吾兄有志於世道人才願於此加意答黃汝玉聞汝出宰江陰且喜相去伊邇政聲可日聞也吾嘗謂今世仕宦堪以廟食百世者惟守令則然令尤親民矣然曠百世僅僅一二見者何哉卑者汩利髙者騖名而實惠及民者寡耳汝為人父母其毋謂民頑毋歉才短民之頑與勿庸忿之姑惟勸之才之短也勤以補拙問以求助毗陵有毛司諫者吾友也唐音者吾徒也皆可問也推類而廣之邑中薦紳鄉閭父老皆可問也屈已以求之虗心以察之皆有益於我也守已潔廉愛民懇惻推此道也蠻貊可行也矧文獻之邦邪答沈一之校昔妄謂學須反求諸已然非篤信聖人或能自誤以故一遵聖賢之言就自已身上體貼去做見到的然處方敢自信雖然猶恐易差也兹承來諭厭時學之自髙可謂確論吾兄篤信矣更願於反求處加之功何如何如承問祔祭事校詎能裁決哉但既下問不敢不盡其愚竊聞禮時為大順次之勛固宗子今既未立後而吾兄以尊行權攝遽使之當尊則非其時亦且為不順但當隨其叔父祔食俟立後再議耳答林相小兒蒼顔而頎才髙而竒遽爾短折此吾不德獲譴於天又不善教所致也怨艾莫追矣所幸小孫風骨頗異校雖不德祖宗積善也久其發於兹乎來諭比擬大非其倫固以寬吾不知陷吾於惡惶恐無地所示條約鄉約甚善甚善但條約所論功夫須體會為一才是立本才是易簡否則只是湊合也反求諸心還能虗否若有意氣在便易外馳江右禮俗吾甚愛之慕之鄉約須與俗約並行更與鄉士大夫講究宗法譜法欲大合族必立宗子族長族尊族正相輔而行鄉約亦須立尊蓋禮俗須是士大夫倡率則上行而下效也保伍法更宜講究只就鄉約中默寓軍法不可明言義總之名亦不必立在臨時命之耳性理節太草草明道先生遺言最切於後學吾嘗與陸伯載歎説三代而下命脈實在此欲提掇出示人未遑也周禮沿革傳乃吾未成之書尚覬有進序文傳出甚是不安宜毁之吾友靜菴忠義奮發死生以之不合則亟奉身而退屹有大臣之節承示周太卿可繼靜菴不勝欣仰惜無緣一見也吾氣體尚如舊不必逺念與鄭窒夫别久不獲望見顔色寤寐有懷時見一二大篇侃侃正論金玉爾相鐵石爾腸偉哉偉哉每歎天下固多英才無端被銅狄引却一輩訓詁詞章又絆了一輩故判然成古今雖然是皆為風氣所驅者也若夫豪傑之士自當超出風氣不作三代以下人物愛莫助之聊致祝望之意與應元忠吾兄天挺英才也任真而行喜佛學之空曠一似缺却煆鍊功夫今天降拂抑將有大造於吾兄也承諭古人進德多在莫年以衛武公蘧伯玉為法卓越如此敬服敬服更願奮厥大勇如夫子之發憤忘食孟氏之所謂動心忍性增益所不能始得百尺竿頭進步耳從今何以驗勤惰哉但就日用間忿怒處或著實體察或是德性上發來或是血氣上發來此一大證見也佛學與聖學其差毫釐而天壤易處願精察之若不參透此關終被達磨踏在腳底做不得振古人豪也校不幸喪子今復喪孫此天譴否德欲喪吾也昔者汰不盡之汚穢今欲一切淨盡之而畏天以終身吾兄不棄願時有以振我廣右之事承諭乃知其精詳足見憂國憂民赤心但孫方伯昔嘗同寮似是同年吳德翼輩人今若此可駭也答王純甫參姪會試特令請教門下後以陸路寓書竟弗得達校甲午喪子以達破憂以敬易哀今春復喪孫爾時百念俱忘恍若見性始悟釋老之幻聖賢若可企及而連續為難校之否德天實厭之或大警之敢不一灑胸中汚穢畏天以終身未知何日得以樂天也海內同志莫如吾兄神交數千里外願常有以振我嗣續之計方此圖之未知天肯宥吾否敦夫久不得書維時溽暑願靖共自愛與王郡守克敬承問四事此吳中膏肓之病小民所由困窮也明公欲從新整頓一畨吳儂孰不歌舞盛德校雖不敏聽於下風不勝欣幸矧承執事下問敢不罄其一得之愚第恐匹夫匹婦不獲盡其情則事終未善已命二三子博訪民情土俗所宜俟有成説乃敢以告丈量一事今且就緒矣采集士民輿論先以上聞其弊根最盤錯者各墟總數與各墟細數不同總數常多細數常少然有一簡易法可破又便於民蓋總數之多者乃書手作弊專為做荒欲多免糧也細數之少却是小民每年還糧實數今但據細數查對各墟還糧原數不欠即己就將總數差處改正不惟弊革且不擾民况侯在吾蘇功德甚大廟食百世今蘇民無長少咸謂明公百年難遇欲望公復為况侯所為特抄况侯奏減蘇州重額田糧疏稿奉上此外惟願明公提紀綱惜精神督各縣可也代各縣不可也小事海涵大事斧斷靜若泰山動若轟雷昔者嘗面告矣更願加意幸甚弔費主事懋賢日令先公趨朝校卧病弗克出迓心殊不安則又自解曰公康強固無恙有如解組南還逺候江滸未為晚也詎意薨逝太速辛巳一别遂為永訣邪每數歸期遣人偵候一日張允清報云鵝湖公喪且至矣亟扶病出吳門問諸郵傳杳無消息允清又云傳者妄耳返棹未數日復遣人偵候則云靈柩已過矣山川阻修多病弗克一往弔哭䀌傷我心每念筮仕初即蒙令先公以范文正期待今日月逾邁道德日負於初心俯仰慚愧自度無可以報令先公矣惟願少湖文星抗志高明超然如在天表不以一毫塵滓纍心赤誠以報國朴素以承家使天下咸稱願曰卓哉此子乃鵝湖公之善教也校忝通家與有光矣幣一匹奉充賻儀聊以將逺忱鑒納是荷與錢治徴承顧愧無以為忠告惟是守已愛民不替初心再三致此意更願令尊諄諄分付隨去僕從此行不是樂地乃是險地慎守則遷喬木疏失則入幽谷昔人有言萬分廉介不過小善半點貪汚便成大惡士大夫不但當以此檢律自已亦當以此防範家人也答唐應德别後恆切嚮往聞杜門讀書聖賢之書既以妨於心學弗讀然則所讀者乃諸子百家之書或後世類書文集不知以此求放心邪聊遮眼邪若遮眼謂之玩物喪志否邪此為格物致知邪多聞多見邪譬諸取友將求勝已者邪同己者邪長吾遊心汩吾照心不可不精察也聞嘗以讀書為業次此恐未合於聖門近世詭聖之言多出於好人而一向差却便至於此願與勘破庶可相切磋若不知不覺被留下些種子他日能為害也答馮用先校也生今而好古志大而才疏固天所棄也日故人過我偶因事論事是何足以言經綸人從心上起經綸必也養得此心篤厚懇切可以對越神明庶幾感格上下所至響應才識意氣小小能解耳大學云如保赤子心誠求之雖不中不逺矣未有學養子而後嫁者也今人多學養子不知只患未誠心果真切自能求民所疾苦也世豈有赤子號而慈母嬉嬉者乎天久晴明利於收穫樂民之樂更願憂民之憂不備答方時舉伻來知尊體常欠和失於問候校淺之為丈夫矣乃蒙長者下問欲消鄙吝之萌愧甚愧甚敢述其所聞人間世最難透者是死生一關透得此關一切順逆得喪又何足道必須提起此心方才照勘得破若逐事物滚何由超然也宋太祖詩云未離海底千山暗才到中天萬國明淺見若此不識髙明以為何如答王純甫鄭壻書回述吾兄聞校喪子喪孫意沮色慘兹承數千里致慰且有楓山之祝深感厚情校昔少年筮仕時有王舉人診校脈曰他日類楓山寧非素定邪今不敢望其壽但願天早賜一線是天赦吾也承教簡略數言而有無窮之意雖然竊有疑焉喜怒哀樂未發性本空也發而皆中節其應亦未嘗不空聖人體用一原也世人不無潛伏故有前塵妄動故有緣影是故不可無戒懼慎獨之功釋氏厭人欲之幻并與天性不可解於心者而欲滅之將乍見孺子入井怵惕真心與內交要譽惡其聲之妄心同謂塵影則與聖賢之學霄壤矣吾兄志大才大而作用處不免孤髙得無少偏乎願更加察也答唐應德逺承書問感荷無涯開門授徒無乃省事中又添却一事誰始為舉業作俑知耗了人多少精神心中添了多少葛藤蔓説縱斬絶之猶恐牽纒况可引惹乎若欲因此轉移人才却是先以欲勾牽後令入佛智也文公謂舉業是一厄詩文是一厄簿書是一厄校謂只此三厄埋沒了天下多少人才願應德卓乎萬物之表莫以此等攖心若謂此是業次是指尋花問栁與力穡同也愚見如此不識髙明以為何如與彭通判聞名久矣日承過我望見顔色知為古貌古心君子人也王事有程期雨中不能留客中心闕如屢欲為陽羡之遊擬從容承教屬家中多故未遑此情恆惓惓也聞有子夏之悲老景遭此旅懷其何以堪緬惟石屋古朴之姿朝著中著不得仕途中著不得自當於山林中求之昔者為七十二峯主人亦是暫主若千峰玉立萬壑鳴璆天將盡畀之延清風明月為主賔昔人有言幸託林泉交物少故於情性得功多又云秋光好似宦情薄山色不如歸興濃校與應德雅欲久留相親吾儕之幸也吾鄉之幸也豈不惜賢達其如髙尚心每用此怏怏溽暑在邇願為道自愛與邵子存嗚呼令先公髙才服善樂從人言憂國憂民出於惻怛勤儉之德儀刑於家真一時正人也而今已矣嗚呼傷哉聞葬度已後期弗獲比於執紼之役中心缺然令先公正人汝為冢嗣必也執禮遵儀使死者有知乎生者不愧死者愈安乃可謂孝今不免俯徇俗態令先公難瞑目矣大丈夫凍死則凍死餓死則餓死方能堂堂立天地間若開口告人貧要人憐我以小惠詬沫我子存汝自猛省若此得無為賤丈夫乎義助一事汝今頗悔否一則遮沒了朝廷厚恩二則壞令先公清德三則汝還要做人否官府切不可輕身出入以事干之子存汝自猛省他日做官把朝廷公法來做私情心下還過得麼大巡聞是令先公門人忠厚之至此聲一出求託汝者必多妬忌汝者必多况又是大比之年汝宜絶足不進察院大巡必愈重汝兩司必自敬汝若不能自持出則譊譊輕言入則瑣瑣有所請託則汝必不成人令先公不享汝食矣令伯父想不我信不敢輕致書以全交也相見為我致敬答歐陽崇一嵗莫王汝中過我自咎只於宛轉世情和合議論上用功不曽收斂停蓄校聞之悚然受教多矣今承來教亦如之信行斯言則昔日講學異同皆不必論矣日用間行事疑礙必多凡所切磋皆實事求是矣世之變也君子自以為有餘其治也自以為不足敬為吾道賀校遭百罹天大警之而亦牖之幸於性情有得力處學問之道無他其用功在復性其收功在定性然不知定性則亦不能復性矣與王汝中别久瞻仰如渴每欲懷以好音而無南歸之便兹值良便病中不能作書昔承教時每見自訟只於和合議論宛轉世情上用功不曽收斂停蓄至哉言也假令聖賢復生所以針砭汝中者亦無以加此矣但願益以此言鞭辟近裏著已篤吾赤誠訥訥不能發口才發口便覺慚愧萌生如此方是內自訟也何如何如答歐陽崇道嗟夫嗟夫東吳民力竭矣外被富庶之名內實罷敝區區彈丸黑子之地而當天下之半其何以堪物不極不返今兹天遣福星固將大活此一方之民也幸甚幸甚願以周文襄王端毅為法開拓心胸集衆人耳目為耳目乃能盡民間利弊一二罷行之邇來吏道貪殘貓與鼠同卧忽聞有所劾治打草驚蛇自此亦當嚴憚矣王守竭力為吳氓賦役二事豈便謂能解倒懸亦且得伸一口氣而困於多言微公主之又只作一場話説矣恐終為人所阻愚見賦當寬民更莫增科一以便民為主匪專革弊役當少優士大夫不惟杜其多言亦國家待賢之禮也别久瞻仰如渴天假良會旌節旬宣吳中校適以病不獲晉謁道生靈困苦之狀與其仰望之情伻來忽蒙惠書重之以腆貺感荷無涯承念嗣續匪公之厚德直道安肯為此言銘刻銘刻校夭子三人矣自度精力稍勝前而有所不足方尋醫問藥為補此一假造化未知天意如何答聶丹徒病中久不聞尊叔父起居恆切懷仰忽承執事書如覿顔靣校也進道不勇日月將不待人執事方富年謂宜立志如天之崇而循序用功如地之實上以古聖賢為我師胡乃執禮過恭下問於校得無借聽於聾乎聞命祗辱儻髙明不以人廢言日用間有得力處及疑礙打不過處相與商量不敢不盡其愚也今日至難為者莫如縣令然仕宦廟食百世者亦惟守令為然校每見從政者始未嘗不憂勤渴欲聞善久而識達世故寖異於初以一邑惟吾獨尊虛美者多不得聞其過也此乃恆人之情髙明決不為此然不敢不以告也與聶郡守文蔚天厭否德喪子喪孫怨艾之餘始知病根俱緣不勇虛底天理不能勝實底人欲天故大警之今敢不自淬勵畏天以終身自量精力未衰寡欲而博施儻天赦吾尚可以得子也僻居窮鄉無由通起居曷勝懷仰令姪遣使至敬附此書所願大進此道敏行訥言以靜御動屈以尺蠖未也蟄之以龍蛇何如何如答胡郡守孝思多病久疏故人伻來忽承書問恍然若覩丰神承諭行事必近於王欽仰欽仰嗟夫王道之不明也久矣其故何邪王道之不行也久矣其故何邪此無他闕却天德也若篤吾赤誠上下誰不響應如不吾信請觀溫公當時豈無才過於溫公者乎至於感動天人則邈乎不及逺矣溫公嘗謂劉忠定公云天人元無兩箇道理只因有這軀殼須著思誠又云自不妄語始卓哉言乎聖人復起不能易矣敬為公誦之與薛君采校雖未及識執事而神交久矣王令下車蒙寄聲惓惓校何以得此哉昔嘗獲見老子解集竊意執事默而好深沉之思天資本自近道第從前似嘗役心於辭章後乃落其華而就實習心或猶未忘聲利天下所趍知動執事不得但未知思慮尚能不纍心否聖雖學作兮所貴者資執事既有其資矣願益篤志聖學如易所謂知崇禮卑者不崇則不能超然不卑則不能去切已之實病詩云采葑采菲毋以下體故敢效其區區古之善修黃帝老子者今莫知其若何用功矣凡涉訓詁者前後自不相入一章之中亦首尾衡決獨執事之書貫若一也雖然校生也固不固則不能叩執事之微言明道有云此言論道非所以論為道也不知此書是欲發明道理是欲指示人功夫令循循有入處若欲教人下手願提掇一二言而毋費辭乃真迷者之指南也天氣漸寒願若時深根寧極不具答顧禹錫校老且衰矣乃承下問勤勤得毋借聽於聾乎聞命祗辱執事年富力強謂宜大肆力於聖賢之學所進詎可量乎昔人有言文章一小技於道未為尊豈直未尊而已邪溺志妨功其為害道大矣承諭欲斬絶之甚善甚善但恐心於重處發熟處難忘罅漏未易塞耳又云讀經史無所得此固謙謙之辭然亦未知若何讀之博吾見聞邪反求諸心邪此通塞之機聖學俗學之辨也管見如此不識髙明以為何如復王道思昔承下問校嘗誦其所聞隨問以答窮所未逮慚負實多不謂髙明乃能聽受志向有加於前欣慕欣慕所願立決定志用刻苦功勿認意氣為志勿以大言蓋之虛檯此心不在本位克已最難事事不肯放過猶未免有錯也管見若此未知髙明以為何如王純甫心學淵深人品超卓屈己以親之當有益也復胡郡守孝思伻回嘗復書請教王亞參過又承寓書詢及周禮沿革傳成否惓惓好善之心公之盛德也此書尚未成自量精神未衰欲完養以覬有進耳承寄秦安志筆力雅健追古作者自非博學髙才詎能若是加之以端重及常有恂恂之意則當於古人中求之矣見海漕策為之駭然校雖不敢隃度然此天下大勢亦可以理推後世水官失其職也久矣而考工記數語尚存有曰凡溝逆地阞謂之不行水屬不理孫謂之不行又曰凡溝必因水勢凡阞必因地勢善溝者水潄之今倡議者不知曽察其地脈否曽度其水勢駃否書云海濵廣斥世所傳千里長沙即其地也既是浮沙則漲沒不常開通未幾淤塞隨至勞費將無窮況河運必須所至有居民瀕海之地恐不能興旺也伻回急不盡所欲言若他有長策出人意表者便中願亟還教校所欲急聞也慰羅達夫杜門幽居如卧空谷故人如達夫非不寤寐有懷而無由一通起居慶門有大凶變欲奉慰者數矣竟以乏便而止負罪負罪達夫孝心天至其於哀痛固當倍百蓰恆情雖然孝有逺者大者所願抑損至情俯從先王之禮篤志好學成身成親達夫自致於聖賢則親為聖賢之親啓聖太中所以流光百世也達夫昔奔喪過姑蘇時校聞之也後不及往弔人頗傳聞言論風旨如愚之固陋更願達夫於自聖作聖處精察之絹一匹奉充賻儀千里微誠藉此以將鑒納是荷與陳原習昔見吾兄自言渴欲得人規過雖然如校之直亦無開口處他人彌難矣此恐有箇病原願反求之泛泛以求亦未必得願精求之求得後却取别紙開看何如何如答王時行一别十有六年遐想吾兄進德甚勇其於瞻仰曷勝惓惓今兹承寄三天悟易説髙明所見固自卓爾不群雖然吾兄豪傑之才也根本不帖帖地鞭辟近裏著己固嘗用力其於致力或未遑伊川有云立言貴涵蓄不使知德者厭無德者惑何時得一見相與剖天根月窟之祕以闡心易邪答路賔陽南都一别十有六年而始會於淮陽今又十有餘年矣故人之書屢至校鄉居如卧空谷非惟不得候望顔色亦無由可通起居恆切懷仰承諭著實之益只此一言不勝私喜乃知故人進德修業加於曩多矣每歎交遊中别之十年或二十年比再見之聲譽日隆才識日進而完然赤子之心非復曩之時矣如吾兄所稱古人腳踏實地做者何可得哉何可得哉但所指功名捷徑者則恐未然凡立功名者上雖有愧於道德必不決性命之情以叨富貴也今邊備大可寒心吾兄昔在上谷必能洞知其利弊不知若何處分乃可以銷國家莫大之慮中州在今日視他鎮為晏然一有事則截然為砥柱國家任用意當在此二處俱求一圖蓋欲知山川脈絡也惟時天氣漸溫盎然吾人仁底氣象擴而充之六合同春也願若時調燮以迓天休不具答唐應德總總中承賻并示之教言無任感荷久失致謝人心元神昭昭靈靈收斂停蓄因其真機引而伸之觸類而長之自有無窮之妙校未之能也億而屢中校亦弗屑焉應德邇來作何功夫想日精進此學須見得收功處則發端不差應德髙明一灑支離之陋豈非大快事却覺似好潔者又未免别生出弊端專內遺外日用間分本末作兩假事如此又仍是支離也愚見如此然與否與與胡中丞孝思校嘗謂今日事最大而勢甚難處者宜莫如黃河久欲請於執事以乏良便而止兹因便風敢布一言黃河變遷亦多故矣要其迹多在今山東願選於屬官中沈實而有文學者得數人指授以方略令循行遷徙處考古證今畫為一圖令他日治河者有所馮據以發其獨智豈非千古之一快哉圖成早得賜教至懇至懇與王純甫校每見講學者往往未老而衰無收結處因內自猛省覺有多少牽絆在自治不痛切長惡容姦天安得不與之大敗露毛髮聳然吾兄剛大之資逈與校異但恐用功處亦未能大副天也吾輩今俱是五十以上人若不致力更待何時願賜砥礪共進此道復沈一之承教衰年宜有接助校豈敢不屑為但不知耳執事若肯見教幸甚幸甚近體大學頗窺聖學之樞機至易至簡説者自生繁難陽明蓋有激者也故翻禪學公案推佛而附於儒被他説得太快易聳動人今為其學者大抵髙擡此心不復在本位而於義利大界限反多依違明眼人觀之亦自易破靜夫若實用功今雖路錯畢竟肯回頭也只怕不肯切實克已耳答鄧魯别後屢得故人書噫汝之惓惓於吾亦猶吾之惓惓於汝也聖雖學作兮所貴者資汝資固自近道但未嘗死中求生勇猛用一畨功來天理人欲不容並立要須誓不與賊戴天乃可決勝耳與吕仲木小兒短折兩承惠書深感通家之誼近見詩樂譜惓惓哉吾兄好古之心意未嘗不欲推今世為唐虞也猗與偉與但此生不知而作吾兄盛德善不必其自已出也而樂取諸人亟為之刋行為之奏請毋乃未深察與吾兄心體至虛至平試因校言而少加察將惡之矣蓋其術本不能誤人而借重於道德名賢反足以誤後學也樂之道圓而神其妙全在散聲矣此天籟所以混融也散聲多者不可損少者不可益天然而然或傳開元詩樂直以一聲叶一字文公深疑之此殆神解謹奉采蘋譜一篇試求知音者布之八音何如何如答胡孝思承諭𨽻楷興而篆廢壞愚謂廢則由之壞則當罪斯篆古人天然之妙悉從廣大胸中流出傳久而訛六王畢四海一李斯適當同文之任乃以小智穿鑿妄改古文此與蕩滅先王法度同一軌轍也李陽冰作篆髙古上配李斯真可雄視百代但其妄作殆有甚焉只如謙卦一字而數體此何為哉好竒逞恣故也尚可以語心畫也哉愚意欲考定六經一復古文之舊但校既多病又無同志者彼此商量以故事竟落落難合也昔所寄六書願一一正其紕繆至懇至懇便中草此容俟後布與何子時故人逺在萬里詩云一日不見如三月兮矧别已數載我思當如之何昔之大儒自少卓然欲學聖人卒其所成就尚不能自滿其意吾人學已後時若不立決定志勇猛用功日復一日必大負於初心矣元誠心學光潔勿欺志行卓爾不羣汝與之相切磋必大有益也與王純甫别紙子言之十室之邑必有忠信如丘者焉不如丘之好學也漢唐篤行者固不乏人列之於德行則不可恐所學未是孔顔之學也兄稱管幼安為潛龍且謂去舜一間如此豈但優於冉閔乎恐未免通人之蔽也論孟子處語意卓絶但不免有過處校嘗歎顔孟之學固自不同亦由不幸不及孔門使得親炙夫子則許多英氣不知不覺暗消常自以為不足矣純公最淳厚而其言露圭角處亦時有之校每見此惕然內省蓋吾人去聖彌逺尤宜於虛志驕氣上磨礱默思聖人德容以求融釋脫落也有若言行氣象似孔子恐其學未免求之於外曽子謂江漢以濯之秋陽以暴之此真知聖人心學者也以此觀文中子不是從本原上學只是從外靣安排續經非吳楚僣王但氣象自陋耳一貫忠恕之論深悟聖賢宗旨但以忠為正心事恕為修身事此猶未免小疵聖人之心渾然天理周流無間吾人被人欲間隔必須發箇真實懇惻底心逐事事上打透故忠恕不是兩箇功夫通大學格物至平天下都包了大要只是一箇活底敬也嬰兒哺乳一假妙甚正心修身體用之説甚當而意未完誠意正心修身一節密似一節誠對偽言似容得惡在惡是萬善之鬼賊故曰毋自欺正對偏言是過不及有所説得重本體受他纍也修只是檢點恐發用處不覺有偏之其所説得輕大偏已去防有小偏也到齊家治國平天下更不説節序都只從身上説起而關紐歸誠意相望千里會晤無由有不合處千萬一一批示與林相自汝之别吾旦夕念汝亦旦夕憂汝汝之才可以大受可以深造而今則未且道何以故汝自思之吾欲與汝下一語曰放心以逺易曰聞言不信汝必信未及則又為汝下一語曰汝喜事以為功為所牽引汝信乎汝疑之乎古語其心之出有物采之又曰與接為搆日以心鬬又曰心卧則夢偷則自行使之則謀又曰心於重處發熟處難忘皆至言也夫學以定性為極然不見性亦無由定矣且道如何見性莫引陳言直舉心所自得處説達夫曽有謝書未知已達否答王純甫書録具别紙答甘欽采兩得故人書惓惓於講學此吾兄樂善不倦之盛心也敬服敬服林廣文往有書奉復想達左右矣嗟乎學之不講也久矣今而講學者日以衆道其復明矣夫雖然談道者一何多也而實體道者一何寡也談若太易易然道其不明矣夫吾輩欲學聖人不求諸人生而靜秪就孩提有知識後説起又不察性之欲與物欲則是以念念流轉者為主無端生出許多議論來聽其言不曰且聖矣夷考其行猶是凡夫且虛擡此心不在本位日用間真病痛却都放寬校為此懼深願諸君子以拙自處把世間一切名利底心斬絶淨盡立志如天之崇循序用功跬步皆踏實地但諸君子自占地步已髙又有喜同惡異之心莫肯退聽大學指授知止此是千聖淵源且道止是如何若於此悟入則功夫有箇起處便有箇究竟處若由大路然校作六書精藴於此有相發明者謹奉數字請教録具别紙固陋之見不識髙明以為何如答鄒謙之久别惄如飢渴兹行天假良會校聞也晚又復無緣得京口書曷勝馳仰承命欲校為下頂門一針惡校何人乃敢校何人乃敢來教自病常照常流是必因用以遡體又病無成佛作祖志與應付僧較短量長是必發其真心超凡以入聖不暇為葛藤如此是已針著百會真穴想周身血氣都掣動瞑眩一畨精神大變換矣欽仰欽仰每見吾兄所作文字明白疏爽而力稍輕今停蓄收斂也久氣象必深沈言語必簡當非惟不當以故吾相待亦且絶筆不肯為人役矣何以故學佛者説我不是應付僧他直把來作黃葉飄飄看又不看作葛藤也出處猶語默死生猶出處只在反求我心莫要粘帶莫被牽引便常超然明道云外靣有些罅隙便走又云理無大小其要只在慎獨敬為吾兄誦之詩云采葑采菲無以下體髙明毋以人廢言答霍渭先承西樵寄大學原中庸原其間發明固多亦儘有合商量者此是繼千聖絶學須從實經歷處説但未有命不敢獻所疑兄子縝東還承吾兄寄所辨子靜之書今上其船者多矣而兄獨否卓哉卓哉目睹秋毫者不能自見其睫善乎兄之下問也此不自滿假之心也敬以所聞對象山振古豪傑也然而學未近道客氣纍之也吾兄之辨自察客氣何如慎勿自恕象山直指人心雖則能聳動人能救拔人而無實下手處如四勿三省之類惜也呌噪己甚上焉者厭下焉者惑中焉者為其所驅若先讀晦翁書乍而讀此若驚若怪不為無助若先讀明道書有得然後及此則固不暇過而問焉矣孟子雄辨猶被英氣害事况子靜乎假令孟子親炙孔門參於顔愚曽魯之間固將薰為太和當欿然自覺不足矣吾輩去聖彌逺謂宜追慕盛德儀容使粗心浮氣脫然融釋不作孟子以下人物何如何如答王長沙子正使君為政未久坦夷之心潔白之操愚夫愚婦或能知之薦紳先生乃聞有不樂欲相料理者東海病夫久不管人間是非未知其事有無然在使君正好自煆煉吾輩若透却名利關人安能軒輊我縱毁我譽我萬方我只消不見不聞便都了却我若是真金儘教他做烈火儻還有些查滓却藉他做洪爐猛煎熬一過是添我多少精神雖然此猶是小小關頭若還透得生死大關更脫灑在承雅愛不覺率爾發其狂言髙明以為何如校欲致書請問於鄧守不得階願求故人為之先容天氣漸寒陽德潛藏於黃宫惟冀若時保固天真不具與王純甫蒙陰令言邑去今武城太逺難於寓書子遊絃歌武城在其邑中二十里弟子周士淹回録吾兄大學解語意卓絶受教多矣但恐天資髙未嘗用過苦功夫來説得易易耳愚見録似别紙請教紕繆處毋吝一一是正至懇至懇老子解渴欲一見之千聖相傳俱是教人反朴還淳夫子老子説得尤切生於衰世故也不如此何以挽回造化但老子説得未免矯枉過正耳後世目為異端非惟不知老子恐於聖門宗旨亦未必知矣别紙大學功夫復性而已矣明我明德吾性自足元不須增添只要去其昏蔽此一言已盡矣新民者明我明德於人也變文言之者人性亦不須我增添只因壞了却要我變化他明明德有箇機竅識得則功夫有著落夫何故只為這道理就在當人血氣上發出來容易被他遮蔽日用間試自省察血氣用事常多其始就是人欲中剔括出天理久之天理才做得主雖然何敢恃也那去不盡的人欲剗不潔淨少縱則復張皇矣教人者若分我人則無含𢎞之量有忿疾之心只把做自家事反求所未至則意懇惻亦易感動他止至善者定性也此是究竟處吾兄見得甚髙至善者非他明德之本體也明德是他發出來的本來靣目性初萌動處難於名言謂之曰善沖漠無朕妙不容言故謂之至善此本然之善不與惡對中庸所謂喜怒哀樂之未發謂之中上天之載無聲無臭也大學先言明明德新民而後及止至善何故先從知止説起此欲人見性也知止是欲學者悟入處定靜安慮煞有功夫吾兄説得輕了雖則見得吾性本靜若血氣德性未能合一此心依舊牽惹得動正是雲駃月運舟行岸移必須用執持功夫校故曰執持而後靜謂之定不執持而自定謂之靜學至於靜至矣何以又言安曰此兼境言是處皆靜謂之安如何又有慮在此又兼有事言所謂動亦靜也到此動靜合一乃為真止學者若不知止非聖人之學也初學何能知故聖經惓惓本末之辨教人反求諸身傳文提出知本甚懇切新親古字互用大學新民作親書親逆作新易大傳易知則有親讀作新才與可久語脈相貫古書似此甚多若不識古文古韻便多窒礙校謂新民是明我明德於人之變文只以明明德於天下一言證之自見一是句猶云同此也否則與皆字重所厚正是良心親切處與中庸思修身不可以不事親同意傳文容後請教答喻吳江時書至知故人在鄰邑喜甚喜甚噫割雞得無用牛刀乎校多病杜門忘世久矣雖然每聞守令一善政則喜動顔色其不善則蹙額久之何也民吾同胞故休戚若在已也故人之來吳江數十萬生靈今而後得所矣前政足以為鑒其先有張明道者足以為法張嘗及吾門其人學佛無世俗一副當名利心故平易安靜民依之如父母然視卓魯尚未及必也淳公乎扶溝晉城此真故人之師也伻回先此奉復答陳元誠可琛至得元誠書未論言語何如只溫醇氣象自藹然溢於言外病我敘文自信太過無虛心屈已之意又疑吾近日學問見得佛老與聖人同大為我懼説到此可謂苦心矣深感深感校且老喪子喪孫罹此大難而志不少衰惟恐懼修省此無他欲自致於聖賢也古無自足之聖賢校今去聖賢甚逺何敢自足邪佛老之學自少年見得與聖賢别今更見得同則是中道而叛聖人也老子又不可與佛並言乃若是處雖出於佛亦不可棄但恐實陷溺而不自覺如此則全賴元誠救正也書尾靜修之言引而不發昔聞元誠論靜云一念不生既不執持又不茫昧三件犯著一件便不是今人多賴動為靜此正是元誠心學淵微處故能發胸中所藴然此是就已靜上説不知未到此地位如何用功才得到此既到此地位還有功夫用否千萬極言毋吝指教疑義録具别紙願一一訂其是非别紙純甫氣魄甚大人品孤髙然學似信佛勢己不可反雖然吾猶欲其反之故校答書引用佛語而折𠂻以吾儒之言使知佛學縱有妙處亦不出於聖人佛所謂塵指妄念也必先有這種因時才發出來故曰前塵此語亦自好但起念都説是前塵動得是處也説是緣影則大謬矣精藴中辨佛處亦儘多翻篆而楷凡楷本從篆翻因取便失了本義自宋來好古者每每欲正之但欠精詳耳字莫備於小篆昔嘗讀之每覺其未安自思古人若如此豈不自然何故却如此蓄疑不敢發後忽見古文乃與吾意暗合又有舊時思量未到忽見古文豁然開我心見得既多乃敢説李斯是小智穿鑿造古文者其心大以密故凡學問之功經綸之法造化之祕觸處自然發出來非吾強説吾但識得與他發揮或因而附已意耳六書若止象形則不足以盡變第三卷字下曽略為之分别體例就象形論須會之以神毋泥其形乃得天然之真稽實待虛以此言易己落第二義以後六書亦不如此混沌是對開闢言此是先天一之所由起有一而未形到開闢初有一自此有二而萬生矣這都屬後天吾心一念不生時便是混沌當其無有器之用此是老子語妙甚與聖人亦同大抵造化從無立有從微至著故學問要反本研幾大抵有質才有文文勝則喪質人知文勝之弊而不知盡去其文之弊恣睢自用與夷狄禽獸同如秦是己老子夫子俱生周末文盛時俱有志於反朴還醇挽回造化夫子説得平正老子便覺矯枉并不滿於先王惹得後來處士橫議秦人出來一切掃去文遂不成世界矣容再思之十一元也到十便反元方好再起百千萬一如之凡事皆如此此承反於一而言無此句意亦足今除之知道無中邊而不知內為主則茫無下手處知內為主而不知道無中邊則隘故曰此心學之全功也天文左右前皆動也惟北辰不動人身背亦如之故曰天根之學本易艮背之旨日行遲月行疾正是天象示人君逸臣勞之義先儒反之然於天終不合也內經云心藏神又有神闕神庭穴妙甚雖然此神明升降往來之道也非神之宅也諸臟皆實而心獨虛故神都焉元誠涵養精深必有超悟處願開其天天發亮則太和元氣盡泄不成造化矣惟其體玄團聚光耀只在日月上發故天元全人體內幽只開竅於目露泄神光目為之使故人之天元全閉口勿言則於求放心甚易上文言心之全體都奔在舌上舌不言亦有動意故下即引此句欲其閉口以固此心即仁者其言也訒修辭立其誠之意若嫌其是仙家語改曰善根何如電光以下語意本出文公因嫌五峰之學不務涵養本原只要執發見一端便張皇作用故有急迫助長之病明道見湯瓶便知陰陽消長之理見石壇濕便知天地升降之理燮字大則為調和陰陽小則為調和飲食字意故有抽添火候之言初不就修煉上説但修煉家不能外耳二盧可琛回有書奉寄想已達左右矣可琛行後始得見所與二三子書真切懇到深造自得之言也但所答梁生説却未免支離豈欲遊戲翰墨邪校雅不欲元誠作詩書意似不謂然夫詩之有律猶文之有駢儷終是俳體古人決不屑此未論三百篇只如枚乘阮籍陶淵明皆涵蓄有餘味亦可陶天真也雖然此猶是掠下説默而成之不言而信何暇假此乎與吕仲木吾兄出處關時運之盛衰凡在朝野莫不太息愚意獨推諸天道術為天下裂也久矣天將大有厚於吾兄使得專一於聚精會神之學反本而復其初挽回世道在此世俗酬應之作一切罷絶之何如與其俯徇人情孰與恭默以承天意詩云帝謂文王無然畔援無然歆羡誕先登於岸又云帝謂文王豫懷明德不大聲以色不長夏以革不識不知順帝之則敬為吾兄誦之山中靜極深造默成自得當益淵慤願時有以教我至懇至懇昔承賜先叔父母薶銘校具書拜謝願有過必告有疑必請以此為謝不識曽達左右否答鄧魯各在天一涯忽得汝書若從天而降何喜如之雖然其喜也乃不勝其憂也又不勝其懼也吾將苦口言之乎汝聞言必未我信雖然汝亦知吾苦心乎嗚呼後世英才不為少矣往往沒溺於身毒之教只為自家立腳不住為其所驅一遇棒喝師遂失其故吁可嘆哉亦可鄙哉昔者汝也好説光景今并撤開胸襟中滯礙若小釋者然而流蕩難反矣只為無實功故被新學聳動又去湊合佛學謂與聖人同聖人之教以三綱五常為主佛教欲絶滅三綱五常還可謂之同乎慈湖侮聖賢大無忌憚而汝好之何邪所示對竹數言大是脫空晉之清談未必如是今之講學能切實用功者無如陳元誠試就正之何如新學大抵敏言訥行先利後義説得太易易然髙擡此心不在本位所行不復可檢點明眼人決不能瞞也試一省看何如餘具别紙答張希虞往古來今人生何限矣其存也能不與禽獸同歸者幾何其沒也能不與草木同腐者幾何此無他皆因志不立及用功不精專也天理人欲勢不兩立果能誓不與賊俱生以死決勝則何人欲之難除也古人一日千里士别三日當刮目相待矧三嵗邪明年必得會晤當豫拭目以須也答王宗尹别汝多年無日不思汝何也以汝為學不無偏滯而肯朴實用功若此自能求所未至故吾常望汝大進惜道逺無由一見之忽承遣人存問始知從政於杭甚為杭人喜今之為民父母者往往學養子而未必心誠求之心一不真萬事悉為虛文癢疴疾痛豈復關於吾身汝素以毋自欺為學此言似不必告汝恐汝執著已見而不能盡民之情則所求者未必能中耳古之聖賢超乎萬物之表祿之以天下不足為榮困于泥塗不足為辱後人胸次小才為卑官便道受人氣不過不由進士科便道志不得大行此其自期待何淺淺也汝萬萬不屑此然微芥蒂於心亦能損吾天德也杭郡多事終日在大忙中應物而不與俱往守正而不主故常足以驗吾學力蘇杭密邇風便願數懷我以好音與沈一之子程子有言不學便老而衰讀故人莫春書颯然有衰意何邪吾人學不大進只為被凡心絆却故天心不純拙者所見不知髙明以為奚若端峰遺範當自有親切人言恐不足為重輕汲汲似猶有好名意何如何如與吕仲木王子崇西行老母病不及奉書其後託可泉轉致不知曽達左右否天下之望在兄一人傳聞吾兄頗有衰意惕然動心程子有云不學便老而衰吾兄完養有道人言諒非真然亦可助內省三代而下學聖人甚難甚難者但知識神之為神不知全其元神也前書舉文王必如是乃能純乎天德管見若此能不畔否願就正於髙明邇來作何功夫想益深造自得願有以振德我弔歐陽崇一羅達夫過我聞知令先公遘疾心常懸懸今嵗林相來則聞吾兄已奉喪南還矣𬗟惟孝心純至其於哀恫固當倍百恆情未審自罹荼毒氣體何似哀毁滅性聖有明戒所願強加饘粥輔養精神孝莫大於尊親願吾兄務其逺者大者篤厚懇惻致其身為聖賢則顯親為聖賢之父啓聖太中所以流光百世也山川阻修病體羸弱弗克趨弔中心缺然素紗一匹奉充賻儀鑒納是荷與李司業汝立别汝忽忽十年矣古人有言士别三日刮目相待矧十年邪其所樹立造就當何如也欣羡欣羡吾山林之日雖長愧無所得惟是死生關略看得破人間一切虛名浮利直是悠悠胸中差覺無事耳與黃宗賢承惠寄雲中疏藁足以占經濟大略矣欽仰欽仰竊惟執事所抱負者天德王道也其中語意頗覺抑揚得毋猶有人者在邪或恐郢書而燕説之此則愚之固也雖然不固不足以發執事之疑而助其觀省哲人斷國信於蓍龜雲中事勢竟當何如執事沈幾先物必有以洞照之矣惟時天氣漸暑願恬養自愛答應元忠胡純過我言吾兄以事在杭承來教憤世疾邪已甚勢若五嶽起方寸隱然詎能平嗟夫直道難容坐令正人困兹多口雖然兹乃天之降禍邪將天福之邪吾兄超邁之資本自天植不知所以切之磋之琢之磨之果能副天之玉汝於成否邪今兹紛紛毋乃天將大警動之邪吾兄何不奮厥大勇以其憤世疾邪者自發憤自憎疾於性情上實用功夫大學之至善中庸之無聲無臭此吾兄歸宿之地也詩云采葑采菲無以下體願勿因人廢言與王汝中昔在山中夢汝中偕伯載訪我校謂伯載曰汝中言甚懇切而學不加進何哉無何汝中果至消息亦大矣但所謂不進者陰陽相反乃神靈託以告余謂校不進也敢不自惕未知汝中內省以為何如大學功夫定性而已矣此心容易牽動何由止止汝中遊道大廣講説過多康節有云亦恐因而害天性所願羞澀其言毋使口滑慎擇所與交以輔吾仁凝然如山亭亭湛乎如水澄澄其於進德何可量也與崔子鍾留都一别且也三十餘年矣遐想年兄進德日以精深欣仰欣仰校也下士晚聞道聊以拙自修而又未能也亦太不勇矣近世講學者日以多道其復明矣乎道其復行矣乎吁憂方大耳虛志驕氣欲一蹴至聖人而言行判若兩截此恐即是談天衍彌天道安之流耳近見序文深斥陸學愚意陸學且未可非彼其功夫雖粗却是實做也淺見如此不識髙明以為何如與周行之吳氓亦嘗荐臻荒年然未有若今兹歉嵗細民敖敖不欲生若此其甚也今幸麥熟茍延鄉人有為令於山東者談彼中災荒尤甚乃若河南則口不忍道耳不忍聞痛心痛心吳中糧額太重雖良有司盡心法終不能盡善雖然若匪盡心小民受害那復可言昔者南昌况侯奏減七十餘萬石郡是以再造其後戶部持三十餘萬石古額不肯蠲除賈似道公田之類是也周文襄公設法隨糧起耗使輕者不失其為輕而重者折為輕齎以救其困其後派折之弊百出則以等則太多也王端毅公復更其法隨田起耗重者差覺減輕而派折之弊終莫能革天水胡侯始驗糧均派昔之神姦不剗自除而輕重復不均文安王侯乃為之牽攤其耗愚夫愚婦可使戶知凡沙瘦水深者則為之量減其法視前政最善而弊不無者有司度田未必實也此非法弊乃是人弊若得良有司踏實永有利而無害矣宋人爭差役雇役利害議論孔多今吳中實利雇役而有司以差役為名其害百端大抵官得其一而私費其四五甚則有破家者矣王侯始立雇役之法小民式歌且舞今更欲講求便於小民而復士大夫亦既有成畫矣二者皆吳中永久之利而言人人殊蓋或未究其本末也吾兄素善稱亭天下之事非憂國憂民無所用其心其於鄉邦利弊固已燭照而數計之矣乃聞深不滿於二法校且疑之未得其説敢請問於左右以求至當之歸病卧衡門瞻仰故人如渴無由一通起居兹因小壻王一誠卒業南雍附此問訊答崔子鍾自陽明之説行而慈湖之書復出禍天下殆天數邪年兄與湛年兄辭而闢之意則甚善但名未正耳何謂名曰慈湖之書逆天侮聖人之書也昔孟子名楊朱曰無君名墨翟曰無父慈湖之行未必能過墨與楊而邪説則甚以其為佛學也校嘗謂佛氏無天今慈湖既已叛聖人而從佛親為之奴矣而又呵佛罵祖陽主聖教欲髙出一層其敢於侮聖人之言者蓋學狠和尚棒喝禪宗呵佛罵祖家法無天莫大焉此書不焚不知顛了無限後生校每思之未嘗不為痛心疾首也承教漫及此與郭水部一别十年忽承干旌訪我於野愧無以告之竊謂講學不必多言只在自知實病痛處方可真切磋心不可有遊思身不可有惰氣遊思多則神明散惰氣勝則嗜欲滋斯言或可充韋弦之用也答熊恱之吾兄忠赤之忱潔白之操因心自然有大過人者來諭懇懇憂國惟恐不能保晚節是憂善哉言矣世之治也君子自以為不足其亡也若有餘使在位者皆能持是心太平可望也海賊盤根雖久然無難拔者近日之事本只該捕盜事勢相激遂致用兵主兵者權輕兵法不立遂至敗北賊徒追我師但觸下體不敢傷上體蓋欲自開後門也以故我軍死者甚少但船與兵仗盡為所得今聞湯總兵且來若能整肅軍法而無張大其事激彼民攻彼冦寧漏有罪而不忍殺無辜開其黨自相斬捕不日可平也傳聞逺方不知賊巢虛實多信流言又有生事之人造為征亂語吾兄膺留守重任必能靜以鎮之但恐此中事情言人人殊未有能得其的者故敢敢以告亦煩與撫公及操江公一言先定廟算嗚呼兵動於外福生於內廟算若善不知是救多少生靈廟算不善不知多少生靈肝腦塗地也嗚呼士大夫要幹大事者必須視民如痛肉一般自然上帝默祐易於成功若有要避禍及立功底心便是逆了上帝帝乃震怒功何由成況此賊本不多人今日平之易於反掌若張大其事奏聞於朝萬一朝廷謂冦盜不足與輕動兵端流禍豈有極也私憂過計故發此迂言詩云采葑采菲無以下體吾兄其留意焉與王憲副克敬傳聞有尊恙或以為瘧也或以為滯下也皆不可知所可知者必焦勞吾民所致也公之於吾蘇可謂良工心獨苦矣天祐吉人想勿藥有喜校適有兄子之喪不獲躬候謹遣人問安總兵何日至其人智勇不問可知矣未知仁與信何如其嚴何如易曰師貞丈人吉子曰必也臨事而懼好謀而成願公與之深語其人若鋭於立功不可也專於殺戮不可也不嚴於立軍法期期不可也兵能分而不能合能合而不能分不可也合數百惡少為曹人有必死之心我軍雖衆不可見利直前而不顧後患也必也上下文武合為一心首去貪酷之吏嚴僨軍之誅賊必破膽開賊生路凡互相斬捕者有賞解散其徒者免罪來首自歸者充軍非賊首但解散及來歸者俱赦不罪故曰上兵伐謀其次伐交百戰百勝不如不戰而屈人兵也凡用兵有機今日事勢固須調兵不若乘其機激沙民使用命又不若乘沙民之機諭沙賊使自歸昔者唐髙仁厚出兵五日而平蜀冦數萬只是一箇誠心愛人開賊生路而已校書生不知兵哀元元之無辜聊陳管見助廟算之萬一惟髙明擇焉可也與余烋昔者得汝書吾意汝先公葬也久矣汝弟煥至亟問之涕泣而對乃知未也吾責之曰大孝尊親汝弗能矣其次弗辱汝弗能矣其下能養乃父何嘗一日享汝兄弟之奉哉身後暴露且也十有三年矣若此與無子何别昔者何子平有故不得葬尚自謂我情事未伸天地間一罪人耳況無故而不葬罪將安逃禮過時而不葬主喪者不釋服今汝兄弟俱釋衰絰從吉施施焉于于焉與他人同是可忍也孰不可忍也正以名教則汝兄弟不可復入學校之門矣雖然此責在汝尤重何也以汝為兄一家之長也嗚呼乃父學為大儒官至少宰身後暴露不得安其體魄孤魂漂漂其竟何依汝兄弟恬然安焉是夷貊之道非復詩禮之家矣亦獨何心煥求吾作墓志銘吾平生未嘗為此昔者靜菴葬胡純來求銘墓遜菴葬李敉來求銘墓叔父之葬吾弟苦欲吾自銘皆辭不作今老矣豈可獨為令先公破此例邪雖然吾心戚戚不忍也欲為汝兄弟轉求陸伯載文章巨公也不然轉求周尚書伯明汝父同年也問行狀及事實皆無之豈能以空文作志邪念汝弟千里逺來又懼汝兄弟以無埋銘為辭差池葬事故不得已以吾所知者代汝作壙記庶幾不誤葬期嗚呼祖父有善而弗能傳謂之不孝煥幼不能知汝長當知可即條録嘉言善行請文於立德立言之君子以圖不朽吾日夜望之記録成當遄寄我煥又言兄子圭長成今遊邑庠矣吾聞之甚喜庶幾克肖乃祖哉欲繩祖武在行不在文在立志在勤用功不專在才力圭勉之哉圭字朝信已當故不著於字説與王資穆聞資穆今嵗不得與於賔興人皆稱屈雖然天難忱斯安知天意不大警資穆使百尺竿頭更進一步邪大丈夫自視何如顯揚其親豈在一第今秋榜已挂事又屬陰矣天公每張此一假公案令人自參人竟不悟枉自勞攘許多詩云上天之載無聲無臭儀刑文王萬物作孚又云帝謂文王無然畔援無然歆羡誕先登於岸人能反求以此自照勘則於世味得失自然輕矣資穆今用何功夫讀書有得有疑可寄我一商量否與鄒謙之伯載誦吾兄書樂與四方講學者接此吾兄惓惓盛心也雖然講學者衆世道固甚可喜而亦甚可憂何也講而不學者衆也是以講為學者也行必顧言義必勝利吾兄亦嘗省其私乎髙明今方為人師匠一言一行後進楷模願以聖門訥言敏行為主人心多動則不能自還明道有言只外靣有些罅隙便走又曰人心緣境出入亦不自知敬為吾兄誦之答陳元誠嵗莫林烈至得元誠書改嵗而劉叔憲所寄書亦至一念未起時語意超妙足見元誠心學淵微但他語不無滯處來諭相見乎離非藏乎離此固元誠獨得處然道理未有不可通於人者更思之何如神闕神庭語出內經心藏神亦內經語也心之神明無乎在而無乎不在也無乎不在而有在也靜則氣母歸根動則神機發見故疑其在彼而不知實在於心雖有在也而無迹也鄙見如此不知髙明以為何如答林烈士淹回道汝意極懇懇學患心不真此心若真何事不可成來書人鬼之語甚切此是善惡已動念時功夫更自體驗善惡未動念時有功夫否人心立極雖有間斷處亦好接頭否則終日向學不免散而無統也答蘇駕部校不才多病天所棄也亦天逸之使為間民也康節有云滿眼清才在朝著病夫無以繫安危故人天方向用宜積赤誠以待機會老杜有云艱危須仗濟時才又云獨使至尊憂社稷諸公何以答升平故人不可不勉也承問復古手假噫有三代而上之學術斯有三代而上之人才有三代而上之人才斯有三代而上之功業今聖賢經天緯地之學具存後之人只向方圓上測規矩而不肯就規矩上出方圓非古道不可復也泥古之迹不能神而明之也校於古人不能為役而志不敢自小者亦欲學古之道竭吾才以求之也維時雨淫害稼暑至而不至氣鬱以蒸他日交秋火必不肯退位嵗氣勝復何時而已邪故人願自燮理吾身陰陽毋為偏氣所沴也與唐應德此行天將有大造於應德也應德天植忠義而於消息盈虛之理或未深察其微故天牖之使操心也危而慮患也深他日出而任世道之責可以萬全不輕於一擲矣天平數語極其苦心當時一似死肉頑不之省過後始警懼真至理誠言也銘感不敢忘銘感不敢忘聞欲秋涼過我敬灑掃先人之廬以俟近日讀詩欲以雅頌之音銷鑠群慝聞兀崖有詩解應德若有之便中願早寄示與唐音得書自覺學未探本原甚善甚善乘此戚然大有警於心百尺竿頭務求進步處乃不枉此一生耳麟入學舉業想日有進但恐德業日忘日逺不患妨功惟患奪志斯言宜惓惓服膺髙汝白幼時其叔父教之以舉業歎曰便做到狀元三年一箇何足慕哉及長登進士第其叔父以書戒之曰此何足喜吾正憂汝從此不免墮坑可置一簿記每日過差寄我汝白自謂我終日侍傍何不相信如此試問其僕答曰比在家漸不同矣因此而懼乃置簿記過過不可勝書因此大懼刻苦用功若汝白之學與其叔父之教可以為法矣與林相跂余望汝久矣徐亞參樾過我始知汝已回嘉禾抱病未出則未知為舊病與新病與語非醫不能治汝之病雖然亦嘗默而思之凡病之作十二官必有不得其職者矣心為天官何莫不由之是故致病在心治病亦在心茍能握其樞旋乾轉坤在兹秋涼望早過我重為輕根靜為躁君輕則失根躁則失君溽暑中驗之尤得力也許台仲暨錢采之沈靜夫曽相見否李參過嘉禾特附此信百凡作縣事可盡告之是固有志為民者也與王宗尹在杭三載上下信之無異辭足以見毋自欺之效雖然願嗛焉其毋自足也足則怠且驕雖有自欺亦不自知矣由世俗希曠觀之嘖嘖滿人口固當由古之人觀之此誠不足以當堯舜之萬分一也嗟乎堯舜其猶病諸是誠何心也乃天德也吾以堯舜之道望汝故不以頌而以規汝前書愧不能如羔羊大夫而欲為兔罝野人意則甚善語或滯矣羔羊名大夫也兔罝自是十亂中人昔者文王舉大顛閎天於兔罝詩人因而咏歌其事肅肅者誠敬之極功也施於中林而終始表裏一致矣春秋傳論舉冀缺而曰敬者德之聚能敬必有德蓋其源流如此李參受萬宰令過杭欲得一見故人問為政臨民之道此可與言者也聞曽太平多善政并煩述以告參與聞靜中昔三原王公在留都其志未嘗一日不在天下國家故無一日不與賢士大夫來往嘗一日出有狂夫向之呼萬嵗入部延屬僚咨之婁駕部曰昔張忠定公行軍三軍呼萬嵗公曰止勿言即回衣冠坐廳上戒閽人謝賔客勿通反覆思得數策明早請婁駕部語之婁不答公乃問曰當時忠定何以處之曰亟下馬呼萬嵗公喟然歎曰吾輩安能及古之人彼倉卒應變而有餘吾無事終日思而不足其好善如此吾兄為國柱石為縉紳楷模其志與三原公先後一致也但未知門下士孰可為吾兄師者孰可為吾兄友者又孰可為汲引而長養成就之者天下事大可憂惟此一著可以應急可以定傾可以任重保大吾兄願加之意焉與周行之日李康惠公為刑部屬見素林公為僉都謂李曰昔三原王公在南都其志未嘗一日不為天下國家故無一日無賢士大夫往來門下今吾門何寥寥豈吾不能屈已邪何賢者之不至也李因問曰公今所交何人曰司寇張公實太宰楊應寧司諌楊方震請各問所長曰某長於某請各問所短曰某短於某請問公所長林遜謝請問公所短林因虛心問焉曰承勛每侍教所聞惟節義文章而未嘗及學問公所長在是所短其亦在是乎林大歎服前輩風度如此願吾兄以三原公見素為法屈已下賢博求人才以自助益亦因而汲引成就後生斯固吾兄成已成物之功也鄉别於嶺南校謂子庸曰吾兄每言無適而非道若見得無適而是道則學大進矣亦嘗與吾兄有言不識尚可為韋弦之助否肅齋公既去前所行二政勢必動搖他日小民復受弊而追思其利彌覺多事矣與方叔賢校以空言鄉學天厭否德喪子喪孫春秋傳所謂於是有隱慝焉敢不惕然內省吾兄昔也無子而今有子兹乃天祐善人願兄丕惟進德以祗承天意恭惟吾兄平生最髙處全在服善故曰聖雖學作兮所貴者資今位日崇望日隆萬一好善之心或不如初則雖有過人莫肯告矣吾兄昔寓錫山校憚暑失此良會今乃闊焉數年南望天一方曷勝鄉往衛武公年九十有五矣猶作抑戒以自警且使國人交警我吾兄之年視武公尚壯其心亦猶武公之心也不知邇來作何功夫承惠大學原中庸原受益多矣可疑處亦往往有之以未得尊命故未敢言嘗有書答純甫論大學録求是正與陳元誠近讀詩以雅頌之言銷鑠群慝覺於性情有功安得日薰元誠咏歌舞蹈天機更當流動盈滿也讀大小雅至於宣王之詩未嘗不喟然而歎曰周其遂衰乎或曰宣王中興之主也胡不責平王而下反追咎宣王邪噫宣王之於周固若下弦之月矣惟患其虧也而可自盈乎哉一時君臣其德精明而乏天地深厚氣象中有一事便形於咏歌文公論周世宗一言極好曰為善須教顯顯地做蓋至於魯頌則無可言矣其真文而不慚者與所以胥而為亡秦也斯意不知髙明以為何如與羅達夫達夫别我去清風明月猶疑見達夫丰神夫子嘗歎才難吾輩所當猛省如達夫者何處得來而未免有我人見不肯舍已以從聖人顧欲率聖人之言從已毋乃擔閣其才乎校嘗謂更不必問才如何只因犯了孟子所謂不能盡其才誰能如顔子之既竭吾才也昔者之舉忠義則有之語道則未盡韓魏公最名有膽任大事死生以之然深服范文正公察乎消息盈虛之理富文忠公視文正為粗然慮不萬全不發日語次見達夫未深省故默不言達夫聰悟絶人今當洞識之矣莊生一言極好易之者皥天不宜深有合於易道也李參受萬宰令附此以訊起居參平生居家有守今居官亦欲有為未知得行其志否袁與吉相去逺近若何若有所聞願有以教之莊渠遺書卷四
