body:
  text: 莊渠遺書巻三明魏校撰書復王濟美久不聞問積有馳情忽蒙惠書感慰無量稔聞令親有志為己之學此固僕所願交也而乃過聴於塗欲執弟子禮相見僕惡乎敢當惡乎敢當僕鄙人也生二十四年始獲聞敬齋先生之學而輕弱之質終莫能自强乃聖門一罪人耳二三年來頼天之靈得一二同志朝夕以所聞切磋似若粗見為學端緒而栽培未厚體驗未真茫乎其無所得間以質諸髙明之士則議論又多不同而蔽錮之深終亦莫能棄此而從彼也夫師者傳道受業而解惑也今以言乎道則未聞以言乎業則未修以言乎惑則斯未能信三者無一焉豈敢輕為人師也哉荀子曰務學不如務求師師嚴然後道尊楊子曰師者人之模範也模不模範不範為不少矣夫模範不足而為人師則不嚴不嚴則道不尊道不尊則師之禮自我而廢矣願以鄙意達諸令叔翁先生以謝來命之辱抱病家居不獲晉謁以叙契闊之情惟東望悵然而已與張常甫病臥窮鄉久不獲聞故人動定朝夕懸仰不忘近者送敦夫因得與朱守忠邂逅詢以年兄起居始知為玉堂元老所留尚未得遂便養初志即欲作書奉訊而小舟楮墨弗便此心歉然今忽忽又二旬矣曩承諭纂輯春秋周禮註疏祇以備遺忘便檢閱而已决不至於狥外為人此足以窺高明之所存而淺陋未免為過慮也然揆以愚見終有未安夫聖賢所說許多道理本自具於吾心只因世人迷而弗知故聖賢為之指示今讀聖賢之書便當尋向自已身上體貼做去若滯於言語文字間則是逐末忘本矣明道先生有言學只要鞭辟近裏著已而已纂輯之事縱無狥外為人之意亦恐未免分却向裏工夫况古之聖賢其學皆深造自得不得已而著書皆從廣大胸中流出昔和靖謂伊川踐履盡一部易其作易傳只是因而冩成試觀其書何等親切有味愚見如此高明其自擇焉與王純甫敦夫北來有書奉上想已達左右矣别一二日得尊兄維揚所慰書讀之不勝兢惕近來覺得平時雖號講學只是悠悠泛泛度日間斷處多以故全無得力仔細㸃檢病痛皆因不能立志之罪天理人欲不並立譬如越王勾踐復讎直湏臥薪嘗膽方做得成趙宋晏安江沱漫只說恢復畢竟不曾取得中原一塊土此有志無志之辨也存養省察工夫固是學問根本亦湏發大勇猛心方做得成就若全不曾發憤只欲平做將去可知是做不成也敦夫謂只因心不痛切故工夫不覺散漫了此言良有味也三復來教直是痛快喫𦂳實用功者自别南北參商去尊兄聲容日逺所願時惠藥石之言匡警不逮使得免於小人之歸則校之受賜也大矣一得之愚亦不敢不自竭也朋友之職所係甚重今人多欠缺了直湏視人之惡便知自已底惡一般自家要為善便湏要大家都為善方能不廢朋友之職也傳聞人言尊兄對客間亦談及詩文駸駸有好意此固未必然但恐不知不覺留下了些種子他日終㑹發也昔過太平門見有老父與一十四五嵗童子並走爭先因竊自歎吾輩旣有志於道而與詩人文士輩争長則何以異於此老父哉向託敦夫寄語不知曾道及否士夫議尊兄在儀部時頗覺放寛一步不及在府學時方知窮困能堅人之志熟人之仁愚意竊以為未然禪教中魁傑人猶能如龍如虎世間富貴功名縛他不住以尊兄之卓立豈以簞食萬鍾而貳其心哉為此議者殆淺之乎其為丈夫矣然在尊兄則聞人之言便當内省諸已不可謂他説我不着而忽之也來諭謂弱的人終不濟事而病某之逐人靣上説一般話深有取於崇志之剛此論甚精切但某之茍且處則校亦有罪焉耳古人學問篤實孝則真箇是孝弟則真箇是弟故與之交游者自然有箇感發處今與渠交二年矣只因自家不曾實用功夫祇以空言講説故不能有所感發况又資其多聞所講者又未必全是切己説話自家猶自拖泥帶水安能救拔得水裏底人静言思之良以自愧與查原博病臥窮鄉久不獲聞故人動定朝夕懸仰不忘緬想尊兄亦未能無離索之歎也校家居簡出有時散步田野間但見村落蕭條望之别有一般悽慘氣象詢之父老咸謂有司苛政日朘月深部使者無可赴愬惟泣而籲天耳嗚呼哀哉嗚呼痛哉觀一方如此則四方可知矣尊兄今方僉憲八閩綱紀列郡仁民愛物之心素所抱負正宜大為一方造福但恐行部所至未能遍歴窮鄉小民寃號之聲未必得而盡聞也愁苦之狀未必得而盡見也所願廣視博聴以通達下情激濁揚淸以興起吏治正己以先之賞信罰必毋為大利害所動搖朝廷數十萬生靈不忍使之困於貪官汚吏之手將見威名赫於上下德澤流於遐邇異時顯庸於朝由此而遂澄淸天下豈不大為朋友之光哉因風曷勝欣願之至正己之道無他請無忘舊日所學當意向有散緩時力量有退屈時但向自已心上體究古人因甚發憤忘食自家因甚只恁宴安古人因甚見義必為自家因甚不免退縮猛著精彩看來看去便自有箇奮發振作的意只此便是得力處亦便是著力處便宜於平日以義理浸灌涵泳此心令其栽培深固則臨事愈覺著力矣詩云采葑采菲毋以下體淺陋之見高明其自擇焉與裴大典尊兄自離南都薦紳之士嘖有後言葢未知尊兄之心而徒摭其跡以生謗議耳平時交游之士亦不能自解於人言此則莫能曉其故斯管鮑之所以難遇也因憶曩在南都時交游有聞尊兄之過肯相規者終亦囁嚅而不發葢億尊兄必不樂受盡言也當時深以為非妄意人當少壯時多激昻自進中年以後此箇意氣漸衰因循汩沒忽焉而若忘者衆矣尊兄天資生得來謙下寡過今年已過中而進學之心精神鼓舞不倦此誠何處得來深可敬畏不知何以得此於士夫間也静言思之終莫能曉朋友之職視人之過便如已過一般暇時輙為尊兄追省其過最後忽若有得焉但淺陋之識不足以窺高明亦未知其是否也請試陳之尊兄其自擇焉竊謂自古中行之士甚難其次必湏剛毅自立孔門惟顔子可當中行自曾子以至子思孟子氣質皆偏於剛然其所以傳聖人之道則皆得剛毅之力也文公謂世衰道㣲人欲横流不是剛毅的人亦立脚不住伊川因論曾子易簀亦謂後人雖有好言語終被氣象卑不類道皆為此也尊兄天資謹厚固是近於中行但終覺少箇剛毅的意以故日用之間或未免有容易放過去處更願尊兄常常涵泳剛毅氣象公私利義之間猛著精神直窮到底剖判得明便與一刀兩斷不令牽惹粘連異時養成天徳之剛當此世界人欲横流之時壁立萬仭一毫汚染不得矻如中流砥柱豈不大為吾道之光哉文公論陳忠肅公一言一行未嘗不推而决諸義利取舍之間惟其析而精之也入毫芒故其擴而充之也塞宇宙門人有問義利之辨者文公謂但心以為近利處即便捨却異時精義入神只有割捨不盡的不消慮其割捨過甚此言於吾輩深有益也狂瞽之言率爾輕發尊兄幸毋忽焉答方時鳴曩聞執事以復命徃京師久稽奉詢敦夫來訪始聞從者已還南臺繼辱來教何慰如之承需改亭箴記深荷不鄙校後進無似執事折輩行而與之交豈敢愛數語但以愚意有未安者不敢不自竭也子曰已矣乎吾未見有過而内自訟者也執事一旦忽覺前日之過而奮然欲改之此其悔悟必有深切懇惻處又恐此箇意思久則或至於忘故復以改名亭庶幾目見而神受之則此心戚然萌動其能改過必矣凡此等處正如人有病負痛一般雖使自家言語形容亦説不得决非他人所能形容縱使十分摸寫得似亦只是添得一重障礙與自家心地上實功元無分毫之益且如執事日用間要為一事覺得過差便與截斷莫為只消改之一字已是多了此處豈容他人著得力也又有旣知其過欲改而未能處此却是天理人欲交戰之機必須猛著精彩提起自訟意思當下便自退聴矣他人言語到這裏亦使不著也愚見若斯非敢違命千萬亮察永淸以言得罪其於世故闗繫匪輕執事抗章申救甚切此誠忠愛所發但未知天意何如耳答周以發左遷之事當置之度外况公論如彼其昭昭也達人大觀無物不可執事諒已悠然於懐矣豈俟余之贅言哉嘗謂今之士大夫得一階半級則以為喜失一階半級則以為憂譬如鳥在籠中縱令底下直飛至頂上許大世界終無出日曷為寘欣戚於其間邪且如以人譽而得官此吾命該得耳因人毀而失官此吾命該失耳彼何能損余孔子曰公伯寮其如命何孟子曰臧氏之子焉能使予不遇哉正此意也貧富貴賤此皆吾分宜爾人固莫能逃彼譖人者自喜其計之得行殊不知自君子觀之但自添得一箇小人之名耳其何能困吾直可付之一笑承以出處見詢深荷不鄙但愚意以為君命不可違未拜而歸不幾於不受君命矣乎之任數月以後惟高志所欲為其誰曰不可請裁之與李一淸前嵗余病殆純甫入問曰病中覺有進否余對他説前次病中使令人不如意輙怒此番覺得心氣稍平不怒矣前次病中急欲病好其實無益祗增病耳今次只一味調理藥石不管責效病亦自易好純甫曰此二事大難得後純甫病余入問復以此二事告之純甫深以為然今復舉似吾兄以效獻芹之意伏惟採而納之不為無補於病云寄李立卿一承示别後於篤實上用功深覺有得力處此即大學之所謂毋自欺也以高明之才而又自治深切如此雖造於聖賢不難矣聞之曷勝欣仰之至又謂沈潜終做不得此則未敢聞命豈謙光之談邪夫沈潜在我不沈潜亦在我或是尊兄薄沉潜而不為豈有欲為而不能之理竊意高明才識旣優氣勢又盛事來揮霍得下應付得行不知不覺多於好處蹉了徃徃心有未宻察理有未精使在他人便敢撑駕説去更不可告以善言今高明自知闕却沈潜工夫此正百尺竿頭更進一步處也今乃逡巡欲為不為甘伏批退相似無乃自畫矣乎須知纔曉得不能沈潜便是能沈潜本領只在吾心一轉移間耳尊兄試於日用間體驗便自可見二靜中來承惠書深自刻責多過謙之辭此葢尊兄盛德之所存其視淺淺丈夫萬萬矣尊兄所處當於古人中求之校安敢不以古道而處尊兄近者得於道路之言未知虛實夫為人上者安能每事盡善正宜廣詢博問以通達下情校以尊兄之心為心故有所聞不敢不告庶幾可禆見聞之所不及傳聞邑宰中有貪暴害民為兩浙之最者欲棄印綬而逃尊兄聴王汝霖之言追令考滿公論淸議不歸怨於汝霖而歸罪於尊兄以昔者仰望之隆故今者責望之備也兹事不識誠有之否更請尊兄於此益振風裁去㤗去甚不可有一分狥人情之心以激揚濁世使朝廷數百里生靈不為暴官汚吏所困則德澤流於遐邇威名赫於上下他日澄淸海内亦舉此而措之耳校又聞之直道難行正人未易合葢自古已然矣今尊兄當上下難為之時宜有窒礙行不得處而亦若順利然豈盛德之所感化大才之所斡旋固非淺近所易測識邪抑亦不無一二遷就其間思欲補偏救弊隨時以立功名邪孔孟之在當時也其心汲汲未嘗忘天下而終其身不肯枉尺而直尋今之人事未至不可為便欲枉尋而直尺故與聖賢作為天地懸隔此正公私利義之辨王伯純駁之分更願尊兄將此二端日用之間常自勘驗務令直截分明壁立千仭以大為吾道之光幸甚幸甚尊兄常以篤實得力處印證若於此處纔有放過便不得為篤實者矣狂瞽之言率爾輕發尊兄其毋忽焉與王純甫舊嵗與敦夫語每愧深厚懇惻處不及古人敦夫謂此難勉强須是本原上涵養出端倪來校自體驗知學以來聰明開發似亦勝前而徳性深厚懇惻處終覺多愧臨事時分明見得天理當如此吾心亦欲如此而蔽固之深不能得發見且如過墟墓當興哀也而未必有惻怛之意遇窮困雖可愍也而未必如疾痛在身心與理打成兩片無如之何纔急廹求之便往往至於暴氣尊兄用功親切此等處涵養得當自不同上古氣化渾厚民生甚淳自少至長涵育在善教中自然有深厚懇惻氣象後世氣化漸漓人生稟質多駁自少至長艮心斵䘮處多轉使人薄故生於今之世而欲其深厚懇惻如古之人非百倍其功不可也但未知功夫當何如用耳尊兄於此體驗必有得力處願以教我幸甚幸甚與徐郡守朝儀不腆敝郡屈吾年兄為守下車之初仁聲布於遐邇小民自慶何幸復見康平之治一二父老咸欣欣相謂曰吾今庶幾其有瘳乎朝夕引領以望善政而年兄方且不自滿假延禮士大夫詢訪得失人孰不樂告以善哉校忝同年深欲一見備陳吳氓昔日窮苦之狀今日仰望之情而病體在告未能入城此懐徒耿耿耳乃蒙數數存問近者偶送故人次於吳門之外又辱干旌賁臨勤勤下問屬有他客至不獲盡所言然盛意不可虛辱也竊觀年兄善政可紀者甚多然皆隨事補益如愚見更欲年兄舉一郡而甄陶之以懇惻愛民之心施剛果濟時之政壁立萬仭凜乎不肯動搖凡世之所謂毀譽利害者一切不少芥蔕胸中自為國為民外了無他念正身以先之使寮屬莫敢不出於正延見長吏詢訪士民俾之悉陳利弊毋隠規模先定次第罷行俾吳氓悉蒙至治之澤集一郡之長以治一郡之事異時功徳在人固將廟食百世矣由此而宰制天下亦舉是道而措之焉耳年兄大度士也故校敢進其狂言惟年兄裁之咨毛希秉汝病新愈又有骨肉之悲殆天拂亂汝也汝宜自寛毋益舊病人心平時易散漫疾病哀苦中却覺致一發得來直是痛切驗得何如此念久漸散緩他念便生常是重者先發試自省察便見此亦是為學一箇關捩子也與胡永淸自兄之赴詔獄也士大夫知與不知咸謂禍且不測洶洶傳聞為兄食不下咽寢不安枕者亦屢矣復聞聖㤙寛大將歸故鄉立卿相約候兄西湖之上喜不可言詎意今復有遼左之謫耶然原吾兄初心固將以死殉國今尚為輕典不待排遣胸中固當泰然也計吾兄不能忘情者令尊丈倚閭之望耳夫孝莫大於顯親吾兄此行其為榮親多矣定省常禮曾何足云况吾兄今在萬里外此身安而後親之心安能勿以思親鬰鬰成疾乃所以慰其親也嗚呼天於豪傑之士其生之也難故其成之也常若有以相之遼左之謫正孟子所謂天將降大任於是人也若復因循廢學是為棄天學焉而不務大成亦非所以承天意也竊觀吾兄之學志於經世故其所講者皆切於事功却於自家身上未必著力夫學所以變化氣質涵養德性吾兄自念積學以來材能知識當大勝前德性氣質與未學時果能大進否天下國家之本在身吾兄有志天下國家且試㸃檢自家身上還有病痛否明道曰不有躬無攸利不立已後雖向好事猶為化物不得以天下萬物撓已已立後自能了當得天下萬物文公曰今公有掀然飛揚之心以為治國平天下可指諸掌不知自己身上有多少病痛在他人心放猶放得近公却更放得逺今吾兄謫居無事願將聖賢之言切已體驗卓然就身心上用功以吾兄之才而能篤志於聖賢之學則亦何逺之不可到哉尊體近來何如養德養身元無二理孔門之學只是求仁天地間氤氤氲氲一箇生理充滿流行於四時而春氣融融尤易體驗分明吾人一箇仁底氣象也人能求仁常存得箇善底意思便與天地萬物血脈相通胸中和氣自然充滿天地好氣亦相湊泊孔顔之樂正以是耳夫子所以謂仁者夀也且如秋氣嚴凝便有一般淸高氣象固亦自好終是肅殺又如地氣高寒便不生物和煖便生物人常存得温和惻怛之意便自然可愛然求仁莫外乎敬今之持敬者多拘廹故覺累墜不快活血氣且不得舒暢如何得道理發生不知敬是吾心自做主宰處不消苦著力只略綽提撕便是文公所謂覺得心放心便在了可謂發千聖不傳之妙矣伊川有言惟是動容貌整思慮則自然生敬又曰中心斯須不和不樂則鄙詐之心入之矣此與敬以直内同理謂敬為和樂固不可然敬須和樂只是心中無事也吾兄試將孔門出門如見大賓使民如承大祭等語優游涵泳就自己身上體貼去做做來做去自當有妙悟處知敬則知仁矣躬所未逮姑誦所聞明者幸毋以人廢言遼左高寒願自愛與邵思抑貴體多恙殆不必過憂天將降大任於是人也必先使之備嘗險阻吾輩旣無大阨窮患難宴安酖毒易以溺人惟有疾痛猶足動心忍性若復因此舒肆是自放倒其為棄天大矣吾兄旣已識得此意願常提撕聳拔則進德孰禦焉與王純甫吾兄立徳足以顯親行狀之文自當傳諸不朽間有一二可疑者敢有請於執事如叙生祖母孫其辭不無回䕶而意則彰矣孝子慈孫之心無乃有未安邪舜後母之頑只是他人見得如此舜則負罪引慝至誠為之設或告曰汝母不慈舜將愀然不忍聞也今未知吾兄所以致隆於生祖母者果能如其所以事嫡祖母者乎萬一有所未至則於大倫無乃有未盡乎嫡祖母生祖母稱謂皆據吾兄立文而叔父獨稱同産弟瑄其後再見皆斥名之無乃失㳟順之禮乎兄弟之子猶子也吾兄能事之猶父乎處偏待下等語無乃使人疑夫繼母之不以慈處吾兄乎舜之負罪引慝肯為是言乎凡此愚意皆所未安出示思抑亦寘疑焉故敢有請願吾兄反求諸心寜過於厚不可過於薄也友人有過吏部望見吾兄者謂兄傲然之色可掬也不知何以得此聲於梁楚間哉又有謂吾兄天資直是峻截但傷於少恩者其然邪其未然邪仰慕深切故有所聞悉以見告吾兄其自察焉文公嘗言五峰善思然思過處亦有之曩承寄性與天道説實出於精思然過亦甚矣似與昔致知易簡説猶是一模脱出也更願虛心遜志以求先儒之言且母自信太過吾兄家業素貧非勤苦則無以為養賢兄弟七人而兄為之長想各有分職俾之治生但人情喜佚而惡勞見他人顯者力能潤親戚而吾兄已貴乃獨常使甘賤貧勢將有甚難處者想吾兄懇惻一念有以動之亦何難之不易也與邵思抑校屛居僻壤間無嚴師畏友先後夾持間中易得墜墮思欲取友於四方因循未果乃蒙故人不我遐棄惠然先施侍數日受益良深瀕行復申之以藥石之誨敢不敬蚤夜以期無負吾兄之盛心未審别後若何進修想高明之資當一日千里也校竊謂人若真有希聖希賢之志則其日用所學决須下希聖希賢功夫若乃交無益之友觀無益之書談無益之言作無益之事不惟不暇為亦且不屑為也更願高明以此猛省有則痛絶之庶幾用志不紛得以其全力而向於道則何聖賢之不可為也與余子積近㑹周世亨極稱吾兄居家有守居官有為不勝歎服又謂兄量頗褊隘嫉惡太深好作詩譏刺人惡其然邪其弗然邪許台仲來訪云在余子華處得㑹吾兄反復論性衮衮千餘言子華色忤而辯愈力氣象剛勁樸實良可敬愛詩云朋友攸攝攝以威儀容貌辭氣之間儘有麤疎不耐㸃檢處仰慕深切故有所聞不敢不悉以告吾兄論性著述成書恐只是明理之學更願就性情上實用功夫方為已有人一日間喜怒哀樂不知發了多少其中節也常少其不中節也常多雖無所喜怒哀樂時而喜怒哀樂之根已自先伏於其間承問已發未發之㫖自愧欠缺處多不敢率爾奉答願與吾兄共進此道來諭政繁少暇不得以書冊相親竊意日用之間書冊之外恐亦無處不可用功也與李立卿故人入凾谷久不聞起居第切馳仰海内窮困極矣日望吾兄大用匡濟時艱才高者多怨名重者見毁閲邸報忽見彈文及聞縉紳飛語深為世道隠憂吾兄素有器量凡世之毀譽榮辱一切不以動心此自資質有大過人處今胸中自應泰然也易曰山上有水蹇君子以反身修德更願吾兄深自修省自念慮之萌以至言語之發及乎政事之施不使小有不正及毫髪之不誠則彼之攻我者皆吾之藥石也吾友夏惇夫嘗言溫公相元祐有旋乾轉坤之功只是積得誠意久能感格上下之心若専靠才力為之能幹得多少事許崇志嘗言豪傑之才未用須善韜晦常如在匣太阿若先發露鋒芒安能濟得大事此言深有味也呂仲木馬伯循韓汝節居家何為願屈已下賢廣集衆善勤攻已闕思抑來訪云永清在遼左甚適家亦平安但未知何日得賜環耳復毛希秉來問種種諸疑只是一疑大抵人心是箇主宰更無主宰之者敬只是吾心自做主宰處略綽提撕當體便在本不須大段著力義理吾心固有若常涵泳自然便有滋味悦心病中若欲恬養只此養德飬身之道已備初做亦未免生習久自熟汝每有聞徃徃當下亦能領㑹只因不曾時習久之此箇意思依舊昏塞遺忘却只管要求契悟處又欲别尋路逕所以用力多而見功寡常抱不决之疑也今莫若習持敬功夫就放去收來處體驗知有欛柄入手此是生死路頭此處得力則其餘功夫皆可次第而舉矣人持敬拘迫固難久然亦不可尋箇和樂敬中自有和樂心莊則體舒若要尋和樂便自知和而和如何得不放倒飲食亦自有恰好處過與不及皆不可但與其過也寜不及耳與張巡撫禹稷三過其門而不入孔子賢之禹思天下有溺者由已溺之稷思天下有饑者由已饑之是以若是其急也㳟惟明公以天子大吏奉璽書鎮綏東南一夫不獲時公之辜其任禹稷之任也其心禹稷之心也兹者天毒降災於吳氓俾不獲康食自冬十月至夏五月雨小民枵腹捍田曰天其憫我乎今則已矣不可復為矣心絶志悲哭聲徧野待斃而已小民奄奄有死之心毋生之氣老弱相呴甘為餓莩壯者非徙則死耳等死耳聚而為盗以逭死焉禍自此興而亂自此作勝而殺之吾民肝腦塗地矣是何異於敺之殺人而又殺之也焉有仁人在位而忍視其民死也嗚呼數百萬生靈大命將絶迓續厥命猶幸而頼明公一人耳嗚呼閭閻窶人憔悴萬狀上之人固弗得而盡見也寃號達旦上之人固弗得而盡聞也厥或有流涕痛哭以告者其能信邪公若臨敝境親覩兹患固將寢不安席食不下咽凡可以活民者雖殫竭心力固不憚為之矣綂内細民引領望公至曰㣲公其誰活我此亦禹稷過門不入之時也人之言曰今上下困窮以賑濟則公帑竭以勸借則私廩空戛乎其難矣然則坐視其死乎凡事豫則立及今講求豈盡無䇿及今措置豈盡無財伏願下令先慰吾民曰所不與吾民奏請蠲免賑貸者有如天日用安定之遏其思亂之志早以哀痛血誠奏聞朝廷之上先祈蠲免之恩次乞賑貸之惠截留上供綱運查理侵盗錢糧不足則丐朝廷接濟一請不聴則至於再再請不聴則至於三朝廷必不忍遂棄東南也國家内帑空虛有司之力誠有限量然皇上天地父母之心固無終窮一聞湖廣水災遂捐百萬吾蘓獨非王民乎蕞爾吳壤地利能幾何而國家征取以鉅億計小民樂嵗不得一飽竭力上供今百五十年矣是世世忠孝有功於國家甚大也今兹嵗凶朝廷豈忍坐視數百萬生靈飢死而不一救之邪天聴雖高公為國大臣瀝誠以告萬無不從也昔也以一方而當天下之賦今也以天下之大而救一方亦罔不濟荒政在人禹稷救之豈一手足之為烈哉郡縣親民之官也明公布徳施惠非郡縣孰與致之民乎願先簡别守令以提其綱然後立科條具寮屬選委賢能而汰其才不勝任者黜其志不在民者所至延見問民疾苦可使及今講畫荒政以觀其材他日因之以責實此唐虞詢事考言之法也孟子曰好善優於天下明公誠能召問父老詢訪士夫下而羣黎亦各周爰咨諏所期閭閻之情盡達郡縣郡縣之情盡達明公而公達諸朝廷之上廣集衆思兼總羣議畫為條品次第施行他日舉而措之天下亦運之掌耳其於一方何有語云活千人者後必有封伏願明公仰思國家付託之隆俯痛生靈困苦之極一念懇惻感格天人於以迓續數百萬生靈未絶之命吾見功德在人廟食百世天將報公夀考胡福慶流子孫無窮矣嵗在庚午吳㑹大饑怨氣薰蒸疫乃大作小民死者百餘萬人餓莩滿野屍闐於川時逆瑾擅朝有司懼罪而立視其死耳未亡之民僅存喘息比嵗恒歉而征歛日益煩苛東南膏血竭矣今兹嵗凶設又弗救是真所謂周餘黎民靡有孑遺矣抑校願復有言焉今兹水患豈惟天時亦人事耳書曰三江旣入震澤底定今東江則湮矣淞江經流也其下壅弗宣洩故吳之南偏歲被水患婁江東迤北滙為陽城昆承諸湖舊有白茅塘受之以泄於江而塞也久矣故吳之北偏嵗被水患吳地邊高而中下昔人象為盤盂一有淫雨水勢瀰漫四望成湖吾民之不為魚亦幸而已非大疏白茅及瀹淞江下流則水患曷其有極邪此大勢也細論各處今田無高卑蕩然漂沒矣救而僅存必圩小而岸闊堅者也其潰而不可救必圩大而岸善崩者也設令平時修築圩岸分其大圩以為小圩高築堤岸廣闊堅牢雖有大水民力亦尚可支豈若今㴞天之患也哉昔文公南康東浙救荒咸以興水利為請謂為務一兩得范文正公守鄉郡請修水利以救荒今與其俟民之饑然後丐國家百萬之粟以延殘喘俾坐而食焉敦若力請於朝早捐數十萬之財大興水利豈惟拯一時之艱實百萬年無疆之大利也病臥閭閻久不敢陳論當世之務兹者目擊愁苦耳聞呻吟心怛焉如割一二父老泣而告曰我公未來聞公仁聲公旣戾止聞公仁言今餓且死其有仁政以活吾民乎吾情莫能上達鄉士大夫弗為我昂首道一言於上固吾儕小人命卒之時也禹聞善言則拜校是以忘其鄙陋敢採輿人之言達於鈞聴情迫詞切伏惟明公寛其僣易舉而施行之斯民幸甚斯世幸甚與胡永淸人有回自遼左者細詢吾兄起居似猶有故吾氣象以高明之才之志而久置之阨窮放棄之餘使得大肆其力於學豈非天將降大任於吾兄邪願吾兄祇承天意毋自失焉所問子積易春秋疑義不知彼答云何昔有請於文公先讀二經者先生極言二經難讀勸令先讀四書其教人徃徃稱是今髙明之學將以為已乎將以為人乎若欲切已為學莫若先取四書循序讀之不待考索不費説辭句句切於日用反覆諷誦身心便覺肅然涵泳思惟義理淵源自見意味深長此於高明變化氣質涵養德性之功當大有助易春秋非不切已但此乃聖人妙用深奥精㣲覺得於今日身心大段闊逺况象數失傳事迹難信大費考索辭説故文公嘗謂四書功夫少得效多六經功夫多得效少高明其擇之緩急先後之間必當有辨復桂子實㳟惟高明難進易退之節夙為縉紳所欽昔者見不可而退今者見可而進其於出處大義揆之精矣而猶博謀逺及淺陋走也不敏何足以知之來命祗辱左右去國日久萬里造朝固將一望主上顔色不知爾時聞乘輿已出否乎百司除日進擬畫可而行不知高明姓名曾徹行在否徃嵗孟夏邵思抑來訪出示吾兄前所寄書時從者北上久矣道逺無由奉答其於瞻仰徒切惓惓嵗莫㑹許台仲詢知吾兄改尹湖之屬邑吾儒澤民之功歛而施之於百里固當沛然也與胡永淸久矣不聞故人起居曷勝惓惓之至令子來館半年矣氣象無能改於其初深用慙負然其質頗有過人者雖旣往弗可追矣而猶有望其將來也禍患天所以相吾兄不知比來用功復何所得讀易私記從令子借觀皆叅取先儒之説間附已意得之為多但聖人精蘊恐不止此吾兄之學所以超然過人者只為勇於力行故所見雖淺却是切實更能深造涵泳聖言反求諸已則所至豈可量邪若瑣瑣滯於文義間非惟不能補救其所短恐亦不能成就其所長也與夏惇夫與故人别又三年矣伏承指教區區立志用功宜有一日千里之勢而今嵗只如是人明嵗亦只如是人何也當時思之不得其説邇者深自修省始知平日學問全未有得力處只因大段欠剛故志氣易得散漫工夫作徹無常有退無進思欲振迅一洗舊習而未能尊兄不我遐棄時惠警䇿之言儼如嚴師畏友之在其左右庶不墮落小人之歸幸甚幸甚復周充之相望千里邈無㑹晤之期曷勝瞻仰近世一種學議論直截高妙能聳拔人然反求諸躬未免知卑禮崇約文博禮若與聖人之道不相似然昔者常辱吾兄靣命及别後寄詩二章駸駸乎覺已先入其説矣故校不憚諄復累獻所疑而吾兄嘿無一語見教豈鄙言不合尊意遂置不省耶今承來諭似有督過之意謂校有所隱而弗言豈校之心邪道乃天下公理正當相與講明而固守之不有益於彼必有益於我此校之心也誠意講章累承下問謹條一二所疑録具别紙别紙誠意一章乃聖賢喫𦂳為人處文公章句或問説得十分痛切吾兄只合將𦂳要處提掇示人令有深省處今翻騰許多説話累千百言汎而不切章末添説敬添説擴充又出一段新意愈覺拖枝帶葉未免將持守之功為講説之資前書所疑意偏枯而詞蔓衍不審尊意云何人不能誠意只是自不肯誠禁止自欺務求自慊正是實下手處欺是自欺慊是自慊故君子必慎其獨此是誠意一箇闗捩子也今謂毋自欺以下是釋誠意之義直至慎獨纔是下手工夫未免將聖賢喫𦂳意思説得全散緩無力了小人揜餙謂是天命之善不可冺滅故其端復萌此説出於東萊甚巧似非究極之論葢天理人欲只在幾㣲之間正要人精察明辨小人見君子若發一㸃羞惡之心欲改其不善而從善這纔是天理復萌若惶恐被人知要揜其不善而著其善則全是人欲此非羞愧自為不善乃羞愧人知其不善也何處得有天理來又何其幾迭為消長之有與余子積吳門之㑹侍教連日極荷警發受賜多矣竊窺尊兄精神丰采大不如曩時以案牘勞形所致也精太用則竭神太用則絶願保合冲和明道云節嗜欲定心志便是天氣下降地氣上躋魯齋云萬般補養皆虛偽只有操存是要規㫖哉言也吾兄其敬聴之禍亂頻起尋就滅亡伯安之功社稷攸頼思慮先見喟然益懐永清也朱子晩年定論近始見之似不計年之先後論之異同但合已意即收載之耳永淸遼左書回亦深疑之今亦無論其他如載答何叔京書所謂因良心發見之㣲猛省提撕使心不放便是做工夫本領此正中年以前未定之論與中和舊説相同者也文公論心學凡三變如存齋記所謂心之為物不可以形體求不可以聞見得惟存之之久則日用之間若有見焉此則少年學禪見得昭昭靈靈意思及見延平盡悟其失後㑹南軒始聞五峰之學以察識端倪為最初下手處未免闕却平時涵養一節工夫别南軒詩所謂惟應酬酢處特達見本根答叔京書尾謂南軒入處精切皆謂此也中和舊説論此尤詳其後自悟其失改定已發未發之論然後體用不偏動静交致其力功夫方得渾全此其終身定見也祭南軒文始所同嚌而終所共棄其此類也夫大抵先生自其初年固已卓然有志聖學然未免為言語文字分却工夫至於中年以後方有一定規模今日正當因先生已定之論而反證其未定者庶幾有所持循也愚見如此未知然否高明幸有以教之與尹令久不覿靣政聲日聞小民咸欣欣然望大惠之且及已也而仰首以俟崑邑幸甚曩者獲見執事孳孳好善虛襟受言思欲竭愚慮以禆萬一顧疾病之弗間弗獲一登使君之庭此心恒惓惓也乃者竊觀閭閻窶人相聚疾首蹙額苦於丁田銀徴歛太急勢如倒懸而里胥尤甚破家者踵相繼矣問之言與淚下且謂鄰封皆無之亦非經常之賦不以咎貳尹而獨致憾於使君譬若人子有患難為之父母者恬然不一引手救則怨慕之心固其所也况貳尹實受命於使君哉催科之政須通計諸色財賦乃知緩急今貳尹専委一事矧嘗受綱運之累勢必以嚴刑驅之小民危迫之情當何如也伏願明使君以父母之心為心亟罷前令停免丁田之徴如不可停亦請使君親任其事寛與之期輕示之罰使闔境疾首蹙額之人莫不歡忻鼓舞以戴盛德豈不休哉與王純甫舎弟嘗覿盛德之光但自㓜失學不復能道左右精進之功以助鞭䇿懐仰之渴何可言也聞已復補選曹柄用伊邇世道人材願精入思議豫加訪求也惇夫久不得書子積永淸源甫皆得相㑹否思抑數通書伯潜起居何如崇志想數得相㑹校離羣索居汩沒荒廢已甚病中涵泳仁體覺得胸中漸有一般融融意思和氣發生天地萬物血脈不至斷絶若私欲一萌便有一般邪氣與和氣相反只提起涵泳意邪氣自消若不遏之於㣲邪氣一盛和氣便都消鑠盡了待覺得又須重新整頓起來日用應事時若渾厚包涵慈祥愷悌便與此箇意思合若急暴殘刻昏縱便與此箇意思相反静時易持動時難保日用工夫最難得合一因思明道先生識得此理以誠敬存之及求義理栽培充拓得去數語然後恍然覺有箇下手處平日每愧不能深厚懇惻只因不曾做得此等工夫耳相望千里深恨不得就正於高明今特舉似數語願兄决其是非也答陳應和别後緬懐氷蘗之姿隠隠心目寮友咸望吾兄有令子承來諭乃復差池天命固有遲速邪昔竇禹鈞蒙神告以無子而殀盍行陰德禹鈞如其言凡可以濟人者無不為之其後神復告以有子而夀世所傳誦靈椿一株老丹桂五枝芳者也范文正公記其本末以勸後之人校蒙友愛敢以禹鈞為祝今執事位望日崇呴沬成雨露叱咤成風雷茍一以慈祥愷悌為主如先哲所謂臨政不合著心惟於恕上著心則人之蒙被徳澤多矣天錫祚𦙍當不啻如禹鈞也詩云先民有言詢於蒭蕘執事其擇之承寄測景臺量天尺感感與胡永淸别後悠悠我思日以勤只我兄還朝機㑹奚若語默去住云何重雲蔽日率土憂疑誰抉浮障以扶東明乎聞上居宫中澹然無他玩好惟勤讀書陽德之亨庶其在此但聖躬㣲弱恐劬苦或非所宜古者教世子必以禮樂日用間轉移變化引續資培之功妙不可言聖學失傳後世専以書冊為務其泛而不知要者反以溺心疲精勞神天機窒而不發深足嘆嗟有能切已體驗者所得固亦無窮但専靠此則易入於枯稿偏滯於天地生生之機不相湊泊今日忠愛吾君之深者宜莫若勸以修習先王禮樂遺法以養聖心充長善端導迎和氣有不知所以然而然者矣自古國家敗亡多起於朋黨之禍今其勢遂成彼此愈激愈甚似有鬼神交鬭其間者願吾兄以至誠大公之心消融其隙一以愛君為念且置舊事勿陳釋前忿生後福否則甚於唐季牛李之覆轍吾兄不可一日立於朝矣子積思抑皆有書勸吾兄堅臥勿起為嘉靖完人葢憂兄忠憤激烈雖慮善以動或動非厥時耳故人意良厚高明擇焉可也答湛元明校天地間一棄人尚蒙垂念懐我以好音慚悚慚悚怨艾之餘頗覺此心出入徃來若有路徑放去收回在握其機恨未得靣質也聞南雍絃歌盈耳猗歟偉歟但古人詠詩隨事取義妙在動發天機且更唱迭和彼此相成則可以引續善念恐不必拘以五倫也與王濟美盛德久未拜謝榮行過我病臥於床弗獲請教别後積有馳情糧役一疏譬如拯溺救焚亦足小試康濟之䇿但恐終歸有司文具耳嗟乎兹事本末甚長更㒒未易數自古豈有建都於北荒棄地利全仰給於東南者乎亦豈有數千里餽糧而無通融之術者乎二者已足坐耗天下加以冗食冗費漫無紀極而又有坐食之冗兵賦役煩苛風俗移靡有司者又從而侵牟之四海所以困窮也安得吾君從頭整頓一番使人歌舞堯舜之澤不然塗炭未涯也與余子積思抑轉致尊教意懇然可掬不惟苦口亦苦心矣不肖安敢不自力以終貽故人羞耶聞諸立卿云吾兄少衰矣其然乎其未然乎兄松柏之質受氣厚完而猶若是矧蒲栁之質耶嵗莫一友過我見校凝塵滿室泊然處之歎曰學以神明厥徳吾所居必灑掃涓潔虛室以居塵囂不雜則與乾坤清氣相通齋前雜樹花木時觀萬物生意深夜獨坐或啟扉以漏月光至昩爽時恒覺天地萬物淸氣自逺而届此心與相流通更無窒礙今室中蕪穢不治弗以累心賢於玩物逺矣但恐於神爽未必有助也校慕古人居家簡重不以事物經心友人曰人心須完宻一事不可放過學而不事事則踈漏處必多應事時必缺䧟了道理吾見清高虛静之士多矣久之未有不墮落者一陰一陽之謂道今喜静厭動正如有陰無陽不成造化矣校聞言聳然又曰生生之謂易吾輩學皆枯稿偏滯如何得生良由不習先王禮樂之教耳今禮壊樂崩而三百篇固在學者祇玩其文所得淺蹙若朝夕諷詠命童子歌之與同志更唱迭和節以鐘磬鼗鼔和以琴瑟笙簫則感觸天機自不容已更能相與舞蹈妙處尤不可言大抵善念非引續則不能深長惡念非消融則不能蕩滌先王禮樂之教所以誘人入於善而不自知也校愚不足與此而深有味其言吾兄長校豈止一格所見當又别也願益以教我校平日學不得力只因此心收聚時少游散時多悔艾之餘頗覺此心出入徃來若有機竅放去甚速收回亦速而持乆甚難臨别請問友人徐指示曰其機在目校聞之躍然而喜深恨不得靣質於吾兄也答李立卿辛未之春送兄大江之滸以篤實沈潜為贈别後六載兄過余東海之濱竊見兄議論宏濶氣詡發揚因以自滿相戒後復勸以毋為出匣太阿念之宛其如昨不知為别十有一年矣緬想德業日懋但未知收歛向裏攝於宻㣲處何如天地混沌而後開闢閉藏而後發生今天下困窮極矣大司冦之擢天固將大用吾兄願完養厚畜以大厥施也人心通竅於舌是以能言多言之人此心奔迸外出未言舌常有動意故其畜聚恒淺應用易疎古語塞兑固靈根可謂識其機括但與其箝制於外不若收歛於中驗之放去收轉之間而心之存亡攸繫當自有著力處也兄昔議論英發故敢以此為獻校自少亦頗有志於學昏惰無成良由勇而無剛不能畜其全力此心收聚時少游散時多善日以消惡日以積今方自怨自艾下士晩聞道聊以拙自修不知終能寡過否也兹承下問且稱辛未丙子二年每見學每加進慙負曷勝答王純甫校也處義弗精頼兄裁割犂然當於愚心此由心體麤疎故應用炤察弗到殆天假良便救此輕脱也承教效法於坤惟平實乃能廣大勸於人情物理用功且自謂更嘗差多觀省加宻足占吾兄别後精進其賜不啻韋弦也但覺英氣時復逼人豈剛大發越固難自掩邪近每讀象山講學之書明白正大深歎其卓識超然妙契聖傳但辭氣軒輊竊疑其猶有虛氣驕志存乎其間恐去淵騫尚逺不識吾兄以為何如天道淵乎㣲哉校豈能窺測但所以厚吾之生玉吾於成者徃徃而是校也棄天甚多故每慙懼耳海内名士甚多校所甚服者惟陳生激𠂻及吾兄為最萬望時賜教言鞭䇿不逮至懇至懇答黄起亨久不挹碧梧翠竹之姿時入懐抱鑑湖風月無恙否雲霞出海其樂何如校多病杜門聊以拙自修時出觀化俯仰宇宙氤氲寥廓欣然㑹心物我俱忘觀來書似猶以舊事芥蔕願開拓萬古心胸虛名在人間世譬猶閒雲在天浮漚在海聚散起滅何常之有語曰達人大觀無物不可狂言何如常甫久不聞起居煩叱姓名致意與胡永淸别後又兩月矣瞻仰曷勝惓惓竊慕君子愛人以德故昔敢以不進則退之言奉獻左右吾兄視太公出將武公入相之年尚自逺在而遽有趙孟之偷此校之所深憂也自兹以往將敬端士而畏之矣畏之則疎而褻狎之人進矣雖好讜言或姑置之矣置則人不復言道古今而譽盛德者多矣一心之㣲衆欲攻之其與存者嗚呼幾希韓相國休廣平曲江流亞也素善挺之而惡嵩佞晩年乃曰嚴太苦勁蕭較軟美此恐必有受病根源不可放過也吾輩三四人情同骨肉子積最為苦口校不敢後也願吾兄閒中涵濡聖賢遺訓維持此心至懇蔡西山發揮武侯六十四陳圖奉以備覽玉髓經二冊容抄畢納還欲借一二書冊希付舍弟就彼抄畢送還天氣嚴凝惟冀善自保燮不具二正嵗天運一新恭惟吾兄年彌高德彌劭法天行以自强至祝至祝嵗莫承賜箴砭之益敢忘大惠韓魏公有言諫主於理勝而以至誠將之告於人亦當爾校所以深服子積吾兄懇惻之心也舊講學未合退而反求極有警省處但未知吾兄曾細察否校平生學苦不得力困則又求今亦安敢自執第因此頗易著力當下操舍便明雖然又懼其差毫釐繆千里也則常以孔顔之言自勘惜也卑弱不能猛進耳有所疑録具别紙來諭病立卿論治頗似少年縱横時而無真實懇惻畏天命悲人窮之意至哉言矣責善朋友之道海内人物如立卿論治能幾交游能幾人吾兄不可放過論治不合且姑置之惟發其惻怛之心此為正其根本又當握其樞機立卿惻怛未至只爲易言以故蓄積不深輕於漏泄但恐吾兄有所咈意則先動氣此却當自責矣子積書云夏間有書附希曾㑹間煩一問之書紳與銘盤跡相邇也實相逺也吾兄嘗察之否乎請遂言之子張務外其心茫無著落夫子説與言行鞭辟就身上用功言行俱從心發出忠信篤敬功夫自内做向外來又恐未言未行時疎漏繼之曰立則見其參於前也在輿則見其倚於衡也工夫至此渾無罅隙矣明道先生黙識此意故曰學只要鞭辟近裏著已而已可謂妙契聖心子張當時書紳亦甚感發但此意思却淺蓄德不深與夫子所謂内自訟默而識之工夫何如譬如今人銘齋及書座隅初亦有警久而玩焉漫為陳迹矣湯之銘盤自是聖心懇惻又書此以置左右目睹則怵於心假令子張書紳同此一模流出却是淵騫位中人矣文者非他是出於人之心也心安從生是出於天地之風氣也故文格不能不與時高下雖同時或不能齊吾兄試觀孟子之雄辯與子思之淵慤何如文公之詳明與伊川之簡重何如是皆超出風氣者而猶不能盡免又如明道醇和而氣脈却促伊川有拙直處而氣脈却長皆有所闗係校論文格其感深矣噫豈惟文哉平生守拙詩文皆屏絶不為日諷詠三百篇間或未識作者之意因旁採漢魏以及盛唐其調每下漢初語意尚渾涵魏晉漸覺發露其後費雕琢矣沖澹閒逺之趣為之頓衰慨然有感古今風氣淳漓不同學問之淳漓亦異竊不自量志期返樸還淳來諭謂校辭不能達意誠然誠然校旣不屑後世語言而學逺愧於古心聲所發正自不免墮在風氣卑弱中吾兄豪傑眼力逈别雖然兄亦不免擇合而受弗及相與究竟所疑雖小事上皆可觸悟也答胡郡守孝思正嵗敷和天地交泰敢賀君子道長嵗莫承教愛恐勞執事不敢造謝而别十事郡人稱誦快然而喜更願持以信必吳氓幸甚射以觀德固男子所有事但黑王相公所處亦似有理公謂何如仲木世方仰如泰山北斗願且毋出其書君子當愛人以德謹具别紙請教久聞仲木先生篤信好學海内推重校嘗恨弗獲薰覿盛德因請叩學問淵源以自砥礪豈天警校之惰俾無縁親仁邪乃今何幸承示仲木演釋諸書受教多矣厚重老成言語前後可質其曰此與志學次第却異曰知格物則下七者皆知曰學者當革舊染之汚不然血肉之軀焉能學貫天人曰此知行並進之㫖若曰先知而後行等到幾時行得却是後世以博洽為知矣曰若先立乎其大者則他好自換不得至哉言乎雖然有疑亦不敢隠今未敢瑣科條以請若曰讀易人懼為惡玩圖人易從善曰學者果能識此當日就到顔子欲罷不能之境曰為文不可謂藝易修辭立其誠曰氣能入虛則能盡性虛能實氣則能踐形其然與其未然與校意更欲進此言之則慙負不言則就正無繇竊惟千萬世而下學者只當以夫子為師讀論語如聴聖人親誨恁地去行務要體貼來做工夫當自不暇自不屑語言假如當時有一弟子退將夫子教言敷演解説衆必駭聞夫子旣我師諸弟子雖前輩長者且緩之待我求得路逕已定却將他學聖人様子勘驗自家我若未是舍而從之彼如與師訓未合亦豈敢遵信雖則如此又當極其尊讓不敢輕有賛訾却似判斷一般不肖平生常苦學不得力困則又求淺陋之見今亦何敢自信但覺頗易著力不識高明以為何如願因執事以為階就正於有道者與高汝白日拜疏陳謝後久不聞起居王時行云見吾兄於白鹿洞忿心釋然以消信乎盛德之感人深矣校困學無朋常思海内賢者以自鞭辟竊惟孟子心學淵㣲其大要有三端發於善邪順而導之惡邪逆而折之夾雜邪因而轉移之齊宣王不忍易牛人常有是念孟子教以察識擴充可保四海梁惠王問利國亦人常情孟子明炳幾先知此隙一開末流不可復制其善惡兩岐如好樂之類一於導之惡將伏藏一於折之善且弗萌孟子為之撥轉使向於善者專則惡自消日用間循此用功頗覺得力求諸夫子之教則有當著力者有無所容力者渾若造化涵育薰陶嗟乎善念固當擴充必兼培壅引續則愈深長惡念固當遏絶更當蕩滌消融則自脱落故夫子教人妙在感觸其天機使不容已提撕警覺使此意思常新顔子稱循循善誘可謂妙體聖心校輩去聖久逺謂宜篤信以求深造愚陋之見敢請質於高明曲者思就繩病者欲求砭願不我遐棄幸甚幸甚與金士惇僕回承諄諄之誨隔千里如靣談謹當佩服人從京回咸道士惇忠厚篤信不容口至誠有以動之也嗟乎人惟心宻乃能謹㣲每謹於㣲天徳成矣此士惇所長但事亦有當執體要者若過於煩碎瑣屑不免鄭重周章則與乾坤易簡或不相似傳聞在京師宻於交際徃來之禮獨振頽風但縁此日不暇給僕夫亦為之告勞其主勤瘁可知矣古之聖賢或不如是士惇必曰此禮也吾身雖勞吾心常安愚則謂尊賢之等與親疎之殺天實叙之故雖朋友之中交誼厚薄亦不能齊禮文隆殺因之以異矧非朋友而泛交者乎禮有相趣也相揖也相問也相見也而後及於朋友焉今士惇槩欲從厚恐其勢有所難行吾人與天地叅宇宙間事業當幹者何限乃困精力於此堯舜之急先務或未然乎天地大化聖賢心學一動一静相乘而静常為主今終日勞吾之形恐其汩吾之神也校昔居南都寡於交際失之不及今乃以勸士惇噫過猶不及惟欲士惇歸於中耳何如何如答余子積得永清立卿書始知吾兄滇南之擢悵然有懐共惜賢者逺去立卿又謂兄徳愈進而身愈健少慰朋友之憂想兄處此裕如也三月朔始領吾兄所寓希曾書如渴得飲日所述友人之言高妙超絶其所自得為多近考之聖門不盡合以其略稽古之功也賈太傅有致火致日之譬讀之爽然吾兄疑之良是但其鞭辟得力處亦當取以自輔也承諭其機在目此乃四勿之一尚缺其三兄得無有未察乎校静中默觀五臟六腑闗系隠隠如歴落然始知此心通竅於目而能視通竅於耳而能聴通竅於舌而能言通竅於百體而能運動此心若走作數者皆其透漏之路也而口之透漏為多日嘗舉塞兑固靈根請教雖然口之透漏豈若目之透漏為甚也葢諸竅總闗於目此心之放皆縁境而生聖學樞機旣從此放出却從此收入至為簡易兄謂目尚閉時心亦放去此辯似精切但未知纔舉念時便已著境暗處透漏與明處透漏亦總一般惟瞽目之人透漏開悟其機乃在於耳而不在目願兄默而體之更以見教承誨出處之義詞婉而意確深感厚愛之情令嗣進修何如天氣漸暑願兄從容静養自愛復高汝白承諭出處此故人相愛之情也校實天之廢才分當杜門以求寡過今聞潢池有警若上章弗允勢不免扶病而西病不可强則徐圖之耳逺承教言平正慤實讀之心開目明因而轉移天機妙處在此日用得力最多高明曰否所謂長得一格則見又别也雖然願於起念處更加研别何如以易體之吉凶易辨正惟悔吝難免以善惡交互耳大抵人心立得箇主宰則全體渾然在此隨發處研審則其應用燦然支離空寂均之有偏然其差處皆於毫釐而其後不復自覺我輩講學異同正宜各相救正以淺陋窺之高明似欲以立本與研幾處相混不識果然否也便中得常賜教幸甚幸甚與霍渭先别後有懐高風退而賦隰桑以見志不識以何日覲天顔對上第一義安出信嚮何如倘有未合願益存誠潜思以求感悟天下之事若從憤世嫉邪起端未免偏於肅殺必也從太和中發出則四時之氣咸備而春生常為之主乃可合徳造化也近讀春秋窺聖人撥亂反正次第只是識得輕重緩急分明而寛大從容故能不動聲色而事自治耳純甫金玉君子執事與之漸摩必有日新之益也病中言不能悉與胡純主上英資天挺而上下扞格不得大有為久矣今令尊為御史大夫而遜菴為太宰此誠挽回世道一機但聞上好明察遣人四出羅事汝宜痛自謹飭常念曰吾父今受天下重任吾守禮法可以增父之光豈惟天下咸受厥賜吾一家亦福澤無窮矣若稍縱肆上累吾父豈惟墜厥家聲將天下之怨咸歸焉閉門歛踪跡縮首避名勢此吾姪今日事也舉業雖久荒廢但汝天資過人閒中尚能温習乎十四事贈胡永淸一開悟君心妙在因機順導上好讀書就於書上開導勸以勿滯訓詁務求體而行之自然聖德日進無疆一今日第一義莫大於通君臣扞格之情先勸吾黨將順聖美釋上之疑勸上先延訪大臣時賜召對不惟明習天下之事又可以察羣臣忠邪一今日得君莫如五六君子而士大夫指為黨人不知自陥於黨今欲消釋黨禍莫若勸五六君子各以公天下為心日以善道輔主士大夫將自愧服若不免於輕且激則將愈疑天下之心一宜勸上愛䕶精神延廣嗣續或諷或規因事勸之則言易入仍簡賢士大夫知醫者入侍調䕶聖躬朝廷一日二日萬幾豈能徧覽章奏宜勸上以執體要務為大明勿事小明一今日急務在薦賢宜破資格開薦舉更相推讓以興人才特敇大臣先舉所知者人各以類舉所未知試以唐虞詢事考言之法大臣進退重在薦賢蔽賢庶幾肯屈已詢訪一聖上英資將大有為而今日因循之弊已極宜勸上靣敇大臣各陳所當興革大事次第罷行以救天下窮困大臣不勝任别求賢者代之務在推誠委任以責成功一宜勸上恢宏聖度勿使有所芥蔕於心一宜勸上畏天常察天之灾變恐懼修省一言官章奏宜置籍以考之少其員則可以妙選選有㨗法許羣臣盡言時政得失擇其能直諫識治體者拔擢之仍責臺諫有闕自舉而嚴不稱之罰一上雅意重守令此誠安民之本但外輕已極宜立法變通若漢宣帝表二千石補九卿唐明皇選卿監出守皆可行也古之守令有君道焉今特僕道耳若非重其職久其任天下何由太平一河運之塞殆亦天意有大興革與其求中䇿下䇿莫若勸上廣興北方地利搬糴減漕此為上䇿一他日兵革終起於邊宜深畱意要在選有威望大臣修明紀綱慎勿以吏事制戎事一周公理財自王宫后宫始今上㳟儉宜勸以四分制國用之法立㑹計之書瑣科條冗費盡革以寛民天下孰不歌舞聖徳一宦官之禍皆起於壅蔽若君臣同游則不動聲色而自消矣與胡永淸李立卿别後有懷如渴校已扶病入汴抗顔復臨諸生有靦靣目所至當為國求才噫使科舉而得人也雖奔走空皮骨固樂為之今徒勞何補北上聞聖徳淸明深為世道慶但小民未沾膏澤有觸於日則怵然我心吾兄身侍五雲俯念百億萬蒼生命墮顛涯受辛苦其懇惻又當何如也黄河淸今上生今黄河復淸前星其將耀乎願賛君相布寛洪惻怛之政以迓天休自京口入汴感慨良多録具别紙請教過歸徳乃宋故墟因上褒崇先聖之奏篇終效野人獻芹未知可否幸改教天氣正温願若時調燮保合太和不具與霍渭先别後有懐如渴嘗一奉書不識已達左右否明良相逢千載竒遇願從容鎮定順機開悟聖心天下事立一大規模却次第從頭整頓慎勿因一事觸激如治亂絲而棼之也與郭尹張柱史南還寓書奉問想已達下執事矣吾蘇民力久竭内實彫弊而外被富庶之虛名若吾崐則又加以綱紀久廢小民尤為嗷嗷以易象之蠱之時也過此不可為矣明公之來殆天愍斯人之窮特遣福星以迓續厥命也公初下車謗言日至多不根之言校驗於衆曰吾嘗識其人也是故能茹剛吐柔不激不隨者也囂囂之言殆噬腊肉而遇毒乎且雨露雪霜造化亦並行而不悖茍當矣雖震之以雷霆亦不為過但不可常耳既而家中附書至極言神明之政數十年所未有衆始信愚言之不誣也雖然愚意更願明公若持衡秉權因物輕重一付之無心校狂直且恃昔者故舊之情率爾言此不知高明以為何如天氣正温静處春生動處春一家春散萬家春敢以為祝與唐虞佐維時春意融融充盎宇宙萬物茁然以萌此天地之盛德氣象也然其根乃從隆冬沍寒之時閉藏極於嚴宻夫然後薰蒸醖釀盛大流行是故聖門之學莫大於求仁而求仁之功必先於主静吾兄以易名家其於乾坤端倪閲之熟矣校敢以所見質之高明噫天下之事惟簡可以治繁未有以繁治繁者也惟静可以制動未有以動制動者也不識高明以為何如二來諭奬借太甚惶恐無所容昔者隨時之疑殆出淺之為丈夫者然必舉似吾兄葢生今之時若與世俗絜長短易墜墮了人若以古人與自家較量便覺得不可及處甚多方有發憤進步處也承示楓山行狀愚意頗未滿其諸未免於辭勝乎與張常甫承諭明刑弼教此非俗吏之所能也昔居刑曹幾陸沉於案牘乃今復為廷尉平仰視臯陶如在天上葢臯陶之學以天為主其心純乎天徳凡事俱是代天有為今也胸中私意填塞如秤失星乃欲强持天下之平豈能酌其輕重也愧甚愧甚年兄不棄時賜教言以警昏惰至懇至懇與錢元抑昔居星溪之上久坐室中時出而適野曠然得大觀焉天文四垂為宇渾渾乎六合一家也日星升沈雲霞巻舒乾端坤倪軒豁呈露時至則草木欣欣向榮氣反則歸根復命可以覩造化之全功焉一自入朝庭户之間所見咫尺神爽每為之不怡然猶匏繫於此者吾皇天挺英哲校食芹而美冀欲一獻之也老兄丰神瀟灑望之如畫圖中人翛然有出塵之趣久與之處則此心惓惓惟欲人為君子惟恐人不為君子大有助於名教也詩云皎皎白駒在彼空谷生芻一束其人如玉毋金玉爾音而有遐心每令人一唱三嘆令嗣令姪進學何如天氣漸向熱惟冀若時保燮天元不具與方思道神交半生乃今始得一見又交一臂而失之悵惋悵惋公固天下竒才也自古脱略細故人闊綽能幹大事雖然願公為在匣太阿毋為出匣太阿古語云自勝之謂强收視之謂明返聴之為聰公於日用間其藴蓄也恒多其發泄也恒少所進詎可量哉諺有之曰狂夫之言明者擇焉敬以葑菲為獻與徐用中承諭朱陸之學此以能問於不能以多問於寡之盛心也正欲靣質所疑無何而執事行矣請卒言之天地氣化渾厚則開文明澆薄則開巧偽故學湏完養本源漸次開天聰明故曰大人者不失其赤子之心此正氣化渾厚未開時也文公廣大剛健篤實明睿此固作聖之資且精力超絶今古使其自少便從根原上培養開廓起來如顔學孔可以優入聖域今未免為多才多藝所使用志或分幾於鑿開混沌潜龍以不見成徳愚深惜文公見之太早也象山振古豪傑其學超然默契根原而氣質太麤譬如渾金未經鍛鍊渣滓尚多也愚生也晩其於二先生曽不能為役非敢妄議短長特欲求正於高明耳答程本虛聞汝已開閫千里生靈命脈繫於汝身有罹鋒刃者仁人所宜慘怛也昔所論學非是支離乃傷於急迫非可久之道耳見元城必能正之李守備松死於王事守廵逃責反歸罪焉忠魂誰與昭雪聞其逐妾有子而悍妻蔽之官與小叔襲此一脈寜忍使之絶乎今汝建牙嶺西自是天意莫若先收養其子徐勘其事白諸撫巡奏請於朝以録其忠以繼其後兹乃激勸一大事也本虛其盡心焉與胡永淸聖恩寛大吾兄得以從容燕飬保全其天年疾其有瘳乎雖然有心病有身病吾兄之身病亦心病有以重之吾兄恁地聰明其於死生已能了悟而於疾病常過憂始也因鬰致病今復因鬰增病何明於大而暗於小乎曷若坦懐任之死則死耳縱種種危急終不以汩吾胸中之和心泰則神怡神怡則身康不求卻病而自郤矣何如何如校方尋遂初賦非久當㑹吾兄三江五湖間也與顧惟賢古人明我明德於天下者自國始國自家始家自我身始要修我身又自正心始葢天下國家之本在身而心乃我身主宰此已是説到盡頭處乃學之綂宗㑹元也下靣三轉甚𦂳正是提掇箇起頭處教人先儒不免説得㪚了如何是欲正其心者先誠其意葢萬事都歸一於心而心却發出兩路善惡岐焉誠意是管歸一路也如何是欲誠其意者先致其知葢善惡各有來路善是從心體明處發來惡便是從暗處發來吾若覺得是惡又是明處但通體暗只有這些子明須著開大致知是要推明破暗開而大之也如何又説致知在格物葢心體本明暗處是有物蔽我良知也故心與物交若心做得主以我度物則暗者可通若舎已逐物物反做主明者可塞故功夫起頭只在先立乎其大者孟子所謂權然後知輕重度然後知長短物皆然心為甚王請度之書所謂若虞機張往省括于度則釋皆此意也愚見如此未知果能弗畔矣夫願吾兄反覆思之還以一言定其可否至懇至懇答桂子實惟公素自任以天下之重遭逢聖明託以心膂知靡不為其於死生且不遑恤矧世間一切利害得䘮曾何足芥蔕於胸中乎寵辱不驚殆未足為執事道也必也蹇之反身修德泰之包荒夬之壯於頄咸可以備弦韋之助也言乃心聲出言或疎得無存心之未宻乎志惟氣帥氣盛過猛得無持志之未定乎更嘗既深觀省加熟此言殆為弗試之藥矣令嗣執弟子禮甚㳟校不敢安亦不敢讓乃知家法所漸久矣今日從耕帝籍倦不能興伻回力疾布此言不能悉與陳宗獻一别忽已改嵗其於瞻仰曷勝惓惓嗟乎世道相交大抵以貌而省齋甚真法家相承率主於刻而省齋獨恕宜天之昌其後也省齋行無何而三法司紛多故矣衆咸服省齋之知幾且處之無跡也校多病求還釣磯天之棄才不可强也幸託林泉交物少故於情性得功多省齋邇來佩韋其益奚若此養德養身第一義也維時春氣氤氳生意充盎宇宙藹然吾人之仁也若忿怒躁急時便覺無此氣象省齋驗之何如答李立卿承教多矣詩調文體視昔皆有進豈筆墨蹊徑亦時為之邪慨自天地旣闢不知翻覆幾多纔有今人許多文藝直是無端吾人只當返樸還淳以回造化痛定録讀之惻然當時治兵目擊元元塗炭朝夕苦心事定後追思便覺瘡痍滿眼故略陳撫定方略而於出竒制勝處皆不忍言也嗚呼仁哉奏篇善因事以為功真救時之長䇿但其間亦有見得太敏不及深思處略救得些便放過了淺見若斯不識高明以為奚若答胡永淸吾兄袖却活國手段也須康濟自身若被病纒縛不求擺脱非豪傑矣人年老則氣衰其性宜緩而反疎急於壯年者脾土受制肝木自甚也凡見此證不可不過為之防怡神養性便是無上藥方也何如何如答夏惇夫吾兄聞謗自修此盛徳事也校多病自救不暇安能發藥於兄乎雖然請試言之吾兄天資甚美純正有餘而剛大若有不足從容涵養固成就其所長而勇猛奮發所以補助其短者尚覺有所未至也以故人情物理研究或未精斷制或未當况今精神又非少壯時比照管自是不能到矣徃事今不必論只問新功何如願常提撕莫放頽惰時以古聖賢鞭䇿自家愚見若此未知是否吾兄擇焉可也答黎世謙别後聞汝備嘗險阻人不能堪固天所以玉汝也南方松栢不歷氷霜㡬與凡卉無異大丈夫嵗寒之節正須受得催挫挺拔出羣纔有根器可致逺大答周道通三復書陳誼甚高惓惓誨我以道且欲曉之人人甚盛心也顧淺陋何以克堪拜命之辱雖然執事旣以古道敦我豈敢唯唯以負執事嗟乎上天之載無聲無臭惟潜龍近之汲汲欲立言皆聲臭也欲成名者也慨自孔孟旣沒惟明道深得其傳正以完養不輕發耳今所纂輯表揚不知呈似明道還首肯否道本天下公理人惟各有私心不免因同異以為取舍何由廓然大公詩云采葑采菲無以下體淺陋之言高明其擇之答聶郡守文蔚日論此心出入闗竅與收攝功夫至易至簡而守之為難到這裏一字也著不得須屛絶一切見解掃除許多語言只就放去處收回得這欛柄入手精彩當自逈别也虎行如病鷹立如睡皆畜其力而全剛生焉纔輕易發洩便覺浮泛無力矣諺云愚者千慮必有一得又云狂夫之言聖人擇焉高明其毋以人廢言答鄒謙之日瞻儀刑消釋鄙吝受益孔多雖然竊有疑也古人不云乎克已最難兄之言學若易易者纔一開口便有一副當見成話頭恐攔阻了進修實功却治不得真病校敢謂之葛藤願兄希顔之愚為曾之魯截斷言語文字之累於操存舍亡處著實用力到謇訥不能出口時纔是大進也塞兑固靈根此機括何如答沈景明逺承寓書奬借太過愧甚不敢當愧甚不敢當竊念校平生無他長惟好善而已昔官留都體羸多病常杜門自修或告曰某善士也則忘病亟徃見之至則所見不如所聞若此者屢矣而終不悔以故前後得益友數人德業相勸過失相規今故舊半凋落而校亦且衰矣追思徃年恍若隔世聰明不及於曩時道徳日負於初心每用憤嘆㳟惟執事邁徃之資年富力强仕優而學謂宜博求四方善士與相漸摩他日德業進修不可量也欣願欣願維時天氣溽暑大火熾然若蒸静為躁君惟寜定可以逺熱善自保愛不具答施聘之慨自天涯一别十載於兹緬懐故人宛其如昨雲翰飛墮若挹丰神何日坐我水晶宫沃聞高論也吾兄天才逸發利器百未一施遭䜛中廢凡在交游皆不覺為兄五嶽起方寸隠然詎能平吾兄曠達襟懐吞吐雲夢者八九曾不芥蔕壯哉壯哉吾身安從生出於天地天地㑹有壊時矧於吾身譬一浮漚起滅於海乃絆却虛名生許多畔援歆羡達人大觀可發一笑也天氣溽暑火老候濁願加調攝保固天元不具答吕仲木三復寓書温㳟退讓儼如登君子之堂而式瞻儀刑有溢於言語之外者矣噫聖雖學作兮所貴者資當今之世先生其人也雖然嘗覽易觧諸書及應酬之作似非作聖之功惟善人能受盡言故有懐不敢隠嗟乎大道㪚為天下裂也久矣辭章訓詁皆易以溺心必也一洗而空之顓意孔顔返樸還淳以回造化詩云帝謂文王無然畔援無然歆羡誕先登於㟁敬為高明誦之與王直夫陳元誠過余山中坐林泉間商量舊學其人超然絶塵如鳯鸞翔於千仞語校曰學者立志湏能如伯夷餓死西山乃可入道又曰學者自期待當以聖賢剋責當以禽獸乃能攔截得人欲𦂳嚴又曰學者須判别臭腐神竒超乎萬物之表與天者游則淸明在躬汩於私骸墮落利欲坑塹則滿體皆血肉腥臊矣又曰人能勘破生死置之度外則名利不須設闗矣又曰後世口説身不行却是把講字代學字聖門何嘗有此又曰天地萬物皆我之師胡為専泥古人糟粕校深有味其言敬以告執事高明以為何如與穆伯潜初聞調命為兄悵然胡善類之多蹇邪旣乃釋然曰兹天所以大造吾兄也兄篤實沈潜神明内藴造聖之資也而縻於文字之官不無滯於詞章訓詁是故瑩矣而未光今得超然一脱斯累蕩滌而照徹之日新之盛德固有匪夷所思者矣欽仰欽仰維時火老候濁金氣肅殺一番玉宇澄淸陽氣潜蔵於黄宫實基於此愚故曰聖門之學惟在乎求仁求仁之功莫大乎主静若非摧䧟廓淸亦未有能静者也淺陋之見願高明是正之與邱以義提學軺車所過多士欣欣信從感動之機亦旣有隠於中矣鼓之舞之丕變厥舊固有引領而望之者矣願高明加之意焉日承枉駕獲瞻儀刑信孚謙恭固有不言而化者矣承諭嘗從事於作敬功夫此聖學第一義也但愚意竊謂心是吾身主宰敬只是吾心自做主宰處若有所添却是别尋一心來治此心其勢必至拘廹血氣不得舒暢天理其能流行乎書曰雖畏勿畏雖休勿休禮曰虛中以治之其言最為要妙可久可大之功也躬所未逮姑誦所聞高明取節焉可也暑中奔走校文形神勞止今旣竣事端居無為天淸地寜復還吾舊其樂只且天王補心丹方藥奉助含飬元神鑒納是荷趙子常春秋集傳十五巻聞已求得之不勝欣慕願録全帙見惠葢自昔説春秋者多鑿惟子常論著有所據依若更向上求之則聖人經世之志可得也與聶郡守文蔚舊嵗免烖因㑹計不早定故實惠不及小民今嵗有詔漕運折色若干甚大惠也聞㑹計在邇願早定畫一之規揭示各邑鄉村使愚夫皆可與知千里之内誰不歌舞盛徳可泉每定烖數輙先期出票曉示小民胥吏雖有神姦不及措手公明察如神亦豈無遺照但願每事執要而毋好詳則吳民蒙福多矣二承惠南軒節要讀之警發良多但刪取大意終未能知尚覺有冗泛語安得暇日相與商量數條庶㡬究極歸一處也今先舉第一條求教太極二字聖人賛易始言之論語中未嘗舉以教人今費許多説辭旣云太極所以形性情之妙又云明動静之藴似皆推測而未得要之皆葛藤也竊意南軒天資高爽英邁超越常倫而下手功夫一時求未端的故文公表其墓稱先生之學始皆極於高逺而卒反就平實今掇其未定之學示人正恐疑誤後學也淺見若此不識高明以為何如與聞靜中大河横流厥有砥柱大火鑠金淸風泠然宇宙間少此様人不得吾兄確乎自守人莫可得而親疎卓哉願兄益求所未至相望數千里何以贈之剛大二言敢以獻於執事答吕仲木昔者不度進其狂言吾兄應之如響斯答有若無實若虛今於吾兄見之矣雖然愚意終願吾兄從今伊始盡斷訓詁辭章而超然深造聖域也維時春氣㣲温生意盎然萌動充鬰且久太和滿盈於宇宙間藹然吾人之仁也然其原乃自冬氣閉藏嚴宻中來夏首連山商首歸藏此聖學第一義也靜處春生動處春一家春散萬家春敢以為祝答歐陽崇一兩承教言恍如親聆故人謦欬深感惓惓厚情或告我曰崇一移疾南還矣以故久不答書今乃知傳者誤也克已最難近年講學者固多英才然言之太覺易易似與聖門訥言敏行相反執事今為師匠尤宜先行其言而後從之也校臥病衡門日惟震无咎而憂悔吝所謂下士晩聞道聊以拙自修高明幸有以振我答薛僑承諭療痔幾殆此固輕信庸醫得毋乃欲速之心使之乎噫天下事皆若是矣三折肱成良醫因是警惕進徳何可量也令兄遭變固有定力然此舉終未免輕從此惕厲乃天將降大任於是人也若頗徳色則阻進修矣何如何如令兄樂聞善言想不以為忤也傳聞改官水部終日勤勞象山輪管庫三年其學大進曰這方是執事敬亦嘗以此自驗否仕宦易奪人志切宜牢立脚跟骨少肉多終易頽塌也何如何如莊渠遺書巻三
