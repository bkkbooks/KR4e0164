body:
  text: 莊渠遺書巻七明魏校撰譜牒莊渠李氏統宗譜序我李聚族莊渠乃今散處而共祖實之府君譬若大樹無根何生矣嗟我族人誰非我祖傳種同氣連枝骨肉之親也族散而無統骨肉且将漠如塗之人吁可憂哉古之人尊祖故敬宗敬宗故収族而宗法立焉大宗立百世不遷以統族之親疎小宗立親者彌相親也盖五世親盡乃遷宗法亡天下無善俗好古君子顧念其本根則謹修其譜牒以合族而譜學惟歐蘇二家傳校稽諸古國史奠系世辨昭穆家之有譜如國有史乃立統宗譜自我莊渠一世祖始而盡於其五世孫别起為圖五世至九世則𤣥孫各為髙祖自系厥後以禪於無窮正適直繼而系前支庶區别而次後族之親疏咸在也而無失其倫盖取諸歐陽氏繼以世譜於正適詳焉曰其猶有古大宗之遺意乎則又立族屬譜爰起自我髙祖彦行府君而下盡於吾之族昆弟凡宗人有服屬者咸在吾與族昆弟之子若孫生則附之親屬始竭猶未忍相棄也盖取之蘇氏復取祖系親盡者奠諸前曰其猶有古小宗之遺意乎二法相為經緯瓜瓞綿綿百世如指諸掌我李孟莊一支諺所謂直下子孫也凡我族人如木附枝於法固不敢立為大宗而事之自當加隆焉耳矣此統宗譜所為作也統宗譜大合族而共圖故世譜専載正適代録其適子某庶子某而庶子所生不復書族人惟賢者特筆以附見又與宗圖自相經緯凡修譜則族人各以其譜來㑹譜成分而世藏之代命賢者一人嗣修嗚呼士大夫則知尊祖矣誰其不重譜牒哉然而或修焉或否焉顧子孫賢不肖何如耳其世篤孝敬守墳墓厚親戚修譜牒而勿替之則天下咸稱願然曰斯其文獻故家也祖宗有光矣樂樂其所自生禮不忘其本凡我後之人尚其顧念我祖宗而毋疏逺骨肉也哉大宗小宗圖説大宗别子為祖繼别為宗百世不遷宗子統族人主始祖廟祭族人服之齊衰三月小宗祖遷於上宗易於下五世親盡則遷繼禰之小宗統其親昆弟其相為服齊衰期年繼祖之小宗統其從父昆弟其相為服大功九月繼曾祖之小宗統其從祖昆弟其相為服小功五月繼髙祖之小宗統其族昆弟其相為服緦麻三月至𤣥孫之子親盡則遷愚按古者國於天地有與立焉是故並建親賢爰有世臣舊族禮家所稱别子者公子不敢上禰先君自我作祖别於尊也始興者亦稱别子自今起家别於舊也别子立廟百世不遷謂之太祖其繼别子者世為大宗統治族人有君道焉為之服齊衰三月尊之如君也封建廢天下無世家矣而宗法亦因以亡合族羣居勢當有所統壹古猶今也禮可義起謂宜推本始祖一人世存墓祭倣古之别子其世適倣古繼别之宗族人雖不敢為服固當以所事大宗者事之乃若今制有爵延及後嗣者自當復古大宗之法叙録昔帝顓頊之苗裔曰臯陶在唐虞為士師以功徳錫土姓其國於六者周衰楚人滅之後罔有聞其以世功賜族者以官命氏曰理暨於利徴逃難殷墟爰始更為李氏古謂理官曰大李之官黄帝理法曰李法故因而稱焉而後之人訛云食李而改自臯陶顯於堯舜之世禹讓徳焉其學以天為主矣後千有餘嵗而耼在周為柱下史以知禮為孔子師厭衰世之多事也則欲返樸還淳以回造化漢興而李氏著姓於隴西後之數百嵗而唐神堯有天下追論繫世則遥祖臯陶時以國姓賜其勲臣而族類多混矣李姓蕃衍於四方代有顯者世逺莫詳我所自出故今不敢紀諸逺紀其近而可知者曰宋編修府君隴西之裔也從高宗渡江而南寓呉為始遷祖搆望鄉樓於葑門人稱磚橋李氏所遺象笏手澤尚存而譜帙闕有間矣故老相傳又云編修府君之子仕宋為金紫光禄大夫實惟莊渠始祖之大父考之葑門而無徴也校故傳疑焉而録其可傳信者於譜最曰莊渠一世祖茂實其子譚始以詩禮傳家七世孫方草創譜牒文獻始有徴孝子則恕信昆弟節婦則始祖妣顧氏開先厥後廸之妻戈氏淮之妻鍾氏麒之妻周氏自祖宗積德且也二百年而始發於校噫其曷敢忘本哉統宗圖第一世二世昭三世穆四世昭五世穆六世昭七世穆八世昭九世穆十世昭十一世穆十二世昭十三世穆已上見家乗世譜一世莊渠始遷祖諱茂實字實之考論其世宋遺民之子也而生於元自葑門磚橋出贅婁門東莊渠城顧千十八提領家為壻子孫之興自兹始其鄉曰習義其里曰孝㢘長洲縣之二十一都也始祖以耕讀為業悃愊無華壯嵗不禄妣顧氏辛勤撫其孤年踰七十白首貞心故我李世有節婦𦵏陽城湖隂終圩之上子孫以昭穆咸祔厥後水嚙而淪於湖嗚呼傷哉今有事望墓以祭適子譚庶子訓二世徴君諱譚字吉甫鄉人稱為坦然處士生元盛時元徴之不起後老矣及見元之亡而際我太祖之興宋遺民之孫故不仕元也徴君幼失父怙恃母以生及長事母孝愉愉如也友其弟怡怡如也母樂其養嘆曰我不幸喪夫幸而得是子不覺我為未亡人也徴君亦自傷曰吾髫齔喪父百爾劬勞上荷母慈噫觀先妣之撫幼孤與徴君之事母吾族安得不昌乎徴君穎悟而篤志嗜學為時聞人古貌古心鄉人多化其徳與學士虞文靖公集游嘗為銘硯期我𦙍嗣之昌詩禮傳家自徴君始年八十二以夀終娶唯亭張氏自後張與李世為婚姻自莊渠始祖再傳而有孫七人其後日以繁衍析為七房吉甫府君之適子孟莊是為長房庶子五仲芳二房季和四房皆生於元叔常五房恕六房信七房皆生國初洪武弟訓一子廷玉為三房今惟六房一支遷崑山信義者最顯恕字彦行信字彦立鄉人所稱二孝子也彦行自幼厚重若老成人平生無疾言遽色孝友天至母袁氏嗽病篤百方治終不愈勺水不入口彦行迫黙禱於天請以身代刲其股肉救母彦立亦刲肱肉從外來兄弟不約而合乃煮糜粥勸母嘗之母病即愈鄉人以其孝誠動天也為作二孝子傳吳文定公寛題曰母病無醫實可哀弟兄何自笑顔開傳文不作傷生誚四體元從父母來叔常三子其幼棄為道士又棄其一孫為僧二子單傳皆無後五房之祀遂絶豈非吾族永鑒哉嗚呼佛老殄滅世教其徒坐而蠧食吾民王法所當首禁故吾族有棄其子孫為僧道而自絶祖宗之類者皆削不書蓋深以罪其父母三世寓耕翁諱孟莊好讀書通五經大義抱材不樂仕元孝敬行於家信義箸於鄉人稱長者生元元貞二十四年卒洪武八年娶懸珠張氏適子允庶子安謙慎國初諸房皆占民籍惟二房四房後以事謫雲南曲靖衛軍畏死各遣其義兒著伍子孫居莊渠者世苦清勾往若棄市至則雇募人替當以生還為幸鄉人解送者亦多破家嗚呼兵弗寓於農又弗土著故世為民害初元人無政强食弱肉太祖糾之以嚴而惡大姓長洲重故家陸伯祥者暴發而富有司則舉為糧長虐其鄉人然終不敢與故家均禮鄉人被害者輒呼二官四官救我以故不得肆惡而恨過之他日坐事則誣李二李四不應罪而連坐充軍也孟莊庶子安贅鄭氏謙贅陳氏者亦各縁妻族坐事籍沒充軍法網亦已密矣安謙俱無子丁盡户絶也四世田樂翁諱允字士中魁岸俊爽見義勇為永樂中有司舉為糧長㢘潔自慎重升合不多取於民衆稱鉅族長者生元之至正卒於國朝宣徳三年享年七十有五娶王氏適子道純庶子勝睿女適齊門顔孝子季栗從弟梅軒翁諱琳字以誠遷崑山信義有司後亦舉為糧長積三十餘年催科未嘗施鞭朴専以誠長者處民區民懐其徳終不忍負之既沒如失慈母至今猶稱為佛子家也梅軒翁幼鞠於從母夫魏士珣因從其姓校不逮曾大父而竊聞里中父老相傳曰老官寛厚有徳人也貌如其心聞人有過口終不忍言惟聞人善則喜而談之不置終身不忍罵詈人雖甚觸忤之終不恚怒但徐呼小郎則人皆尤之曰汝奈何犯長者至此蓋其厚徳有以感人也子鏞仕為玉山縣儒學訓導司訓公字聞逺卓犖有大志魁傑人也有司强補邑弟子員治尚書數舉進士不第成化十六年貢於朝廷試授以學職自國初以來先世多長者朴茂惇龎可勝重任然皆隠居不肯干仕進故吾族出仕自司訓公始而位又不盡其才也司訓弟諱鍾人稱朴隠翁朴隠翁字元律校嘗逮事大父母竊見大父朴茂而長身言必謹慤行必周詳喜怒不輕見於色子孫有過弗誚讓也則召而敦勸諭之使愧而改下至臧獲亦不忍輕撻一人性勤儉昧爽先家衆興綜畫諸務夜則候人定時徧視門户扄鑰乃寢平生無他玩好暇輒觀書有得或忘寢食忙後常黙坐休養精神迪知衣食之艱難懇懇語子孫以耕織勞苦疏衣糲食淡然安之少見紛華意輒不樂也大母王氏勤儉之徳與大父同壯嵗即却環珥粉黛弗御大布之服雖敝猶整潔若出於新大父在畎畝未嘗忘君嘗謂大明律者我太祖畫一之法也當與天下共守之新例出於羣臣一時有所奏請因而施行耳今充軍者日報也而曾不足以禁頑而徒為貪酷吏舞文作威福因太息曰廷臣豈無張釋之戴胄者邪則又誦其言曰誰與以此聞於上者吾蘇以田賦之太重也與水利之弗興也而民之死徙者衆大父常傷之則究心水利之學曰吳地邊髙中下形如盤盂禹貢三江既入震澤厎定今淞江全受震澤下流而中多阻如腸胃病噎然則併而入婁江過劉家港入海西迤北地彌卑下則匯為陽城昆承諸湖舊有白茅塘受之以泄於江而今塞矣此吾蘇第一患也海口潮汐漲落易壅泥沙錢氏有土時設卒撩淺其法可迄今守也而廢也久矣數使人言於當道冀以上聞意惓惓未嘗不在民也大母凝重有威目未嘗左右顧大父偶失愛於伯祖大母聞之則治具延兄公呼二兒使侍食焉伯祖固俊爽士歎曰吾聞兄弟之好以婦人敗未聞以婦人全也吾弟婦其賢矣哉大父一日嗛内姪之子曰卑幼也乃數犯我大母曰汝母族惟一息耳奈何不能寛容大父矍然稱善其内助皆此類也五世諱道純字伯純繼母鄒以財私其子睿伯純讓而弗争事之加謹以難得者兄弟易求者田地也生國初洪武卒於正統十一年妻鄭氏以賢孝稱適子璿庶子璣初酷吏張同知徽以死脅伯純父士中承他籍軍役曰汝欲為鬼乎為軍乎士中理直不撓曰吾寧死不忍無辜以禍子孫遂死於獄復逮伯純掠治强誣伏竄軍籍中同負寃者千數百人厯患難二十餘年嘗哭謂子孫曰吾昔順繼母心遺汝至薄矣今反以禍遺汝輩哉何時得見天日既而况知府鍾下車公㢘吏也相率赴愬蒙奏清軍役各終厥身子孫復占民籍衆皆鼓舞今有雪寃冊存於官伯純先業富厚世以積善聞於鄉閭不幸父子遭軍禍破家子孫遂貧不復振幸而遇况侯實惟再造之恩其亦為善之報也哉况侯又嘗奏豁吾蘇糧額數十萬石郡人世蒙其恩六世東園翁諱璿字宗澤徙居周涇因族𦵏於是距莊渠舊業十里而近生洪武二十三年卒天順六年三月十六日享年六十有二妻張氏適子方庶子遵吾族自始祖妣顧氏以貞節傳芳至六世而得節婦二人焉皆宗澤之族昆弟妻也迪廷啟妻戈氏其生以永樂十二年上距始祖妣之歿蓋未百年也廷啟蚤世戈年方艾哭謂舅姑曰今吾不忍𦵏吾夫也遲十年兒成童矣使送爺喪舅姑弗忍違其志孀居三十餘年人皆多其志操淮清叔妻鍾氏其生以景泰二年去戈氏近矣鍾父母無子愛而憐之贅清叔為壻不幸蚤喪鍾年二十有八父母俱亡舅宦逺方繼而亦卒内外㷀㷀無依族人利其改嫁也則侵奪其産鍾氏澹然弗與爭晝夜紡績自給養其二孤勤苦萬端屹弗改節𢎞治十四年卒享年五十有一矣鄉人髙其貞潔相率狀其行於有司奏請旌表其門閭以既歿而寢校自幼則見吾從伯母面嘗有憂容目汪汪如淚流也慎黙寡言與人言煦煦如恐傷之至其節操毅然人亦莫能奪也廷啟弟達廷善贅徐氏事徐夫婦甚謹亦既有分業矣兄卒則籍其産還徐之庶子而歸以養其父母撫其兄之孤自奉嗇甚或腐或魚未嘗重食而奉親則甚豐鄉人多其孝友徐氏有賢行孝事舅姑如事父母家貧遇凶嵗自度力不能活人也則命冢婦曰計煑飯用米若干而多煑為粥鄰人饑者來則食之曰吾日三粥足以無饑矣而餘力可兼濟人不愈於食飯而獨飽乎子庠宗周内外斬斬所居矮屋三間而五女長矣客至寂不聞婦人聲妻鄭氏孝事後姑恩愛若母子娣婦性多恚柔以下之情若姊妹終身無間言蓋化其徳也夫喪㷀㷀獨與幼子參居紡績以養曰虀羮菜飯無厭時汝大母常語也小子識之先君諱奎字孟文以校貴勑封承徳郎南京刑部主事而吾母張氏封安人先君生天順六年二月三日而大父夢文昌之星降精於家先君天性至孝年未弱冠聞大父之在官而雨霑服體盡濕也則亟往代之而為塘長而為糧長大父得以佚老終身水利僉事伍姓者貪酷吏也每行縣則塘長駢首受杖有死者惟陸祥以重賄免而吾父死而復甦他日又行縣大母哭語人曰長男昔代爺死裏得活今該少男代之雖然吾終不忍也先君聞之慰大母曰兒自往耳弟弱詎堪大杖邪是時幾再喪生校兒時尚憶大父母欲觀杖瘡先君終不肯而私與四叔祖觀之則相持泣也臀若虎餂蓋将䕶三月纔愈伍動大衆開京口河先君與其役大父在家病危殆先君心忽悸動夜寢不安而家人至紿曰老官有病今瘳矣先君哭曰是欲欵我勿回耳遂冒禁而逃晝伏夜行聞林木有聲則驚以為虎也蒲伏不敢動良久乃行先君抵家而大父適以是日愈復往終役故勑詞褒先君云孝感有徴義聲無忝蓋指兹事也先君未營宫室先建祠堂其制前為同堂而分其後以為四室祠位各奠於室由禰而上皆得南面而有常尊祭位同享於堂自曾祖而下皆統於尊而暫屈嵗時奉祀惟謹祝文則用御製教民者卒嘉靖二年五月十日享年六十有二嗚呼痛哉𦵏長洲陽山之中麓七世一木居士諱方字思式幼師事祭酒陳鑑與吳文定公寛為同門友補邑弟子員五舉進士不第以詩鳴於時思式尊尚祖禰痛惟上世譜牒不傳由莊渠始遷祖以來世為冢適族屬日以繁衍散而羣居将以收攝宗族爾時故老猶存及見先世遺事思式朝夕諏焉創為譜牒積十有五年而成凡我族人各知祖禰所自出者思式之功也思式謂譜所以自尊我祖宗若冐他人顯者為祖是自絶其本根也不孝莫大焉故斷自莊渠始遷祖而下列其所可知者記事拙直寧質而俚不敢為虚飾故其言鑿鑿可信其法前為總圖每世復為譜詳其生卒𦵏娶某氏子某人有善行則書之今存其法不敢廢每嵗續增修譜則據以筆削思式為宗適年彌髙矣見族人尊行者雖稚年執禮彌恭故舉族無長幼莫不敬服生永樂十二年閏十二月二十二日卒𢎞治某年某月某日享年若干娶王氏以某年某月某日先卒適子周庶子鐸欽鼐廷器季和之後與思式為親同姓矣廷器有孝行母張氏老而喪明性多恚人莫能可其意者廷器能委曲順之得其懽心廷器出其妻妾嚴奉事之終日不敢寧居然終不悦曰須我孝兒來也廷器歸則指數曰大婦某事懊我可笞若干小婦某事懊我可笞若干廷器如數詬責之妻妾亦安以為常不敢疾怨也思式修譜時苦貧乏久未繕寫廷器則助之費譜成與有勞焉莊渠始祖六傳厯二百有餘嵗而校始顯於朝鄉先正范文正公有言吾吳中宗族甚衆於吾固有親疏然以吾祖宗視之則均是子孫也自祖宗來積徳百餘年而始發於吾若獨享富貴而不恤宗族他日何以見祖宗於地下今何顔入家廟乎庠子秀校之從弟也以太學生仕光禄寺典簿鍾氏卒後數年為節婦周氏麒之妻也君子曰麒家世中微周之父兄也賤為𨽻於官初非有詩書禮義之教也而周氏天資夷粹有學士大夫所難者幼事父母長而事舅姑雖甚勞苦人未嘗見其有倦色父母舅姑疾怒之人未嘗見其有愠容家貧饑寒切於體亦未嘗見其戚戚也年二十三喪夫孤孀貧窮寧死不他適雖節操寒於氷霜而人亦未嘗見其有矯厲之行也然久而相與心服之噫以周氏之美質使生治古盛時充養以婦學則其貞順之徳庶幾哉為九族宗師矣周氏同時有節婦李氏者孝子信之孫女也於吾族為尊屬矣嫁為里人陸行妻行死無子凍餓不能活或勉之再醮節婦且哭且詈欲喪其生時父楠已前死乃歸依其兄清清死依其姪昺昺又死依其姪之子秀三世貧窮患難節婦終其身甘寒與饑晝紡績不足或繼之夜其貞烈性之於天不自知其異於人也人亦相忘無異之者他日校賙給宗族特致粟於節婦鄉黨始嘖嘖稱羡其賢八世周字文則生正統七年先其父卒娶胡氏適子鳳莊渠之族中衰仲芳一支六傳至參為戊子貢士文則之從弟洧狠而貪莊渠祖屋數椽宏大壯固族人相承二百餘年矣洧豪奪之盡毁其故有司舉洧為糧長其貪如狼牧羊也後以乾沒官錢糧瘐死於獄家人信巫曰神怒遂棄尸弗迎𦵏也弗敢成服也弗為設几筵也而家破矣鄉人咤曰此其積惡之報也與哉噫君子之善善也長惡惡也短而為親者諱校之修譜也稱美不稱惡矣惟洧也得罪於祖宗則直書而不隠以示戒焉耳洧之子孫有能恥之尚其蓋前人之愆乎九世鳳字孔祥娶王氏鳳生而穎異鄉先生見而羡之曰一木有孫矣長而落魄以死鳳無子古者大宗無後則族人以其子後之鳳固吾族大宗也而於校為孫行矣其生乃與吾父同天順六年族人未有可為後者去之三十有餘年而鳳之從昆弟有子矣校将為之立後則又自念曰幽明久隔矣無復有父子之道矣故不得已而謀於衆以次房攝主宗祀也僉曰鳳也之叔父鐸也在鐸字文振思式之中子其母陸氏妾也贅錢氏而歸生子志憲志蚤卒憲之子孫他日代為世適矣莊渠遺書巻七
