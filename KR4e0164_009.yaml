body:
  text: 莊渠遺書卷九明魏校撰公移嶺南學政欽差提督學校廣東等處提邢按察司副使魏案驗當職祗奉上命將與爾諸生朝夕從事今欲宣布明詔俾為師為弟子者崇正學迪正道革浮靡之習振篤實之風顧身教之弗逮弗克表率一方其奚敢騰口説以騁惟願諸生先辨厥志裒然服儒衣冠將為君子儒乎將為小人儒乎志於德業者君子儒也志於富貴者小人儒也日用工夫稽之以聖賢之訓合則加勉弗合則亟改之一以聖賢為法今不繁立條約惟以國朝奏行德行經義治事三法考按諸生以行黜陟凡我合屬長吏各學師儒同為王臣各圖報國表正風俗養育賢才以對揚天子之顯休命庶幾嶺南人材繼出發舒山川之靈翊扶國家之運當職與有光焉所有事目畫一於後擬合通行為此除外仰抄案回府照依案驗內事理即行各該所屬一體遵行仍刋發各學人給一册朝夕省覽抄案官吏具依準類繳計開一德行者爾諸生立身之本風俗日偷矯誕者惟務干名浮薄者相與非笑胡不自思人無德行其何以為人願爾諸生各相勸勉惇行孝弟忠信禮義廉耻觀法其賢者而訓戒其未賢者反躬自治吾何所長因以成就其美吾何所短務以揉正其偏則德行之未至者皆可企而及之矣一爾諸生皆將有天下國家之責正宜志在天下國家講求經世之務出而待用却乃學為無用之空言及其入官世務皆所不習是自敗壞其才也願爾諸生各量材藝所能如禮樂兵刑水利算數之類專治一事或兼習他事參考古制務求可以施行於今庶幾學有實用國家異日亦得真才仍選習禮生員講習文公家禮鄉射禮及古今禮制表率鄉閭共成禮俗一國家以經術造士諸生治經宜先講明義理以身體之然後據所見發而為文則學有淵源可以成德可以逹材今乃惟務剽竊聖賢之言綴緝文字故聰明破碎志氣萎弱人材治化由此而衰願爾諸生各遵書程熟讀精思深求經義務為有本有用之學力救此弊一學校禮義相先之地宜推賢讓能月終教官為期會諸生使各推擇某也德行可尊某也材藝可重各陳實事月朔提調官集衆核實乃書於册季終提調官季考諸生試以經義治事參考德行定其優劣第為三等申送本道察其賢者能者集其宗族鄉黨審無間言特具申請以憑薦聞如有過惡彰聞顯有實迹者具申黜退其善未孚於衆者勿輕贊揚以儲逺大之器惡未棄於衆者宜事涵覆以生悔悟之心愛惜人才宜體此意各該學教官通質長短及其進修功夫仍令諸生各録經義所得所疑及治事業次以憑按臨查考儒士有善一體訪求其有過惡者不許冒送科舉一守令民之師帥風化所繫其崇重學校倡率作興道之以正而毋以利誘勸諭父老各勉為善以訓其弟子如有勤惰殿最攸存師儒之官專主教化已弗能正如正人何其敦勵行檢為諸生先相與講明正學師之賢否以弟子員成否之數而賞罰之如有不顧名節挾公法以濟其私士有善惡蔽而不舉舉而不公者當具論如法按臨之日仍先察德行然後考其文學以行黜陟一當職歲巡歷一遍勢弗能與諸生相親今倣古法提調官及教官選於諸生務求志行端謹資稟朴厚材識通明者津遣至省助之廪餼當職朝夕與之漸摩激勸以成就之俟有成效乃遣之還以備郡縣延請郡則通請各邑之秀者縣則自選其邑各延明師聚而教之異日轉以分教各鄉撤無額寺觀淫祠改創書院社學以教多士庶幾人材衆盛惟國家之所任使其浮薄誇誕憸詐者雖有文藝毋得津送蓋心術先壞無由正其學術也一社學宜於各鄉擇子弟端謹明敏者聚而教之延請有學行者俾為教讀日以文公童蒙須知令其演習以收放心初授以養蒙大訓四言五言口誦既熟乃授以小學近思録四書然後治經觀史知識稍開毋得教以屬對作文散其淳朴先教之釋字直解大義既通乃教之演字漸長其辭次演一句又次而演通章久之自知作文之法凡此皆蒙以養正之助也候按臨日社學之師各率其子弟來見考其率教者進之退其不率教者因以賞罰其師一醫學人命所繫嶺南瘴地既多疾病復少醫藥夭閼之由也各屬長吏具體天地好生之德擇通明醫術者集數醫教之各專一科候按臨考試有疾病者分使治之視其功效以行賞罰醫術未通者仍禁毋得行醫一卧碑及敕諭內事理節該前政申明俱照常遵守正德十六年八月欽差提督學校廣東等處提刑按察司副使魏為毁淫祠以興社學事照得廣城淫祠所在布列扇惑民俗耗蠧民財莫斯為盛社學教化首務也久廢不修無以培養人材表正風俗當職怵然於衷擬合就行仰廣州府抄案委官親詣各坊巷凡神祠佛宇不載於祀典不關於風教及原無勑額者盡數拆除擇其寬厰者改建東西南北中東南西南社學七區復舊武社學一區仍量留數處以備興廢舉墜其餘地基堪以變賣木植可以改造者收貯價銀工料在官以充修理之費斯實崇正黜邪舉一而兩便者也抄案官吏先具依準仍將毁拆興建過緣由造册繳報正德十六年十一月學址在城中石頭廟巷舊址為定林寺地廣三丈二尺深一十八丈學舍大門三間習禮堂三間延賔館三間燕居二間號舍三間學田共二十頃五十八畝嵗入官租米正耗共二百零五石八斗糧米正耗共一百一十石一升零三勺學址在番禺縣之西舊址為真武廟地廣八丈一尺深一十三丈八尺學舍大門三間二門一間習禮堂三間延賔館三間燕居三間號舍十二間射圃亭三間學田共二十頃五十七畝嵗入官租米正耗共二百零五石七斗糧米正耗共一百一十石零四合九勺五抄學址在城西西市街舊址為五顯廟地廣九丈五尺深一十九丈學舍大門三間習禮堂三間東西齋三間東西軒三間東西居室六間月泉井一口學田共二十頃五十三畝歲入官租米正耗共二百零五石三斗糧米正耗共一百零九石八斗三升五合五勺學址在南門外褥子巷舊址為西來堂地廣一十五丈深一十二丈二尺學舍大門一間習禮堂三間延賓館三間燕居三間射圃亭三間號房八間塘一口共二十頃五十二畝歲入官租米正耗共二百零五石二斗糧米正耗共一百零九石七斗八升二合學址在城北順天門街乃大雲寺小府君廟二淫祠之故址地共廣二十丈深一十三丈一尺學舍大門三間門亭三間二門一間習禮堂五間延賓館三間燕居三間射亭圃三間內號舍八間外舍五間學田共二十頃五十六畝歲入官租米正耗共二百零五石六斗糧米正耗共一百零九石九斗九升六合學址在南城外永安橋之西舊址為大王廟因地淺狹復市民間地一隙共廣四丈八尺深一十四丈三尺學舍大門三門習禮堂三門延賓館三間燕居三間號舍十間井一口學田共二十頃五十九畝歲入官租米正耗共二百零五石九斗糧米正耗共一百零一十石一斗五升六合五勺學址在西城外蜆子步舊址為小天妃宫地廣四丈五尺深一十九丈二尺學舍大門三間習禮堂三間延賔館三間燕居三間號舍十八間學田共二十頃五十五畝嵗入官租米正耗共二百零五石五斗糧米正耗共一百零九石九斗四升二合五勺學址在城北二牌樓街舊址乃李指揮之宅因地淺狹復市鄰居者四家地共廣六丈八尺深一十六丈九尺學舍大門三間習禮堂三間延賔館三間燕居三間射圃亭三間號舍四間學田共二十頃五十四畝嵗入官租米正耗共二百零五石四斗糧米正耗共一百零九石八斗八升九合諭民文欽差提督學校廣東等處提刑按察司副使魏為興社學以正風俗事朝廷以文德治天下教化興太平本職欽奉勑諭典領學校風教四方竊以人才之賢否係於風俗風俗之美惡在於漸摩近見得廣東一省係古南越地稱鄒魯民雜華夷文獻固有源流淫邪尚當洗滌與其治於為惡之後不若化於未惡之先況民有彛倫本乎天性好善惡惡皆出自然奈何閭閻有便安之習教化無切實之功相染為風遂成弊俗茍不曉諭叮嚀何以轉移變化本職深愛爾民做好人幹好事孝順父母尊敬長上和睦鄉里教訓子孫守本分業為太平民不犯刑條何等快活不致禍敗何等安康今乃愚信邪姦好訟強凌弱衆暴寡淫侈耗財放縱敗家傷倫亂俗有關風教今特欽奉勑諭興復民間社學訓教蒙童以為育才之本其民間一切故弊有礙勑例教法者悉行禁約區處今先行曉諭汝四民毋得有違違者依律問罪定不輕恕所有諭目禁約開示於後教子弟以興禮義民生有欲非教不善方今聖明在上禮樂大興兹欲一道德同風俗必當後刑罰先教化然學有大小始終今社學之設所以正其始於先於是教以大人之學斯可成其終於後凡為父兄者如有子弟年六七歲至二十歲未冠者俱要送入社學社學之教不專於念書對句務要教其愛親敬長隆師親友習禮樂養性情守教法禁逰逸逺玩好戒驕縱如此教之斯可變化氣質為大學之基本今人空教子弟念書對對念得對得固是子弟聰明但不知子弟性情何如氣質何如事親何如交友何如手不執灑掃之事身不習趍事之勞耳不聞正樂目不見正禮隨子弟自家資質做去多有率意妄行習與性成惡人同歸者也至於入大學之時氣習已深不復自知其非所以陷於一偏而不能有成者衆矣其間有能成者亦資質之美而已故聖人有曰十室之邑必有忠信如丘者焉不如丘之好學也立學之後不論文武貧富之家皆一體遵依社學教條毋得違悖一立學之後汝四民如有能從教化朴實尚義好詩好禮善處彛倫能和鄉里篤教子孫足為一鄉敬信者許里中老而有德者告於社學之師訪問得實書於揚善簿內以待本職查考以禮褒勸一父兄如有故違不送子弟入社學者提問坐罪一倡優𨽻卒之家子弟不許妄送社學禁火化以厚人倫孝順父母是我太祖髙皇帝親口教詔汝民第一件好事父母生我愛我如金玉痛我如肺肝子一有病為父母者祈天禱地問卜求醫以至廢寢忘食惟恐子身一日不安人子或湯爛火傷父母即撫胸涕淚愛子之心人人如此為人子者以父母愛我痛我之心去愛痛父母何患不能孝順父母者乎今四民之中有父母生時觸怒得罪可殺可卨父母死日即火燒路棄可痛可傷此固久安之陋習亦由有等師巫謬彰邪説惑亂民心以西天為極樂火化為歸仙不知西天是夷鬼之地父母何居火化乃炮烙之刑父母何罪不思愛痛深恩顧乃以仇報德既煎熬其骨肉必飄散其神魂日後雖有思親之時祭之不享哀之無益禽獸同歸天人共怒家道凶亡子孫衰替皆本於此自今以後切須聽我教誨生時盡心孝順死後隨力葬埋葬者藏也欲人不得見也貧者冗土藏棺存禮而已不許輕信風水家禍福之説及興廢某房之説停藏父母至數十年不葬以致尸棺暴露鴉餐狗食傷害天和變生瘟疫惜哉痛哉曉諭明白聰者省之一民間有義舉助喪及周恤患難孤幼者里人當報於社學師書於簿內待本職查賞褒勸一禁約之後有火化者子孫依律死罪工人各行重治一未葬者限一月葬畢違者里甲鄰人族長呈送問罪如過限不呈訪出一體治罪一葬親者不許乘時強占他人墳地違者治罪不恕闢異端以崇正道禁止師巫邪術國有明條今有等愚民自稱師長火居道士及師公師婆聖子之類大開壇場假畫地獄私造科書偽傳佛曲搖惑四民交通婦女或燒香而施茶或降神而跳鬼修齋則動費銀錢設醮必喧騰閭巷暗損民財明違國法甚至妖言怪術蠱毒採生興鬼道以亂皇風奪民心以妨正教弊固成於舊習法實在所難容爾等愚昧小民不知死生有命富貴在天且如師巫之家亦有災禍病死既是敬奉鬼神何以不能救護士夫家不祀外鬼邪神多有富貴福壽若説求神可以祈福免禍則貧者盡死富者長生此理甚明人所易曉今我皇上一新政化大啓文風淫祠既毁邪術難除汝四民合行遵守庶人祭先祖之禮毋得因仍弊習取罪招刑一禁約之後師長火居道士師公師婆聖子尼姑及無牒僧道各項邪術人等各赴府縣自首各歸原籍另求生理買賣故違者拿問如律治罪一民家只許奉祀祖宗神主如有私自奉祀外神隱藏邪術者訪出問罪決不輕恕敦朴儉以保家業夫四民之家有千金之産者有一金之産者奢者以千金而不足儉者以一金而有餘何也奢者勉強隨人妄用無節口好肥身好懶驕淫姦盜由此而至所以雖有千金亦必至於困窮儉者隨分守己節用省事減嗜欲務勤儉循理避禍不至喪敗所以一金之家反能長久而不困窮今之四民每每如此聘禮則虛彰儀物嫁女則多耀搬粧設酒則將無作有鬬勝則借假為真只取一時好看不思後日有無此愚偽之俗禍敗之機也何不反奢從儉以圖長久受用不致眼下窮亡古人云人能咬得菜根則百事可做此言極有理願爾民思之念之無貽僣侈之罪一民間酒店賣酒假以賣酒為名實乃淫人取利大傷風化府縣官訪拿治罪一服色居室婚喪祭葬有違國朝禮制者府州縣拿問治罪一為父兄者有宴會如元宵俗節皆不許用淫樂琵琶三絃喉管番笛等音以導子孫未萌之欲致乖正教府縣官各行禁革違者治罪其習琴瑟笙簫古樂器聽一不許造唱淫曲搬演厯代帝王訕謗古今違者拿問息爭訟以免刑罪照得廣東多好詞訟其故何也民不被教喪失良心故也隂險詭詐是殺身之藥貪利害人是斬身之刀強梁者不得好死教唆者到底傷身賭博淫行者終身破敗剛忿不忍者多致官刑今特與爾民約凡有父子兄弟夫婦不相親睦及爭財異業以致飲酒博奕打鄰罵里教唆賭博姦淫盜惡謀為不善打點誆騙等項以每月朔望兩日相會里人於社里中有過失者許自陳説或族長鄰人陳説如小事有不平者衆人勸戒處和事關大惡者衆人明言責救如有不從擇老者數人同至其家責勸如再不從許地方鄰人同族長赴各該衙門呈治如有互相容忍不行勸責呈治者事發之日一體治罪一里中如有能改過自新變惡為善以循理教者許里中老而有德者告社學之師訪問的實書於改過簿內以待本職查賞化愚頑以息盜賊照得廣東地方如從化新寧恩平等處往往為盜殺人劫財本職雖非理刑心實切於教化且為盜之一事未必盡是爾民之罪亦由為民父母者養之無道教之無術禮義不聞良心喪失田疇旱潦而不知賦役繁苛而不恤飢寒迫身不顧亷恥但求一時之活不顧後日之誅於是惡染鄉閭貽禍親戚強者得利富者坐分善者無依弱者必死遂成大盜流毒四方其間弊病難以悉舉今爾民於無事之時善心有時發見即當自家思量我如此做賊固不勞耕作不煩稅役可以足食足衣且厯觀昔時為盜之家今尚有幾家得存不至滅絶者乎況且如今聖明在上天下太平何不乘時歸化萬一不然未免家散人亡縱使逃去别方亦是一生百死肉膏草野骨餧狗豬終為無祀之鬼父母妻子奔亡祖宗墳陵丢棄到此時節計拙心回要做好人亦做不得豈不恨哉若爾民自謂實有勇力死亦不怕此便是至愚至蠢者也千日殺人一朝必敗豈有做賊而能長久者乎本職深惜爾民樂於禍敗而不思求活所以誠心直説明白曉諭使爾民從此向化做箇好人取些安樂福壽豈不好過殺人為盜東逃西避終遭刑戮者乎一詔書有能遵體各歸原籍耕種者許爾自來聽教本職即與爾立社定鄉約使爾各安生理曉諭之後如有能先來聽教者重賞不欺正德十六年十二月欽差提督學校廣東等處提刑按察司副使魏為毁淫祠以興社學事照得各處廢額寺觀及淫祠有田非出僧道自創置也皆由愚民捨施遂使無父無君之人不耕而食坐而延禍於無窮本道已行各處凡神祠佛宇不載於祀典者盡數拆除因以改建社學今歲適當造册之年合收其田入官改為社學之田是除生民無窮之害而興無窮之利也仰抄案回府著落當該官吏照依案驗內事理即便行仰各縣通查廢額寺觀及淫祠之田清出歸官召人佃種分撥各社學供給師生就擇佃人看視社學有餘則量撥儒學册內明白開注仍總立碑學宮存照以防侵占絶姦欺隨田糧差各隨土俗議處明白呈奪以為永久之利其清查完日各造册繳報俱無違錯抄案依準繳來嘉靖元年四月欽差提督學校廣東等處提刑按察司副使魏為申明社學事當職欽奉勑諭古者鄉閭里巷莫不有學即今社學是也爾凡提督去處令有司每鄉里俱設社學擇立師範明設教條以教人之子弟年一考較責取勤效仍免為師之人差徭欽此欽遵竊惟古人八歲皆入小學其教先行後文禮陶樂化篤信力行由此而入大學故進善者多今之教舍行趨文使蒙者益以荒惑童習而長安之故為善者少間有質美好學者亦不免蔽於末藝若名世者其無文王猶興者歟故有由俊秀入府州縣學者多懵然不知小學之事豈復知有大學工夫手執詩書口談仁義考其行曽無異於常人不免任氣滋欲逐世奔利甚則下視宗族陵奪鄉里以道為迂以禮為執一以亷恥為沽激雖與之言不徒不信且反聚而笑之此無他心已久放欲反作主如醉未醒如夢未覺悻悻然自以為是不復自知其非雖聖人與居恐亦不能化而入矣豈不深可惜哉鄉無善俗世乏良才有由然矣原其所自非民之失教之失耳觀諸曲禮少儀內則弟子職諸篇固小學之支流餘裔亦未嘗不後文先行孔子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文此皆聖人至教萬世人人所當學者也然則社學之教其可茍乎今之各里社學館舍淺狹讀誦雖存禮學盡廢故特建各隅社學大館以為諸生學習禮樂之所以禮樂讀誦互相啓迪務求作新以期化民善俗育才成治為師者冀共勉之慎毋曰三代闊逺難行所有合行教條開具於後仰抄案回府轉行所屬遵行具依準類繳一每歲各州縣提調官以正月望後啓學先一月具書致禮請師明示各里以啓學日期前期數日師至本隅各里擇生徒年長有禮者四人或二人先往社學大館迎師一里同具一手帖開報某生姓名住居年歲月日及父兄籍貫以某人為户某仕宦生理在某街巷某教讀讀書或在本家讀書總付本里年長生徒送赴本隅社學大館每前一日學師於隅內生徒各里點一二名或三四名共輳六七十名或百名同一日坐齋肄業每日晚命各里生徒一人用一小紙帖寫其本里次日當坐齋生徒姓名歸往其家報之明日本生赴學即帶自已名帖送回學中交納其餘班未至者各回本里教讀學舍讀書或歸本家讀書初見不用贄禮行拜而已生徒初相見分班亦行拜禮一生徒當日者須黎明至學先生前一日列生徒長少之序挂於門內東西兩壁生徒至依序立於兩階下點灑掃者先以序入執事其餘軒舍以役人代之畢復降階立原位觀其執事恭謹者録之怠忽者教而責之次擇贊禮者二人先升堂正揖分班立先生之前唱序立諸生以序兩班升堂正立唱揖分班圜揖就位靜聲端立良久以觀其德容命執事者擊雲板命坐年長在上以次序坐務使從容嚴靜良久命擊雲板命十人一班依序出就先生位前正立量其少長或以童蒙訓或以大學之道白直教之懇切以開其志趣援古以增其見聞不須屑屑講解文義只要責之使行於身如此是君子汝所當學如此是小人汝所當戒彼古人已行之孝弟如溫凊定省之類須告之曰此是古人實做的事汝能如此溫凊定省便是學若不能實做溫凊定省之事徒然念得講得亦何用今教汝之後常訪察汝果能如此以禮待汝不能如此痛責不恕凡所告者皆以生徒職分所能知行至於起居出入動靜食息皆當實教不須告以性命髙深之理躐等無益之言徒增口耳之末而無益於身心也教畢仍命復位坐看記所教蒙訓之類年小未能看者教之誦記退食擊雲板亦以班揖出館之後察其有不能隨行後長或傲慢鄉里者責而教之一復午學升堂如朝儀就位立聽雲板命坐分命詩章各以簿抄寫字要端楷有善書者録之其詩或詩經或律詩絶句擇其得情性之正音律之和者年小者代寫寫畢教以歌咏務令莊敬和平明白通貫歌風雅者用正音歌律詩之類或正音或越吟始命各生讀成誦令善歌者數人同歌數次於是衆歌既成聲每班十人歌於先生之前用鐘鼓其餘笙簫琴瑟之類以漸教而和之未升歌者俱端坐靜聽歌畢者命復位坐聽其聲容溫雅廣大者録之清麗俊逸者録之靜正簡淡者録之如躁澀俗弱妖艷凄楚者教而革之年小未能歌者但令誦記聽歌而已歌罷退食擊雲板如朝儀一復晚學如儀就位立良久擊雲板命習禮未出位者命坐每班十人出就先生位前東西向立東先出位北面立長東少西四拜習揖畢復位西拜揖如儀退先生坐觀其容體恭肅愷悌者録之鄙倍者教而責之如有善拜揖者免習習禮畢請善琴者教琴擇生徒可教者教之迎琴案焚香進先生位前請聽琴學琴者就琴案東西立在位者俱拱立靜聽凡鼓琴皆用正操除淫怨操不用聽畢先生復位教琴者退於後館教琴其餘所當用之樂亦以漸斟酌教之諸生在位者聽雲板命坐以班出講習六書九數五御之法酌其簡明者教之御雖今日不行亦當講明以備古人一藝有餘功者聽其退於後館習樂歌詠命持重者二人臨之有失禮放肆者稟責勿恕務使諸生和氣相親禮文相敬以成善教年小未能講習者在位誦記蒙訓或教以嘉言善行晚擊雲板執事者撤先生書席如儀揖退留直班四人俟先生退後而出夜歸仍在燈下講誦當日所教蒙訓之類即以所教之事事親事長處事接物先生常常訪察如有徒能講誦不能實行其事者重責勿恕一生徒既教琴者以三日一次午後至學聽教後退於後館習彈每生只許教二三操既能者免赴館彈習其間年長生徒如有不習科舉之業願學樂歌詩者除坐齋日外命其午後常至本學後館學習有琴者命自携琴如有士夫鄉人善琴好學者許社學師生時以禮請午後至學有父兄能敦尚禮樂以教子弟者本職查訪禮勸一朔望拜聖人前一日之晚命執事生徒拂拭設牌位香案牌用木臨期用紙書孔夫子先師帖牌面拜畢焚之每朔用一日坐齋生徒望亦如之拜聖人畢退别館拜先生分班相拜畢抽籖問講蒙訓之類不能者責乃退每月朔望放假一每月初五十二二十二十七四日習射聽先生預期具柬請某賓或請某教讀學師行射禮賓或不足則師生自殺禮行之初射命初坐齋之一日生徒午前至學觀射次射命次日坐齋生徒觀射餘倣此擇生徒知禮者教之觀其德器優者録之其餘觀射而已此日不坐齋一生徒固以少長為序若其間有良賤之别者亦當更處以存大體毋得混然不通一生徒有四時之祭及髙曽祖考忌日須前三日稟於先生給假教以禮儀雖蔬食菜羔務盡孝思以申報本之義以成化家之道如有忌日燕笑違禮者痛責勿恕一有冠婚喪祭之家許託本里年長生徒就先生問禮量其力之厚薄以酌輕重一遵先王之禮不許安於舊俗逆禮亂常及私用淫樂作佛事違者訪拿以法懲治一生徒居家及朋友相過俱要敦尚禮節於事親敬長之餘須歌詩學樂講論古今嘉言善行兄弟朋友各盡其道互相切磋誘勸言笑動止不許習為市井之徒務求做箇好人大則化家善俗為利用之器茍不見用亦不失為君子保守家業上承祖宗下垂後裔斯不陷於禽獸無忝所生慎毋自暴自棄為師者務要以此等言語終日提撕為生徒者必須篤信師言勇求上進所行教規令諸生各抄一本以備檢閲省察一生徒有過失者或居家得罪父兄骨肉或出外得罪鄉黨朋友或自己所為有失即當直告於先生朋友求知己過不宜以不善之事自害其身大凡偏惡之人未嘗樂於偏惡由其不聞師教率意妄行日甚一日養成是性性既偏惡見善人必嫌聞善言必毁正如街市常人見大君子所作為必驚駭以為不是由其昏閉不知故也今生徒有過不肯告於先生朋友求知改者是自棄其身而甘於為惡者也先生察出重責書於改過簿內以待本職稽考一生徒衣服俱要儉朴不許用紵絲紗羅及違制服色但許用布絹為之出入不許騶從輿馬如違定行究治一生徒有好酒博奕逸遊驕縱者切察其事痛責深曉録之改過簿內如不改許送提調官懲治毋得茍容本職訪究一生徒有不服師教悖逆非毁及有傷彛倫者呈送提調官治罪訖仍申本道區處學師録於改過簿內一生徒如有資質可教能遵守學規日有進益者或有資稟異常志行不凡者學師時常選擇録於揚善簿內待本職按臨歲考之日查取考送府州縣儒學教養學師須從公具由開送如生徒不可教者不可因其父兄富顯冒送以阻後學之志一隅內有貧甚不能具棺舉葬者許本里生徒告於先生度隅內有力之家遣其本里子弟生徒告之集百家之小費自足以濟一家之急如有仗義捐已獨濟之者學師録於揚善簿內待本職按臨以禮奬勸庶幾鄰里相助激勸人心一有喪之家服未滿者不許燕飲歡樂違者社學師録之改過簿內以待本職查究一開學之日各里父兄固當以禮往見但人衆事繁恐妨教事至歲晚罷館之時父兄當率子弟拜送各申待師之敬四時無事不許輕至社學請師求對如欲問禮須託年長生徒請問先生議行務從簡靜以成教事毋致送往迎來以荒學業一歲晚罷館之日許生徒年長者四人或父兄里老先期半月具手本稟本州縣掌印官某社學以某月某日罷館提調官務要以禮待送或社學在逺鄉者修書遣里長老人禮送謝師之禮社學已有措置不必重瀆為民父母者毋得違禮慢易以致教化不行當職查考諭教讀竊謂學無二道習有異途童蒙之教欲一之於正道而不使雜焉以壞其良心者也今有等生徒安常習故以為社學之教皆非當世所急只是多讀書熟作文中舉得富貴便了不知我太祖髙皇帝立學教民則先行後文設科取士則以文觀行豈徒文而已邪夫文既不足以盡學則讀書作文安足以盡人道欲盡人道而不為小學大學是猶欲飽而不求食未有能免於飢者也且小學是童蒙身上實事自王公以下至於庶人之子弟皆學此學書册記載不過欲人知而行之至於大學所謂明德德不是紙上之物明不是口耳工夫古人雖未嘗不多讀書要在得於身心茍不知學雖讀書五車作文一世不過增口耳之欲攻紙上之談而已於身心何干故曰書生多欲少剛胡不自愧自反六經四書人誰不讀實學乃為有益徒記反以蔽心所以學者徒能記得甚多講得甚精作得甚好亦只是一場間説若所為不善口誦心違是侮聖人之言也夫子曰今吾於人也聽其言而觀其行聖賢豈貴於空言也哉今之童生七八歲時止是讀書十歲之外便學作文父兄師友皆是欲速一或博記能文即稱之為有學不知養正與明德工夫一分不曽做得將何以謂之學乎亦嘗有自悟而進於大學之道者蓋由質美而然學校中未聞以此而教人也且古之聖人亦待小學大學而後成今之學校如此欲才之多得乎其間知大學者又多有滯於講説訓解之一偏而不自覺雖能談玄説妙於身心上苦不得力不免終為利欲所奪此只在童蒙時壞了所以多轉不得若不變舊日社學之教而復止於督取書課是乃限人以紙上之虛談而不欲其修人道之實甚則縱而使之徇利貪欲積惡無恥欺取富貴而已若在常人之中則多強梁懦弱父子悖逆兄弟為讎骨肉是輕財利為重甚至殘忍刻剝隂害詐謀雖絶滅人道不顧也朝廷設學教民育才果欲如此壞之乎當職叨任教事深思自責敢不以古人之學望諸士民而欲其有行有文以盡人道之實而乃以文藝限之邪由此觀之社學之教至重至急凡為師弟子者當慎修其事毋復安常習故以誤後學一教讀師皆有成人之責切須以身率人正心術修孝弟重亷恥崇禮節整威儀以立教人之本守教法正學業分句讀明訓解考功課以盡教人之事今而後宜虛心自責篤信力行以稱師儒之職不宜妄自菲薄以誤風俗所行教禮教讀之規各里師生俱要抄寫一本互相體悉同心輔教以成美俗庶幾補助朝廷政化之萬一有能遵依不悖為衆所稱信者當職以禮褒勸俟各學大館教禮之師有闕補用如違定行革退一教生徒須先引其志趣責其恭敬增其見聞察其玩戲以至坐立拜揖居處道路飲食衣服皆須著意照管提撕警覺使之日歸於正然後足以成之不如是必有一暴十寒習染一偏之病求其不流於卑下者鮮矣一日所講所讀之書須擇一二章切於弟子身心人倫日用者白直講諭就以子弟所當為者發明責在子弟身上如講孝經即令他歸家如此事親此不是講書是借古人之嘉言善行以教他做人與講科舉之書絶不相同不可念誦浮詞泛然都作一場話説一日所讀之書皆用正書不許私讀幼學詩及吏家行移等書讀書皆用正音午間不許作對句只抄寫風雅頌之詩全章或一二章或前人律詩絶句教之歌詠以興其志趣養其性情不許歌金榜富貴等詩以啓生徒急功利之心一寫字專習一家正字務令端楷清健不宜取法今日吏家軟俗之體最為可惡及寫字式不許寫金榜富貴求仙等詩須擇有益身心之言本道有前代法帖分教一生徒往社學大館習禮樂之後如有因仍逃學不服拘管者及有違學規者重責書其過以待查究一生徒之父兄待師之禮每宜加厚常見有等父兄惡先生責其子弟者故使教者樂於茍且曲順人情以終歲月所以教法不行生徒無忌是乃棄子弟於無用而養成其敗惡之性也凡各里教讀之師其間生徒固有往社學大館教禮之日但教禮之師已有措置不用生徒供給為父兄者宜各盡禮於教讀之師不許因而計利以慢師儒汚薄風俗一教讀不許罷間吏員及吏員出身之官或生員因行止有虧黜退者丁憂者及有文無行教唆險惡之徒下至道士師巫邪術人等各宜先自退避學規已行之日如有隱情冒教定行查究一社學規仰各府依式刋行務要對明字句不許差訛命所屬印給里長坊長分各社學刋畢先繳本道查考嘉靖元年六月為表章風化事切惟嶺南自昔吏道多汚遂令石門清泉亦蒙其恥被以貪名百世不能易也晉廣州刺史吳公隱之嘗題以詩古人云此水一歃懷千金試使夷齊飲終當不易心到州清節愈勵千載而下聞其清風尚能使人興起今其碑刻具存唐廣州刺史宋公璟開元賢相衆推為天下第一人其凛凛大節肅乎與嚴霜烈日爭髙也當時立有德政碑遺迹在學擬合表揚仰廣州府抄案回府著落當該官吏照依案驗內事理行委教諭袁吉擇省城淫祠寬大者改為德政祠樹立舊碑如無相應祠地就於光孝寺或玄妙觀內擇宮室堪以為祠者塑像立碑因命僧道守之事體尤便訓導雷樂前詣石門相度僧寺改為亷吏祠表其所題貪泉遺迹仍刻明道先生中心如自固外物豈能侵之詩使官於嶺南者由石門而來咸知所勸此係褒崇先賢激勵後進事理毋得違錯不便抄案官吏具依準繳來為學政事訪得潮州府學生員李承揭陽縣學生員黃坪等志行資質俱可與進牌仰潮州府即便津遣後開生員至省激勸漸磨其間貧乏者助其廪餼使得盡力於學潮陽人材倍於各邑而有志者絶少仰府轉行該縣提調官及教官時加奬勵毋得自安於浮靡之習責有所歸具依準繳須至牌者為崇正學以闢異端事照得粵秀山一城之鎮故有觀音閣今改而新之崇奉宋廣東漕憲周元公遺像順民心也山之左為迎真觀右為悟性寺因併廢之塑奉程淳公正公遺像南有仁皇廢寺塑奉朱文公遺像即其舊扁更為濓溪明道伊川晦菴四書院迎真觀之左有天竺寺改為崇正書院合祀四先生廣之諸生來講者使散居各書院斯實崇正黜邪之大者也必須得人庶可集事擬合選委牌仰廣州右衛指揮李松督同武生黃澤黃節將佛寺銅像鎔賣賃工修塑立先賢遺像查取淫祠神位座案爐瓶鐘鼓應用僧道驗無度牒者送官問革還俗其給有度牒者歸併光孝玄妙等寺觀迎真觀田原係官府置買仍入官召人承佃寺田係僧田納糧當差者仍給還寺僧選年老無家小心謹慎者每院二人為廟祝行府寄名養濟院月支米三斗給之俾之灑掃門庭崇奉香火承委官員惟勤惟慎務殫厥心事完之日具由回報抄牌官吏先具不違依準繳牌為作興人才事照得本職每歲巡厯僅能一周所至不過數日弗獲與諸生朝夕相親今欲集一省有志之士館於崇正書院相與講明正學訪得廪膳生員鄭𢎞彛劉一夔等增廣生員蔡大列等附學生員劉益薛僑等初入學生員林錦等或學行可稱或資質可進除揭陽已面諭知縣陶禎外仰府轉行該學并海陽饒平湖陽程鄉各學凡有志願學者俱該學給文徑令赴省其貧如劉一夔等該學具白有司量為津遣助之廪餼人孰無志故今更不列名行取以廣為善之路乃若激勸之機在良守令誘掖之方在賢師儒願相與體悉此意播告諸生咸使知之毋以卑陋自安毋以髙亢自阻庶幾無負國家作養之意具依準并起送過生員數目繳報為崇奬師儒事當職祗奉上命自愧德薄弗克興正學於一方亦惟我二三師儒之官是賴日當職巡行髙肇雷亷四郡考按諸生文行各學師儒咸殫厥心公於勸懲勤於訓迪固多有之如化州學正陳常存心篤實立教謹嚴髙明縣學教諭李士文四會縣教諭林啓俱文學優長行檢端慎當職深有望焉善善與衆共之擬合通行除外牌仰本府著落當該官吏照依牌內事理即行該府州縣備禮奬勸轉行各學俾知所勸其餘果有學行俱優當職一時不能周知者該府提調官其為我博加詢訪開具實迹呈上一體奬勸牌具依準繳為科舉事照得今歲大比正國家賓興賢能之年在下者當自重不可有求於上在上者當廣求不可有遺於下本職先巡歷潮州府歲考生員參取文行列於優等其有志講學者又經續考以行激勸但該郡人材素多原取數少合再甄收仰抄案回府著落當該官吏照依案驗內事理即行各學將後開歲考及續考優等生員起送應試其有行檢欠修不為衆所信服者提調官及教官訪實申呈定奪毋得混送應試該府提調官仍會各該縣提調官及教官務推至誠之心期於薦賢報國毋得容􅊏毫私意上負朝廷下玷名教天地鬼神亦當殛之先照案申呈前來候考畢總造册送道稽考抄案官吏具依準繳來為毁淫祠以正風化事切惟廣東之俗大抵崇尚鬼教所在淫祠布列巫覡盛行而雷郡尤甚節該行仰各府縣拆毁淫祠興建社學其間悉心奉行與奉行未至固係於有司之良不良然未有若雷郡之全廢閣不行者也必須委官方得集事仰抄案回府著落當該官吏照依案驗內事理即便轉行原委官知縣章昺王祥主簿盧璲教諭葉秀訓導林啓口山等通查境內淫祠及廢寺觀盡數折毁以祛數百年之惑變賣地基收貯材料以興社學凡可以便民者從宜為之田糧入官其師公師婆火居道士聖子人等俱令首官改正追出袈裟法衣神像經籙之類當官燒毁敢有仍前修齋設醮跳鬼降神者依律重治事完之日造册繳報承委官員務崇正道勿信邪術敢有阻壞風憲行事者教官密具帖呈稟教官不行盡心本職訪出或另委别府官員查出定行究問不貸抄案官吏具依準繳來為毁淫祠以興社學事照得省城番南二縣各鄉淫祠數多原無社學今欲興革必須委官方得集事擬合就行牌仰髙明縣教諭李士文四會縣教諭林啓增城縣教諭易文彬新會縣訓導蕭濬從化縣教諭唐仁新寧縣訓導倪廷玉分詣各鄉通查一應淫祠盡數拆毁收貯財料變賣地基興建社學凡可以便民者從宜為之仍除地立社以行鄉約其合用皂𨽻民壯行二縣取撥敢有抗違阻壞風憲行事者呈道重治民間所延之師逐一查訪仍會里老推舉資行端謹者留之其浮薄輕賤自行干求壞人子弟者即行罷遣各鄉孝子節婦義士用心訪求或表章其墓或存問其家候事完之日通行造册繳報為崇奬師儒事訪得萬州儒學訓導楊慣於操持民懷其惠勤於訓迪士感其恩近以親老思養懇求致政州之士民爭為挽留擬合奬勸仰瓊州府抄案著落當該官吏照依案驗內事理行仰該州轉行訓導楊模原籍遣在學諸生一人存問其母以禮致請楊模復任仍通行各學教官知會其間果有學行俱優本職一時訪察未周者提調官為我訪實具姓名事迹列上一體崇奬毋得違錯為風化事當職巡行亷郡考按圖志採訪民風略舉所當興革者於後一亷志亂雜無倫毁譽失實宜命教諭柯守仁等重加草定延諸名士筆削一亷郡生靈凋敝已極其禍皆由採珠而志不能備述其艱苦大失作志綱要修志者宜首及之一亷郡之前舊有一祠廟既完整且當要道宜改為忠清祠祀漢合浦太守費公貽孟公嘗宋陳肅公瓘俾往來者知所瞻仰一石康知縣羅紳及其子鑑同死賊難父死於忠子死於孝廟貌向存後石康縣廢併入合浦宜修葺之名曰忠孝祠合浦縣春秋遣官具祭一呂祖恭謫欽州舊與文公交遊者也宜立祠廟一孝子施敦宜立石大書表其墓曰明故施孝子墓仍擇永安淫祠改為孝子祠以祭之一劉節婦李烈女宜集其鄉老詢訪信如人言各表其墓一曰明故節婦闕德妻劉氏之墓一曰明故李烈女墓一合浦有僧綱道紀司而無僧道所有印記宜貯府庫慎勿添立護印之人崇長異教覬覦復興仍禁民無得給度一靈山檀上舍以死捍患宜與立祠一名宦鄉賢宜立二祠學之師生議當列祀典者具實迹條上一近歲林公錦有功於亷甚多其所存遺迹宜亟修之俾勿廢以慰民思一立祠表墓者各遣教官祭告其英靈一建立社學宜詳書其事於學宮提調官會教官及諸生推舉儒士堪為教讀者如無以生員有學行者為之右仰亷州府抄案轉行各州縣及儒學遵行為風化事當職巡歷雷郡採訪民風考按圖志今略舉所當興革者條具於後一珠池中館廢罷空間公館改建學宮萬衆鼓舞稱快但立學以文廟為先多士有所瞻仰前堂卑窄弗稱宜以玄妙廢觀正殿改建大成殿觀門及旁屋改建櫺星門基址易價充費觀舊有田其改為學田一玄妙觀因其廢而廢之舊設道紀司而無道士一人所有印記宜收貯府庫慎勿添立護印之人崇長異教使之復興一天寧寺僧一人而占田三十六莊影射差役坐享厚利蠧國殃民司政教者所當治也庸僧不通內典不守清規本當盡數入官既告願讓田二十莊為學田姑示寬容僧死毋俾他僧接管以崇異教每大禮習儀宜於學宮展教慎勿於寺中俾復得以藉口興建一寺田觀田既改為學田宜分其所入以為四積其二以修葺學宮及社學其二以延社學師及均給教官雜用以寬府縣備辨禮器等費有餘則以賙生員之安貧者歲終府司遣官集送用過數目以慿本道查考一冦萊公祠宜命人守視十賢堂附祀文廟之旁窄隘弗稱其以懷坡書院改為思齊書院崇祀昔賢其一翰林學士蘇公軾其二正言任公伯雨其三門下侍郎蘇公轍其四丞相李公綱其五丞相趙公鼎其六參政李公光其七樞密編修胡公銓數公皆天下名士流寓於兹邦人尊而祀之雷之人物未有顯如數公者豈山川之靈不發於本處之人邪余故名曰思齊以望雷郡之士正字秦公觀蘇公門下士難以並列與唐桞公仲郢李公雍俱改入名宦祠衆論未合令師生再議列上一鄉賢名宦祠宜與修葺郡無孝子節婦祠今宜補立學之師生集議當入祠者具實迹列上一廣濟寺乃係私創宜毁以滅迹其寺田改為學田附掌於學凡郡有孝子義夫節婦生當存問殁當表揚者於此取費一天寧寺銅鼓并各寺院銅皿送學鎔鑄祭器以絶怪誕一府學前舊有民居宜以官價易之充拓學宮規模一圓通寶閣鎮渡塔六祖真玉堂東嶽廟五顯三官三師地府諸廟上元諸菴一應淫祠俱應盡數拆毁一雷志舊載寺觀及珠池中館俱與刋落一四姑堂廢宜與興建其以天寧寺後堂為之立神位於內一建立社學宜詳書其事於學宮提調官會教官及諸生共舉儒士堪為教讀者如無則以生員有學行者為之右仰雷州府抄案轉行各縣及儒學遵行為風化事當職巡歷南雄考按圖志採訪民風略舉所當禁革者條具于後一萬物本乎天人本乎祖譬則木之有根水之有源也今南雄之民皆不祀先祖是絶祖考血食而忍其無所依歸不孝之大者也有司宜嚴加禁約悉毁外神責令專祀先祖一淫風流行始於男女無别南雄丈夫懶惰却令婦女出外傭生過嶺挑擔則與雇夫同行買賣則與販客相接或男女同席而飲或翁婦同堂而食既已混亂無别必然姦淫無恥為民父母者深惡而痛絶之嚴加禁諭教以內外男女之别養其羞惡之心有故違者罪其夫及其父母一婚姻儉約從禮則男女各得及時今南雄成親女家父母兄弟娣妹及親戚男婦俱送至壻家或中途設燕男女喧譁或同送及門尊卑混雜晝則宰牛燕會夜則聨床厭飲壻家貧不能具酒食遂至長大不能成親最為醜陋之俗有司宜嚴加禁革教以親迎之禮不許女家親戚陪送違者罪其家長一送終人道大變南雄民有父母之喪皆不以衣衾棺槨為重惟務供佛飯僧或暴露尸形而動經數日名曰保奏或廣開壇醮而直逾五旬名曰過七有司嚴加禁革責令遵行喪葬家禮一書鋪當禁之書一曰時文蠧壞學者心術二曰曲本誨人以淫三曰佛經四曰道經扇惑人心先已通行禁革委官宜責取各鋪并地方總小甲鄰佑結狀如再發賣前項書籍重治以罪再不許開書鋪仍大書告示張挂關隘去處不許從外省販賣前項書籍私入廣東境內不時差官盤驗以詰姦弊一南雄民風願慤乃有外省無籍之徒度嶺教書專教子弟讀律因而教唆起滅詞訟大為民害有司宜悉禁革敢有潛住民間教書者拿本道重治罪及其主人右仰南雄府抄案轉行各州縣遵行為風化事當職巡歷東管考按圖志詢訪民風略具一二所當興革者於後若其詳則有望於令長之舉行師儒之建白云一鄉賢祠舊所舉列聞有一二未厭公論通學師生其採訪功德實迹堪載祀典者會議列上其未愜輿論者毋得濫舉一創名宦祠凡有功德於民堪以廟食者具姓名列上一表章熊飛忠義祠立於榴花村以義士趙必􅝃並祀若必􅝃祀於鄉賢則專祀熊飛可也一廢額寺觀及淫祠田查出均撥各社學量撥醫學以為永久之利一委教諭劉蘭訓導舒清方輅親詣在城并各鄉通查一應淫祠盡數拆毁變賣基地收貯材料量興社學以教子弟立社以行鄉約毋得縱容豪右減價承買姦頑集衆阻留其各坊巷鄉村教子者委官悉心查訪仍會里中父老推舉資行端謹者留之浮薄輕賤干求為師壞人子弟者即行罷遣右仰東管縣抄案畫一繳報莊渠遺書卷九
