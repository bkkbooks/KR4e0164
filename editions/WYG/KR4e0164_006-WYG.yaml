body:
  text: 莊渠遺書巻六明魏校撰序周禮沿革傳序夫周官何為者也聖人代天而立也為生民開太平也其稽古而集厥大成者乎吾由是而得聖人之心法焉是故其統紀安在曰在王心諸所建置孰重格王為重也其條貫何攝曰三百六十屬一六官也六官一太宰也太宰一天也行之則奚先厥亦先建六官大綱定矣乃萬目次第以舉三百六十屬備矣吾由是而得聖人心法焉聖人之心何心也醇乎天心也渾乎天地萬物一體罔有不仁也故其法天下為公不敢少以其私病民也是故由其道可使天地奠位萬物各止其所兹謂盡善古之極也秦暴以顛實始棄古典則惟厥私意便安命之曰法肆一人於民上天乎為民立君之意荒矣後有作者莫知其朔迺規規襲秦故常創業甫定與民休息哉稽古則不暇暨於守成舊章是因則莫之敢更雖以天挺雄才未能或之度越也故曰古一宇宙也今一宇宙也自秦限之聖人至公秦以其私聖人大明秦以其苛太平之典曷日其興邪天将有待邪古經簡奥儒者頗為發明校不敏因其典禮以求其會通僭為沿革傳推古可行於今吁迂逺而濶於事情與都乃言可底績與愚皆罔敢知惟曰吾皇先公厥心迺克正事敢獻聖學惟治亂匪自他一惟心造皇尚作聖母或自聖徳之下衰久矣皇卓有立曰予一念公對越上帝曰予一念或私帝震怒之一民弗獲其所痌瘝予身丕逺惟古帝王是師曰予徳弗類終身惟恥予非古訓弗以學别求聞昔之先民是程惟師保是隆惟耉老成人是詢惟法家拂士是親招我髦士於四方其彚於朝曰汝其師師惟聖學是明以保我祖宗黎民兹惟太平之基六書精藴序嗟周之衰天王之弗考文也久矣秦以凶徳閏位强取文字而同之乃後世惟李斯是師先秦古文則既闕有間矣其别出者多列國未同之書然則文終不可考與曰文者非他也心之畫也所以體天地萬物之撰也古文先得我心之所同然耳心之所同然者何也天然而然也心學而明也貫若一矣古人之心學大以密倉頡之作六書也猶之伏羲之作八卦也若剖混沌而開之其道易簡愚夫愚婦可使與知不知不足以言道乃其精藴則有學士大夫不及盡知者是故傳久則易以譌有王者作議禮制度而考文心法同也昔者周宣嘗考文矣古文之變而為大篆也史籀所述也文字浸以備矣開闢而後與有功焉者也心法之微傳與否與今固弗能知矧秦之斯彼何人兮而其心乃敢曰古亦莫予若矣兹其萬惡之根矣大篆之變而為小篆也斯實紛更之文字則大備矣混沌之鑿也亦多矣秦以吏道易君道天下日擾擾焉程邈因是以隸書代篆書六書亦墜地矣要之二人者同於輔桀者也校嘗曰三代而上一宇宙也三代而下又一宇宙也自秦限之矣秦弗稽古師先王而厯代師秦以為故詎惟六書也哉校生千載之後悼斯文之久湮欲請於上因古文是正小篆之譌擇於小篆可者尚補古文之闕多病未遑則為之贊發大義以闡心法學者毋滯於書而博之天地萬物毋徒求之天地萬物而反求諸心天機之不器於物也古猶今也噫天而欲興斯文也兹其濫觴也已或曰師無道秦百代羞也請廢斯篆一洒空之無寧慊於志乎曰斯篆亦詎能盡廢古文今亦何必盡廢斯篆天王而考文也亦惟祖頡而參諸籀若盤盂書定而一之斯篆可者取之其不可者釐正之惡而知其美曠若天地之無容心焉邈隸亦亟修之與俗宜之翻篆而楷俾無失六書掃官府之繁苛灰書籍之叛經離道者復歸民於樸毋或琱琢其天或曰噫信斯言也古道可還也六書云乎哉禮記纂言序六經聖人親所刪定秦人燔之禮樂二籍俄空焉世惟周官儀禮厪存而學官罕所傳習漢儒所補戴記列於五經純駁班如也註疏又頗傅以緯學經世之誼鬱而未彰今所宗者陳氏集説而已耳朱子嘗修正三禮未就惟吳氏纂言倫類明整稽合諸儒異同厥功博哉而世鮮有傳者豈天未興斯文與曷絶之易而續之孔艱也雖然後有作者稽古立制興世太平兹書雖匪盡出孔氏固周官儀禮之翼也文獻斯存殆将由是乎考法千古之闕典可舉而行也君子之於禮蓋沒身焉學者弗及見古全書幸而此編尚在庶有格言詎可暫而舍諸如用於世且将執此以往矧亡者禮之數也其不亡者存經禮三百曲禮三千根心所發也蔽以一言曰毋不敬兹書開巻全經之體要具焉其可忽諸寧國守胡君東皋爰刻是書嘉與四方士共之屬校題諸簡末先王之典墜地也久矣庸詎知天之不欲興斯文也而以是為之兆與君守郡適倥偬多故時乃能崇尚經術其為政知所先務哉朱氏遺書序六經傳道之書也訓詁而已耳漢儒之所以陋也辭章而已耳唐儒之所以衰也迪知允蹈充之為聖學焉達之為王道焉宋儒之所以盛也六經至朱子而犬明世之學者咸知誦法朱子雖然其講明也過多其踐履也過少後儒之所以支離也或乃入耳出口而未嘗反求諸躬假途以干禄立門户以要名而朱子之志荒矣道喪於多岐舍旃而求捷徑逃儒而入於釋者也害則滋甚校始讀朱子語類文集二書歎其廣博浩繁茫無際涯久而見其提挈綱維闡發精藴有確乎其簡易者然後知夫統之有宗會之有元條列萬餘而其本惟一焉耳遡統而窮其源斂華而就於實斯固朱子所望於後學者也輒不自量爰取二書剟其統紀條貫深切而著明者輯為朱氏遺書雖未足以得古人之全體然於聖學之階梯王道之權輿亦略具矣學者惟毋以糟粕視之則古人之不可傳者庶乎其猶有傳也廣東鄉試録序代考試官作惟皇御極萬邦咸慶作曰天其将啟堯舜之治乎元年天下大比巡按廣東監察御史謝珊謀於左布政使王子言按察使汪鋐等曰貢舉大事也矧逢景運惟兹海濵黎獻共臣其慎擇舉者爰先期聘四方文學既而巡按監察御史涂敬受命來代監莅厥事曰予其輟他務虚中以治之維時總督右都御史張嵿總鎮太監韓慶總兵撫寧侯朱麟暨提督副都御史聶賢咸贊襄曰予其經武俾文教聿興市舶監丞解銘審録寺副汪和亦與贊焉及期御史敬颺於衆曰惟古賔賢暨能惟今稽古其毋顓文藝乃請教授應奎黄文雍曰其綜文衡汰厥浮華惟實彦是登教諭周天錫張琦萬楷林文炳訓導黄珠陳思順鄭復曰其分閲五經文必根於道毋尚枝葉時提調右布政使章拯左參政周用以舊服正法度監試副使陳祥僉事李中糾勿共者肅以常刑參議徐度孫懋副使胡訓王大用胡璉僉事王宗源汪克章沈炤臧相施儒都指揮甯漳李漳等咸協心於外以胥有濟遂合提學副使魏校所簡士三試之拔其尤七十有五人遵制額也録成獻於朝奎當序諸首簡竊嘗聞之古者學校教民其徳六曰智仁聖義中和其行六曰孝友睦婣任恤其藝六曰禮樂射御書數皆實學也貢舉之制始於族師閭胥月書其行而終於鄉大夫三年大比考其徳行道藝而興其賢者能者以禮賔之厥明獻賢能之書於王王再拜受之登於天府惟今鄉試有録殆古賢能之書也雖然奎初不知諸生誰氏所校者一時之文耳道徳行藝無得而稽焉其賢其能未知與古奚若文則燦然盛矣有稱道徳者有談仁義者有及性與天道者視古閭胥所書敬敏任恤族師所書孝弟睦婣有學若陿小焉然皆紙上語耳孔子曰始吾於人也聴其言而信其行今吾於人也聴其言而觀其行又曰有徳者必有言有言者不必有徳諸生之言其有徳者乎我不敢知行其可信矣乎我亦不敢知惟是踐爾言乃不負所舉孔子曰文莫吾猶人也躬行君子則吾未之有得又曰古者言之不出恥躬之不逮也敢以是為諸生勗昔者驩兠舉共工於堯曰方鳩僝功匪徒以言也帝猶吁而弗用曰静言庸違今諸生皆以言揚他日修身刑家平均天下慎毋違爾今日之言否且不容於堯舜之朝矣敢以是為諸生戒廣東鄉試録後序代考試官作我國家立學教民設科取士其在廣東厯五十餘科矣名公鉅儒先後相望科目與有光焉此我皇上龍飛第一科也廵按御史涂敬等以庚之朝入院昭告於天地神明誓公無私以進賢報國壬之朝以出天氣清明人事整暇僉喜為國家得人賀謂文雍盍序諸文雍不佞請廣其意以告多士夫道充塞宇宙何古何今何逺何邇然自三代而降人才治化何如也遡而求之三代之前人才治化又何如也宇宙之間如有大限隔議者謂今之不能為古譬則人老而衰不能復少壯矣异哉斯言道無汙隆學有明晦兹其為古今之别爾古之學也以實行今之學也以空言古之學也以求道今之學也以干禄士逐利誘靡然一趍於文心術既壊故其學術益以支離而人才治化閹然其弗振矣作新變化是誠在今不此之圖謂古不可復是未知天地之運一盛則一衰未有衰而不盛者也今天子英哲天縱粹然堯舜之資方将稽古正學上遡精一之傳萃天下賢者於朝交修厥徳俾分教於四方以一道徳以同風俗然後使民興賢出使長民使民興能入使治民則天下之民無一夫一婦不與被堯舜之澤矣此萬世一時也天下大勢西北者其原也東南者其委也天下之山皆起於西北而盡於東南天下之水皆發於西北而會於東南廣居嶺海之間乃天地之盡氣也氣已盡而復發泄之故山川崛奇毓為人才多發豪雋秀而能文而渾厚剛大之氣或有所不足故古之聖賢多起於中土而南粤迄今寥哉無聞豈氣之鍾於人者固有弗全邪曰否人心與天地相通山川詎能限隔至善莫如堯舜至惡莫如蹻跖係其心存亡何如耳一念天徳堯舜在兹一念人偽蹻跖在兹常存厥心顧諟天徳行著習察動皆以天毋汩以人偽是聖賢復生於今也故曰北海有聖人出此心此理同也南海有聖人出此心此理同也道本在我顧自諉曰弗能且上誣其君曰是何足與有為也則亦棄人也已文雍與諸生有一日之雅竊覩文獻之盛故於録終進之以聖賢徳業庸厚望焉若謬為大言一則曰堯舜二則曰堯舜而其行違禽獸不逺焉則是相率而為偽也已文雍惡乎敢文雍惡乎敢自京口入汴紀行京口擊楫横絶大江駕長風渡淮自此南北形勢分矣江淮之間厥田膏腴而多遺利若農扈得人富庶可期月而望也兩淮鹽利甚博患亦彌深今将釐宿弊乎請法行自近始可以裕國而寛民必也為逺圖不可不深長思矣甄琛元勰之議要皆未見周禮而有言也淮小於江不啻倍蓰而吞大河豈特智者決其為患河北有鯀隄而無禹隄後世師鯀而不師禹河患何時而平也漕河新開暫逺河患但今大河勢已趨北決溢而復故道誰能禦之漕河之憂未艾也海運期期毋講上策莫若修舉虞集故事其次法唐宋轉般國朝設淮徐臨徳通五倉尚存遺址而遺意則莫之識矣妙在通融焉耳米乏則以次轉輸米賤則隨在廣糴貴亦時糶之以為糴本但使漕運得人辟召諸監倉而久其任北方復兼糴麥粟倍給於軍此法之至省至便者也唐陸宣公嘗行和糴關中嵗增百餘萬宋蔡京壊綱運東南遂不能支其利害昭昭可考也昔者鯀湮洪水汩陳其五行帝乃震怒今因漕運而逆河濟及淮三瀆之性垂及百年今上英才邁世赫然将大有為天意適於此時變動自是一機深識天人之際者莫若勸上乗此一大機會作一大處分漢都關中文景恭儉未嘗轉漕武帝窮奢極慾嵗漕關東六百萬斛海内虚耗昭帝恭儉一旦盡罷之上恭儉愛民如倣古制國用之法通計國課嵗入若干國費嵗出若干立一會計之書課入視祖宗時孰增孰減費出視祖宗時孰寡孰多立為定格一斷以祖宗舊制復進而考法於先王百年冗費一旦革之萬姓誰不歌舞聖徳漢昭盡罷漕運未足多也京口地固而民悍劉裕嘗用之矣此金陵之東户也維揚少弱近淮則又强矣此金陵之外捍也彭城山勢雄偉實南北之要衝古之立國者設險必在數百里外呼吸則四圍皆應觀形勢之起伏其間强弱自相為牝牡信天造而地設也覩淮而江之上流可想矣汴坦而無備豈帝王之都宋太祖謂遷洛陽未已終當都長安耳吾欲循周漢故事據天下之上游省冗兵以寛天下真英雄也自彭城入汴萬里中原固在仰稽聖神經緯之蹟邈乎不可見已中觀豪傑所以成敗興衰與其攻守之畧蓋有可言者俯察生靈困苦之狀無路達於九重深思地利不興萬無致太平之理斯地也夏用之以貢商用之以助周用之以徹今乃鹵莽耕之滅裂耘之不復有相之道海内所由困窮也堯舜舉農師禹盡力溝洫文王即田功蓋天子之職主於代天養民而守令又代君養民今也數易牽制又多匪人地利誰與興復必也隆重守令大畧如西漢時治道乃有根柢戰於中原步不如騎騎不如車車可以戰可以守騎便衝突可為游兵因思溝洫法存戎騎亦難蹂踐豈有晉宋之禍也校所至風雲相迎河山如待天寛地寛眼亦寛覺得收攝只在方寸深愧主宰不立未免衮衮隨逐大化噫此心收却根本上露生端倪纔與天地同體若放去自由便被軀殻私慾裹住違禽獸不逺矣莊渠遺書巻六
