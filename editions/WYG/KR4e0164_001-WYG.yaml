body:
  text: 莊渠遺書巻一明魏校撰奏疏講詳郊祀大禮疏提督四夷館太常寺卿臣魏校謹奏為昧死應詔陳言講詳郊祀大禮事臣聞禮惟聖人為能饗帝惟孝子為能饗親祭非物自外至者也自中出生於心者也心惕而奉之以禮昔我太祖髙皇帝祀天圜丘祀地方丘厥後合祀於南郊遂為定制其心必大有不安者矣是故不憚變古肆我皇上以上下之分隂陽之義将復太祖初制改定厥制其心亦必大有不安者矣是故不憚變祖然則如之何而心乃安曰心天心也空空無我精義入神而毋容私焉合乎天心則心乃安今聖制前定斷以不疑而猶詢羣臣親降綸綍俾各陳所見聞蓋欲如帝舜之朕志先定詢謀僉同鬼神其依龜筮協從武王之汝則有大疑謀及卿士謀及庶人謀及卜筮也臣愚不佞既弗能曲學阿世亦罔敢面從退言竊念先王制禮宫室也主中霤冕服也尊黼黻飲食也尚元酒太羮皆莫能忘其始矧太祖實始開創我國家一旦聞議變祖戚戚痛傷厥心口囁嚅弗忍發黙而勿言乎又念三代而下聖人之心學不明儒以訓詁溺心而六經成糟粕厯代每有制作則諸儒持論各挾勝心寧悖經而弗敢悖傳記寧違先聖而弗敢違其經師名為聚訟世又下衰文獻通考復掇諸儒糟粕成書眩惑心目窒天聰明弊也久矣天挺皇上志欲度越古今一則若稽先王二則若稽先王惜乎羣臣未能因心以廣治酌古而通諸今日我皇上之詔行親蠶於北郊也乃舉千百年之曠典而羣臣弗能推明周禮使我皇上之慊於志而但引用文獻通考襲漢魏之舊儀若應故事者臣誠惜之欲舉周禮開廣聖心會得痟首之疾弗果今兹郊祀大禮臣愚過慮誠恐羣臣不深惟聖經之醇祖訓之重詳究制作本㫖洞達幽明而輕易變易既非先王之典而徒取祖宗成法紛更之則我皇上之心滋有大不安者矣惟我皇上之更定郊祀何心也惕然動於中惟欲内盡於已而外順於道也乃天心也皇天后土實鑒此心祖宗在天之靈實鑒此心非敢狹小祖宗制度也非敢示天下為美觀自作則也天地祖宗實鑒知之臣既推原我皇上之心復述臣一人前後所見異同著為郊祀論二篇以開明我皇上之心務求本諸身徵諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑則改之而心安改之可也改之而心未安弗改可也謹寫成二本一乞留備御覽一下禮部看詳臣不勝恐懼之至為此具本親齎奏聞伏候勅㫖郊祀論上臣少有志古禮常論郊祀其言曰天地分祭合祭之議久矣愚請折諸孔子孔子贊易曰大哉乾元至哉坤元在禮曰郊社禘嘗尊無二上巍巍上帝與皇地示並列既非所以尊天蕩蕩皇地示厭於上帝而不得獨全其尊又豈所以尊地哉雖然孔子贊易曰乾天也故稱乎父坤地也故稱乎母在禮王者父事天母事地宜若可以合祀然夫天地絪縕以氣化也男女媾精以形化也上帝皇地示之尊豈若父母之以夫婦牉合邪或疑分祀天地周禮文繁也夏殷而上其禮簡質今無所於稽安知其不合祀哉夫唐虞秩宗典三禮與周禮大宗伯掌建邦之天神人鬼地示之禮以佐王建邦國先後一揆天地合祀則凟矣臣昔所論著云爾嘗語友人李承勛莫能難也而戒臣持論太早自信太過言若逆臣耳者厥後臣學頗進益知義理無窮不敢傲然自賢又從而考諸周禮大宗伯以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌伯雨師皆序天神也以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物皆序地示也初未嘗言皇地示考諸尚書丁巳用牲於郊牛二祀天也越翼日戊午乃社於新邑牛一羊一豕一祭社稷也亦未嘗及皇地示湯之伐夏也昭告於上天神后武王厎商之罪告於皇天后土亦未嘗及皇地示臣又徧考傳記曰祀帝於郊所以定天位也祀社於國所以列地利也且郊特牲而社稷太牢於郊曰大報焉於社曰美報焉兆於南郊就陽位也則曰郊以明天道君南鄉於北牖下答隂之義也則曰社以神地道而終之曰尊天而親地也亦皆不言皇地示周禮封人設王社壝大祝建邦國先告后土古人造字地土也社土示也諸儒釋社曰五土之神故以社為小而欲别立北郊祭地以對南郊祀天其言無所考證具五土者各止山林川澤丘陵墳衍原隰而言也后土者總大地全體而言也乃知皇地示即后土異稱如昊天上帝一稱天皇大帝也其名本出緯書而禮家因以南北二郊對此亦緯書而禮家引之以釋經傳耳按周禮大司樂凡樂圜鐘為宫黄鍾為角太簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鐘為宫太簇為角姑洗為徵南吕為羽靈鼔靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣説者誤解冬至祀天於圜丘夏至祀地於方澤此南北郊之議所自出也不知聖經總言神祗各以類應故曰天神皆降地示皆出求天神當於陽生求地示當於隂生凡神皆壇其象圜凡示皆坎其象方經又言凡祀神示者以冬日至致天神人鬼以夏日至致地示物鬽亦泛言隂陽感格之道非専謂冬至夏至日也以經考之六經皆無南北郊惟此一章又出於諸儒之誤訓其不足徵也明矣况大司樂分樂之言後世皆莫能曉其義止當闕疑闕殆故曰盡信書不如無書祭法謂燔柴於泰壇祭天也瘞埋於泰祈祭地也用騂犢凡傳記言南北郊者亦惟此一章按周禮陽祀用騂牲隂祀用黝牲今槩言騂犢附會顯然以經正傳之訛則言南北郊者無足徵矣復請折諸孔子曰郊社之禮所以祀上帝也朱子釋曰郊祀天社祭地不言后土省文胡氏又謂古者祭地於社猶祀天於郊後世不當崇地抗天周禮禋祀昊天上帝血祭社稷而别無地示四圭有邸舞雲門祀天兩圭有邸舞咸池祭地而别無祭社則以郊對社可知矣臣所考郊祀禮制聖經賢傳皆可徵但禮必有義臣求之而未得也虛中以俟之蓋學不可以不思而思之道貴乎切近貴乎優游不可强迫也其後臣學鞭辟近裏天聰明若有開者始悟人稱上天下地者皆徇名言未造實際者也天地渾是一體正如我身上帝至靈正如我心百神正如我身百體魂魄后土亦我體魄之大者耳人之靈安得有二也故楊震謂天知地知子知我知而程子曰天地無二知淵哉言也豈惟天地一體人與天地亦渾然同體形骸雖各間隔而一氣相貫通人但知軀殻内是吾身而不知通宇宙是吾身故好名好勝作好作惡種種私妄縁軀殻生若天地萬物一體則能廓然無我痒痾疾痛舉切吾身矣地不可以對天故以社配郊則可以北郊對南郊則大不可惟心無對上帝至尊豈有對邪聖質髙明試以臣言黙加體騐将洞然貫天人矣地不可與天對夏至亦不可與冬至對聖人扶陽抑隂一陽之始生也聖人重之故曰復其見天地之心乎若有對則是復見天心姤見地心也貞下起元在一嵗冬至子月為復在一日夜半子時為復在人心静中養出生生善端也是故聖人之學在求仁而求仁之功在主静今夫制律者候黄鍾治厯者正日躔皆始於冬至也臣今所見如此昔者蘧伯玉行年五十而知四十九年之非行年六十而六十化未嘗不始於是之而卒以為非也今臣生四十八年矣尚覬有進安知後之視今不猶今之視昔乎孔子曰夏禮吾能言之祀不足徵也殷禮吾能言之宋不足徵也聖人之心其慎重也如是矧我皇上孝子慈孫之心哉臣不肖又安敢縱言及於禮哉郊祀論下臣昔嘗論日月不當配天其言曰按禮家謂郊祀天而主日配以月釋者以天體廣大而日著明故以為主是未知上帝臨汝陟降在兹也天之神洋洋乎無所不在聖人終日對越上帝復立之郊以萃之是曰合渙之道今曰主日吾未知郊之祭也大報天乎報日乎配之以月吾未知主祀者其天乎其日乎蓋因迎長日一言誤而生誤也日生於東月生於西王者春分朝日秋分夕月祀有常經則祀上帝不必配以日月也萬物本乎天人本乎祖故王者以祖配天在日月則無取於斯義矣既配以祖又配以日月在正位則褻而不嚴在配位則混而無别非所以尊帝而重祖也臣昔又嘗論百神不當從祀於郊其言曰郊之祭也大報天也非以索百神也則祀上帝不當又祀百神凡兹百神載在祀典已有常經則祀上帝不必又祀百神也禋祀當極精誠若敬有所分豈曰精意以饗或曰上帝降格則百神景從豈可闕百神之祀王者躬薦於上帝百神則分遣乎羣臣曷為其不可哉曰信斯言也是以上帝為有象也方士者流其言誕漫謂鈞天上帝所居而百神各有官府皆可名言故叢而祀之佛氏入中國其法普同供養而古禮始淆矣且郊之日庶民猶弗命而聴上矧羣臣乎今惟主祭者専一而羣臣敬有分散非復上下一體之義矣臣又論祀天祀上帝不可分其言曰按孝經郊祀后稷以配天宗祀文王於明堂以配上帝孝莫大乎嚴父嚴父莫大於配天則周公其人也禮家因謂冬至大報天季秋大饗上帝而未知其非孔子之言也夫上帝天之主宰天以全體言譬則身也上帝以主宰言譬則心也身外豈别有心周禮禋祀昊天上帝今分天與上帝為二而祭之於義何居古之祀天掃地行事今於明堂曾謂上帝至尊反就人鬼以饗乎周公相成王尊崇文王配天乃嚴祖也非嚴父也謂周公嚴父配天是無君也况配天必以祖以其功徳與天同也如曰嚴父而已矣㒺非天𦙍曷為豐昵哉臣又嘗論五帝之祀非古其言曰大宗伯禋祀昊天上帝小宗伯兆五帝於四郊凡祭祀之聯事皆首言五帝大神大示亦如之是蓋文誤否則諸侯去籍後所增也禮家謂東方蒼帝威靈仰南方赤帝赤熛怒中央黄帝含樞紐西方白帝白招拒北方黑帝叶光紀與昊天上帝為六夫天人一理民無二王孰謂天有六帝乎慨自周之末造諸侯僭天子位在藩臣而臚於郊祀然猶不敢盡同天王故魯郊祈榖實祀蒼帝秦作西疇實祀白帝其後增畤以祀黄帝赤帝青帝蓋聞諸國僭禮而并祠之􅍀然有招八州朝同列之志矣是時北方諸侯無僭郊者故闕黑帝漢髙曰是待我也乃備五帝之祀諸儒莫知其源流故議論紛如也臣昔所論著云爾厥後考求國家典故見我太祖論及大祀甚嚴必有精意黙感者則戰慄不敢發口孔子戒學者毋輕議禮臣自後不敢輕言臣今所言者亦禮之文也非本也皇上所言修徳法祖親賢愛民禮之本也皇上則既知之矣臣復何言書曰知之非艱行之惟艱願我皇上篤行之耳乃若禋祀之義臣請為皇上詳言之古之祀天也以器則陶匏以席則藁秸以牲則特以位則不壇掃地而祭是何心也誠以昊天罔極顧萬物莫可報之故略吾外心而竭吾内心是曰精誠之極非祭時發之也乃積之於平時也其心平時恒曰天之愛民也甚矣豈其使吾一人肆於民上昔者禹也菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫吾飲食菲矣特牲而心安吾衣服惡矣陶匏藁秸而心安吾宫室卑矣掃地而心安其或志不在民厚自奉養也而薄於天心其安乎周公之訓曰至治馨香感於神明黍稷非馨明徳惟馨臣敢稽首以獻乞褒崇先聖疏為褒崇先聖事臣惟孔子萬世帝王宗師厯代崇徳報功固已漸次修舉國朝尤為加隆尚有千古闕典未及舉行端有待於陛下也昔者周封微子於宋以奉殷後孔子繫宋子孫自正考父適魯始為魯人孔子周流四方而逢掖居魯章甫居宋惓惓二國不忘者以魯父母之邦而宋其祖宗根本之地也魯於今為曲阜縣孔氏子孫家焉宋於今為歸徳州臣所至考按圖志始知微子廟尚存嘗有孔還鄉莫能紀其世矣漢梅福請封孔子後以奉殷祀不報後世褒封為衍聖公宋亂從髙宗渡江建家廟於衢遂分為南北二宗北宗在曲阜者太祖俾襲封衍聖公南宗在衢者守臣建言孝宗官為世襲五經博士誠以先聖子孫所居故國家致其隆厚矧先聖祖宗所自出之處乃獨未有表章之者臣所謂千古之闕典端有待於陛下也昔者宋儒朱子居於建寧而其先徽人也國朝以其講道有功集諸儒之大成故兩處皆霑恩典況孔子集羣聖之大成垂憲萬世有天下者凡可以崇徳報功尤當無所不用其極伏乞陛下深惟先聖道配天地亘古及今特勑禮部表章選孔氏子孫賢者一人來歸宋之故墟援衢之例官為世襲五經博士建立家廟俾世守之因守視微子之廟以嵗時徃省殷湯之陵庶幾有以上慰先聖在天之靈千百年闕典陛下一旦舉行實可以作則萬世也陛下天挺英資臣因奏事敢有所獻竊惟古之帝王務學必務求師伏願陛下能自得師於千古以孔子為宗萬幾之暇莊誦孔子遺訓毋若書生章句講説每讀一言儼如親聴聖教務求反之於身曰朕何以能若是乎其所告誡則曰朕得無有是乎察之念慮之微騐之政事之著曰朕之所為有合於聖訓否乎以陛下之聰睿循此用功日慎一日則孔子之道陛下親得其傳矣孔子之道何道也堯舜相傳之道也陛下為堯舜之君則天下之窮民皆将鼓舞而樂堯舜之澤臣不勝大願縁係褒崇先聖事理未敢擅便為此具本顓差承差齎捧奏聞伏候勑㫖復姓疏為復姓事禮曰萬物本乎天人本乎祖陛下以孝治天下臣生斯時敢忘本始臣故李姓髙祖恕刲股救母鄉人稱為莊渠李孝子娶髙祖母金氏生臣曾祖琳兄弟四人於行為二魏士珣之妻與髙祖母兄弟也無子養琳為子因改姓魏髙祖李恕係長洲縣二十二都十一啚魏士珣係崑山縣三保三十二啚兩家國初洪武各占民籍至今曾祖琳寛厚有徳長者實始昌大厥家魏氏遂為士族士珣夫婦甚賴之後庶出有子曾祖亦不復歸宗子孫居於崑山易世之後迷所自出因與崑山李姓為婚厥後宗兄李方始大合族為譜族之人曉然咸知尊祖敬宗臣父封主事奎雅意復姓弗果臣登進士厯官中外從弟庠由太學入官皆有籍於朝不敢輕改臣敢追述先志爰具家世源流上達天聴乞勑吏部移文原籍官司體勘是實具奏改正貼黄户部改附冊籍庶幾子孫相承不昧本原為此具本差家人魏悅齎捧奏聞伏候勑㫖乞休疏一為乞恩休致以保名節以延夀命事臣昔官南京刑部正徳九年欽蒙召為兵部職方郎中臣以患病再疏乞恩放回原籍調治正徳十五年欽陞前職越明年夏勑書及門適當陛下龍飛之始臣不自度其不肖黽勉赴官教無根原事無漸次疾惡過甚奨善太輕不能宣揚陛下之風教嘉靖二年五月初十日臣父封主事魏奎不幸在家病故萬里阻隔至六月二十七日臣始聞訃匍匐奔喪不孝之罪上通於天不可復贖臣今免喪居常自念士之立身惟忠與孝臣今無可用力以報臣父惟有致命庶幾以報吾君耳奈臣稟氣甚薄自少多病兢業自持僅保無事少有縱肆疾病交攻殆者數矣天常扶持而全安之臣於病中黙觀天人之際凡所以誘臣之衷而啟其為善警臣之躬而禁其為惡者蓋無所不至臣實弗克勤徳慢天棄天及遭大故又弗克自怨自艾立堅固志用勇猛功而乃過求安逸揆厥所由皆因心無定主一念之善暫或順天隨復汩沒一念之惡固已逆天又復浸淫是故善日以消惡日以積天始絶意於臣數降臣以災疾也心者神明之主百病之所由生也致病惟心治病惟心臣昧於心學弗克奠安天君十二官交失其職百邪侵焉目眩而損其明耳鳴而壅其聰風寒外襲則㦸肺癢喉飲食内傷則洞泄下迫此其顯發之證也乃若伏藏之證尚多有之臣毎回光返照内自五臟六腑外達於四肢百骸無一而不受病者非天絶臣臣自絶於天耳天之所棄人亦棄之至於過惡上聞皇恩浩大曲加優容不忍捐棄臣感恩圖報固當死生以之但臣元氣多耗神爽易揺若復知進而不知退則必決其性命之精一不成而萬有餘喪矣臣自不能謹疾保身恒以死生存亡為慮其語近於不祥豈宜上塵聖聽竊嘗聞之人勞苦則呼天疾痛則呼父母陛下天地父母也故臣有疾痛勞苦籲而陳之陛下以自乞其不肖之身伏乞陛下憫臣多病察臣不才特勑吏部容臣休致庶幾保完名節優游以延其天年臣未死之前尚當肄習古禮詠歌古詩以少助陛下太平之化臣不勝感激惶懼之至為此具本差家人魏悦齎捧謹具奏聞伏候勑㫖乞休疏二為乞恩休致以保餘生事臣先任廣東按察司副使嘉靖二年五月初十日臣父不幸在家病故至六月二十七日臣始聞訃匍匐奔還原籍守制嘉靖四年九月終服闋臣該赴部聴用因患虚怯等證抱病踰年不能起復至京一曕天日之表嘉靖六年二月二十七日接到吏部急字八百六十八號文憑一道復除今職竊念臣斗筲庸才已試罔效蒲栁弱質因病早衰自遭憂患以來病久成痼聖恩浩大起臣於閒廢之中再加任使臣當竭力圖報死生以之奈臣血氣已憊精神已虧風寒外襲則㦸肺癢喉濕熱内攻則洞泄下迫耳鳴目眩鼻衂齒齲此其顯發之證也臣每静中澄神黙照内自五臟六腑外達九竅百骸無一不受病者莫大之患可畏之勢伏而将發念之可為寒心從容燕養訪求醫藥自輔尚可保全餘齡若更奔走於宦途勞瘁於戎事必至摧喪其生矣伏乞聖明廣天地生生之徳不忍一物失所憫臣多病察臣不才特勑吏部容臣閒住俾得盡其天年陛下聖徳龍飛方舉堯舜之政臣幸得為堯舜之民與康衢擊壤之童叟共樂太平臣不勝大願為此具本差家人魏悦齎捧奏聞伏候勑㫖乞休疏三為懇乞天恩保全衰病事臣昔任廣東按察司副使提督學校丁父憂服闋嘉靖六年正月内復除江西按察司副使整飭贛州兵備臣病甚不能赴官奏蒙聖恩欽准致仕本年十二月初四日接到吏部急字九百六十四號文憑一道復除今職疏逺小臣一嵗之中再蒙陛下收用憫臣不堪戎務既曲賜於保全念臣嘗司文衡復改授以新命臣感恩思奮義激於中誓将捐軀報國奈臣受病深痼藴積有年心火上炎腎水下滲因循弗治則隂陽不相為用幾於廢人驟而治之又恐元氣愈削幸蒙寛恩得以優游田里正欲尋訪醫藥考求病源未及施治而恩命忽降自天臣孱然病軀遽起奔走從事内揺其精外勞其形豈惟舊疾彌増必且變生他證陛下雖欲恵養生活之不可得已況臣昔者典學嶺南祇奉勑諭思以崇正學迪正道於一方躬行弗逮學無本原教無等節疾惡太過奨善太輕怨讟並叢於身大貽斯文之玷陛下明見萬里察臣事雖有過心本無他復有中州典學之命臣自揣不稱人其謂何已試罔功再命祇辱伏乞陛下廓天地生生之徳為臣造命特勑吏部容臣仍舊致仕安分自守頤養天真臣幸而生全於堯舜之世當與擊壤父老共歌太平私效華封之祝臣愚不勝惓惓為此具本顓差家人魏悦齎捧奏聞伏候勑㫖乞休疏四為自陳不職乞賜罷黜以消天變事臣聞王者父事天母事地今天地降災沴以警動我國家譬則父母譴怒發於聲色也陛下恐懼修省躬禱於南郊正如人子負罪引慝祇載以見父母也前期微雨灑塵庶幾父母之悦懌矣及禱之日風乃大作雲散雨收似父母之怒猶有未解者陽亢已極雨澤愆期飛蝗蔽天赤地千里其勢且復見矣以陛下之精誠豈宜有是臣嘗反覆思之竊以為致今日之災者良由羣臣不能皆以陛下之心為心獨使至尊焦勞而上下情志否隔也今欲體天地交泰之道以和召和則莫若親接羣臣使之各舉其職有事皆得面陳欲羣臣各舉其職則莫若精擇其人進賢而退不肖臣備員理官獲從九卿之後既弗能寛大仁厚務持天下之平又弗能忠讜直諒極言天下之事不肖之當黜無以踰臣詩云天之方蹶無然泄泄臣誠有之不敢逃罪伏望聖明早賜罷黜臣不勝恐懼待罪之至乞休疏五為患病不能供職乞以原職放歸事伏蒙聖恩陞臣太常寺卿提督四夷館聞命自天俯僂在地瞻仰魏闕病不能興竊念臣八月十九日執事於山川壇感冒風寒翕翕躁熱臣以元氣之虚也不敢用藥發散静以鎮之浹旬而愈遂出朝叅無何復感風寒視前稍重臣静以鎮之如初再浹旬而愈十月初二日臣執事於悼靈皇后陵積傷勞倦夾以感觸寒邪身發壯熱委頓而歸臣愚執徳不堅輕信庸醫不求責病源不叅合色脉拘執局方用藥發散太過邪氣脱若去體而元氣索然不絶如綫坐令輕病變重重病變危呻吟床笫間萬念俱已灰冷惟報國一念炯然如丹而筋力不堪馳驅矣方将上疏請乞骸骨而寵命忽臨委臣以象譯之事崇臣以禮樂之司臣感戴之深固已刻骨忠誠所激誓将捐軀奈何力不從心病勢反覆沉痼調理弗痊伏乞聖慈憫臣蒲栁之質察臣樗櫟之材特勑吏部容臣以原職放回原籍休致俾得從容燕養保全其天年是迓續臣命於天也臣不勝大願為此具本令家人魏悦抱齎奏聞伏候勑㫖乞休疏六為多病懇求休致以保餘生事臣昔冬傷於寒汗之過劑發泄真氣太多主蟄封藏不固今春氣升無以為發生之本上盛下虚罷極易乏風氣乗於顛病從俞入遂得痟首之疾久而不愈移於中焦脾土受傷轉輸失職飲食雖納不能運化滯而生痰風痰羈絆腸胃之間兀兀欲吐發而為眩運立則欲僵坐則欲偃以病在告者數矣逮夏火氣炎上痰飲迷漫心包絡間恍惚善忘甚則憒憒不省人事静自思維勢難久生嗟臣之甫弱冠也慨然有懐唐虞何幸斯今躬逢堯舜在上逺泝精一之傳臣不幸乃抱狗馬病不獲隨麟鳳之在郊寒谷自隔於陽春靡草獨枯於盛夏豈非命邪天地之大也何所不容父母之慈也惟憂厥疾伏願聖明廓天地包容之量推父母愍念之恩特勑吏部放臣致仕俾得生還故鄉狐正丘首儻未即死尚得以沐浴膏澤咏歌太平以續康衢擊壤之謡也臣下情不勝哀懇之至為此具本令家人魏悦抱齎奏聞伏候勑㫖乞休疏七為病困再乞天恩放回休致以保餘生事臣以多病上疏乞骸骨生還荷蒙天恩不忍捐棄臣不勝犬馬戀主之誠病小愈即詣闕祇謝供職不料觸冒暑熱忽爾霍亂隂陽不得升降氣絶復甦既而嘔逆上吐暴注下迫病勢雖少殺而榮氣若脱腹􅑎然空矣良以時值赫曦大火熾然若蒸而臣内有濕熱相火合而成病故其勢熛悍可畏今死生尚未敢知幸而不死非静養數年決不能完復也古語有之曰人窮則反本故勞苦倦極未嘗不呼天疾痛慘怛未嘗不呼父母今臣之病力氣奄奄若存若亡呼天天髙弗聞呼父母父母逺誰為之恤肆惟我皇在上克寛克仁其於羣臣蓋之如天勤而撫之若父母臣敢暫息呻吟籲於陛下之前伏乞聖慈憫臣沉痼之疾察臣危迫之情曲賜保全放臣休致俾得生還故鄉從容燕養以保全其天年皆陛下大造之恩也臣不勝至願為此具本専差家人魏悦齎捧奏聞伏候勑㫖患病不能面辭疏為患病不能面辭事臣蒙天地大徳賜臣骸骨生還時值天暑可静而不可動未敢就塗今将逺離思欲一瞻天日之表然後退伏田野隨擊壤父老謳歌太平不料臣病憊甚首顫目昏身弱足痿不能詣闕面辭特令家人扶掖下階遥望闕門叩首致謝迤邐輿病而行尚賴陛下之福生還故鄉雖不敢獻野人之芹尚當私效封人之祝為此具本令家人魏悦抱齎奏聞伏候勑㫖經筵講章康誥講章一已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民這是武王告康叔以明徳之事而舉新民以終之已是語将盡而意未盡之詞乃是汝服是事𢎞是廣應是和武王告康叔先發嘆詞纔説道汝年雖小而責甚重今日至難化者殷民然民心不和實由君徳未廣汝之事惟在廣上徳意使包涵徧覆如天地之大則殷民誰不鼓舞相慶如依父母之安乎是能輔助我一人以安宅天命而作新民心矣蓋天之視聴在民民心既安則天命自安民之則效在君君徳既新而後民徳可新也是知天命係乎民心民心係乎君徳而君徳又係乎臣下之交修故武王於康叔一則望其𢎞王二則望其助王也夫武王聖人何待於康叔之𢎞與助而諄諄命之者聖不自聖弗自用而用人也臣嘗論之明徳新民乃武王全體大用之學是學也武王得之於文王文王得之於帝堯克明峻徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍此帝堯全體大用之學也武王論新民必曰惟𢎞王論明徳必曰𢎞於天益之贊堯首曰帝徳廣運孔子謂惟天為大惟堯則之蓋帝王法天者也此心不能𢎞大便與天不相似豈復有全體大用之學哉我皇上聰明天縱有聖人之資莊敬日强有聖人之志宜乎上帝用休下民祇若以享聖人之治矣然而未盡然者其故何哉臣愚願我皇上深念保天命在安人心安人心在修聖徳修聖徳又在恢𢎞聖心廓然大公如天之無私覆如地之無私載如日月之無私照虚以受人則萬善咸備謙以受益則萬福攸同豈惟成堯舜文武之徳又将享堯舜文武之夀所謂太和在唐虞成周宇宙間者再於今日身親見之矣四海蒼生不勝欣願之至康誥講章二王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺這是武王告康叔以敬慎刑罰的道理嗚呼是先嘆息封是呼康叔的名皆所以警動其心而使之聴也敬明乃罰這一句是綱人有小罪以下這幾句是目𤯝是不知誤犯終是明知故犯式爾是有意為之災是不幸適爾是無意為之這都是分别其情之輕重也刑罰本非得已不可不盡心必須以敬為主事事務要推究分明庶幾情真罪當乃可加刑但立法有經常用法有權變方能盡得人情且如有人犯著小罪的論法雖輕推究其情不是誤犯乃是故犯非人作孽乃自作孽公然出於有心這等人姦惡可惡最能敗常亂俗不可不殺之以示懲戒此即帝舜之刑故無小也又如有人犯著大罪的論法雖重推究其情不是故犯乃是誤犯非自作孽乃天降災偶然出於無心及到官府又能輸情服罪這等人昏愚可矜宜從寛恤而不可殺之此即帝舜之宥過無大也是知凡欲定罪必須得情若欲得情必須明理若欲明理必須存心故武王提出箇敬字來説舜典所謂欽哉欽哉惟刑之恤哉正此意也臣嘗考之臯陶曰天討有罪五刑五用哉可見人君用刑只是代天行道人臣用刑又是代君行道固不當有私惡亦不當有私好必須大公至正合得民心方纔合得天心仰惟皇上事天如事親時時對越愛民如愛子念念哀憐更願以公平廣大之心布愷悌慈祥之政戒法吏之深刻而重循良刪法令之繁苛而務寛大使春生之徳每行於秋殺之中陽舒之恩常溢乎隂慘之外和氣充塞國祚靈長吕刑云一人有慶兆民賴之其寧惟永臣愚不勝惓惓説命講章惟天聰明惟聖時憲惟臣欽若惟民從乂惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休這是商書説命篇傅説戒髙宗法天以治民的言語天是上天聖字指人君説憲字解做法字傅説説道天髙髙在上未嘗有耳以聴凡世間的事無一件不聞得未嘗有目以視凡世間的事無一件不見得此無他只是一箇至公無私而已人君為天之子凡事皆取法於天如惇典庸禮命徳討罪悉體天而行亦出於至公無私則人君聰明與天為一矣欽若是敬順從乂是順治人君既能法天聰明一出於公則羣臣必體此心自然同寅協恭而祇承於帝百姓必體此心自然心悦誠服而從欲以治矣羞是羞辱甲胄是兵器戎是兵衣裳是五等章服干戈是兵器傅説又説人的言語所以文身本不起羞但出得輕易則未免反起羞辱人的甲胄所以衛身本不起戎但動得輕易則未免反興禍亂此二者雖以為已要當慮其患於人也衣裳所以命有徳要當謹於篋笥不可有所輕予干戈所以討有罪要當嚴於自治不可有所輕動此二者雖以加人要當審其用於已也允是信休是美傅説又説言語甲胄衣裳干戈這四件是法天聰明的條目王惟戒此四者之患篤信於此使心不蔽於私而能明焉則言動賞罰各得其當朝廷政治無不大公至正而極其休美矣傅説以此告髙宗可謂善於責難而得相道者與臣嘗考之臯陶陳謨曰天聰明自我民聰明武王誓師曰天視自我民視天聴自我民聴則知帝王致治無非法天以順人心耳仰惟皇上聰明天縱而聖不自居徳業日新而心若未至蓋真欲追古帝王之盛非徒慕髙宗中興而已也尤願時味傅説之言勑天之命始終此心聲為律而身為度刑當罪而賞當功則與天合徳而覆幬之下罔有不尊親者矣孔子曰惟天為大惟堯則之惟聖明留意焉孟子講章先生以利説秦楚之王秦楚之王悦於利以罷三軍之師是三軍之士樂罷而恱於利也為人臣者懐利以事其君為人子者懐利以事其父為人弟者懐利以事其兄是君臣父子兄弟終去仁義懐利以相接然而不亡者未之有也先生以仁義説秦楚之王秦楚之王悦於仁義而罷三軍之師是三軍之士樂罷而悦於仁義也為人臣者懐仁義以事其君為人子者懐仁義以事其父為人弟者懐仁義以事其兄是君臣父子兄弟去利懐仁義以相接也然而不王者未之有也何必曰利孟子心學精密洞察天理人欲之幾微故隨事剖判天理在一邊人欲在一邊以決取舍同一罷兵息民也若人臣以利開導君心從人欲那邊則其害至於喪邦人臣以仁義開導君心從天理這邊則其效至於興邦句句皆是實事非空言也後世讀之者乃只作一塲話説在紙上講求皆知重仁義而輕利及到事上理會却顧利而不顧仁義故臣嘗謂三代而上是天理世界三代而下是人欲世界君臣父子兄弟夫婦朋友之間一為利害所昏則皆棄其天性舉世滔滔也自非聰明睿知如我皇上之達天徳安能救此陷溺之人心哉何以知皇上之達天徳也臣因明倫一事而知之昔我皇上入繼大統羣臣咸請不得復顧私親是天下為重天性為輕也是未免於懐利去仁義以事親也聖心不安至欲歸藩以養聖母是誠何心也大舜惟欲順父母視棄天下若敝蹝之心也擴而充之不可勝用矣故萬世綱常卒賴皇上而大定昔之議禮者亦皆悔悟感歎跂望皇上與之更始一事若此推之事事皆然都要辯别箇天理人欲去利而惟仁義是從則何三代之不可復也惜乎有君無臣每議一事輒顧忌利害之私而反以仁義為迂濶使我皇上天徳不克施於政事之間立人之道曰仁與義所以扶持宇宙者在是所以奠安生民者在是利人之私也人各私其私中國所以為夷狄人類所以為禽獸也惟願皇上為世道作主更博求同心同徳之人光輔太平但今専以科舉取士資格用人多是貪慕爵禄口談仁義實則利害根著於心必須多方訪求不次拔擢乃可以得真才也先儒曰有天徳便可語王道其要只在謹獨更願皇上内省心術之微一念動處察其公於天下邪私為一身邪公於天下者此天理也順而充之私於一身者此人欲也逆而遏之復察羣臣之心術觀其發言行事志在天下國家與或専為身謀與志在天下國家者必君子也任之勿貳専為身謀者必小人也去之勿疑又有託為名髙而實懐利者此則小人之尤去之尤不可不速者也但願皇上之心常與上帝合羣臣之心咸與皇上合則於行王道也何有臣愚不勝惓惓敬誦所聞以獻莊渠遺書巻一
