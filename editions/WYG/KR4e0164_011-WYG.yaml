body:
  text: 莊渠遺書巻十一明魏校撰拾遺書與王純甫承寄性與天道二說議論精確理即是氣氣為天性等語吾兄必自有見得端的處故敢直截擔當說出不經人道之語今亦未易以口舌與吾兄爭也明道先生有言上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命則謂之性率性則謂之道修道則謂之教孟子於其中又發揮出浩然之氣可謂至矣此說最為完備浩然章曰其為氣也配義與道無是餒也既謂之配還好說理氣無别否近與一人論理氣因問之曰人當哀痛時滿體如割涕淚交流此惻隱之心也當羞愧時面為發赤汗流被體此羞惡之心也今且分别誰是理邪誰是氣邪其人唯唯曰未也哀痛羞愧固有發不中節時亦復涕汗流出豈亦理之為邪其人不能自解校曰理非别有一物只就氣該得如此便是理理本該得如此然却無為其能如此處皆氣為之也然氣運不齊有不能盡如此處理氣合一則理即是氣氣即是理昭乎不分孟子所謂配也氣與理違則判而二矣夫子所謂回也其心三月不違仁又謂人能𢎞道非道𢎞人皆此意也今試就吾心日用間體驗有時分明見得理該如此而吾不能如此打成兩片若謂氣即是理只好說善底一邊惡那一邉便說不去矣願吾兄更精思而黙識之可否幸速旋教烏反哺羝跪乳此是物性稟得來孝至於鵝不復知有母是他性中元無那理世間又自有孝鵝此意恐儘有商量承示伯潜進修動履憂喜相兼伯潜固吾畏友也曩嘗大進一畨今别後又復一畨精進校輩慚愧無地矣但其病體則深有可憂者竊惟養徳養身元無二理願以孔門求仁之㫖告之若只恁謹嚴固亦自好但恐拘迫太過則血氣且不得舒暢如何得道理發生鄙見如此不知高明以為何如其二吾兄處晦觀動其於治亂興亡大故固已黙㑹於心傳聞主上英􅐾天挺此大有為之機也乃以典禮扞格黨禍將興天下倒懸誰與之解校嘗以天時人事窺之文同既死上必注意渭先氣盛而才雄銳然以興致太平自任此亦有為之機校憂其過也且懼其輕也又恐人言激之則愈甚也願兄以公天下為心正其學術隨事補救其偏慎毋輕與之辨論凝定以鎮之從容以誨之順其機而轉移之天下安危將繫此人身上兄不可不加之意也别紙承諭孔顔所欲勿者非禮也疑校并視聽言動亦將勿之信斯言也則與仙家目既不視魂自歸肝耳既不聴魄自歸肺何異豈校辭不别白與竊謂心放處正是非禮孔顔所欲勿者在此非謂纔視聴言動便是放也大抵人心通竅於耳目口體天君奠位四者守位稟命何待於收惟此是心放出走作則四者皆其透漏之路而目為甚故曰既從此放出却須從此收回此乃孔顔所謂勿也心學淵㣲吾兄剖析於毫釐正校千里之謬深感惓惓至情但此心往來機竅更願吾兄黙而察之何如其三别後每以吾兄抱病為憂陳知縣鯨過武城不識曽使之診治否竊謂吾兄欲求萬全之安非主靜不可屈之以尺蠖未也必蟄之以龍蛇夏首連山商首歸藏此乃聖學第一義吾兄天資盖世茍能從事於兹凝精完神深造自得其於却疾也何有嘗與崇志論此甚詳不識曽舉似吾兄否元中超邁絶倫而學未精確責善輔仁正友朋責也不識吾兄何以告之别紙允薦先生乆聞其名未得面㑹今亦未敢致書質疑煩兄自以已意徃問一二至懇周禮春官天産作隂徳地産作陽徳古今註者皆欠了然大司樂圜鐘為宫三叚古今註者皆莫能曉其義願求箋註數語律書三分損益隔八相生所從來乆矣筭法甚精然其術易窮故不得已而用半律變律但既曰半曰變則非律之本聲矣宋元儒者始為隔八相生乃旋宫之法非定律之法定律自當依周禮六律六同之序陽律皆左旋隂吕皆右旋其法往而可返禪於無窮近世又謂黄鍾之管長三寸九分蕤賓九寸乃黄鍾之變而非黄鍾也其說何如求一折𠂻之論古詩三百篇皆可合於絃歌願求譜數篇見寄近見允薦大成樂譜甚精但以一聲協一字今譜古詩須有散聲方合天然之妙向見陳元誠歌古詩散聲多少皆出天然安排不得必須譜出來然後人可學耳瑟學乆絶乆薦既能之願譜一二見教孔門甚重瑟千萬留意其四國家以漕河故河淮濟三瀆皆拂經汶水東注而障之西乆則將變其他禍皆小惟大河北傾將使千里生靈魚鱉校深憂之而未有以處之不知高見以為奚若與鄧魯别紙聖人說話都是教人切實做工夫如學而首章聖人分付要如此如此假令有一學生只管去念衆必驚訝以為病狂䘮心嗚呼此乃後世記誦之學設有一生只管對人解說學是如何習是如何衆必驚訝以為病狂䘮心嗚呼此後世訓詁之學設又有一生要求勝夫子夫子說學他便要說以不學為學夫子說習他便要說以不習為習如此衆有不大驚訝者乎此即慈湖是也此正棒喝禪師訶佛罵祖者也魯生魯生胡不觀鷹乃學習都是實事空言使不得也與胡永清校不才一嵗之中聖恩荐至有非疎逺小臣所當得者寜不感激思奮嗟乎欲致太平求賢第一若學術不正人才不興而期得賢萬無是理昔我太祖開設學校固先行而後文科舉取人亦因文以觀行師儒從有司自辟譬如大家延師今科舉弊壞已極士不務實學惟務空言師儒多非其人教化所由壅也校昔不自度其不肖强欲更張但俗學溺人已深此官終難行志雖勞何補且撫已内怍亦無顔復臨諸生吾兄知我愛我與其使罷精竭神較閱掇拾俳偶之文而實無補於世孰若使之優㳺林下發明周官經世大法及條春秋撥亂綱要庶幾可以助興太平玉汝於成惟兄是賴叔賢渭先避嫌不敢通問俟得請後奉瀆也其二傳聞元山病故上必注意渭先矣世道之責吾兄不可不自任明主可為忠言但救其末流不若正之於本指陳闕失白發姦弊不若因機而導之其機安在羣臣不得面見無可致力者聞上聰明好讀書惟有開陳古聖賢讀書之法使上自求之庶幾有大開悟但古聖賢讀書與後世絶異其差只在毫釐間不可不辨也病倦言不能悉世道可憂處將來何者為甚願吾兄常籌之庶幾轉移救正容易著力也其三近讀吾兄執中一奏不覺心開目明其於君徳國體關係甚大而切經術正所以經世務不我誣矣校嘗學春秋頗覺聖人撥亂次第此莫還是第二着且道第一着何先請兄靜中洞察天機所向必能中其肯綮也其四上祈雪於南郊十七日有事於大社是日祭畢而大雪此吾皇精誠感格也噫以吾皇之英明而導之以聖學明乾坤易簡之理體天地交泰之道其於太平何有吾兄精忠體國聞此亦當鼓舞惜乎有君無臣不能不為之浩嘆耳與余子積别紙嘗謂古人讀書主於體而行之與後世惟事講明者異武王曰今民將在祗遹乃文考紹聞衣徳言往敷求於殷先哲王用康保民汝丕逺惟商耉成人宅心知訓别求聞由古先哲王用保乂民𢎞於天若徳裕乃身夫子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為此古聖相傳讀書之大法明戒也聖人之學大以宻校近讀周禮見其區處天地萬物各得其所建立規模綱中有紀紀中有目徧布至為精宻誠聖人經世大典也而乆鬰弗彰校頗發明其義務求可以推行於今吾兄深思善悟懇惻直言敢録天官冡宰及太宰分職奉上請教願兄且勿開看先將聖經及諸家注疏閱遍思量聖人包括運用處然後閱此則彼此得失瞭然便中求摘紕繆匡其不逮更願兄畱意此書於世道大有助也其二承諭徐州水灾重大民窮盜起賑濟無糧勦捕無術自病書生之學未適時宜此固足以見吾兄憂勞惻怛之盛心矣校不佞敢再以書生之論上瀆高明今日事勢困窮極矣願吾兄方寸間常以禹稷之心為心凡可以救民者無所不用其極請命於朝力言百姓饑且死懼散而為盜賊以貽國家憂積誠意以動上安知廟堂不惻然而念之乎否則受人牛羊求牧與芻而不得孟子所以語平陸大夫者可謂無遺䇿矣録寄春秋繁露二章讀之未能深了豈内經所謂知其要一言而終不知其要流散無窮者邪趙氏屬辭固有鑿處然考訂該博功夫精專足備一家之學恐與程氏本義大有不同也高明暇時熟玩當自見之與夏惇夫在滁事簡望尊坐鎮雅俗使善類有所瞻依其益多矣雖然勿以事簡而弛防閑也御下不可不嚴也臨事不可不慎也山水雖佳幸毋終日徜徉觀之比曰觀我生君子无咎汝節天下竒才也而未必能遜志於學吾兄痛相切磋彼此必大有益也學者第一義必也恢恢乎有好善之心不自足已不求勝人乃可以深造也淺陋之見不識高明以為何如其二愷悌君子遐不作人想今已有次第恨道逺未獲聞其詳也承諭今音歌古詩同於俗樂云云深得慎重謹宻之道但校所取者正以其曉音律耳感人天機莫神於樂此乃後世一大闕事校甞小試於嶺南頗有效騐食芹而美故欲獻之吾君也伊川不答溫公甚善但在校則可吾兄舉似源甫則不可彼正病於不肯盡言今又益其疾矣天氣正溫充盎宇宙願兄養徳養身自愛復邵思抑前屢得吾兄書意向甚切頽惰之餘賴以振迅然猶未得平日端的用功今承來教愈覺鞭辟近裏所舉病痛皆就實地上說出來昏弱之資受益多矣惇夫有言此心提起處便是天理放倒處便是人欲提起心自提起放倒心自放倒至哉言矣日用間常切提撕須令應事接物與靜坐讀書時功夫合一方有得力處耳靜中涵養體騐所得所疑更願遂一見教幸甚所論良心數語甚精鄙意亦謂如此江西典學舊為有時名者作壞一畨近日典學臨難不能死節師道掃地朝廷選擇而起吾兄大愜士望其責甚隆也象山故江西人今其學張皇於一方此吾道明晦通塞之機人材盛衰世運否泰皆將繫焉非得吾兄㧞本塞源何以力救兹弊此又同志所責望於吾兄也伏承不棄遣使持書以出處之事下詢淺陋顧校何足以知之願以昔日求去之心而度今日可出之義則將不俟終日決矣其二故人日以逺悠悠我思吾兄親切用功日用間想有得力處天徳本自完具却被已私障蔽重重自非決堅定志用勇猛功如何得透出校因學不得力未教而已知因慚對夫子宫牆故人不棄願有以振我秋令嚴肅天高氣晶願兄法天推盪胸中陳垢以收摧䧟廓清之功不具其三不才多病乆當退藏天意固將大儆昏惰之資而畀以丘壑違天不祥不敢不勉日承下問畧獻所疑今復麤舉一二以吾兄切實用功當先了了矣古人口未甞說性終日於性上用功如何是性動處可見善乃天真性之本然惡乃人偽從軀殻起故不可無澄汰之功古人所以貴於精一也然必須篤信性之本善與聖人同乃能確然立志子積論性得無支離矣乎今欲於理氣處求一說融貫可通恐涉於想像講說矣象山天資甚高論學甚正凡所指示坦然如由大道而行但氣質尚麤鍜鍊未粹不免好剛使氣過為抑揚之詞反使人疑昔議其近於禪學此校之陋也喜怒當求之性情不當求之議論今舉先儒同異之說而求一說可通是又想像墮於言語間矣躬所未逮率爾奉答慚負慚負其四來諭若以奔走廢學古人造次必於是顛沛必於是豈待安安而後用功邪明道有言學者為氣所勝習所奪只當責志吾兄以為何如其五别乆寂不聞起居伻來喜動顔色吾兄蒞政臨民不識此心常精明否儻因而汩没却須求一出塲也禮曰孝子將祭慮事不可以不豫比時具物不可以不備又曰虚中以治之此言論敬極為親切邊事本易處分而廟筭或欠整暇盖未知敵虚實也中國大勢盜賊實惟近憂然莫如山東為甚今機械已萌矣吾兄所論列必切事情便中幸有以教我其六永清南還吾兄朝夕又得親一畏友此殆天相二人也吾兄明敏有餘却似剛毅不足故於沈潛之功決定之志未能自慊於心與永清處當甚有益永清豪傑之才但涵養徳性變化氣質之功未免從前缺少近告以體仁功夫躍然而喜但未知别後得力處何如願以孔門程門所示求仁之方與相切磋台仲數得相聚否近道之資好善之志深用嘆服但其用功次第未知何如莫於閒中消了日月責善輔仁朋友之職願各努力相勉與桂子實乆不聞故人起居懷想無已姜源甫余子積來訪盛稱吾兄進修之功昆仲自相師友朝夕漸摩以講明禮樂為已任聞之曷勝欣仰先王之禮乆不明於天下高明乃獨深信而篤好之考求其故冀可行之於今此其志當於古人中求之校病卧家居深恨弗獲執經請益抑嘗聞之明道謂横渠以禮教學者甚善又病其下稍頭溺於儀章度數之末如喫木札相似此言又何謂也二程先生平日教學者未嘗不以禮然其言曰涵養須用敬進學則在致知此其本末先後之間必當有辨高明其自擇焉與聞靜中卧病衡門乆矣不聞故人動定今始知年兄改官考功深為朝廷得人賀今國家紀綱尚存海内幸而未亂者前後考覈亦與有力焉明年春當考覈之期天下之治係於年兄天下之亂亦惟年兄天下之望咸在年兄天下之責亦惟年兄尚其朂哉惟吾兄惇厚靖黙近仁之資朋軰鮮有能及者而且精密小心動無過舉黜陟大事固當加詳但未知剛斷明決處比舊何如耳君子居其職則思死其官有官守者不得其職則去昔裴洎三爭事於上前不聴李藩謂曰曽以出處決之否憲宗乃從洎言所願年兄壁立萬仞以澄清天下為已任勿為大利害所動摇其察之也必精其詢之也必廣其行之也必果其持之也必堅所陟也必有以慰天下之望所黜也必有以快天下之心公道大明紀綱益振則海内猶可望治也聞諸縉紳咸以公輔之器期待年兄年兄一生勲業咸在此舉尚其朂哉其二校昔官南都司直劉公寔為吏部端居簡出惓惓於鑒别人才爾時世道方傾危君子有所恃而不恐小人有所畏而不敢為非隱然為一時之重吾兄清徳重望與劉公同素善品評人物雖然校不惟欲兄為衡鑑更欲兄為大匠今世人才衰㣲須大振作之汲引之挽回世道庶幾在此别紙天下大勢有緩急故君子之應之也有經權今國家之事亦孔棘矣若以常法應之恐未足以救兹變也東南大水數百里生靈將化為魚不識當道何以救之乎其三源甫所載革除時事雅有史才其包舉也廣其考訂也精其臧否也正今亦不必改竄但取其所載事畧以朱墨别之凡朱㸃者録出便可成書矣墨㸃者亦不可棄别録出之以備料檢故事愚見如此不知高明以為何如又源甫所查者多吏部兵部事更願託相知者備查户部禮部工部及刑部事各衙門亦然但有關係者皆科條録出可以大補我國家典故不但可補史氏之闕遺也校昔見兵馬司所取妖人南赤肚供招備載藥劑分兩製法可以延年可以生子不覺吐舌君子作事當為逺圖此事竒甚必且傳播四方豈無癡人欲嘗試者但云假造秘方殺童男童女和附子等藥為方則其術不復售人亦不談之矣吾兄老成持重必能深長思招議中決不草草也未知此事畢竟何以處之與吴徳翼校讀尚書見唐虞君臣互相戒飭凜然生祗懼之心今交友多唯唯之風願與吾兄共惇古誼校嘗竊謂吾人材質易為氣稟拘住若只就謹言正行上做工夫固不失為自修之士終恐規模窄狹展拓不開直須卓然立志以古聖賢自期見得箇義理大原學問要切處日用之間先立箇大綱領然後循序用功庶幾規模闊大不受氣質限量孟子之所謂能盡其才也答潘希召承諭某近已回頭但猶未轉步此誠可為吾道之喜但以愚見窺之某豪傑之士才高氣雄此等人既已回頭不憂其不能轉步但恐未肯回頭耳然此亦難以口舌爭要在積誠意以感動之耳古人只在實地上用功孝則真箇是孝弟則真箇是弟存養真箇是存養省察真箇是省察故朋友之際相勸而善工夫冣多不消費許多言語後世只為實地上工夫不及古人故議論愈多愈閙承諭近讀孟子只覺深得一格子此等必有灑然自得處第恨離索之逺不獲面詣以領教言與張常甫往嵗㑹於吴門承諭天人之際逮今猶覺凜然年兄既已識得此意其於戒謹恐懼之功自不容已日用之間必有獨覺其進處但未知虚心受善及廓大規模處比舊何如校竊聞之夫子曰吾十有五而志於學孟子曰乃所願則學孔子也學者立志直截要學聖人則日用所講皆聖人之學便自見得箇根本簡要處決不作枝葉瑣碎功夫其於訓詁辭章非惟不屑為實亦不暇為矣年兄聰明過人又多材藝恐於訓詁辭章未能絶利一源故區區有懷尚欲以此瀆告耳别紙嘗慨心體湛如太虚只因軀殻上起種種私意便如漫天雲霧莫能就根上勘明我身從天地來天地開闢㑹當有混沌時我身有生固當有死何啻海上一漚風前一塵死生已透更無關則人間世所謂名利關聲色關者更無難透矣而後心體超然天徳自見且道世間貪生怖死底畢竟免得否人何不自省悟愚見如此敢呈似吾兄以求是正與蔡希淵吴門一别相將二三十年吾兄則既老矣而校年亦踰艾不敢復以世俗常禮筆墨陳言溷長者記有之高山仰止景行行止鄉道而行忘身之老也不知年數之不足也俛焉日有孜孜斃而後已請以是為高明獻承示新刻太極圖解及改竄西銘足占吾兄精力沛其有餘不然豈其皓首而猶游戲翰墨邪未知元公純公見之還首肯否與崔子鍾别紙體仁舊說當時雖頗知鞭辟近裏尚涉想像日用間缺却行著習察實功立本處未能致一不免更端邇來杜門修省逺求堯舜危微之戒近體孔顔克復之傳用是惕然愧懼所恨昏惰之資不能勇猛奮前願吾年兄常賜鞭䇿與徐子榮别乆瞻仰曷勝吾兄位望日隆當自任以天下之重校天之廢才也乃扶病入汴抗顔復為人師慚負慚負過歸徳考按諸生乃微子所封先聖祖宗所自出之地也曠百年無表章之者盖有待於皇上焉耳校謹具奏以請事下春官願兄與西樵共成兹美此萬世一時也與王時行一别十有六年始有虎丘之㑹竊覸吾兄所存剛大尚存精神視舊則歛藏矣此固可喜然猶未足深喜者欲吾兄百尺竿頭更進一步也校嘗謂人能虚已從善則天下之善皆將歸焉易曰或益之十朋之龜弗克違元吉孟子曰好善優於天下吾兄若於此處著力所進詎可量邪更願沈潜以求之勇往以行之沖澹以守之毋以教外别傳亂吾聖門宗㫖使彼此失是也其二别乆曷勝瞻仰古之大臣不用則天下仰之用則功被天下何哉其誠素積有以感格天人也故曰才與誠合然後能勝天下大事吾兄今當暇時正宜勤懇大進厥徳訪求人才講求經世急務以古聖賢豪傑自期待毋徒養望自高也何如何如與梁仲用校無似誤䝉教愛二載於兹緬惟執事以黙名菴而言語傷易傷煩十常七八豈欲寡其過而未能邪人心通竅於舌舌動則聲因以宣故人之多言者舌常有動意盖此心全體俱奔在上面也仙家守氣必先塞兊固靈根吾儒欲存此心亦須捫口勿言不輕漏泄意自歸根則養得心完密無罅隙可走易曰修辭立其誠所以居業也人之所以輕易其言只因不把當事才高之人事來應付得去揮霍得下其失尤多凡此皆放其心而不知求也故嘗妄論欲求放心必自謹言始校方咸其輔而乃以艮其輔勸執事可謂舎已之田而芸人之田者矣然在執事自不當因人廢言也與陳宗獻校多病惟泉石之與居鶴鹿之與游世與我而相忘乆矣意猶依依在天台雁蕩間者念省齋素菴之真率也渺山川之阻修歎聲問之日疎兹得秦黄門出宰望邑今而後彼此得以常相聞矣昔歐陽文忠公每見學者好語吏事以其有及物之功也國朝設大明律後法例日多吏莫知所遵守𢎞治間刪為問刑條例其後奏行又復増多省齋一生為刑官冣乆平恕多及物之功今當閒居取舊例而閱之中有難行者私論其故因機上聞此天下之福也校嘗怪大明律中文武官犯公罪文武官犯私罪因何不行起於何年何人奏請死罪真犯雜犯法家承用已乆莫知其原省齋必能究其本末也便中幸賜教與王誕敷傳聞吾兄治郡勤勞乆而弗懈此盖忠厚懇惻之心不容自己吾夫子所謂居之無倦行之以忠者也但為治亦當綜執體要振揚紀綱庶幾恩惠所施周徧廣闊若徒屑屑庶務屈首於簿書聴斷間則將有偏而不舉之處此理勢之必然也然吾所謂體要非簡畧庶事也深識治體舉其大可以包羅細事而無遺也吾所謂紀綱非專委任他人也分政百職吾可以坐鎮於上而責其成功也校讀經史見古之人雖位有大小時有汙隆然其治皆先有一定規模然後次第施設故用力少而成功多也年兄大度士乃敢進以此言其二傳聞貴治灾傷頗與敝郡相似何辜斯人荐遭酷罰哀哉年兄素寛厚覩兹艱難其於慘怛固當倍百恒情也目下荒政檢勘宜早蠲免宜寛下司奏行咸觀望上司意嚮所在大絃急者小絃絶願明諭屬吏一以救民益下為心庶幾少延垂絶之命年兄尚念之哉復徐子謙姑蘇密邇貴治傳誦政聲洋洋滿耳夫以􅈤惻憂民之心而濟之以平易精密之政宜乎事便而民安然徳翼又稱善政所召天降嘉禾自楊守承芳以來僅一見嗟乎天人之易格固如是哉然在年兄則當謙而弗居日慎一日可也郡守之職至為親民君子學道則愛人如欲少行其志無以踰此官矣然其澤有在一時者有及於數十年之後者有百年者有百世者顧其規模次第何如耳居今之世牽制孔多又多簿書期會之冗坐縻精神不得專意於其逺者大者然此為常人言耳年兄豪傑士也豈復時勢所能拘哉充吾懇惻愛民之心盎然天地之初意氤氤氲氲盈滿於胸中發而施之於政事凡世俗之毁譽利害休戚得䘮一毫毋使芥蔕於心以雜吾正念集郡之賢士大夫逺近父老相與講求諮議兼總條貫次第施行因平易之政而更為乆逺之制因精密之政而加以闊大之規則其澤之所被逺且百世近亦百年兄於兹土將廟食無窮矣南望旌麾每欲瞻拜而多病所縻弗獲如願徒切引領而已與胡希曽吾兄清節瑩如冰壺一旦青蠅㸃白璧天下咸嗟矧於知己五岳起方寸隱然詎能平也乆矣然在吾兄吞雲夢者八九此何足芥蔕人間世利害得䘮寵辱關心只為有我若曠然無我任他萬起萬㓕豈能汩吾胸中之和且我身安從生固出於天地今夫天地原也從混沌來畢竟又混沌去我身住得天地間能幾時何故却就軀殻上起許多意思維絆却浮名如蠶自纒自縛不得堂堂自由世間只有道理冣大生天生地吾身又從天地生當初天地生我時完全交付與我今也須完全交付還他生一日便當盡一日道理故曰窮居不損大行不加巻之不盈分散之彌六合維時春氣氤氲生意流動充滿盎然吾人之仁也靜處春生動處春一家春散萬家春敢以為祝與毛黄門乆仰􅂄徳願見而未得階乃䝉辱先以書儼若承教左右嗟夫聖學不傳乆矣空言溺心異端惑志願長者一振頽風行著習察而後道可明也維時正得秋而萬寳成更望收歛歸蔵以法造化不具與方時舉校病弗獲詢起居懷仰懷仰人物志稍増於舊頗聞有後言或未必面告校辱過愛故敢以告願精覈之更博訪之死而是非未定者姑徐之又如唐節婦周賢婦皆古人所難而名不出於里門恐潜徳尚多不遇君子表章遂爾湮没二婦尚無恙例不當書故未敢白恐前此或有類於是者衆司人物權衡者不可不留意也朱節婦鄭烈婦已載五貞祠而傳不之及衆皆訝之未諗尊意云何與支孝先昔聞論及華人農惰而不知耕山有葛而女不知織養蠶矣而不知治繭水中有魚而無漁師吾因賛曰若興此數利此廟食百世功也願為蒼生汲汲與吕仲木吾兄載道而西校兩奉書不識能達左右與否詩云高山仰止景行行止鄉往之私意未嘗不在豐鎬間也大哉聖人之道峻極於天願吾兄超然於訓詁辭章之表聚精㑹神不作三代以下人物子曰予欲無言天生精神幾何那得許多應付世俗儘隨緣說得無限好話當不得四時行百物生也矧於不好人也要說他好三代直道而行無乃不若是乎校於吾兄何能有所禆益然猶時獻其一得之愚者以吾兄好善肯舎已而從人也春氣漸温願若時完養太和之氣不具答吕仲木兩生侍教醉飽盛徳而歸明道有云後人雖有好言語終被氣象卑不類道吾兄以厚重淳美之徳涵養既深盎於面背正當於古人中求之耳今也講學者太易易然而内省或缺似與聖門訥言敏行相反高擡此心不在本位天下事一以浮氣大語盖之未知流弊何極吾兄身繫海内重望愚意深望高明用志不紛以其全力而向於道勿滯於訓詁勿散於詞章庶可障百川而東之迴狂瀾於既倒也源甫經濟之學明習國家典章長於兵法而人鮮知者今得同官當有切磋之益也敢以為賀願常叩之庶可以發其胸中之竒源甫薫沐徳容益知鞭辟近裏著已則所造亦當長一格也與鄒謙之昔者請教承問發於屢空邪抑億而中邪善哉發藥矣空空願學焉而未能億則校所不敢然而人苦不自知譬如病者不自知其病得明醫指示而後曉然投以瞑眩之藥而後疾脫然去體矣吾兄既知病證願賜藥劑使無深入膏肓至懇至懇六書精藴中三巻知字四巻忠字六巻格字二巻靈字與來教有相符處願取一觀訂其得失幸甚幸甚承賜東郭文集骨骼開張明白痛快善啓發人受教多矣但其間有說得甚是著題而殊不切於其人者豈應酬之體當如是邪信如是無漏佛菩薩亦時復為應付僧邪鄭壻若曽嘗受教於涇野今卒業南雍獲在鈞陶之内何幸如之願加鍜鍊汰其查滓底於精純至幸至幸復徐曰仁病卧窮鄉乆不獲故人動定積有馳情兹承惠書深懲吾黨各立門户之私意極惓惓竊惟道乃天下公理愚夫愚婦皆可與知人惟各有私心是以自生障蔽吾輩相與正宜公天下以為心故曰大舜有大焉善與人同舎已從人樂取諸人以為善若乃自立意見以私智窺測大道便謂此乃天地之純古人之全體同已者則以為是異已者則以為非斯其去道亦逺矣此校之所不敢也安得吾輩同志數人相與聚首一處僕得聴於下風彼此坦懷盡言無隱各陳所學質其是非騐之吾心性情之實考之聖賢經傳之言參之天地萬物之理辨異端近似之非振俗學支離之弊務求至當歸一精一無二剖破藩籬以為大家豈不快哉若欲仍立門户不求同理而求同已則亦末如之何矣此校之所深願而未能者也嵗暮邵思抑過我道及高明有書與之講學恨不獲聞其詳今㑹晤未涯幸以教思抑者教我雖心之精㣲言不能盡然既陳其端庶幾思而得之可為他日承教之地也至懇至懇與楊實夫惟時孟春和氣藹藹充盎寰極間萬物欣欣咸有生意吾兄負蒼生之望願體此意以福斯民嗟乎時事日益非矣每讀殷書周雅喟然不能為懷想吾兄在位者當倍慘怛也舊嵗呉下大水嘗奉書吾兄勸當途大施蠲免賑貸之惠意弗得達今民之憔悴極矣而徴歛益苛是何異於敺民以填溝壑也斯實禹稷過門不入之時矣願勸新中丞速解一方倒懸之急幸甚幸甚答王天宇聞名二十餘年尚未㑹面惟神交而已伏承下問為學功夫茫然不能答請姑陳其自訟之意吾人學不得力只因無必為聖人之志以故纒繞於文辭擔擱於意見不肯喫𦂳做功夫今欲反此必須辨得朝聞夕死之心而後庶幾有成耳與唐應徳侍教連日獲探心之精㣲洒然超脫塵俗卓哉卓哉但毫釐易差恐㣲有近禪處徴諸孔門或有未合辨之弗明弗措乃可洞極幾㣲於此尚覺欠耳賈傅致火致日之譬聖學殆有取焉何如何如其二聞讀周易以應徳之高明必有超然㑹心處便中毋惜示教校昔治五經惟春秋易致力為多賴天之靈偶有所見而又得之弗完體之未合恒用歉然深願應徳撥轉天機莫被葛藤纒去也雖然又不可落空不識高明以為然否其三虎丘之㑹承諭所用功夫視前乎此可謂盡言無隱矣學患不能行如應徳之力於行所進何可復量但校有所疑亦不敢隱應徳信道篤矣而執徳似未𢎞仁以行之矣而學以聚之問以辨之寛以居之似有所未足吾輩不幸去聖乆逺學絶道䘮不稽之以聖人之言安保其無差校自度言輕不足以回應徳雖然應徳昔者持之甚堅亦猶今者持之甚堅但願毋使他日之悔亦猶今日之悔也聞欲過我跂余望之與林勿欺别紙兀厓之亡於世道有大關係南京一小内臣大呌曰朝廷崩一座山矣里人有在山東作縣回者曰昔傳駕又將出官民俱不知死所卒賴兀厓回天則兀厓非但忠臣乃直𨽻河南山東之再生父母也答簡中丞修門一别八載於兹瞻仰厚徳宛其如昨海瀕多盜屢作屢止屢止屢作要皆販鹽之徒目前之禍尚小他日為東南大害者必此也明天子挈長江表裏之封付公經畧必能為國逺慮坐消此莫大之憂欽仰欽仰天氣正暑願靖共自愛謝錢清戎日旌節過敝里校偶出弗獲迎迓中心缺然承賜腆貺深感厚徳兵不土著世費清勾上下俱困一夫行戌輒破數十家而禍未已也故曰難盡法者莫如清戎而易積隂徳者亦莫如清戎恭惟執事秉國之鈞叱咤生雷霆呴煦成雨露東南億萬生靈仰以為命先正有言寛一分則民受一分之惠校不佞敢述小民仰望之情獻於臺下幸毋以人廢言謝郭侍御聖天子方殷憂在上共惟道長方振風采於臺端今日之事敵勢可憂未若漕河可憂之遠也漕河可憂未若中原盜賊將起未起可憂之大也等而上之憂端齊終南願披丹誠為明主忠言之自本而末沿流泝源俾天下蒼生轉禍為福幸甚幸甚與徐朝儀荒政至急者蠲免賑濟今則蠲免尤急自來官司檢踏災傷上司必復熟幾分一圩之中間有田成熟者必累一圩荒田故低田小民往往將高田開没以免後患今必須先期勘騐廣施蠲免之恩下令禁戒庶絶兹患一年饑則缺二年之食乆雨後必晴比及秋冬水勢須退必資春熟庶可接濟秋成宜及今設法多收大麥種至期給散貧民勸令廣種是亦救荒一助也更緩數旬麥價必踊貴矣水勢滔天窮民乗機易聚為盜况於素為盜區者乎昔承垂問盖已軫憂所謂太上救失於未萌也今其勢己兆矣遏盜之機正在今日昔庚午嵗盜賊充斥官塘白晝不敢行父老有識者議令沿塘各區糧長每區出巡船一隻與巴城塘浦東西二巡司往來巡視因命㸃閘盜賊當聞風屏息也父老所謂建是議者彼嘗目擊近地有賊官府差人不能擒後命各區糧長與俱捕獲故也巡司嘗憂地方貽害每欲申請特未敢耳校採輿人之論達於台座伏望年兄早賜舉行如有效則推於他處可也復胡郡守孝思承示所定名宦鄉賢允愜公論千百年缺典一旦舉行甚盛甚盛校不敏豈能有所賛襄爰舉一二缺遺告於下執事伏俟鑒裁名宦若漢都尉任延太守第五倫張霸梁郡丞江革唐刺史蕭定宋知州閻象通判徐奭僉判司馬光知州孫覺李光鄉賢則高士若龍丘萇忠義若張乗孝子若龔明之篤行若陳之竒名臣若王葆流寓若黄士毅毅嘗受業於考亭之門其他可稱述者尚衆願命三學諸生悉心蒐訪科條其人㕘以史傳而明公詮定焉垂示永逺以為法程校不勝欣願别紙鄉賢有沈既濟者觀其選舉議及請冠中宗之年書武氏之事乃經世之識也嘗坐楊炎薦左遷終身後陸宣公為之申薦更願考訂其人俞琰神仙家似不可與其所作弦歌毛詩譜願就其家訪求之此書渇欲一見也其二别後風伯所阻遂不果行有虚尊賜文選及陽冰法帖已拜嘉貺嗟乎文章字畫皆生於人心又繫於天地之風氣故不能不與時高下雖豪傑之才亦未免囿於風氣之中雖然天地氣化渾厚澆漓固各有時而吾人返朴還淳豈無其道論其要不越乎此心收聚放散之間耳每讀易至於大畜小畜未嘗不三歎焉葑菲之見不識高明以為何如傳聞荒奏已得請小民歌舞徳澤願刻日散布民間庶沾實惠其三承示樂府其格雄渾其調悲壯沈鬱或婉而麗盖兼衆體而雜出之者乎雖然校不敢賛而敢獻所疑古詩中聲之所出所謂人詣乎天為至人言詣乎天為至言故可被之八音其極動天地感鬼神而况於人乎今所傳三百五篇非盡孔氏之舊以其繁聲多也而後世莫能非之知言者鮮知音者彌鮮樂府要皆出於風氣多屬繁聲其勁以急者邉聲也有殺聲者必有殺心其靡靡者俗樂也有淫聲者必有淫思是故君子不可以不慎也高明以為然否天氣正寒願若時凝固天真不具答聶郡守文蔚林廣文過我首詢吾兄起居且聞所以不出之意甚慰逺懷豪傑樹立自别今之講學者好說心常動而不靜不復知人生而靜為天根來書獨深取蟄龍之譬山林之日長道義之功深足占吾兄進徳矣達夫邇來用功何如校勸其辨自聖作聖之别不知渠肯俯聽否彭石屋完然赤子之心而講學頗闊步相會淺不曽獻得一服藥也與王郡守克敬今吴下惟糧長為苦役公十分盡心莫不知感大抵其害有四一曰起運此大政使然由今觀昔固自有間雖然宿弊實未盡除士大夫度量小便欲邀功生事減去加耗使糧長重困願加優恤二曰收頭此其弊在有司今蒙禁革立為櫃收之法甚善甚善但姦頑細户不納者有司不肯查姦書總結在糧長户上則又累矣願加之鑒察三曰大户此則士大夫不能無責今既自兊則無此累矣却有姦民二三石上下者恃頑不納煩查照近年楊二守事例令糧長查報難徴人户文册在官先行追併四曰包陪此須設法開墾荒田實為永乆之利調收極不便於糧長極便於小民舊嵗聽糧長自收小民十分嗟怨今嵗願仍調收但須督有司耐煩着實催徵不致墮誤以累糧長乃為兩便大抵收糧之時小民可憐而糧長可惡兊糧之時糧長又可憐而兊軍可惡交兊之時兊軍又可憐更有可惡者安得如公輩布列上下内外使人人安生樂業乎校所採民言若此敢轉告於執事傳曰芻蕘之言明者擇焉莊渠遺書巻十一
