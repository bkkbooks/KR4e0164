body:
  text: 莊渠遺書卷二明魏校撰講義發明心箴臣惟聖王心學不傳也久矣陛下始孳孳講求理學親註范浚心箴臣不勝大慶敢提剟要義以獻聖學樞機全在此心有箇主宰故謂之天君箴内所謂惟口耳目手足動静投間抵隙為厥心病一心之微衆欲攻之其與存者嗚呼幾希此只為無主宰故耳若此心作得主宰則百體皆守位稟命豈能病心惟作不得主宰則百體皆逐物妄行衆欲紛然來誘心始不勝其病矣今欲就百體上一一防檢誠恐茫無下手處莫若收攝用功提起此心來作主宰件件皆有著落孟子所謂先立乎其大者則其小者不能奪也箴末所謂君子存誠克念克敬天君泰然百體從令正是此箇功夫也語意繁悉莫若只道箇敬夫敬何以用功若外面徒把捉則方寸愈不定疊若裏面纔急迫則四體俱不舒泰皆未免别以一心治此一心臣嘗謂心是吾身主宰敬是吾心自做主宰處只要常存畏底意思一言不敢輕發一事不敢輕為務合道理此千聖相傳心法也臣又聞之古人恭曰篤恭敬曰篤敬沉潛蘊蓄全在内裏用功不輕發泄於言語文字上則厚而有力髙宗所以恭黙思道而心與天通也伏願陛下體而行之臣他日更提四箴之要與此互相發明御製十六字箴卓爾之見一貫之唯希聖君子朂哉勿偽進顔曾二章講義顔淵喟然嘆曰仰之彌髙鑽之彌堅瞻之在前忽焉在後學聖人第一先要立志顔子纔學便要做聖人想像聖道甚易做來做去始覺其難仰之彌髙進得一級又有一級鑽之彌堅透得一層又有一層瞻之在前功夫慢些又趕不上忽焉在後功夫𦂳些又反失之顔子真要做到聖人故見其不可及而汲汲以求之也臣願陛下立志斷斷要學古先聖王念兹在兹真箇去做覺得這事也不及古先聖王那事也不及古先聖王如此方有進處便是顔子仰鑽瞻忽時也若空在言語文字上求不見得聖王難及處却是虚驕意氣不得謂之志矣夫子循循然善誘人博我以文約我以禮志既定第二便要求作聖親切功夫顔子初用功未免髙逺夫子教以博文約禮就日用平實處用功臣願陛下立志如天之髙循序用功如地之實只守夫子之教纔得用功不差博文是要開明此心若徒尋章摘句未免支離破碎反自窒塞聰明講官解説數行啟沃亦少願陛下親讀聖人之經将𦂳要處就自已身上體貼玩味務要依他踐行暇時觀史惟於治亂興亡大處留意不宜多記損心有得有疑面召輔臣講官從容顧問大臣有事常親召對必令稱古先聖王所行為今準則特勑公卿舉海内賢者於朝陛下與之相親講明聖學久之胸中豁然大明矣約禮是要防制此心陛下崇髙極矣富貴極矣可欲滿前此心易得自肆臣願陛下以禮制心恭敬撙節退讓而毋敢或驕視聴言動都就規矩準繩上行凡飲食衣服器用之類與夫􅉏御之人都立有品節限制少有過差大臣匡拂言官捄正不憚速改初雖矯揉久漸純熟矣周禮天官一篇最是周公格王精義後世人主私意不便皆莫能行天将有待陛下也欲罷不能既竭吾才如有所立卓爾雖欲從之末由也巳作聖功夫第一怕差既不差第二又怕間斷顔子深悦聖道盡心力而求之自不容於間斷昔時想像聖人道理無處捉摸今分明確實昭昭就在眼前而無可用力只待涵養純熟自到聖人地位而道理在我矣夫禮義之悦我心猶芻豢之悦我口臣願陛下優柔厭飫以禮義養心篤信之深必能篤好篤好之深必能篤行功夫常接續而不間斷矣子曰參乎吾道一以貫之曾子曰唯曾子事事要學聖人見得聖人事事俱好不知都從心上發來夫子恐其功夫太繁因示以總要處吾心渾然一理是箇統宗會元日用萬事都只從此流出譬如千枝萬葉總是根上一箇生氣貫通曾子平日篤實用功言入於耳即悟於心不覺其應諸口也若使素無積累功夫雖聞夫子至言亦只作一塲話説而已子出門人問曰何謂也曾子曰夫子之道忠恕而已矣門人見聖人有許多道理今却説一以貫之疑而不信曾子因門人未曾用功不可語以上達道理因舉下學功夫以告之蓋忠恕是一貫下學的功夫一貫是忠恕上達的道理元無二致聖人之心天理流行學者之心不免被人欲隔住必須一箇懇篤實心逐事上推去私意間隔使道理常得流通一箇忠做出千萬箇恕來及到純熟便是一以貫之也臣惟乾坤之道易簡而已矣夫子一以貫之乃乾坤易簡之理曾子忠恕便是易簡功夫陛下一日萬幾若只於零碎上用功而不知有總會的道理殆不勝其難且繁而與造化聖人不相似矣臣願陛下常存一箇實心推之千般萬般政事都要以公滅私且如愛己則切愛人則緩此是私意間隔必須推那愛己的心去愛他人必不肯咈百姓以從己之欲矣責人則明責己則昏此是私意間隔必須反那責人的心來責自已必能有言逆於汝心而求諸道矣此乃聖門仁術也總論臣惟孔子萬世帝王宗師顔曾二子親學聖人而得其宗者也其功夫皆同曰誠而已矣陛下所謂朂哉勿偽可謂深契顔曾之心夫於穆不已天也至誠無妄聖也誠信不欺賢也故曰賢希聖聖希天若何謂之無偽但求實踐不務空言其必為善如渴思飲如飢思食其必不為惡如寒畏氷如熱畏湯此之謂無偽口説身不行昭昭則信節其為善惟恐人不知冥冥則惰行其為不善惟恐人知如金淆鐵如粟雜秕此之謂有偽陛下中心不欺君徳修矣更須鑒别羣臣辨其孰誠孰偽以此而示好惡以此而定取舍則臣徳亦修矣伊尹所謂咸有一徳也夫百官亦衆矣陛下豈能人人而察之宜法乾坤易簡之理首鑒别三四輔臣又與輔臣鑒别六七大臣使大臣各鑒别其僚屬責以訪求海内人才引進忠良拔去邪佞故曰進賢受上賞蔽賢蒙顯戮今君臣勢隔情不相通陛下亦何由鑒别宜體天地交泰之道尊禮輔臣置諸左右朝夕納誨宣召大臣訪以政事夫召見猶有時請復祖宗舊制特許大臣有事請見詣左順門報名召入便殿從容面相可否則大臣進見無時彌得相親矣次及侍從臺諫外暨監司郡守或不時召問或傳諭咨訪不惟可察羣臣忠邪陛下亦得以周知天下之故矣臣又恐天威嚴重羣臣一時震佈失容有懐莫吐伏願陛下假以温顔略去形迹使人人皆得自盡此我太祖所謂君臣同遊堯舜所以明四目達四聰之道也臣愚惓惓發明皆古帝王聖賢心法伏惟聖明採納見諸躬行天下幸甚皇極講義五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極洛書九數五居中央參天兩地而成五數之統會也在天下則王居中央在一身則心居中央故禹陳九疇配以皇極道之統會也皇建其有極者天下惟君最尊惟道理最大君不能盡這道理天下何所宗名雖至尊實與凡庶何異故周公曰其惟王位在徳元必須君心略無偏邪行出來的事事盡善大中至正更無以加與天下做箇樣子易所謂大觀在上中正以觀天下論語所謂為政以徳譬如北辰居其所而衆星拱之也五福一曰夀二曰富三曰康寧四曰攸好徳五曰考終命天道所以佑善也人君所行不善天弗降福於其身豈能福及天下皇極之君克享天心一身全備五福又推以福天下之民體天行道善則以福錫之勸民為善惟時厥庶民都趨向這道理又與君保守這道理皇極之君徳尊位隆又有福善大權故能鼓舞天下無一人不為善則亦無一人不受福詩所謂羣黎百姓徧為爾徳書所謂一人有慶兆民賴之也凡厥庶民無有淫朋人無有比徳惟皇作極庶民在下無位者人在上有位者淫朋比徳皆所謂私意偏見道本天下公理人惟各有私心相與阿其所好結成朋黨自昔人君深惡朋黨而欲去之忿疾愈甚交結愈深雖震以雷霆之威而不能去今能使庶民無有淫朋羣臣無有比徳朋黨不待禁而自消惟在人君建立大中至正之道有以深服人心易所謂渙其羣禮所謂一道徳而同風俗也君心若有偏邪身先自陷於黨邪人迎合附和真為朋黨者不能覺悟反猜疑正人以為朋黨天下之禍從此始矣凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰予攸好徳汝則錫之福時人斯其惟皇之極皇極之君以盛徳居尊位人仰之如天之不可階而升必須廣大包容俯而就之如天之下覆萬物方能委曲成就人才庶民之中有猷有為有守此乃中人以上之資人君固當常念在心不合於極亦不陷於咎此中人之資人君亦當受之而不可棄諸度外棄則流於惡矣人才造就得成見於貌而有安和之色發於言而有好徳之誠人君那時錫之以福則是人歸於皇極甚速矣無虐㷀獨而畏髙明㷀獨庶民之至微者未必無一長可取不可慢易凌忽之使其有言不能自達情不得伸伊尹所謂匹夫匹婦不獲自盡民主罔與成厥功也髙明大臣之有才望者亦安能每事盡善不可嚴憚顧忌而不戒之春秋責備賢者之義也人君之心當平如秤不得偏有輕重也人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好徳汝雖錫之福其作汝用咎國家所賴惟在賢才羣臣之中有能有為者其才固可用矣人君更須鼓舞作興使進其行則才徳兼全必能保我子孫黎民國家自然隆盛若有才而無徳心術不良用之多生事喜功反敗壊國家元氣矣人君代天養民凡厥治事之臣皆代君養民必須厚養以禄保全其㢘恥節義之心方可責其為善若仰不足以事父母俯不足以畜妻子饑寒切身如詩所謂室人交徧摧我則惟賢者為能至死不變中人而下必将喪其所守而陷於罪戾矣士風既壊嗜利無恥不復知徳之可好於此輩無好徳之人而錫之以福使其在位則必貽禍於民是乃人君自用咎惡之人不得辭其過矣人君不能體恤愛養羣臣其流弊必至於此故易曰聖人養賢以及萬民無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極皇極之君以身帥天下又敷布其言以風動天下之民偏不中也陂不平也作好作惡有意而為之不能循其自然之理也黨不公也反倍常也側不正也是皆生於人之私心王義王道王路皇極所當行也蕩蕩平平正直皇極之體也是乃所謂天下公理公則一致私則萬殊公私不容並立故反覆歎咏人當去其私心一遵乎皇極當行之道私心既去則皇極公平廣大之體本來如是人固有之會其有極者收攝天下之人於極也歸其有極者盡納天下之人於極也至是則天下之人皆在道理中矣敷言如詩之體言有盡而意無窮悉從聖人廣大胸襟流出故其感人也深後世人主無聖人廣大胸襟而欲模擬言語設教意味淺促豈能觸發人心之天機也曰皇極之敷言是彞是訓于帝其訓敷言在昔先王所傳箕子述之又更端贊説皇極之敷言是乃蒸民常理是乃垂世大訓非君之訓乃上帝之訓也蓋道理本出乎天人君之心純是道理與天同徳口裏説出話來便是代天説話可見人君一身終日是代上帝作事口代天言手代天工賞是天命罰是天討敢有一毫私意於其間凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王庶民於君聖凡雖極懸絶道理本同皇極之君其徳光被天下庶民因極之敷言是訓常誦於口是行常踐於身亦得明其明徳以近天子道徳之光華故皆感戴君父成就之大恩不覺贊歎極其尊親之辭親之則曰父母尊之則曰天下王王也者言為天下所歸往也大抵皇極之建不建君心有天理人欲也皇極之行不行世道有君子小人也此是總要處不必於煩碎上用功只要就此辨别得明執持得定常存天理為主隨事克去人欲之私使小人道消君子道長天下太平矣自古皇極之君惟有堯舜禹湯文武人生其時幸而得為皇極之民下此雖英雄如漢髙祖唐太宗宋太祖皆自不免慙徳豈能表正萬邦今上天錫聰明尊為天子更願徳為聖人布昭大中至正之道宇宙俱在吾皇太和元氣中上下並受其福率土之民何幸躬逢其盛御札朕聞講以洪範第七疇之二段曰驛曰克者蔡傳以驛為金兆克為土兆似有未安既心有疑須問於博學髙見卿其為朕詳明指説來聞仰惟皇上因講官説經未安問及微臣臣不覺手舞足蹈自慶於心曰上真可以為堯舜矣書曰好問則裕自用則小易曰君子學以聚之問以辯之堯稽於衆舍己從人舜好問而好察邇言樂取諸人以為善皇上每讀經史有得有疑輒賜宣問則何堯舜之不可及也請因聖問所及而陳之夫義理有當汲汲講求者有當闕疑而不必講者蓋講求義理正欲實踐履於身而見諸行事故當汲汲乃若文義有不可通者則當闕之而不必解若穿鑿牽彊則反汩亂吾心之虚明有害於聖學矣故孔子曰多聞闕疑慎言其餘又曰吾猶及史之闕文也古人卜龜之法今已失傳但以大義推之先王每事盡合造化夫造化之所以為造化者不越乎隂陽五行而已筮法貞悔既屬隂陽則卜法雨霽蒙驛克分屬五行可知周禮經卦皆八其别則六十有四悉從隂陽變化出來經兆皆百有二十其頌千有二百悉從五行變化出來但不知五行如何分屬漢儒去古未逺尚不敢質言註疏但言今之用龜横者為土立者為木斜向徑者為金背向徑者為火因兆而細曲者為水不知與此五者同異何如後儒奈何必欲穿鑿牽彊立説今但當闕於所不知皇上所當知者先王終日對越在天奉順天道人事既盡遇有所疑又以卜筮質諸鬼神若親聴命於天慎重如是此則不可不知者也仰惟皇上聖質超越古今正宜廓大胸襟講求聖王心學之要開天聰明不宜屑屑於文義間鑿破混沌臣竊見講官所説多滯於小小浮泛文義而於帝王全體大用之實罕有發明自昔輔臣専用此術蒙蔽莫肯求賢今幸天啓聖心超然黙契千載不傳之學但一己之聰明有限天下之義理無窮伏願皇上益務謙虚不自滿假二三輔臣尤宜開導所不及不可徒為稱美之言無益聖徳而反阻聖學之進上臣事君以人特勑在京三品以上官弁科道官各先舉學問淵源操履篤實堪以講明帝王心學者疏一二姓名上聞不稱則連坐舉主以後容其陸續訪求事下吏部看果得人則請會内閣輔臣推擇置之講筵輪備顧問皇上與之從容講究每論經義必問以今當如何行或訪時政必問以此事與古合否賢才日侍左右啟沃必多聖心洞開得以博通天下義理而施諸政事之間其視局局於數臣中解説數行文義者相去萬萬矣此乃今日作聖第一急務臣愚不勝惓惓冬至進易卦月令講義臣惟聖心澹然無欲可以對越天地更願黙觀造化之原臣因冬至有感謹述經義大者以獻易曰復其見天地之心乎天地之大徳曰生十月純隂天地生物之心閉藏而不可見及乎十一月冬至一陽萌動始露端倪交春遂發生萬物矣一嵗之運則十一月冬至為復一日之運則夜半子時為復皆從静中生出動來人心培養之深善端初發亦如是也雷在地中復先王以至日閉關商旅不行后不省方陽氣奮發而成雷冬至一陽尚微潛藏地中未動先王法之是日上下各務安静以養微陽禮記曰是月也日短至隂陽争諸生蕩君子齋戒處必掩身身欲寧去聲色禁嗜欲安形性事欲静以待隂陽之所定日短至者冬至夜六十刻晝四十刻為極短自此乃漸長也争者隂方盛陽欲起也諸生者萬物之出機蕩者欲動未動之意湛然純一之謂齋肅然警惕之謂戒君子無時不敬有事則敬愈至也處必掩身者寒氣傷人不可輕有觸冒醫經所謂君子固密不傷於寒也身欲寧者醫經所謂無擾乎陽也去聲色者恐耳目交於物引動其心也禁嗜欲者醫經所謂冬不藏精春必病温故君子逺絶欲事也安形性者内静其心外静其身内外交相養也事欲静者百官皆安常守位不得有所興作勞民動衆也待隂陽之所定者順陽之生使隂邪不得阻也臣惟天地生生之徳貫乎四時而春氣融融生意盎然獨盛嘗體騐之分明吾人仁底意思也皇上常念天地春生之徳博大寛舒惻怛慈愛可以覆幬四海而無難但此生意不始於春而始於冬隆冬閉藏極於嚴密雖一陽萌動微露端倪而全體隐然蘊蓄不泄至春薰蒸之久生意充周雖隂崖寒谷亦透矣故帝王之學莫大乎求仁而求仁之功莫先乎主静伏願皇上收斂此心截斷浮泛思慮沉潛藴蓄不輕發泄於言語文字間使天地生生之徳渾然在我隨其發處擴而充之以不忍人之心行不忍人之政天下無一夫一婦不在吾皇春風和氣中矣此乃聖學淵微之妙曠千載而不傳臣敢稽首以獻孟子講義凡有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海不能充之不足以事父母孟子心學淵微指出惻隠羞惡辭讓是非的道理又教人以察識擴充功夫凡有四端在我者本與聖人同其不能作聖者只因不能察識雖有發見連自家也不知隨發隨蔽若能察識知得這是善端就這一念推而廣之便可充滿全體人人可以作聖也正如火之始然雖未燎原已有燎原之勢泉之始達雖未赴海已有赴海之勢但要常接續他故茍能用力充之則吾心道理通達流行四海亦無難保茍不能用力充之則吾心道理窒塞阻礙雖父母亦不能事矣臣惟孟子學己到聖人處全在察識擴充上用功三代以下往往做不到聖人者只因将這道理祇在紙上講求不在心上體騐弗能察識既被人欲遮蔽弗能擴充又被人欲攔阻如何濟得天下蒼生今四海困窮極矣天生皇上以救斯民也臣願皇上勿牽滯於文義将聖賢説的就見諸行通學問政事而為一先王惻隠之心親親而仁民仁民而愛物其功徳覆冒萬世皇上一念親親昔者蔽於羣議鬱遏幾數年未能擴是心也既而一旦開悟遂定萬世綱常能擴是心也事事若此則四海何難保哉願因親親之心推之以仁民今天下小民困於賦役窮亦甚矣而大臣多務因循小臣専事承奉莫肯為皇上實心愛民者況生民之膏血日削而國家之用度日增皇上雖有愛民之心事事阻礙民亦不被其澤必須擴充仁心以行仁政痛節用度廣求賢才俾天下得大甦息乃可以望太平也先王羞惡之心匪以為名伊尹恥其君不為堯舜若撻於市思天下之民匹夫匹婦有不與被堯舜之澤者若已推而納之溝中彼為人臣尚爾況皇上為人君者哉其發憤當如何也先王辭讓之心徳盛而益恭位尊而愈謙願我皇上從不敢自足之心而擴之虚懐以納諫好問而不自用舍己從人羣臣有稱美者明示以謙抑至情使進忠直讜言以匡不逮先王是非之心昭若日月願我皇上因其所明通其所蔽常於正大處推廣而毋察細微常在道理上推廣而毋任術數凡用一人必先辯其人之心術任賢勿貳去邪勿疑凡行一政必先究其事之利弊利則興之弊則除之慎重而勿輕改延訪羣臣使之直言聖躬過失朝政闕遺生民休戚咸得上聞覽觀前代治亂興亡以考今日所行之得失久之聖心豁然大明矣臣惟孟子之學堯舜以來相傳之學也仰惟皇上卓然有堯舜之資而羣臣多章句書生莫能以堯舜之學啟沃皇上臣愚不勝惓惓敬誦所聞以獻大學講義若有一个臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉君之職惟論一相而已若得一箇好輔相大臣則羣臣箇箇都好那大臣須是斷斷誠慤務實而不務名始終表裏如一别無技能材幹可見此正是他不可小知而可大受處蓋論大臣與論羣臣不同羣臣須要有才可用大臣只要善用人不須自家有才也其心休休者藹然易直慈良如青天白日可見如春風和氣可親也其如有容者度量汪汪恩怨俱忘小大並蓄能容受得許多也見人之有才能就如自已有的一般未嘗嫌人之長形己之短見人之彦聖有徳不獨口裏説他好其中心著實愛他處甚於口之所言這箇大臣能容得天下之才徳如此人君求得這等人而信用之則能保其子孫世世為君黎民百姓箇箇安樂其利無窮然非這箇大臣一身能如此由他好賢樂善薦得天下許多有才徳的人都來輔佐朝廷為上為徳為下為民故能致天下太平也此是三代以上人君為治第一件大事故孔子筆之於書曾子又引來以釋大學平天下之義真萬世之法也仰惟皇上英哲天縱卓然三代以上之君而治弗能及三代以上者患在有君無臣耳必須求三代以上這等的大臣使之引薦今日海内賢者聚於朝廷相與講明三代以上之學而施諸政事則三代以上之治可坐而復也人才甚難何由知其可比三代以上輔佐臣有一譬喻國之有妬臣如家之有妬婦千方百計只是要獨専其寵阻絶勝己者使不得近前耳臣願皇上親命大臣各舉其所知若能薦勝己者此休休有容之臣也勝己者不薦惟薦其不若己者此娟嫉之人也一忠一邪自難逃聖鑒之下矣論語講義子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣人臣事君凡有三様人君皆不可不知一様是忠正之人其善易知也一様是奸邪之人其惡亦易知也惟有一様庸鄙之人雖無才徳可觀亦無過惡可舉却能蠧害天下國家故孔子特指出此様人來以戒萬世鄙夫可與事君也與哉是設為疑辭教人儆省以見此様人甚不可與他同心協力輔佐朝廷也只因這様人識趣卑陋惟一身富貴權利是圖方其未得之先躁急心熱奔競干求惟患不能得之固不肯為天下國家謀及其既得之後世味深入於心躭戀不忍舍去惟患其或失之又豈肯為天下國家謀哉人而至於茍患失之則朝夕為躭位固寵之計其初不過避嫌顧望緘黙取容又恐其保不得則又窺測上意以事逢迎阿徇時好以立聲譽又恐其保不得則又嫉賢妬能以杜人之進市恩張威以攬君之權舊時喪不盡之良心至此壊盡到得利害切身則雖弑父與君亦将無所不至矣孔子此言明白正大可為萬世切戒而自古及今庸人常據髙位竊重禄者蓋因此様人多能謹畏自守而以和柔悦人故人君不覺而信用之也然則如之何曰人君正心以照臨百官不取其順從而取其能匡弼不取其循黙而取其能敢言不取其尚同而取其能特立則正人日進庸人日退矣季子然問仲由冉求可謂大臣與子曰吾以子為異之問曾由與求之問所謂大臣者以道事君不可則止時俗但知有才望的便是大臣故舉仲由冉求為問孔子抑之以大臣甚難稱也所謂大臣者必其以平日所學之道開悟君心輔養君徳君所行合於道邪則将順之君所行弗合於道邪則匡救之惟以堯舜責難於君而弗肯曲學阿世凡世俗所謂功利所謂權術皆弗敢陳於吾君之前吾道得行天下之福也君不我聴吾道不得行則當奉身而退以全吾出處之義雖禄以萬鍾弗顧也此即禮記所謂道合則服從不可則去始終一出於道蓋古之大臣類如此不惟可為萬世大臣事君之法亦可為萬世人君觀大臣之法皇上欲求大臣更不必問其才但察其孰能以道自重而輕富貴孰能格君心之非孰能引君於當道則自黙識之矣子路問事君子曰勿欺也而犯之子路問人臣事君的道理孔子告以勿欺也而犯之勿欺是要盡吾誠心犯之是要行吾直道誠心直道此萬世人臣事君之法亦萬世人君取臣之法皇上欲鑒别羣臣必取其忠信不欺者臣而欺君罪莫大焉然欺亦有差等一曰大奸包藏㓙惡變亂是非熒惑主聴此欺偽也二曰積弊茍且成風相率為文具莫肯務實此欺慢也三曰過悞心本無邪而謀國或未審薦人或未察因而敗事者是亦不免於欺妄也然欲臣之不欺其機亦在上而已皇上推誠任賢則羣臣自不忍欺矣講學明理則羣臣自不能欺矣公聴並觀則羣臣自不敢欺矣厯代人君深惡人臣之欺而莫能禁者其弊有三一曰壅蔽上情不能下宣下情莫能上達故欺蔽易生也二曰猜疑上以術防下下亦以術待上故欺蔽愈多也三曰苛察小事欲致詳大事反多廢故欺蔽益甚也人君其尊如天其威如雷霆人臣有犯顔敢諫者皆效忠於君㤀身殉國者也人君宜大開言路以招來之言而當則嘉納以奨其善言或不當亦優容以宥其狂庶幾君身有過失朝政有闕遺人人皆欲盡言於上矣古語曰興王賞諫臣又曰殺諫臣者必亡其國豈非萬世之法鑒哉列女傳講義列女傳曰古者婦人姙子寢不側坐不邊立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聴淫聲夜則令瞽誦詩道正事如此則生子形容端正才過人矣列女傳者漢儒劉向采輯上古賢聖婦人事蹟作為傳記以教後世此章是説胎教之道言古者正見後世之不然姙子懐胎也寢必以正不斜其身坐必以正不偏其身立必以正不偏任一足正味乃食不正之味不食後世好用炙煿之物尤為有害割肉不方正不食設席不端正不坐小者如此大者可知目不視不正之色耳不聴不正之聲晝時所接皆正到那夜静之時又令瞽目婦人審於音者諷誦古詩道説古昔正事古人胎教無一不出於正如此故其生出子來形容端正才徳自不凡矣蓋子在胞胎時精氣神未定與母氣相流通母感於善則善母感於惡則惡此自然之理也臣惟胎教之法曠千載而不傳矣猗歟聖母誕育我皇暗合古人胎教以故聖徳夙成今萬國臣民咸願我皇早生聖嗣為天下本臣愚惓惓伏願皇上以古者胎教之法親誨後宫懐孕在身常正了此心不得起一妄念事事依著正道而行更助以雅樂胚胎未生時聖質已具此萬世無疆之休也臣誠不勝欣願之至内則講義内則曰凡生子擇於諸母與可者必求其寛裕慈恵温良恭敬慎而寡言者使為子師内則禮記篇名内治之法則此章是説蒙養之道凡國君初生子時選擇諸嬪御中與凡可任其事者寛量大能容也裕性緩不迫也慈仁而愛人也恵有恩及物也温和厚也良易直也恭莊重也敬者主一無適之謂慎小心謹畏也寡言静黙也此婦人之全徳蓋得坤道之純者必求此等婦人使為子師蓋赤子初生時純一無偽雖未能言然形既生矣神發知矣其知識亦漸漸開全在人保養著他則能完其天真先王所以慎重之至那時便為之立師後世多忽略反引壊了他到得出就外傅時不知己雜了多少人偽此古今一大限隔也臣惟子未生在胞胎時譬則天地混沌子既生在孩提時譬則天地開闢之初若胎教不至是鑿破了混沌何以保全天地之純蒙養弗至是初開闢時便壊了亦不復成造化矣小學首載此二條深得先王正始精意臣惓惓悃誠惟欲為國家億萬年計故敢稽首獻此逺謨臣愚更望皇上特勑太醫院檢録姙婦飲食起居禁忌及安胎便産方法豫曉後宫斯亦保合太和之一助也俟皇嗣誕生臣更選集禮經先王蒙養之事詳悉以聞孟子講義孟子曰知者無不知也當務之為急仁者無不愛也急親賢之為務知者聰明過人其於天下事固能無所不知然若要件件零碎去做将那不要𦂳的事混著要𦂳的如理亂絲抽不得箇頭緒一齊亂了知者正不然識得箇先後緩急之序何者當為何者不當為只揀𦂳要的做仰惟皇上一日二日萬幾聖躬亦勞矣若不急所先務而徒日親朝政覽泛常之奏章日御經筵講碎瑣之文義雖勤何補今夫應天下萬事者此方寸也不執簡御煩而以煩治繁汩吾神明耗吾真元則方寸且弗能治矣臣瞻望天顔每覺聖體清癯縷縷血誠惟願我皇上急所先務凝精完神以固齊天之夀今日所當急者三一曰明實學謂将聖人切要言語實踐諸身而發揮於政事不可效書生尋章摘句及操筆為文辭也二曰識大體謂恭己南面以天下事分任百官而責其成效今未免君行臣職大臣行小臣之職也三曰接羣臣謂親召見延訪不惟可以明習天下之事亦得周知人才也仁者以天地萬物為一體固無一物不在吾所愛中然吾只一身天下有許多人無縁箇箇親得須就許多人中急急求其賢者親之使為我轉去親愛許多百姓那時纔得恩恵周流若只知愛人不知求賢教那箇不好的人去殘害百姓便與自家殘害他一般不得謂之仁矣仰惟皇上至仁惻怛盎然天地生物之心而小民未被其澤者百官有司多非其人往往阻礙隔住也臣願皇上急親賢之為務如何可以得賢一曰破去資格而開薦舉之門二曰深惡媢嫉而崇推讓之風特勑羣臣人各舉其所知大臣各舉勝己自代宋儒程明道嘗上養賢劄子乃王道第一急務也臣敢稽首併録其言以獻伏惟聖明俯賜採納論語講義因不失其親亦可宗也此二句文義頗難曉蓋古今人言語不同請舉今人語以況因是依託他做主人家宗是尊敬他在門下蓋古之為臣者與今之為臣者不同古者人臣得親近君便思量何以報國惟有薦賢是一大事只管去廣詢博訪那疎逺之臣有好人來到京師觀國之光便去延訪接引他到家欵待昔聞其名今又會面曉得他真箇是賢便薦拔他也得親近於君那引薦的終身出其門下同心報國不敢有負所舉近臣徒士固當如此那逺臣却要自重他雖來延接我却不可輕往茍非其人後必貽玷必須擇其道徳可親的纔依託他為主他日便被他薦引我亦可以終身出入其門而無愧蓋彼之薦我為公不為私我之依他以道不以勢孟子所謂觀近臣以其所主觀逺臣以其所為主諺云門内有君子門外君子至門内有小人門外小人至甚切論也後世公卿大臣不務薦賢故亦不肯接士士之恬退自重者皆恥往來其門惟有奔競之徒趨走門下讒諂面䛕不公薦於朝而私相汲引此古今世道升降一大關繫也伏願皇上特勑公卿大臣各存至誠至公之心以薦賢報國為一大事凡大臣進退専視其所薦之多寡公私則公卿大臣皆肯詢訪人才謙恭下士期為國家得賢矣御札連日風霾繼作朕心憂恐必有其由卿可為朕言之無隐臣惟風霾者隂邪蔽遮太陽下土不得仰其照臨象君心有所蒙蔽未解也似雲非雲弗能為霖雨以澤下土象人君有徳恵阻而弗行也天氣髙亢而不下交地氣隔絶不得上達則變而為風霾象人君深居九重弗與羣臣相接則壅蔽所由生也皇上欲息風霾則今日至大至急者莫先於君臣相親皇上親接羣臣則為天地交之泰和氣所以致祥也皇上不親接羣臣則為天地不交之否乖氣所以致戾也臣祇承聖諭先述大義以對復發明聖人希天之學續當奏聞天説一帝王之學終日對越在天以其迪知天命也今夫人君郊見上帝其心肅恭曷敢萌一邪念以上帝降臨之也及居深宫臨􅉏臣則不免惰慢便是䙝天吁可畏也人皆以蒼蒼者為天故相隔逺不知吾心中有天日鑒在兹是故一念善邪則上帝用休一念惡邪則上帝震怒不可欺也乃若好名以為善弗出於誠是未免以天為可欺也詩云上帝臨汝毋貳爾心書曰先王懋敬厥徳克配上帝願我皇上請事斯語一帝王之量必也與天同大無所不包乃克肖天纔狹隘急迫便與天不相似如何而能與天同大亦惟廓然大公胸中空洞無物事來順理以應事已往則釋然不復留滯於心譬如天體太虚時作雲雨既散則太虚復如初矣書曰無偏無黨王道蕩蕩無黨無偏王道平平言與天同也若私有作好私有作惡渣滓宿留胸中阻隔凝滯殆不勝其小矣孔子曰惟天為大惟堯則之願我皇上如堯法天則帝徳廣運如堯矣一古之帝王恭己南面如天運於上而無為惟擇人以任衆職責其成而已我皇上勞心焦思以憂萬姓而膏澤不下及民由未嘗擇人所以委任責成之道未至也是故古者君逸臣勞今者君勞臣逸願我皇上執要御煩日召三四輔臣暨六七大臣面議政事察其某也賢某也不賢賢則任而勿疑不賢則亟去之更求賢者然後使分擇天下人材各舉其職則天下之賢恢恢乎有餘裕矣帝王之治莫急於求賢大臣事君莫大於薦賢報國皇上面勑大臣各舉所知召而察之叅以臺諫之公議審以輔弼之平章則賢才彬彬而出矣一天道下濟而光明皇上不接羣臣則其人之賢不肖皆無由而知若親接羣臣則可以辯别賢不肖咨訪既多亦得以明習天下之故矣伏願皇上先親輔臣次大臣以次漸及羣臣其親輔臣也每朝日講畢留與論道面質所得所疑每日調㫖進呈後召見面相可否不時召見或並召或獨召皆勿拘廷試後總召見大臣諭以有事許不時請見面議仍以時宣召如吏部問以若何用人户部問以若何理財或獨召或與侍郎並召亦皆勿拘講官日輪一人以備顧問羣臣之中大臣有薦其賢者必召見訪以政事因察其人臺諫有大事亦得召見今日感召和氣鼓動人心莫急於此願我皇上速為施行御札朕每觀書見論祭義曰祫曰禘但不知其義何謂卿可指陳之使朕得聞其㫖伏承問及禘祫之㫖臣愚何足以知仰惟皇上聖孝達天徳固已黙契古聖人制禮之原復欲講求其名義此堯舜好問好察之盛心也臣敢稽古經傳異同擇其可徵者以對禮記大傳曰禮不王不禘王者禘其祖之所自出以其祖配之趙匡曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之朱子曰以始祖配祭而不及羣廟之主不敢䙝也臣惟太廟祭始祖子孫千百世不忘孝心固得伸矣但祭不及始祖而上則孝心伸有不盡故又推廣始祖孝心追禘其所自出其義至為深逺人之祭祖考也聲容相接則其情易通今推而至於始祖所自出世代遼隔邈不相親自非仁孝誠敬到那極處何由感通然則如之何願我皇上常齋厥心致其精誠之極右論禘禮春秋公羊傳曰大祫者何合祭也其合祭奈何毁廟之主陳於太祖未毁廟之主皆升合食於太祖臣按祫有二有大祫有時祫天子七廟太祖百世不遷自太祖而下親盡則祧祧則不祭故時祫惟遷六廟之主於太廟至於大祫則凡已毁廟未毁廟之主咸在而合食焉蓋子孫之於逺祖恩雖無窮義則有止故親盡則不免祧然其恩終有不能忘者故又制為大祫之禮而後可以伸其孝心也臣願皇上常念祖宗一脉相傳以至於今則報本追逺之誠自篤矣右論祫禮臣按禘祫之禮不明也久矣古者天子有禘有祫諸侯有祫而無禘周衰諸侯祫祭其祖僭擬王者禘禮行之是故禘祫之禮始混後人從而附會之曰禘者諦也審諦昭穆也蓋因誤以傳誤耳詩云禴祠蒸嘗此四時祭名也記禮者誤以禴為禘後之人推其説而不通則曰此夏殷禮也是又因誤而生誤矣衆言殽亂折諸聖臣嘗考訂周禮而著其説曰古者天子祭祀之禮有六一曰禘大祭也周禮所謂以肆獻祼享先王也禘莫重於祼孔子嘗嘆禘自既灌而往者吾不欲觀之矣二曰祫合祭也周禮所謂以饋食享先王也祫莫重於食故春秋傳曰升合食於太祖二者其禮極隆故謂之間祀三曰祠春祭也周禮所謂以祠春享先王也四曰禴夏祭也周禮所謂以禴夏享先王也五曰嘗秋祭也周禮所謂以嘗秋享先王也六曰蒸冬祭也周禮所謂以蒸冬享先王也四者其禮少殺故謂之常祀四時惟春特祠各行禮於廟夏秋冬則合祀之故又謂之時祫右總論祭禮御札朕聞卿禘祫之義論朕惟禘祭王者所重之祭我聖祖之制何無此舉古之王天下者嘗有此祭者幾君朕欲聞之朕又聞郊祭曰祀天宗祀於明堂曰祀上帝夫上帝即天之主宰何為焉又古者祭天地於圜丘方丘取冬夏二至以為隂陽之始又有合祀之説不知皆起何時也卿其言之伏讀聖諭臣瞿然而驚作而歎曰我皇上真聖人之資也郊禘之禮不明也久矣自昔章句俗儒終身學之往往牽制於文義而不能曉今我皇上聞言即悟渙然不逆於心纔一二言便了大義自非聰明睿知超越古今曷克臻此誠千載之奇逢也更得博求二三名儒有實學者以備顧問朝夕啟沃明乾坤易簡之理發聖賢心學之要述生民困苦之狀陳帝王經世之略聖心洞然開悟天下事可運之掌從頭整頓一畨此真大聖人作為出於尋常萬萬者也臣不勝願望之至禘固王者大祭然此乃守成之君推隆創業之祖特制此禮在創業時却未有此禮可行故我太祖止立親廟追帝四世祖考所謂禮時為大也古之行禘禮者唐虞不可聞矣前三代夏商周也皆嘗行此禮而商周之禮不可通於今後三代漢唐宋也漢未嘗行此禮惟唐宋行之然不盡合於古以諸儒論議紛紛也右答禘禮之問虞書肆類于上帝周禮以禋祀祀昊天上帝其言明而有徵孝經乃謂郊祀后稷以配天宗祀文王於明堂以配上帝是分昊天與上帝而二之朱子刋誤嘗辯其非聖諭謂上帝即天之主宰可謂一言以蔽之矣天人一理上帝神明正如人身渾合中間一㸃靈處豈可分而為二也右答祀天祀上帝之問禮家謂冬至祭天於圜丘夏至祭地於方丘然考之周禮不合大宗伯以禋祀祀昊天上帝以血祭祀社稷初未嘗以皇地祗與昊天上帝並稱宋儒胡宏考定古禮謂先王祭天於郊祭后土於社而已人與造化一體臣每論學必推之造化論造化必反諸身騐之天地渾渾一氣正如吾人之身只有一箇主宰獨運豈有兩箇主宰並持故知分祭天地之説非也乃若天地合祭比諸夫婦同牢始於王莽其言不經後世因而未改耳不特此也後世訓詁為學始於漢儒科舉取士始於隋煬帝資格用人始於拓跋魏之崔亮君臣不相接始於秦二世之聴趙髙皆非先王之舊也右答天地分祭合祭之問臣自少有志古禮嘗與同志講求今幸躬逢聖明何忍黙而不獻誠以天下事有緩急今四海困窮所在人相殘食此豈功成制禮治定作樂時邪若欲潤色太平為事則是以禮樂為虚文矣我皇上豈務虚文者臣愚惓惓惟願皇上恢廓大度收用天下豪傑共圖太平是乃今日急務制度文物在所可緩況今學士大夫知禮者甚少知樂者絶少徒使皇上勞心焦思誰與討論哉宜勑下禮部博求能通禮樂者薦之來京使之考求先王遺法以備他日任使仰惟皇上欽明仁孝固性之於天但聖體清癯臣縷縷血誠竊以為今日第一義莫大於保䕶聖躬焉耳皇上思慮太多勵精太急故於不急之章奏無益之文義亦或留神恐非養徳養身之道也易曰乾以易知坤以簡能易簡而天下之理得矣臣敢稽首以獻御札昨卿以為奏所以因盡忠愛云朕思慮太多勵精太急或於無益文義亦不免留神夫此等之為委的何益但朕不能自知所圖之宜卿當就是三者明白實指庶朕有所知改勿憚疑可也臣聞詩書稱堯舜禹湯之盛惟在乎好問好察舍己從人聞善則拜改過不吝兹承聖諭仰見我皇上胸中廓然無我渴於聞善勇於改過真堯舜禹湯之用心也臣不勝欣躍慶幸之至謹條析以對一臣疑我皇上思慮太多者竊窺聖容血頗不華於色心脾二經受病為多蓋思慮最傷心脾也甚則飲食少進舌不知味睡臥不寧血不歸經非保合太和之道也然思慮多亦有二病其一苦心太過終日汲汲强思其所不當思此一病生於好勝人其一游心不定終日營營雖思而自不知其所思此一病生於不立己書云思曰睿睿作聖帝王心學全在於思今乃反為心害者蓋天下之事有萬其多茫然致思不知從何處下手故孟子論心之官則思思則得之而必曰先立乎其大者蓋天下萬事其主宰全在心此是箇根本歸一處此心有箇主宰則當思而思不當思而不思便有箇綱領可挈思此一事更勿以他事參之便有箇端緒可尋此乃乾以易知之理千聖相傳心法也臣敢稽首以獻一臣謂我皇上勵精太急者今天下萬事不理其大勢如人之身四肢百骸筋脉皆緩弛而不舉此其致病必有本因救病當有漸次若不詳察而一旦遽求速效就一肢一節上整頓便欲如無病人非徒無益必且大傷元氣故書稱明作有功必曰惇大成裕易稱用馮河必曰包荒願我皇上恢宏聖度包羅天下於胸中講求得一箇規模次第将天下運量得轉親接羣臣日倡率之使各修舉其職則可以恭己無為而待物之自為矣虞書有云臨下以簡御衆以寛此帝王之徳與天同度者也臣敢稽首為今日獻一臣謂我皇上於無益文義亦或留神者人心本靈人性元善只因有所蒙蔽聖賢為之指示出來字字句句都是説我自家身上道理自聖學之不傳有等腐儒不知切己體騐反沒溺於文義間或尋摘章句将聖賢言語解釋一畨是謂訓詁之學或掇拾話言将聖賢言語綴輯一畨是謂辭章之學臣一言以蔽之曰此皆放其心而不知求者也皇上日御經筵而講官所説多是纒繞文義其於帝王經世之大用聖賢立教之宗㫖罕所發明皇上時或親洒宸翰恐亦未免有意於文辭其於帝王經天緯地之文殆未可同日語也臣嘗自歎又復自慶曰聖王之不作二千餘年矣今我皇上天挺英哲卓然古聖王之資惜乎羣臣未有以古聖王之學啟沃我皇上者臣蒙厚恩嘗竊私恨雖然自古未聞借才異代以四海之廣豈無一二人潛心聖賢之實學可以啟沃上心者乎但患求之之道不至耳伏乞聖明留意臣不勝欣願之至莊渠遺書巻二
