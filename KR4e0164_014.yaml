body:
  text: 莊渠遺書卷十四明魏校撰拾遺書與周行之别後緬懷高風賦白駒以見志恭惟吾兄心如蜆絲紬繹有緒愈出而愈無窮井井不亂雖有善稱停事者莫能過矣吾兄長處在此其或雜然而紬之反以自亂紏紛而不可解乃知斬絶為難吾兄短處亦在此孟子曰心之官則思思則得之不思則不得也今吾兄之思得失中半焉毋乃主宰未定乎孟子所謂先立乎其大者只要此心自作得主宰耳淺陋之見不識高明以為何如與王誕敷昔者傳聞尊恙孔棘且殆憂懼良深比小僕回則聞貴體已安而後喜可知也繼此每欲遣人問候起居值家君背瘍調治新愈以故未遑傾仰之切積有馳情楊稔來致尊命欲需點藥遣人詣馮彼適治邑宰疾是以弗果來奉藥少許病後飲量亦嘗痛節之否乎此物氣味誠嘉然其性慓悍酷烈吁可畏也已目疾腸風皆其餘毒所發也消渴而發癰疽古無治法尚賴年兄形壯質厚早得良醫易於收救然亦凛乎其可為寒心矣遍詢醫者咸謂積毒未除再發必不可治國事廢弛然後盜賊交侵年兄勿以敵退為可喜而以敵之再至為可憂斯乃萬全之道也人當病甚時將恐將懼引杯覆之猶曰遲矣病愈之後將安將樂此意漸移曰雖飲庸何妨乎自古未聞以警戒而致危亡惟其因循悅豫則禍亂之所由生也故豫之六二曰介于石不終日貞吉年兄平日天資夷曠是其所長發勇猛心立決定志是其所短惓惓之情不能自已故敢獻其藥石之言或可為執事佩弦之助知舊嘗過毗陵詢訪善政稱之不容口但云平易中才有偏處便不可回此亦千慮之一失也附此以告與費先生屢遣人偵候明公未至託諸方丞杜門鄉居人迹罕至忽傳明公信宿吳門亟諗方丞則云已行無及矣自離門下數載天假良會交一臂而失之引領牙纛悵然有懷傳聞明公盛氣顛實顔如渥丹差以自慰兹因信伯柱史南行附問起居幣一匹奉引下忱乞賜鑒納校蒙上恩曲成吐吸煙霞吟弄風月遂為天地間散人矣伏願明公保合太和遵養時晦令嗣賢弟敬而無失慮以下人敢以保族亢宗為祝石翁之禍私嘗憂之其猶屬陽乎公今可以免矣事屬隂矣雖然弗過防之從或戕之神龍之在陸也蝦蚓或得侮豫鄉人寧無險而健者乎萬有一造釁往呌帝閽鬼神交搆之或能加罪於明公之𨽻人也願公闔門養威重絶口不道時事約束族人含垢忍耻犯者弗較詩云既明且哲以保其身又云采葑采菲無以下體敢一獻其狂言答夏惇夫承諭壁立萬仞校不能企也而安敢不勉以求無負教言校不合已決去志而尚遲遲者竊謂義如利斧擘截分明然不可露䀶迹耳講章亦送閣下但不曾改耳傳者過也與汪汝成鴟嚇鵷雛曷損吾兄盛德第可惜者鳳縹眇而逺逝其如世道何人心空洞如太虛生意盎然充滿悠悠之言曾何足芥蒂乎若微有礙便當挽却天河一蕩滌之也病中聊此問訊答葉尚源文莊盛德海內所欽矧於鄉之後進乎矧其子孫乎承諭兢業不敢辱先此心何心也即令先祖之心也即自古先民之心也保而勿失推而勿怠不可勝用矣大夫士有問文莊之後何人者校再舉執事以對則皆欣欣有喜色此人心之秉彞也答許崇志海內講學者衆矣深造實踐如吾兄者何處得來承諭主靜之功深感至教人心湛如太虛不著一物故能宰萬物若與事物滚何由超然純甫剛大之資未免因病擔閣惇夫溫潤如玉似少栗然補天之功今固難望校歸期當在秋渴欲一會晤也答唐應德令姪逺來愧無以答其盛意虛負此行雖然亦嘗與之指陳天根之學妙在涵蓄而忌於漏泄高明之士或亦有助焉耳應德聰明絶人更願用志不分以其全力而向於道勿溺心於世俗詞章以耗吾真元汩吾神明則其進何可量也仲春擬過毗陵進謁不識天意肯助之晴否答歐陽崇一詩云一日不見如三秋兮與故人别且三歲矣瞻仰何啻飢渴忽聞南征喜若從天而降也抱病空谷旌斾往返吳門皆不及聞知失此良會曷勝悵怏崇一夙有大志慨然欲興斯文今二成均一道德而同風俗固其職也亦其時也雖使崇一自擇何以踰此官但末流澆漓昜長浮偽故曰天下無道則言有枝葉所願革薄從忠庶幾返朴還淳以回造化此自學校人第一義也人心放去收回如反覆手若切實用功則心常收日見不足處若只管講説則心常放侈然若有餘矣塞兌固靈根聖學樞機在此愚見如是不識高明以為何如姪參卒業南雍虛心求教願賜陶鎔與吕仲木病中得復獲覩大篇但隨肺腑流出不復有意筆硯蹊徑間而重厚雅馴長者氣象自别雖然氣得無少衰乎愛莫助之如校之愚願兄并此一切謝却凝精完神此乃養德養身第一義也天官沿革傳半篇奉上求教此卷即舊寄李立卿者也中間紕繆及遺漏處不吝斤削幸甚幸甚仍願勿出此書示人姪參卒業南雍特令受教門下願與進之萬萬二昔兄留南多士爭欲出入門下飽德而歸今師成均海內風動天將興起斯文也頗聞以嚴見憚豈士習放弛也久卒難就規矩邪此在君子必有弛張之宜恩義兼盡今之法與古之法將無同邪否耶昔者明道未嘗廢法然不拘拘於法也日寄天官太宰篇渴欲聞教願終誨之答王仲實别久積有馳情承惠歲書使山中亦知甲子感荷無涯忽聞令郎怔忡之疾深為之憂此殆思憂太過執泥太過所致天相吉人想已勿藥有喜矣若猶未也則宜自度官與身孰輕莫若優遊林泉瀟灑以送日月庶可以保壽命之源也昔敦夫嘗得心疾久而自悟用功疾亦良已其詩曰方寸原無事要忘還有心這些關捩子妙在自家尋和靖云放教虛間自然近道斯言可以養德可以保身也與蕭子雍昔者持鐸中州正與吾兄易地而教校且愧且懼上疏懇辭故人永清立卿咸以書勸曰子雍正人也教法素明今承乏特易易耳入汴見善善惡惡分明一遵舊約束毋敢變而少加寬焉無何召命至矣故於吾兄遺風不能少禆萬分一也己丑之春橫議暴作雖素持公論者亦不能無依違於羣咻大抵因端守一事也吾兄豪傑之資天下事可迎刃而解艱危須仗濟時才兄之謂矣但恐是出匣太阿未是在匣太阿須防缺折更願主之以忠信孫以出之溫厚勝於肅殺進德進福其在兹乎火老候濁惟冀凝靜以固天真不具答邵思抑楊令至承懷好音恍若覿靣之人也愷悌君子民之父母今而後吾氓有福矣姓未復譜未出也以故遲遲聞兄舍其子而蔭兄之子足見友于至情可惇薄俗萬里相望何以贈故人惟曰磨兜堅又何以贈故人惟亦曰遂初焉耳令嗣今在都下從何人遊矯輕警惰是其對病藥也與潘希召卧病衡門忽蒙故人來訪聽教數日啓沃實深邇來一别又三月矣每一南望悵焉采葛之詩立卿來樂道年兄之善且言諫垣一疏功被江右彼民世世感德也傳聞武毅之民強梗不順號稱難治然可以誠感而不可以力驅可以義動而不可以刑服尊兄處之當自有餘裕矣校近讀論語內省厥躬不勝兢懼春秋之時去古未遠又親得聖人為之依歸而孔門高弟若子夏子張之徒尚不免用心於外吾夫子蓋嘗數數提耳誨之猶不自覺故吾夫子嘗歎曰古之學者為已今之學者為人又曰古者言之不出耻躬之不逮也又曰已矣乎吾未見能見其過而內自訟者也其言喫緊痛切一至於此今去聖人二千餘年風俗日益偷薄此心終日向外馳求讀吾夫子之言其敢不愓然深省邪更願故人不棄時賜針砭之言庶幾常知警懼也楓山老先生想時得相見每有所聞願轉以教我與王純甫離索數年久矣不獲承麗澤之益又以地僻艱於致書雖欲請見而無由無任懷仰近見薛君采老子解未識其人似默而好深沉之思先嘗役心於詞章後乃落其華而就實者發明昔人未及處多雖然亦只恐未曾用功來也聞吾兄注此書必有精微獨得處昔嘗請於兄今託可泉録一册轉致願勿吝教嘗怪漢儒專門訓詁而聖學寥焉闊哉無傳道家者流見傳於世者却云善修黃帝老子言吾儒可以猛省矣何如别紙古者天子諸侯絶旁期惟祖父母正統之期不降大夫士遭祖父母之喪自應解官持服周衰禮廢世鮮克行伊川看詳學制士人遭祖父母喪不得應舉此意最為深長校昔在官遭祖父母之喪哀慕大弗克如禮逮今猶恨過之爾時養病例嚴不獲歸奔葬事校讀春秋至葬某公某君處往往廢卷不能讀為吾兄計早宜移疾而歸佐令尊以襄大事謂既去理難再來此猶是形迹上論不幸遭喪移疾而歸若或居家難處則大事既襄之後遲一二年復以病痊赴部北可處則仍補北北不可處則告而南似猶勝於外補之謀也考滿伊邇恩典雖可指日待然令尊丈方斬焉在衰絰之中得之速亦未為榮也若遲一二年間則考滿之期適與起復相近宜亦無不可者雖然事難遙度今言之已遲計此書得逹尚在明春若大事已襄恐遂無及矣惟吾兄裁之勿貽後悔二歲莫嘗奉書計今春始得逹左右别紙所疑不知曽入思議否大道自然吾輩以意見窺測豈能無蔽正惟虛心體驗寬以居之乃能有得慎勿執著一説便謂不易之論也近得子積與執事書詞氣甚是鄙倍只為胸中先橫了一箇意見雖有恁人言皆不能入矣此可以自省也吾輩講學亦須廣大兼容乃能集有衆善如子積書議論固多鑿然其間亦儘有發明至到者不可以其大體不合而遂廢之也何如舜好問而好察邇言所以為大智也近讀尚書見唐虞君臣更相告誡此氣象最可默識今交友多唯唯之氣願與純甫共惇古道時惠我以藥石之言亦不敢不盡其心周官體大程朱未遑先儒著述衆矣承惠何司冦集注一二小小文義亦多發明但建立規模遍布精密可通古今處則殊未之及耳安得會晤盡獻所疑相與是正與周充之一冬天氣晴和途中想安好令嗣念家寢食能如故否此宜徐察而寬譬之靜中精進功夫想更深密不識可推餘緒以告故人否校惟道體浩浩無窮吾輩既為氣質拘住若欲止據已見持守固亦自好終恐規模窄狹枯燥孤單豈能展拓得去古人所以親師取友汲汲於講學者非故泛濫於外也正欲廣求天下義理而反之於身合天下之長以為一已之長集天下之善以為一已之善庶幾規模闊大氣質不得而限之自古未聞有聖賢杜門獨坐者今年兄之學屢叩亦不鳴校往往獻所疑聽者默而不答相與付諸忘言問者雖已開端亦難自竟其説加以會合之難如在數百里外者每讀麗澤兑君子以朋友講習未嘗不悵然也久不聞年兄起居奉此以待靣晤天寒山中願自愛與王德懋别後每與陸伯載言未嘗不歎公之厚德長者公昔在蘇飲蘇之水而已誣善者乃以蒼蠅點白璧豈知質之盛者不受飾矧受汙邪祗見其營營自勞耳校幽居罕人事黜陟不聞舍親周子樞持教鐸入蜀詢知公為憲長奉此以問起居吳蜀相去萬里何以贈公曰寬不容非又何以贈公曰斂華就實會晤未期惟冀若時保燮自愛與盧木伯别後得雲陽所寓書知溽暑中在途迪吉此天祐之也校昔官刑曹八載吳德翼嘗語校曰頭上是青天時時對越眼前皆赤子念念哀矜校亦恆言春生之意每行於秋殺之中陽舒之恩常溢于隂慘之外敬為親家誦之答林令往歲使者來云執事以太倉回日相見跂余望之竟無消息想勞於王事而弗遑也多病中久失裁謝兹承使者至下問庶孫為其庶祖母承重語意未明當云生祖母凡言為後者主適而言無適則庶長是也王純甫嘗為其生祖母丁憂國朝之制生母與適母俱服三年應承重者既為其祖父母三年則生祖母亦當三年也來諭有伯父二人則令尊不得為父後執事亦不得為祖後既非承重服祖父止于期年生祖母亦當期年勿問可知矣乃若孝思無窮非禮法所可拘然為非禮之禮則亦不可言孝也校學術荒落姑述禮法所宜以復明問惟賢者裁之答應元忠承寓楊推書尚未逹若即轉寄秦子元者則已得而拜讀之矣吾兄兩持繼母服昔者嘗與校語反之心以為疑承諭陽明以為非是竊謂其一尚有説其一則更無説想當時但知從厚而未知其失中也毋乃擇義之未精乎所問林宰事彼既不當承重則為其祖止服期年豈有為其生祖母三年之禮王純甫嘗為生祖母丁憂以其父庶長當為後也與林宰異矣答薛尚謙昔歲哭令姪於吳門有書託令弟職方將上想已逹左右矣承寄研幾之書啓迪多矣但其間尚有合商量處而吾兄之意似執律同而欲以此協天下之聲如區區者又何敢贊一詞哉來書又復謙虛想吾兄之進勢當一日千里是又不可以故吾論也吾兄消息舊歲已聞兹來真天假良會校適有痁病轉為河魚疾南望神馳氣倦言不能悉汝中處近有便嘗寓書想未逹也相見煩致意與胡永清正歲天運一新願天純祐國家使兄舊疾脫若去體出而霖雨蒼生吾皇英資自不待贊説而輔導者不無乖其所之吁嗟天乎人乎心者神明之官治節焉靜則氣和而理躁則十二官咸擾百疾之所由也以吾兄之高明誠能靜以治躁克廣德心則於治身治天下之道舉得之矣何如二日會子積自言過臨安時常見尊丈得聞吾兄起居少慰惓惓之望又云吾兄方在顛沛患難中而萬里還書所以勸其父兄與教其妻子者毅然無一不出於正士大夫平時好講義理及臨小利害輒喪所守視吾兄當愧死無地也因相與歎慕無已然校之所望于吾兄者殆不止是自古豪傑之士代不乏人而全才完德者至少無乃質美而未之學邪抑學焉而非其道也願吾兄因其所已能而益求其所未至玩味聖賢言語就自家身上充養起來則聖賢可跂而及也三大司空之擢天眷甚隆願為天下自重渭先過余東海之上毅然欲興太平第一開導上心求海內賢者共濟彼甚傾仰吾兄也校所憂者恐其急迫揚露安得持重識大體以公天下為心者匡其所不逮此有為之機但慮諸賢相持相激則事未可知耳承示宗賢書奏反覆觀之才識儘高氣魄或弱志大言大似少密功但得不自滿假尚可進也撫蜀雜稿足占吾兄濟時規模其所長者善因事以為功實不為文具更能進此天下之福也四自兄之去體國忠誠憂深思遠者頓覺寥寥其人一旦緩急不知誰堪撑拄校歸興每一動便覺神爽南飛但明主不世出食芹而美冀欲一獻之故戀戀未決耳吾兄暫弛重擔更願愛養精神散湮鬱屏嗜欲胸中融融常如初春此身壽考康寧國家柱石終必賴之純敏質也勿令久在大忙中使得肆力於學以昌厥後與胡純敉也聞選通政經歷不知有子未也近寓書想又不逹烋也有書勸之因而責之然猶故吾也汝能亢宗忽抱竒疾今其何如清心寡欲此汝第一義故曰靜為躁君重為輕根此言妙有至理河運聞已通行喜甚邉境邇來何如其出沒之路可為我一訪邉將孰可以當吉囊者孰可以當俺答者少慰漆室之憂二聞汝得選為御史大夫掾此國家厚恩令先公遺教也願益篤志忠孝以報君親切勿驕盈古語云衰至便驕何常之有潔白之操堅之益堅慎勿干請人亦勿受人干請行可質於幽明令先公雖亡猶存也答林相登泰山後所得又何如大林丘山之善於人心亦其人者不勝此亦不可不知汝高才清節更宜攝其粗疏造於微密若髙擡此心不在本位則自覺進處反是退處也何如答彭通判承惠周禮儀禮二經久稽致謝見執事所集歸田樂詩足以占志尚簡遠世紛不足以攖其心欣羡欣羡雖然得無猶有待於外乎莊生有言大林丘山之善於人也亦其人者不勝神可以勝孟子曰萬物皆備於我矣反身而誠樂莫大焉此之謂居天下之廣居此之謂足乎已無待於外惟時初春欲溫未溫天地大和元氣流行於四時而春氣氤氲尤昜體驗盎然吾人之仁也其根卻欲靜中來冬氣閉藏極於嚴密故春生溫厚之氣醖釀薰蒸隂崖寒谷亦透靜處春生動處春一家春散萬家春敢以為祝與吳克學間中每自省何以獲罪于天其大有二天不使吾有知猶可諉也賴天之靈頗窺聖學端倪弗克專勤精進是為負天是為棄天罪一矣古之哲人多窮校何人斯而承祖考遺業安安而居弗能廣施以光先人之德顧隂耗之罪二矣後者人各有能有不能天或以精力恕吾其前則在吾決志而往也與霍渭先校自少有志於學煆鍊之弗至琢磨之弗加人只是舊人氣質依然只是原來氣質但口頭却會説幾句大話如何打破得鬼門關天心仁愛大警動於我心自今不敢不力但未知終能領惡全好否高明不棄願有以誨余近成六書精藴頗發心學路遠不獲請教謹録序文并九字求正幸指摘其紕繆答唐虞佐古人有言求忠臣必於孝子之門太夫人在堂吾兄急流勇退舍祿仕而就色養其於忠孝可謂一舉而兼之矣欣仰欣仰承諭杜門讀書以求見道此古人不自滿假之心也恨道遠不獲請教詩云毋金玉爾音而有遐心便中幸有以教我晉語云行未能咫聞則多矣此後世通弊不敢為吾兄道傅説云惟學遜志務時敏厥修乃來永懷于兹道積于厥躬武王曰𢎞于天若德裕乃身敬為吾兄誦之但今所説時敏未必説之意也與王郡守克敬吾蘇在天下蕞爾一郡財賦上供舉天下大布政司莫能及焉民力勞弊勿問可知矣故吾蘇在今日最號難治政事浩繁盤根錯節視一布政司殆甚然一言而舉其要不過錢糧之難清耳錢糧之不可清無他徵斂太重飛詭必多貧弱者愈困矣今得明公攤其耗不均則而則自平不變法而法自便昔年飛詭宿弊一旦不革而自除貧弱下户莫不隂受其賜雖然此猶一時之功也昔者吾蘇幾不可成郡賴周文襄暨况侯奏減糧額數十萬石民始得更生至於今雖婦人孺子猶知稱二公敬之如神明愛之如父母今明公燠休吾民復上減糧之奏此真百世之功周文襄况侯復生也人之無良乃有隂壞仁政者公焦勞數年精神亦為之減不過為吾民焉耳今功垂成而廢是使億萬生靈命墮顛崖受辛苦者永無出期也願公亟為之天必祐公福壽樂康慶流子孫矣與范袁州仰令名之日久矣天假良緣邂逅于鍚山一會弗獲從容别後中心如缺昔李康惠公守南昌校送之謂曰大丈夫欲致君澤民不為相則莫如為守矣何也近君者莫如相而近民者莫如守也其後康惠公出將入相實南昌基之胡端敏公亦嘗出將入相然舉平生得行其志處必曰廣西太平執事有二公之長才一麾守筠雖未足轉舞袖然無南昌之繁難太平之頑獷德澤尤為昜施也他日將相之業終必賴之萬宰新令李參校自幼挈在官邸教之有成居鄉素能有守今居官未知其設施如何幸而處爐錘之下願勿以上下司視之而以師弟子處之凡百教誨使踐墨而行詩云匪手擕之言示之事匪靣命之言提其耳倘得少有惠澤及民皆執事成已成物之功也與鄒謙之聞南雍以禮樂為教妙哉轉移之機乎昔者見甘泉咏歌一高則必一下非復天然浙中翻曲調為歌調則又出之以人矣惟陳元誠歌聲若出金石聶雙江聞之不覺歎曰是真足以動天地感鬼神矣斯人心學淵慤故其發聲自然莊重從容也古樂妙在散聲文公謂樂絶不可復譜者正惟此失其傳耳每見元誠咏歌或一字具三四散聲或半聲或全無散聲者皆天然而然不容損益如思齊詩肆成人有德小子有造古之凡十一字通無散聲至人字散聲忽見勢若飛動欲活者天生斯人固興古樂之機也而乃使之數竒不遇不知天意竟如何斯人心學實曾服瞑眩藥來舉世知者亦罕惟伯載嘗見之深服其人與林以吉一别十有二年於兹始見於潞河詩云溫溫恭人惟德之基再見情好彌篤氣則若稍揚者禮有之盛氣顛實揚休故不復以告由今觀之乃知充養有素有開必先也校也為善不力天厭否德喪子喪孫春秋傳所謂於是有隱慝焉敢不惕然內省吾兄昔也無子而今有子此則天佑善人也願益進德修業以承天休伊川有云仕宦能奪人志一日看除目三年損道心緇衣者流謂相逢盡道休官去林下何曾見一人其輕吾儒如此不知大行於我何加窮居於我何損固吾儒事也髙明今居萬山中與清風明月作主想人間世功名冨貴不復罣胸次矣何樂如之莊渠遺書卷十四
