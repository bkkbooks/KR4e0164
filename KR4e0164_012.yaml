body:
  text: 莊渠遺書巻十二明魏校撰拾遺書與嶺南社學師慨自古風寖薄庠序之教廢也久矣本職承命督學兹土深為是懼爰興社學訪明師僉謂如先生者模範謹嚴宜憲䝉士兹者舘舍告成敬修書幣延請諏以陽月己夘日啟舘伏望體聖明化育之心念本職惓惓之意毋惜俯就先期貺臨早敷德教於一隅可暨風聲於列郡庻幾遠近相承教事大興古風復見於今日本職不勝至願惟冀鑒亮不宣與河南列郡守校鄙人也豈堪中州教鐸今來已晚又迫賔興之期大懼弗克選掄以上副明天子求賢之意恭惟執事一郡之綱也諸生素行某也賢某也材或某也不肖久已知之雖有未知朝訪而夕可得矣敢竭誠悃求助於執事忠莫大於以人事君願殫厥心禆校成此盛舉州縣長令暨於師儒與諸生彌親其知彌真而與校未信也執事與之相孚願逹此意共濟登斯有三善焉一可以為國得人二人知所勸可以為他日興教化張本三所舉得實不至於長詐偽之風反傷大體校不勝至懇答王郡守子正伻來承下問惓惓於吳氓甚盛心也顧淺陋何足以當之聞命祗辱來諭禁奢靡息争訟此誠今日對病之藥也如校之愚更願明公以書請於鄉士大夫相帥以儉共成禮俗以為民表富民能節儉好禮者勞之擇其犯分尤不率教者或使卹其宗族鄉黨或督之開墾荒田而官無所利焉小民庻其風動乎乃若倡優賭博搬戲雜劇男女逰山燒香此尤風俗大蠧願為之厲禁犯則峻治之詞訟一事願以誠感上司勿輕受詞及偏原告以長刁風勸屬吏廉靖愛民勿利紙錢贖米民自以不擾明公復以書請士大夫舉行族約鄉約訟當自簡矣古人有言治天下者何異於牧馬哉亦去其害馬者而已矣願加之意雖然之二者固急務也如校之愚則謂莫急於正紀綱願明公推誠於郡佐邑令同心共理治道去泰去甚大抵法弊昜救人弊難救而時弊尤難救雖然如猫捕䑕一擒而衆惕矣伻回先此奉復仍令二三子詢訪民情具時政當罷行者續以告也答吕德汝書惓惓問政嗟乎今之作縣即孔門之為邦也但古有君道漢猶有長道今直僕道耳此固法弊亦由人弊下焉者惟知漁利人靣而鬼心此盗賊之行也汝必不肯自汙亦不待吾勸戒稍上焉者但務名以干上司之知其弊徒虛文無惻怛之實此市井之心也吾不願汝為之也時新居鄉亦嘗見作縣者守身如玉之潔如氷之清而愛民也如父母之切而不獲上下之心者乎保伍法古人嘗行之矣妙在誠心愛民因俗以為教所謂神而明之與民宜之也安石行之而害者法既苛擾又以刻急濟之皆由其抝性彊心所致也答章懋實承示奏篇足見惻怛之意書稱欽哉欽哉惟刑之恤哉曾子曰上失其道民散久矣如得其情則哀矜而勿喜此心何心也天地生生之心也充之滿腔皆春推而逹之六合皆春矣但事多見行覆本昜於破調不過曰合無申明則又作一塲話説矣東漢而下奏篇往往瑣細萎弱惟孔明出師表可泣鬼神唐人尚駢儷陸宣公奏議炳炳如丹口不言仁義而仁義存其中亦不覺其為四六也宋人自諸名公外皆未免於議論多范文正公則又逈出諸公之上程朱奏議自當於六經中求之而明道數篇若用其言可以從容三代之治近世奏議往往是舉業否則吏牘又否則一篇古文詞胡端敏公論事剴切讀之令人心開目明願親家究心焉平時作何功夫所交何人皆吾所願聞也與陳克修暑中不獲入城看汝此心缺然之任已浹數旬矣部中諸事想俱悉其本末昔太祖嘗言朕蓄百萬兵於京師不曾費百姓一顆米以開江北諸屯也工部特設屯田一司想專為此今廣屯如故而大困民財不知其弊起於何時願為我考究顛末詳以見示至懇答王民熈承諭克己之難自非懇切用功豈能知此艱苦狀敬仰敬仰雖然此莫只是後天茍知人心惟危常存畏意蓄吾全力纔覺萌動便逆折之擇其甚者與之鏖戰必也誓不與賊俱生滅此而後朝食庻其先天乎躬所未逮姑誦所聞慚愧慚愧承問中庸指歸且未作五經已付之忘言惟禮記經文不可不刪定容他日為之答曾太平與故人别十有四年矣徐亞叅王泗守過我僃言善政余作而歎曰有本有用之學固如是邪甚為赤城之人喜之自守令之數昜也而癢疴疾痛不關於身今若此真民之父母也來諭所舉戒懼慎獨足見留意於切已之學但未免猶落言詮而分屬正心誠意則彼此似俱失是願更體騐之夫中庸與大學一也大學教人用功首把明明德來説中庸則首舉至善指示人亦猶大學之提起知止也中庸之戒懼慎獨乃櫽括大學八條目只是一箇活敬大抵人自未應事及乎應事以至事過總是此心又進一歩自未起念時及乎起念以至念息亦猶是也善用功則貫串做一箇否則間隔矣吾所謂立本是貫串動靜工夫研幾云者只就應事起念時更着精彩也近作大學指歸大學翻楷大學考異寄往指歸錄本偶不在以草本寄其間更有一二修改處然大體則不異矣試體騐之有不合處儘好商量維時仲春宇宙間渾是一團太和元氣薰蒸但覺或未至而至至而不至近則調爕一身遠則康濟兆民尚慎之哉寄參自汝涖任後久不得汝書至今懸念周子樞督學四川取道江右吾有書寄汝想已逹毛剛卿自雲南回道經袁郡云會彼中士夫往往訾汝恃才而傲慢人好張弛而不知體要嘖有煩言惟范太守説汝所行是多扶持之言嗟夫好事難成好人多磨一至此哉雖然己所不欲勿施於人行有不得反求諸已此聖賢教人忠恕之道也以迹觀之悠悠之言似出妬婦之口以道觀之因是而反求諸躬有所未善則改無慊於心則加勉何莫非吾忠臣也何莫非吾金玉益友也縣尹立於萬民之上誰非俯仰吾者惟吾獨尊矣故不患其折挫也而患其昜驕也有所拂鬰於心觀省加密兢業轉深久之自當孚應古之學者必先理性情汝之性情素傷於褊急而於寛大和平惻怛忠厚之意有所不足或因事觸發或自覺知或得人指破大煆煉一畨此最是着力處亦便是得力處也化漸長成讀書勤惰何如汝父儻出外衙中凡百關防俱當用心昜家人利女貞男正者身正也女正者家正也况主母不在内外尤當謹嚴慎勿以官事在室中言之恐昜漏洩生事汝居家素儉泊今居官尤當儉泊於家古人官箴將勤補拙以儉養廉説得甚好前軰又有箴自高不高䕶短終短有銘内不足者急於人知沛然有餘厥聞四馳皆格言也吾與尊幼俱平安汝不必掛念一縣經綸四海同願汝以不忍人之心行不忍人之政廟食百世詩云有斐君子終不可諼兮與楊尹仁甫吾崑九保鄉氓朱朴有賢婦曰周氏朴忮人也自丱角時為婚以睚眦之憾棄置終其身然以賢婦善治家也猶委之内政已而他娶賢婦處之如常再娶者化其德願以妾禮自居不敢與賢婦均禮朴他日擕外婦歸再娶者亦不見答懟不能堪賢婦數教勸之已而外婦死情好如初賢婦教誨之力也再娶者及外婦所生子女賢婦鞠育之不啻若自已出子女長成猶孺子慕朴壯歲死賢婦哭之甚哀竭力持其家賴以不墜再娶者於吾家有中表親自兒時已知其事今賢婦老且病矣與吳德翼别紙錢進士來致尊命問修辭立誠此吾兄不耻下問之盛德也校承命祗辱長者有問不敢不對正欲求賜教也今畧箋數語未知然否忠信所以進德也德者非他吾心固有實理也若無真心早自與理背了必須發真實懇惻心方可進德修辭立其誠所以居業也人有實心必須作實事句句都是實話若容昜出言不檢㸃便散了這實心噫最泄漏處莫如口知至至之可與幾也知終終之可與存義也知至而不肯便至此非真知也知終而未能終之道理便有缺䧟皆與忠信不相關此心若真知是真知行必力行答金世龍相去萬里悠悠我思不知邇來作何功夫同年中合志者為誰同鄉中合志者為誰四方之士所交者為誰昔提學高汝白之諸父隱君子也雖則教汝白以舉子業每歎曰可惜可惜假令得狀元亦自枉過一生其後汝白舉進士以書督責之曰汝得一第吾不為喜而以為憂此後必駸放肆可錄逐日言行寄我汝白歎曰吾終日在側豈不我知而憂我放哉試問一老家人曰比舊漸不同矣乃儆懼置一簿錄其所為試自檢㸃其過不可勝書乃大激勵為學卒為善士汝昔好為深沉之思其後又若欲趨㨗徑者今其究竟得力處何如日用間最可自驗皆實學也答俞獻可知縣大丈夫欲致君澤民不為相則莫如為令與守近君者莫如相近民者莫如守令而令彌親矣癢痾疾痛無一而不相關也居今之世可以廟食百世者惟守令則然民之思令彌深矣雖然三代封建有君道焉兩漢守令有長道焉今之郡縣直僕道耳士之雄成者不屑焉謂之雌伏吁何輕民命也賢者所至塗炭者可使之枕席小民戴之如君親之若父母上之人固將敬之如九鼎大吕山川若增而勝焉然則能重此官者是固在我遠承存問深感不忘故舊之盛情傳曰若保赤子心誠求之以此致祝雖則雨露雪霜均之澤物然吾願故人之為陽春也與王時行古有旅人歸人之目吾兄今始還莆真行者之赴家也古語見月休看指歸家罷問程信是樂事惟心亦然一自孩提有知漸離郤真境久之不能自還故曰與接為搆日以心鬬又曰其心之出有物采之一語最警曰靈臺者有持而不知其所持而不可持也緩則無功急則彊把捉非可久之道此須尋恰好用力處而自行持吾兄喜昜時亦有妙悟處而越出者多夫學昜者非學其言也學與造化相似也願吾兄體昜日用間一言一動務求合天然道理而不敢輕則懸空之論竒怪之見一字亦使不著矣與徐少叅故人過我時約以他日還當再過我故别時未及盡所言夫學所以變化氣質非隨氣質為學也譬之於醫必先求責病原乃施治法吾雖折肱屢矣而非明醫念無可以相益敢於聖賢千萬言中拈出一言以告曰沉濳剛克不知可為瞑眩藥否若未中病不妨再商量也吾問人才汝嘗言嘉興貳守吾心慕之每訪其郡人皆言不肯幹一事亦不能幹一事此若言何謂也與利僉事賔昔者伻来但言汝將出巡過我不言汝已陞官故復書先附寄六書精藴一部别一部寄張柱史其後從子過南都特來謁汝始知汝已僉入閩矣不知汝過姑蘇何以不一過我必有以也而我不知耳吾離羣索居也久道德日負於初心不知汝奔走宦途此心能屹如底柱不為風濤所震撼乎能抉浮翳以開東明乎宴安鴆毒能勿懐乎人之學强者當柔克弱者當剛克是故急則佩韋緩則佩弦汝宜自察乃可長善救失也與顧禹鍚承惠真文忠公文集自晦翁後學有實用者勉齋魯齋及公而已本傳稱公所至惠政深洽不愧其言奏議明白剴切胡永清嘗言晦翁奏議精光鑠人讀之雖名公鉅卿所建明盡為所掩真文忠公庻幾而神不及也永清奏議甚好人多泛泛觀之不知其意之所存一事有一處置皆鑿鑿可行也與金推官世龍嘗讀書至甘誓費誓啟嗣位卒罹有扈之孽伯禽撫封於魯年尚少也而當淮夷徐戎兵衝應之皆整暇可以見禹周公之家學皆切於實用自科舉之學興率皆空言無益故有讀書萬巻不讀律致君堯舜終無術之譏吁有是哉吾昔少年筮仕得刑官大懼見前軰老法家必請教焉未有能彊余志者幸遇胡端敏公同寮曰問刑不難於招而難於審情若欲得情必先明理其後居刑曹八載每見同寮嚴刑訊囚多不輸服吾終日或不撻一人而情常先得只是虛心察理視民如傷故民多感服也康誥吕刑此法官之規矩也咎繇為古今刑官第一今不能知其詳矣大抵其學以天為主而好生一言者真天心也敬為故人誦之與聞靜中傳聞敵人内侵蹂踐太原至於上黨今散而之他不知回舊巢邪抑改而他圖邪邊警之由出自俺答及吉囊之子邪或小王子尸之邪小王子不足憂所可畏者俺答及吉囊之子不知吉囊居河套中冦陜以西昜為力何以靜而弗動邪吉囊之子能為俺答下否諸子克和否此可間而離也黄毛韃子素強今不知能為狄後患否此可招而使也三晉之民天下莫强焉今荼毒甚矣此可激而用也但患文武才畧持重識機變者難井陘阨塞難出此道可虞猶未若東北可虞之甚也華當新與敵婚言之可為寒心近見黄掌科奏差彊人意昔嘗見胡靜菴李遜菴之籌邉如運之掌今九原不可作矣病卧空谷消息苦難真吾兄素體國又宰留都必有的報真見便中幸示慰與陸浚明承惠春秋纂例辨疑弗及靣請教退而究其説賢哉其用心也三傳重於漢而輕於唐以談趙陸三人同心而相繼也亦專門之蔽既極故天啟其𠂻子厚尊之亦是惜其於周禮未精故考論往往失是尚未若趙子常之言春秋豈後出者勝與雖然聖人經世大義則恐槩乎其未有聞也校嘗作春秋經世欲以發明聖人之心而力不逮僅至隱公而止謹奉左右請教有紕繆處願賜批抹指摘得以商量至懇復顧禹鍚昔胡端敏公之為大司馬也以十事要説内一條欲練兵於京輔肘腋盖欲隂制大同而潜消其變也時有厄之者端敏亟去國故人莫知其謀而大同遂成大癰疽勢將與身俱亡可為痛哭李康惠之為大司馬嘗奏雁門寜武兵僃寡弱邊騎若侵大同迤西一帶透入朔州忻州則山西大可憂今其言騐若蓍蔡矣又言東北兵僃尤弱若邊騎入懐來白峰兩空之地則一路俱少隄防大可寒心今皆莫之省憂萬一震警此處豈但可痛哭哉大抵我國家以吏事制戎事而吏事又多虛文也賈誼復生當若之何昔人有言滿眼清才在朝著病夫無以繫安危校之謂也獨使至尊憂社稷諸君何以答昇平願在位者同勉之與陳子醇别後又且二年矣懐想如昨傳聞從政大得民和深以為慰傳曰如保赤子心誠求之雖不中不遠矣明道所至必書視民如傷於座隅曰某常愧此四字子醇篤志講學願立誠為主凡事只看道理當如何不以贊毁利害昜志人情物理見有未周毋憚屈己詢訪暇時㴠泳聖言令常自警省處勿使汩没此心拙見如此不識高明以為何若答沈一之承諭攅葬又甚盛舉也可以大厚頽俗有司愛民惻怛擇高土為義冢塋令民無力者葬其中仍令親隣人出錢米薄助勿作佛事勿獻羮飯便可送終一洗二氏惡俗矣今俗做羮飯只要把酒食作散塲却是樂哀也季秋祭禰恐不必行生日不受賀而獻考罔極情深此意却甚懇至也土地之祭不經當改作中霤此即一家土神也惟揷秧收榖却當賽祭土榖之神此即古之以社以方也聖人深體民情為之禋祀後世上既不行故民間各自賽祭耳遠承下問忘其固陋姑誦所聞高明擇之答馬嘉定伻來知貴體已康復甚喜甚喜更願凝神定慮以保萬全之安承惠腆儀感感日過嘉定始知昔人興水利者但通潮水而不通湖水是謂水背原而不長又不於下流設閘壩以是開而復塞今幸遇明使君願為練川生民造命洞究厥原委斷而行之此廟食百世之功也賦法役法勢將動揺人人異議惟明使君公心為民獨悉其利弊之實願言於南岷公持之如山則一郡咸受大惠矣顒望顒望答周舉人來諭下問惓惓無乃借聽於聾乎承命祗辱雖然請姑誦其所聞立志欲堅而毋認虛氣以為志用功欲其切實而毋昜昜於言也發言當有倫次而毋雜雜則為游言必其多游思也不識高明以為何如六書精藴奉覽其中所論多反本還元或可為韋弦之助否乎荷亭書且勿論其言只氣象輕率已可厭惡但近日後生軰好大言殆有甚焉此書反若酷吏中趙禹矣復喻吳江來諭賦役法已定一郡之民受福無量不但德被於一邑而已欣忭欣忭更願修舉水利以為永久之圖此廟食百世事也立齋閒録已領國朝少野史此書儘有功雖然史才甚難昌黎文章鉅公而順宗實録殊不彊人意此無他作史者但求載事而不以經世為志也何如何如其二月盡天且凉吾欲過垂虹看汝而汝使者適至心之黙相感固如是耶承問作六書精藴之故吾昔著周禮沿革傳今復著此二書一轍六典壊於秦後世不能行則惟以秦為師六書變於秦後世不能知則惟以秦為師若能得古人之心法而會天地之純視無道秦豈直醯雞而已精藴作後吾將正六經今已正大學矣卧病衡門毎聞善政未嘗不喜動顔色嘗舉以告肅齋肅齋曰此吾門生也有志向上吾勸以節用而愛人能用吾言但松陵驛革之歲可省費五千而執不肯從也絹銀之惠近日交際多用之在故人則不可何事非道何事非學謹用返璧答尹惟中與故人别不覺踰年矣慨日月之昜邁媿德業之無成願與故人寸隂同競王泗守昔為杭倅過我吾問以平生學問得力處何如答云亦嘗署縣署郡當政事倥偬時及遇盤錯處平生學問不得力便覺漏綻包羅不來展拓不去吾因歎康節有詩云在尋常時觀執守當倉卒處見施為南軒敬齋箴云事至理形其應若響而實卓然不與俱往文公有詩云事至理明隨理應動常有靜在其中至哉言也敬為老友誦之與王直夫時值溽暑病軀不敢出門當此遠别不能一執手中情闕然贈言者多矣吐詞皆成珠玉吾但申以一言曰思其艱以圖其昜天下萬事皆本於心此心制之一處則何事不辦雖有甚難者茍能朝夕服念更屈己而詢諸人則何難之不昜也答金推官世龍涖任今已三月餘矣民情土俗必已周知願求所以致訟之由與夫息爭之道因寓轉移之機昜曰天與水違行訟君子以作事謀始又訟有孚窒愓大患在於下情不能上通是故平昜近民非但守令之體司刑者何莫不然也答宋尹下車未幾頌聲載道亦可以見民心之昜孚矣更願益加詢訪規模漸次了了於胸中然後畫為科品見諸行事以大慰細民之心至懇至懇大丈夫志在天下國家不為相則莫如為令以近君者莫如相而近民者莫如令也故曰一縣經綸四海同偶檢薛文清公從政名言奉上備覽其為韋弦大矣復王郡守子正校不度德輕作大學指歸過蒙賜以序文冠於篇首校何人足以堪之學問之道千言萬言大學總而歸之三言序文直指為心學又約而歸之一言有德者之言自别信乎所謂操存一言要為爾挈裘領者也入刻後更願惠數册寂而能照感而遂通二句妙甚愚意更欲贅云寂而能照而不為物先也感而遂通而不與俱往也不識高明以為何如弄斧公輸之門良以自哂夜夢應德不知有消息否答吳長洲校於明道先生不能為役三代而降道足以上繼孔顔者惟先生一人而已康節天挺人豪也惜其局於數學然其超然萬物之表視人間世之功名富貴若將凂焉後學亦未昜攀也象山固是振古豪傑卓然先立乎其大者其心青天白日其言震霆驚雷足以大振俗學之卑陋雖然詩詠文王小心翼翼昭事上帝書稱文王之敬忌以校觀於象山似與若此不相似然來諭自言放心未昜收力行之功聖賢之所難此非常用力者不能道校則謂此事亦甚昜亦甚難人一能之已百之人十能之已千之其何難之不昜也一日暴之十日寒之其何昜之不難也雖然所謂求放心者亦非謂兀然黙坐以收此心也若是心彌難收何事非心日用間事事謹畏皆所以求放心也故曰仁者心無内外遠近精粗之間詩曰采葑采菲毋以下體高明其取節焉别紙承示嘉作大篇舂容而短章工於造詞政事之餘乃能飾以文學若此信乎天下竒才也文而加之以骨詩而加之以風味所向無前矣雖然校不敢頌而以規昔者明道所至書視民如傷而曰某常愧此四字信斯言也恐不暇作為文詞矣承惠王充論衡白沙有言文衰東漢無高手詩到中唐少作家又承惠樊川集杜牧之却是有用之才惜乎氣揚不帖帖地不能持其身故終於小器也答沈一之昔我高皇時所重在貢聖意謂外國獻方物中國貢人才其後科重而貢輕矣今得一之可以增重來諭遥授欲進言既承下問不敢不盡其愚以昜時義當之黙則无咎无譽語則㐫悔且吝矧言天下事亦大難必須自家有醫國手叚説着便切病原用着藥便對病庻可立效也答鄭希大承問䘮禮校弗能詳也姑誦所聞以對古者過時而弗葬則主䘮者弗釋服不論闋與未闋也䘮禮莫重於返哭是謂送形而徃迎精而返孝子慈孫至痛在此若墓上釋服從吉是廢返哭不迎親之精氣以歸也斷斷乎不可魂帛當埋於家亦無埋於墓上之理盖墓藏體魄神棲於廟致死致生不可混也其二别後有懐高誼形往神留初八日鼓枻横絶大江乘汴船渡淮過此則天下南北形勢分矣地多遺利故民窮甚於吾鄉北上日聞聖德清明深可為世道慶但沿途每接士夫好為彌文苛禮而少真率自度吾軰懶折腰人世難諧俗出既無補於時而屑屑往來江山相迎對之不無愧色何日始得釋負相擕而撫孤松也天氣漸温願若時頤養天和不具答林烈聞汝邇來甚是興起深慰我心昔有問文公門人誰勇曰未見勇者今求之孔門惟顔與曾可以當之顔曾立志决然要作聖人不肯頃刻放下譬如漢高祖唐太宗若未得混一寢食斷不遑也以此自䇿勵何如何如格物功夫一物不放過只此便是博處其二聖雖學作兮所貴者資汝質樸茂固已近道更願大厥志只問作聖當何如更不求第二義知本而必循序精進而勿退轉乃能有成耳與尹惟中别後猶如見顔色不知已自春徂秋矣顧憲長書回徐少參過我皆盛稱故人亷潔惠愛遇事有執持而未知學之源流曰有本者固如是願故人益充養此心視民如赤子視官事如家事事太守如事兄視各縣令如手足而胥為一體有善則歸其長過則自歸士大夫家有事至我者與其以法裁之未若以禮處之使其心也服而法不廢何如何如天氣尚炎惟冀若時自玉不具其二董相云仁人者正其誼不謀其利明其道不計其功武侯云鞠躬盡瘁死而後己若夫成敗利鈍非臣之明所能逆睹也文正公云為之自我者當如是其成與否雖聖賢不能必吾豈茍哉願惟中終始以此立心則正大光明可逹天德而寄百里之死生矣訓釋頗猥似不必刋校嘗歎古書傳於今者何嘗列某人編次某人校正某也題䟦云云哉近世容易便成一書又有幾許附名者薄亦甚矣昌黎云内不足者急於人知沛然有餘厥聞四馳何如何如正得秋而萬寳成胥有豐登之慶矧為民父母之心哉喜可知矣願為民自愛其三自故人入閩聲聞日遠蔡舉人至稱故人以兄禮事長官至義所不可則確乎不可奪其待士夫亦然忻慰忻慰振衣千仞岡濯足萬里流願惟中常存此志操海濶從魚躍天空任鳥飛願惟中開拓此胸襟南土瘴熱養靜自愛何如答蔡潤宗汝文體善自變化不謂汝數竒雖然棄周鼎而寳康瓢自昔已然矣既知大命則小命固不遑卹也雖然汝歸方將舍其所長益求所未至則吾願有言汝也認理過精得在此失亦在此動有成説不能觸其真機文若為所礙者昔人借禪喻詩曰不陟理路不落言詮禪語亦病夫理障法縛者此言皆偏然汝因此蕩滌胸中空豁豁地庻幾天光發新其進何止百千里也吾嘗謂上舉業者天地萬物悉移入紙上種種非真澄波定形各還本色何樂如之答何子時故人遠在萬里慰我以書深感惓惓之愛與故人别數年矣氣體今何如惟聚精會神可以進德可以養生記云莊敬日彊又云盛氣顛實揚休皆充養所致也來書歎屢空之難此是真經歴語志士不忘在溝壑勇士不忘䘮其元須著抖起精神做去日月逝矣歲不我與願及時進德修業立决定志用勇猛功以成遠大之器不具與王爚聞汝初至即往兵間不知事勢如何兵㐫戰危至難至險然勿以艱險自阻宜博謀於衆從長而行靜菴有言書生用兵智勇固非所長信義在所當立又曰已招者不殺再叛者不招新起者必撲滅於㣲此言可刋金石也文公答林擇之書與皇甫帥書曲盡人情事勢萬古可行居官動關利害與居家不同衙内關防宜極仔細若兵事畢分廵一道便當為此一道窮民作主凡官府貪酷者宜預訪知告發便痛與鋤治其無大過者不可輕受狀以損其威上下宜相體也與鄭壻若曽涇野重厚端方名重天下汝今出入其門逸志當自消驕氣當自除但學莫病於好名而教昜失之過高以好名之心而聞過高之論其患有不可勝言者孟子曰大人者不失其赤子之心者也若好名過高則將䘮其赤子之良心人偽勝而天真㣲矣不可不自勵不可不自省得汝平安書甚慰間有論天下事未免輕發漢景曰魏其沾沾自喜難以為相持重不可不慎也此處須有病根要與汝道破未必能㧞去須自尋求知得是病便只是藥連根可㧞矣其二屢得汝前後書深自刻責所求病原儘覺懇切終未沉着程子有言這㸃意氣能得幾時子須發决堅志用勇猛功日用間讀古聖賢之書句句就自已身上體貼力行合則從不合則改見得的然處方可自信雖然猶未也收歛停蓄深造黙成方是天根之學其機只在此心收放聚散之間耳人心操則存舍則亡收之甚昜放之亦甚昜不可不慎也與周士淹汝美才也而氣局尚窄以故弗免有滯礙處欲開大規模此誠第一義亦嘗觀之造化乎惟大而後能運故曰若無天度量安得聖胚胎更願於明以動故豐思曰睿睿作聖上用功何如何如令弟有美質宜數勸以耻言過行功夫勿輕為大言抑其虛驕開其真識乃可成遠器否則聰明誤矣履德之基謙德之柄而後曰復德之本學者决當識此其二人皆曰士淹有進而吾未之喜者吾以一日千里望汝若尋咫間能幾何哉邇來用功奚若相去萬里悠悠我思何以贈汝天在山中大畜君子多識前言往行以畜其德又何以贈汝山上有澤咸君子以虛受人其三古之逹人棄千金如輕塵脱萬乗如敝屣義重故也汝能見義不見利求慊於心且悔昔之動氣日用間事事若此充塞宇宙在兹買諸人則己貴賣諸人則己賤人皆謂之拙或哂其癡豈知如是則心安纔用智術縱能得贏餘害其所以養心者不在大心必大不安矣康節有言珍重至人常有語落便宜是得便宜深可玩味也其四昔日入城汝兄弟問皆懇切吾甚喜之但皆不曽究竟到底求一確實功夫為立命處則吾又有憂終恐淹也規模窄洵也意氣雜勇猛精進使吾大喜此吾之深願也吾年且老修持不勤只騰口説真可羞人近體大學從源頭做功覺得聖人指示發端處與收功處極是端的前此枉自沈埋甚欲與同志者共之今脱去塵累此乃天玉成汝正好大用功而拘拘猶故也循循猶故也無乃未副天意邪切莫負天切莫負天寄從子希哲屢得汝平安書甚慰自汝之去吾朝夕思汝又朝夕憂汝思非為别離惟欲汝做箇好人憂亦非為汝勞苦惟恐汝做些不好事汝今在涇野門下須服行其言觀法其行乃真為弟子否則雖見好人不行好事反不如凡夫矣待文王而興己非豪傑之士文王所不能興汝道他比得凡夫否益者三友損者三友太學四方人才所聚若所交俱英才及忠厚有德者其益不可勝言若只汎交與説閒話為無益之事則其損亦不可勝言謹黙二字可銘諸心其二科塲在邇汝肯勤苦用功吾甚喜甚喜但吾更願汝愛養精神為上不可太耗之節宣之弗至反生出病來却是欲速助長之過也王太守在此惓惓愛民而困於多口傳來語言想多不公也隂雨連綿半年低田已多渰没今朝夕在此車戽細民窮苦不忍見不忍聞尚未知天意何如其三聞汝在京辛苦天下事只如此若心厭之便增幾倍憂苦若心安之便有無數自在古老常言成人不自在自在不成人莫於閒中送了日月也六書精藴舊歲已成矣今歲欲完周禮以愛精力尚爾遲遲莊渠遺書巻十二
