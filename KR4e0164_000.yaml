body:
  text: 莊渠遺書别集類五明提要臣等謹案莊渠遺書十六卷明魏校撰校有周禮沿革傳已著録校欲行周禮於後世其説頗為迂濶所著六書精藴欲以古篆改小篆而所列古篆又多杜撰尤為紕繆然校見聞較博學術亦醇故是集文律謹嚴不失雅正考據亦具有根柢無忝於儒者之言其御禮問經義諸條亦多精確惟郊祀論一篇謂見於經者獨有南郊無北郊而以社當地祇之祭不知大司樂方丘之文與圜丘相對圜丘為郊天方丘為祭地可知未聞祭社於澤中之方丘且於夏至之日也又祭法瘞埋於泰折祭地也與燔柴於泰壇祭天之文相對皆北郊祭地之顯證校乃引周禮隂祀用黝牲駁祭法祭地用騂犢為附會不知周禮為一朝之制禮記則雜述舊典不能強合先儒辨之甚明無庸橫相牽合自生糾結也乾隆四十六年閠五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:abe15ce480a65c20bc6174eb95739960ef5b70badb2f20b37c95579e67b8c7dc
