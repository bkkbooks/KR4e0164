  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0164_WYG_010-1a, image: WYG1267/WYG1267-0878a.png}
body:
  text: 莊渠遺書巻十明魏校撰公移河南學政欽差提督學校河南等處提刑按察司副使魏為學政事竊聞北方學者樸實不尚多言當職自慙躬行弗逮豈敢騰口説願爾諸生卓乎立志丕惟古聖賢是師朝夕誦法其書壹似面聽教誨務求體之我身勿徒出入口耳善者加勉有過咸許自新惟怙惡不悛乃名教所棄也訓迪蒙士尤宜先行後文保其淳樸凡我郡縣長吏學校師儒同心以正學術作人材為事師道久廢尤宜自律律人國有明法豫惟天地之中風氣渾大鍾為人材大者聖賢其次豪傑爾諸生所狎聞彼丈夫也我丈夫也慎毋自暴自棄右仰府抄案下所屬州縣及儒學一體遵行各具奉過日期繳報為科舉事照得今歲大比之年賓興賢能國家重事也當職為國求才所至參考諸生文行一時豈能徧知必須上下協心庶幾事克有濟合就行仰汝寧府抄案着落當該官吏照依案驗内事理通行所屬州縣文書到日提調官速㑹教官考選儒學生員擇其文理平實典雅已在取列者從而審察其素行採訪鄉評其間果有過惡彰聞衆所共棄者文辭雖工責令退避以俟修改果能改者亦當職所容也若有素行稱於鄉衆所信服或抱負材識傑然出衆而拙於文辭者特取而進之儒士監生應試者提調官一體考選俱送該府提調官嚴加覆考各查上科應舉名數量増一倍候按臨坐府送考期在四月上旬牌至乃刻日期其不預送考者各在學肄業勿妨其功此係國家開科求賢重事務推至誠至公之心期於薦賢報國勿徒虚應故事責有所歸案至各具奉過日期繳報為廵行條約事切惟上下之際當以誠意交孚今往往曲為奉承過自卑屈至於政事則多務為虚文當職實所深恥今請悉罷苛禮凡事着實舉行其請託需求乃時俗極弊吏胥常態學校禮法所出豈容有闗節交通然禁防不可不謹擬合畫一通行一官吏師生俱毋得出郭迎送及跪於道傍城中毋用鼓吹所至提調官遣廵捕一員帥人迓諸境上因以防護衞所亦如之每遇古蹟則以告過一鄉則言其俗將至一舍許遣其僚若屬一員與醫偕來教官遣兩生來迓因以勞問及郭門遣佐貳一員教官一員諸生四人迓於郊門及近郊出迎候駐馬官與諸生皆前相見用兩生導以入過城門及旌表門閭各街巷公館神祠若寺觀淫祠則皆轉身相告商賈俱勿罷肆惟讀書之家父兄子弟聽其拱立於門送亦如之庶幾禮肅而情親若加以非禮之禮是悦之不以道也待我為何如人一知府相見登堂行禮立則於堂之東始終無自屈膝一所至用禮生四人立於堂之圮各官相見畧倣新官到任儀但自上而下以次立齊吏典而下以次跪齊俟禀某官某人見參拜而退不必跪聽發放有不及處禮生相之一府佐州縣正衛指揮及守禦千户暨師生有事皆正立相向從容禀説勿行跪禮若有過戒飭聽其跪以示恥罰一長吏相見後各具圖志及舉政教所當興革者學之師生採訪風俗美惡條上一民間有孝子節婦山林隱逸有懷材抱德者武家子弟有通兵法者諸生父兄有興禮俗者庶民之家亦同大家有興地利務農力穡有功者醫家有精通方技者皆具姓名列上一明倫堂講書各遵憲綱叙坐毋得謙避坐時常存肅敬毋得因而舒肆有失儀者屏立堂下示罰一謁文廟前一日儒學開報鄉賢名宦祠有未當者師生考定列上一寺觀惟太祖所定歸併叢林係是有額其餘悉係無額與淫祠一體當毁謁文廟後有司畫圖具數開報相度以興社學一供應出民脂膏務從儉約一書吏門𨽻人等當職嚴加防範如有需求財物師生宜即陳禀重行究治若私以賄交通是與彼同為小人也今日以贓饋人他日必受人贓事發一體究治一諸生有請託者即是素行不謹不必更考其文藝一府州縣各置門簿諸生每日有入公門者記其姓名與事歲終類繳候案臨稽考一北方稱呼甚醜惻然不忍聞士類何忍出口寜無羞惡之心乎宜從此痛絶其弊務期敦勵風節養成正大剛方之氣一當職家世業儒並無親識逺客中州如有在外詐稱所在官司即便拿問遞回原籍毋得輕縱一近年文移太繁變成吏胥世界今後務遵國初洪武年間悉從簡約右仰府抄案下所屬州縣及行附近衞所一體遵行案至具奉過日期繳報為尊崇聖蹟事按上蔡縣古有羲皇畫卦臺地産蓍草神聖遺蹟宜莫有靈異於是者矣本職親往省視遺址尚存周垣頽圮羊牛來牧廢為荒墟蓍草亦不生茂雜出於小民墟墓之間絶無叢生者矣舊俗相傳白龜祠廟塑有羲皇神農軒轅遺像皆草木被體混處佛像中䙝瀆神靈莫斯為甚中門今亦閉塞盡塑佛像羲皇至尊下與胡鬼為伍是固司風化者之責也擬合釐正仰汝寧府抄案轉行該縣提調官親詣本處因厥遺址繚以周垣守視惟謹前門扁曰羲皇聖蹟闢其中門撤出佛像扁曰天生神物祠廟盡撤佛像毁之其三皇遺像欽遵太祖遺訓圖繪廟壁廟之北壁大畫先天圖前置香案上立髙大一座牌位表曰太昊宓羲開天聖蹟廟之左塑一龍馬背上旋毛具河圖之數廟舊名白龜以蓍草生處神龜守之也右塑一白龜不必具洛書之數其上畫為紫雲有司時常葺理毋使廢壞每歲春秋二丁後教官一員親往省視回申提學道毋得遲違及因而有所科擾案至先具奉過日期續具修過緣由繳報為申明社學事當職欽奉勑諭古者鄉閭里巷莫不有學即今社學是也爾凡提督去處令有司每鄉里俱設社學擇立師範明設教條以教人之子弟年一考較責取勤効仍免為師之人差徭欽此欽遵當職所至詢問社學每府州縣各設數處然皆卑陋湫隘名存實亡教讀姑取備員而已蒙養弗端長益浮靡愓然有傷於心今擬與提調官經畫其事原設社學各因其舊而以為小館各延教讀聚附近子弟讀書其中可増則増可更則更務從其便别設一社學大館延請明師專以禮樂為教小館生徒各量地逺近為節班輪入大館絃歌揖讓其中大館師與講説書中大義令其退而服行必擇地之寛大閒曠者旁置一射圃若有淫祠及廢額寺觀則撤而新之事體尤便經畫既定然後興工營建既成當職别有教條頒示小館教讀提調官㑹鄉之父老及在學生員推擇其大館師提調官㑹同學之師生推舉上自鄉先生次及山林隱逸次及監生生員務求衆所信服者提調官踵門敦請以賓禮待之小館師父兄自行供給大館師有司供給之必須置買社學田乃可經久提調官政多弗暇先命教官一員及生員數人規畫而後提調官為之措置因是亦可以觀其才此係國家化民成俗重事慎勿徒為虚文案至先具奉到日期續具行過事宜繳報為考正祀典事今畫一於後仰抄案回府提調官規畫下汝陽縣撤滛祠改建施行先具奉到日期續具行過縁由繳報一古人祭因國之在其地者蔡仲克庸祗德見稱於周公實始封兹土今宜舉千載之闕典立廟祀之斯固太公祭爽鳩之義也蔡世子有身死社稷特書於春秋英風凛凛至今尚有生氣宜祀以附蔡仲一信陽宰端木公賜蔡人曹公卹漆雕公開秦公冉混而列於名宦鄉賢幾於瀆慢今宜擇淫祠髙大間曠者改作書院祀之増司馬温公光謝上蔡先生顯道以興後學髙山景行之思為辨息怪妄事按少林相傳胡僧達磨靣壁九年影透入石世以為神書冊記之本職親至其處見洞石與影石形類不同已了其妄因命登封知縣侯泰召石工微鑿其痕驗之則其怪誕不待辨説而自破仰河南府抄案轉行儒學存照候修志書之日特與改正以破千古之惑免使流傳四方愚者起信智者生疑斯實闢邪崇正一大助也案至具奉過日期繳報為重冠禮以責成人事昔者聖人始制冠禮兹惟人之一初將責之以成人之道是故不可不慎重也自入中州見諸生童稚垂髫者皆偃然復加帽於首是欲自附於成人也亦有年既過時而弗冠者是自廢成人之禮也擬合改正仰開封等七府并汝州抄案下所屬儒學凡年幼生員教官召而誨之務執童子之禮恭慎謙卑祗許垂髫毋得加帽犯夫子速成之戒年長過時者使人勸其父兄請賓擇日加冠以進德修業期之其童生未入學者一體遵依案至具奉過日期繳報為激勵士風事切惟士人讀書當先識禮義亷恥斯乃立身大節也自入中州見士人每每陳乞惻然於𠂻料檢故牘則有告乞補廪者有告乞補増者有告乞應試者狀内皆有老爹醜聲今雖改正稱呼而陳乞者尚有只此一念試自判斷果出於義乎果出於利乎君子小人從此而别昔吾夫子深惡鄙夫孟子比作墦間乞兒斥罵士人讀書至此固當心開目明養成正大剛方之氣堂堂天地間為一大丈夫何忍墮落作此軰仰開封府等七府并汝州抄案下所屬儒學徧告諸生互相砥礪以古聖賢豪傑自期勿輕䧟身卑賤案至具奉過日期繳報莊渠遺書巻十
