body:
  text: 莊渠遺書卷八明魏校撰譜牒莊渠李氏族屬譜序孝弟也者本其所以生也爾身從何生也曰吾父母遺體也父安從生曰吾祖宗傳體也而忘之則其心死諸昆弟伯叔父何親也曰同胞也而忘之則其手足不仁然則子孫非曰吾有之也吾祖考散而成體也是故昆弟之子猶子也一視同仁也先王教民仁其九族立愛自親上本髙祖下逮於元孫而旁及諸父昆弟喪則五服以相戚也祭則紀之以小宗五世親盡而服窮矣而宗易矣而情何盡矣由親同姓以往懼其漸以疏逺也則大合族而統之以大宗故親者彌相親也而疏者雖百世猶相繼毋散校之立統宗譜以合大宗也則始祖以為主代上下相承無間也其道曰尊尊詳適而略庶則又立族屬譜以厚吾小宗也而髙祖為之主矣前後相附以互見也其道曰親親詳近而略逺與統宗譜相錯前表莊渠始遷祖世系録其自適而分著我自出也乃起自我髙祖彥行府君而盡於吾之族昆弟圖成而五服之屬四世之宗咸萃焉油然生其孝愛之心吾與族昆弟之子若孫生則附生則附親屬雖始竭而猶未忍相棄也子孫續為譜則遷祖考親盡者奠諸前復自其髙祖始而改紀其親屬尊尊親親無窮也修譜必也告於大宗以統宗譜相質校復采耳目所覩聞談祖宗時故事命曰世説子孫而聞之庶其音容若接矣乎嗚呼天地之大德曰生人也而弗念厥祖弗哀其父母劬勞自戕賊其心也昆弟而路人自痿痺其手足也是豈人之性也哉其無乃俗流失與物欲迷與亦教之孝弟而已矣凡我族人其毋忘本哉五服圖説上殺父斬衰三年母齊衰三年祖父母齊衰期曾祖父母齊衰三月髙祖父母齊衰三月下殺父為長子斬衰三年庶子齊衰期孫大功九月曾孫緦麻三月元孫緦麻三月旁殺昆弟齊衰期從父昆弟大功九月從祖昆弟小功五月族昆弟緦麻三月世叔父母齊衰期從祖父母小功五月族祖父母緦麻三月從祖祖父母小功五月族祖祖父母緦麻三月族曾祖父母緦麻三月昆弟之子齊衰期從父昆弟之子小功五月從祖昆弟之子緦麻三月昆弟之孫小功五月從父昆弟之孫緦麻三月昆弟之曾孫緦麻三月五世袒免為親同姓六世而親屬始竭父母至親也故喪三年至痛極也此喪禮之大綱五服因是以生矣父母之於子其痛同而庶子以尊加之故降而期則以降為正服而長子三年為加隆焉耳以傳重也祖尊矣故自三年而期而孫以尊加之則為大功適子死則適孫為祖承重三年故於適孫加隆為期也曾髙祖尊同而恩殺矣故不敢以大功小功服之而為之齊衰則殺其數為三月也曾元孫緦同不可加其月數也此皆正統之親也昆弟一體也自吾父而推故期從父昆弟自吾祖而推故大功從祖昆弟自吾曾祖而推故小功族昆弟自吾髙祖而推故緦也世叔父自吾祖而推當大功矣以吾父一體則加隆而為期其報服與庶子同昆弟之子猶子也從祖父從祖祖父自吾曾祖而推也故小功族祖父族祖祖父族曾祖父皆自吾髙祖而推也故緦而報服同以旁尊不可加之也此皆旁親也尊卑之體適庶之分親疏逺近之等恩義曲盡矣祖系一世祖諱茂實字實之二世祖談吉甫生一子孟莊其一支為吾髙祖恕世次為穆我李宋南渡故家也建炎之初髙宗棄汴來遷於杭時則有編修府君者從而南寓吳葑門為始遷祖其子官至金紫光祿大夫於古為始興而世系不書者無徵也故今定莊渠始遷祖為一世是為實之府君生元之初宋滅而華夏稍變更矣其子吉甫府君生元盛時元徴之不起後老矣及見元之亡而遇我太祖之興再立人極宋遺民之孫復見聲明文物之盛矣族屬圖髙祖曾祖祖禰昆弟附圖子孫已上見家乘世説我太祖遣大將軍徐達北定中原以次削平四海定有天下之號曰大明建元洪武越明年而吾髙祖生自此天下太平矣享年八十有一卒正統十四年三月七日是嵗也先入冦土木之變英宗蒙塵髙祖母金氏卒景泰三年三月十日時景皇帝中興故君雖蒙塵而天下不傾也髙祖彥行府君有馴行暗若與古符其孝友因心而發生母袁病篤迫默禱於天祈以身代弗得遂刲股救母弟信亦刲厥肱孝誠相通不謀自同乃煮糜粥食母母病遂瘳兄弟創亦遄愈孝誠動天人罔間言鄉人至於今猶然稱之曰二孝子也髙祖有子四人而吾曾祖行三出後崑山魏士珣族曾祖奕宗大生洪武三十二年時建文君在位傳至棠為繼髙祖之宗與弟松今居郡城敏宗學贅荻溪王氏子孫今居荻溪生洪武三十五年是嵗也而太宗靖內難聰宗文生永樂八年傳至權為繼曾祖之宗權父瓛能道祖宗時故事髙祖之後惟此一支居於莊渠髙祖與魏士珣同娶於金而士珣無子則育吾曾祖以誠府君為子魏故農家世積善得曾祖而家道日隆遂為巨族士珣夫婦甚賴之後庶出有子而曾祖亦不復歸宗曾祖寬厚有德言貌溫溫聞人之過口終不忍言惟聞人善則喜談之不置終身未嘗詈人雖甚觸忤之終不恚怒但徐呼小郎則人皆不安曰爾奈何犯長者吾蘇蕞爾地不能方二百里而財賦當天下少半郡城繁華四方商旅輻輳過者嘖嘖羡富饒豈知鄉氓雕敝其力穡者終嵗勤動僅能還官樂嵗尚咨寒飢遇凶嵗則餓莩滿野尸填於川錢糧自此虧額矣有司鞭撻血肉淋漓吾曾祖嘗舉為糧長積三十餘年専以誠長者處區民不忍一施鞭撲區民化其德終不忍逋負之至今稱為佛子家吾父亦嘗為糧長有祖風然區民漸貧不能無逋負者又三十年而民力憊甚嵗率拖欠以為常有司督責糧長賠納多破家亡身矣嗚呼天子仁聖非大蠲賦無由活此一方民也有惡少嘗不快於曾祖三放火來熸屋廬輒心怖而止一日自首伏曾祖以酒肉勞之曰儂可罷休兹詎好事其人感泣遂為善人曾祖始居信義舊宅在真義浦東莊渠之族中衰而信義興矣吾祖别治宅於浦之西信義之族亦惟我一支為盛噫起家艱辛子孫詎能盡知邪曾祖生永樂七年卒成化十一年十一月八日曾祖母顧氏生同年以成化六年十月二十一日先卒是時國家全盛極矣然自太宗遷都於燕控制形勢天下始奠安而吾東南困於轉漕民力亦竭矣曾祖族葬磚場字墟與新宅鄰曾祖歿後人夢其騎從甚都呼曰上帝以我公直今為神矣吾祖新婚適有訟事里媪呫囁私語曰新婦不祥曾祖母怒曰官事年注月定偶值婚期奈何作此離間語其賢明皆此類也伯祖聞逺號一默有大志魁傑人也其所交多一時豪傑有司強補邑弟子員治書經數舉進士不第以嵗貢授玉山訓導後世以尚書相傳遂為仕族生宣德四年是時宣宗不親政而能屬任元老稱太平天子卒成化二十三年八月十五日伯祖疾革則語家人曰速治我後事吾且從上賔天是嵗憲宗登遐伯祖母沈氏好潔其所居室常自灑掃無纎塵伯祖三子從伯父涇清伯號菊泉繼祖之宗貌清癯讀書以詩鳴為鄉人師有祖孫三世受業者繼娶不慈一哥庭椿遊蕩死其子照繼髙祖之宗淮清叔贅洪墟鍾氏幼有奇質父友見而異之曰是兒清徹一似雪晴新月遙映梅花長乃嗜酒御童僕少恩一夕大醉溺水從者援之遲遂咯黑血死時從伯母年二十八矣鍾故富家父母既歿伯祖宦逺方尋卒於官從伯母煢煢無倚族人利從伯母之改嫁也則稍蠶食其産且盡從伯母讓之弗與爭晝夜紡績自給養其二孤庭楠庭朴勤苦萬端屹弗改節𢎞治十四年卒享年五十有一矣鄉人髙其貞潔相率狀其行於有司奏請旌表門閭以既歿而寢校自幼則見吾從伯母面常有憂容目汪汪如淚流也慎默寡言與人言煦煦如恐傷之至其節操毅然人亦莫能奪也庭朴五哥嘗學醫有老醫語之曰汝用心過不通也學醫先守常法正治不愈乃可從治汝今好奇不肯就病治病輒求隔二隔三治之此未學行先學走也湘清夫贅吳涇胡氏子庭樗今居吳涇庭樟徙陽城村四面皆湖也伯祖之後多讀書能文而貧不振庭樟六哥目不知書而敦篤異常家亦溫飽鄉人倪姓者以軍籍誣我伯祖往見清軍御史不屈則以大義質之其人震怒伯祖膝行而前曰昔者勾補軍伍惟恐平民不為軍今清理軍伍正恐平民為軍其人為之霽威伯祖復抗章奏於朝事竟得白子孫賴之大父元律府君朴茂而長身言必謹慤作事必周詳喜怒不輕見於色子孫有過弗忍笞也召而敦戒諭之使愧而改下至臧獲亦不忍輕撻一人性勤儉昧爽先家衆興綜畫諸務夜則候人定遍視門户扄鑰乃就寢暇靡他玩惟好觀書有得或忘寢食忙後常默坐移時休養精神迪知衣食之艱難懇懇語子孫以耕織勞苦疏衣糲食與衆同之少見紛華意輒不悅厭世俗之侈靡也則有志淳古之風故自號朴隱也吳固澤國也禹貢揚州厥土塗泥厥田下下國朝而田賦登上上亦既竭澤而漁之矣而水利久廢莫之興也吳人以水田為命嵗數被災大父意慘然不樂也乃講求水利之學曰吳地邊髙中下昔人象為盤盂不大決其下流注之海則胡以止湖翻矣禹貢所謂三江既入震澤砥定者也今淞江全受震澤諸水實惟經流而中多阻如腸胃病噎然西迤北地形愈卑則匯為陽城昆承諸湖故有白茅塘受之以瀉於江而今塞矣此吾蘇第一患也大父木訥不善文則數使人言於達官冀有聞於上者𢎞治八年東南數大水孝宗命侍郎徐貫治水於吳一時工程惟開白茅重大而有司者多文具勞而無功大姓復有私萑葦之利隂持之者大父憾之終身正德十六年武宗命撫臣尚書李光嗣復治之白茅遂通其他水利亦未能盡興也大父嘗嘆墟田窪下恃岸為防岸崩則禾蕩然滅矣必也大墟分小墟牢築岸腳使耐風浪大父嘗嘆海口潮汐漲落易淤泥沙五代錢氏有土時設卒撩淺其法可迄今守也而廢也久矣大父嘗嘆世衰則刑繁今新例充軍者日報也而曾不足以禁頑而徒為貪酷吏舞文作威福也每誦張釋之之言曰法者天下公共也今法如是更重之是法不信於民也又誦戴胄之言曰敕者出於一時之喜怒法者國家所以布大信於天下也則又嘆曰誰與以此言聞於上者𢎞治十一年孝宗厭新例之冗瑣也則命羣臣廷議舉要而刪其繁定為問刑條例大父猶恨一時大臣不能將順上美惟守大明律以一民也大父嘗謂縣丞簿最為親民矣而祿薄少自慎重宜增俸以養其廉庶可為民造福也大父嘗愛伊川格言自檢束則日就規矩注其下曰誠上達君子才放肆則日就曠蕩注其下曰真下流小人命校書置屋壁以自警大母王氏外大父張仲侃魁傑士也獨奇愛大母曰此女吾自主之一日見大父撫其首而異焉遂以歸於我大母體貌豐碩凝重有威寡言笑每乘舟未嘗左右顧岸鼻顙一黑子宛如元珠被服惟布素雖敝尚整潔若出於新壯嵗即却環珥粉黛弗御大母性孝一夕天寒使婢以衣覆女孫則嘆曰人言母憶兒兒不憶母吾母在家而寒也誰以衣覆之哉曾大母性嚴諸婦少有當其意者惟大母善事之能得其歡心季父幼多病大母憐愛之異甚夜卧置之腹遺矢亦不移大父偶失愛於伯祖大母聞之則治具延兄公呼二兒使侍食焉伯祖感嘆曰吾聞兄弟之好以婦人敗未聞以婦人全也吾弟婦其賢矣哉大父一日嗛內姪之子有所恨過之曰卑幼也而數犯我大母曰汝母族惟一息耳奈何不能寬容大父矍然稱善大母嘗語吾子孫曰莊渠之族爾家本根也其勿忘大母嘗戒子孫鄉鄰與若平等勿以我富而驕勿以彼貧而憎蘇氓困於重賦勢且不能聊生宣德初元有詔蠲重額十之三而户部格弗下蘇守况鍾則抗章以死爭得蠲數十萬石大父嘗嘆曰微公吾民不活矣近嵗詔有司立廟以祀夏忠靖公原吉周文襄公忱大父嘆曰二公廟食於吾土固當雖然必以况侯配校官刑曹每訊重囚則大父輒見夢告戒之精爽若生大母晚嵗中風語多不慧而形益肥善飯以無齒不能食也吾母則跪而哺之踰年遺矢則親抱持每自浣滌大母且歿嘆曰吾溷汝多矣願汝子孫咸孝順汝君子以比崔山南大母以正德二年十月十五日卒越明年四月十三日而大父卒時校在官畏法網不敢請告回也嗚呼痛哉是時武宗不事事宦官劉瑾擅權毒痡四海又二年始伏誅而法網解矣然羣小用事不衰也大父生宣德十年享年七十有四臨終曰吾今獲考無所恨惟孫校在官弗獲一見吾欲成為清白吏其以田三百畝廩之以養廉先君諱奎字孟文而人稱為竹泉翁短而豐下色溫體舒性仁厚雖婦人孺子皆知其坦然無欲害人之心也以校貴敇封南京刑部主事而吾母張氏封安人先君生天順六年二月三日而大父夢文昌之星降精於家是時英宗復辟聞處士吳與弼賢遣使往聘之至則以為左諭德不拜復遣使送還與弼厲志聖賢為我朝學者倡噫自有科舉而士彌賤若與弼可謂髙鴻在寥廓矣先君未弱冠聞大父之在官而雨霑服體盡濕也亟往代之而為塘長而為糧長大父得以佚老終身水利僉事伍姓者貪酷吏也而勤政然不辨淑慝每行縣則塘長駢首受杖有死者惟陸祥以重賄免而先君死而復蘇他日又行縣大母哭語人曰長男昔代爺死裏得活今該少男代之雖然吾終不忍也先君聞而慰大母曰兒自往耳弟弱詎能受大杖邪是時幾再喪生校兒時尚憶大父母欲觀杖瘡先君終不肯而私與四叔祖觀之則相持泣也臀若虎餂蓋將護三月才愈伍動大衆開京口河先君與其役大父在家病危殆先君心忽悸動夜寐不安而家人至則紿曰老官有病今瘳矣先君哭曰是欲欵我勿回耳冒禁而逃晝伏夜行聞林木有聲則驚以為虎也蒲伏不敢動良久乃行還家而大父適以是日愈復往終役故敕詞褒先君云孝感有徴義聲無忝蓋指兹事也大父仁慈雖甚愛先君而先君孝謹奉之若嚴朝廷嘗一夕大醉扶歸從者曰及門矣則蹶然醒見大父言動無少差退入室則惛醉如初也先君未營居室先立祠堂其制前為同堂而分其後以為四室祠位各奠於室由禰而上皆得南向而有常尊祭位同享於堂自曾祖而下各統於尊而暫屈嵗時奉祀惟謹祝文則用御製教民者世俗童僕從其主姓先君各因其本姓以為稱曰吾今不奪人姓他日亦免混亂吾姓也正德九年校之召為職方郎中也則語先君曰今邊帥握重兵隨上居大內而藩王有反謀兒義不可出也先君曰汝內自斷勿謀諸人親戚聞而交勸我多事矣自是移疾不出者八年中間嘗有召命時宰議處校於銓曹先君意不能無動一日聞上私出遊幸則大駭為之隱憂語校曰古今詎有是事汝當藏修遂初志耳校官南曹頗名執法人有謀干先君以撓之者至則聞其名卒不敢嗚呼校之出處辭受實先君有以全之也吾家由先世以來未嘗有亭沼也而校之移疾而歸先君特築精舍前為小亭臨池曰汝可濯纓於斯矣其後土屋數椽因其舊亦蒔以花木使成隂曰汝可遊焉息焉於斯矣則又語校曰家務勿以經心也吾自主之吾欲汝惟志其逺者大者焉耳鄉人二三子來學則館榖之四方朋友有至者則歎曰吾以為書院也而田舍也何以歎蓋歎其村朴有古風也而校則語之曰此侈於陋巷矣亦嘗出户觀野乎天文四垂為宇六合一家觀生意於苑囿臺池間也則已蹙矣乃相與歎先君之儉德曰逺矣哉先君好賔客人見其時而豐也而莫知其恆於儉也自奉淡薄如大父時人或弗之見矣而先君則歎曰昔者吾也逮事父母得一甘脆未嘗以爽吾口則持而進之二親今而子孫以奉我噫吾何忍嘗則庋以待賔客先君治家亦既勤只而人未嘗見其勞也蓋事有漸次使人各程其能武宗崩年而校為典學使者將行先君與吾母戒曰嗟吾兒嗟吾兒汝毋以已長格人毋以求備取士教則莫如寬矣他日聞校罷斥學官之不職者則寓書曰兒亦知夫師儒之清貧乎而弗恤之而徒責之使砥行也人得無弗堪乎先君鄉飲一嘗為賔退而泣也先君之泣蓋傷大父昔者鄉飲旅於衆賔而今顧居上也嘉靖元年以上母后徽號恩而先君與吾母賜四品服越明年五月十日先君卒於家不肖校督學嶺南弗獲永訣終天之痛尚忍言哉葬長洲陽山之中麓卒之明年而大禮之議起徽號三易乃定嶺南陳激衷有道之士也一見先君歎曰吾閲士多矣若太公厚德君子哉先君既終校門下二三子各為敘述其言不同而稱厚德則同先兄子賢面常帶笑容天性樂易平生無怨惡於一人胃氣積傷於酒煎熬真隂多飲而少食竟以噎亡先兄不事事而竭力為鄉人捍災嵗大雨且傷稼則先馳會鄉父老與謀曰事急矣尅水必以土某涇口可壩為堰以遏水衝某墟岸善潰則為之增髙倍薄某處可立大朋車戽水某家速辦船載乾土用也量地逺近及田之多寡以起役夫曰先從吾家始則為立期會定賞罰奔走督責不憚塗泥人有持酒勸之者則卻而弗受曰吾今何忍沾唇事成復酣飲口不言勞一日聞校與客講學則語校曰吾為汝一言而終收其放心而已矣我乃放而不知求聞論孫吳兵法曰是謂多詐勝少詐耳先兄一日以事過里人其人出不遜語甚倨也先兄默念此改常矣則以善言慰之是夕其人暴死使當時小有忿言則難至若掇矣先兄娶顧氏以産厄死時正德十有三年越明年寧王反罪人得而武宗南征天下洶洶義二年武宗病彌留而今上入嗣大統社稷幾危而安天也季父橘泉翁字仲文長身而目微露幼多病不慧長而精悍嚴明嘗學醫善切脈理前知人死生已而棄去則専治生埓於封君後乃為府醫學正科待缺未上也生天順八年是嵗英宗崩而憲宗嗣位我朝宦官之禍始於太宗而成於英宗晚年益明習天下事內侍不能大欺也君臣不相親自憲宗始然能久任大臣天下以寧國初重薦舉天順而後始以資格拘矣校嘗歎後世科舉也取士資格也用人而文法也制吏治四海所由困窮也以吾季父之材能有如舉為農師寬假約束使盡地利於北方則其利民豈淺鮮哉校嘗語季父曰我國家北都燕而逺漕江南粟非計也則莫若修舉虞集遺策矣曰集之䇿何如曰京師瀕海萑葦之場也集請如浙東捍潮法化鹵地為桑田募富民使闢土能以千夫耕者授以千户以萬夫耕者授以萬户功成則世襲以官季父笑曰我多多益辦耳季父娶趙氏宋宗室之後也嘉靖九年校致政以九月朏還家而季父以八月十九日前卒後十一月二十三日而兄卒嗚呼痛哉是嵗也而上更定大祀禮后出北郊親蠶罷孔子王爵四叔祖行節魁首巨腹形短而肥少時嘗一賭賻曾大父召而戒之則歎曰人非草木過不能改是我非夫遂終身絶賭性寬厚家人侈衣食旁竊利孔弗訶也坐是先富而後貧則鬱鬱不得志而病風痺言笑常如哭聲卒𢎞治十五年時孝宗清明有志圖治而天奪之速噫此我朝治忽大機也外王父張叟諱澤世農家而外王母曰季姥外王父生而朴愚自少出贅季之族人以其無聞知也百方侮之以為笑樂有勞役則曰汝往尸之仡仡終日未嘗憚煩官府有所誅求則曰汝往應命至則受夏楚而歸未嘗疾怨外王父惟一拙誠自居而季之族人久自慙負不復施其巧知君子曰張叟年既耋耄而德如嬰兒庶幾哉無懷氏之民與人人如叟刑可措也外王母貞順慈良孝敬勤儉外婉而中慧通詩書謹禮度內外宗戚咸尊事之下至婢妾亦樂其德來則相率歡迎去則戀戀不忍相捨也吾母能言矣聞人談外王父短長退而以告外王母驚曰兒莫如是此之謂學舌故吾母於終身於人是非耳雖得聞口不復道也吾母能食矣外王母之王母與他兒食而不以及吾母退而以告外王母驚曰兒莫如是此之謂爭食故吾母終身甘淡薄於飲食未嘗有所揀擇也嗟乎以外王父之慤與外王母之賢而善教也而所生子多不類天其萃美於吾母乎而吾母之生也外王母之王父驚喜告人曰兒女子大有福德詩鼻祖道上世之事也吾家聚族莊渠尊實之為始遷祖矣乃始祖則力田質朴有古風顧氏妣以貞德開厥先二世祖吉甫惇行孝弟迪子孫讀古人書彬彬為文獻家矣古我鼻祖始基莊渠於璞未鑿於醇未漓渾渾一脈匪且今且繄先妣顧壯嵗而嫠嫗育二雛遐日奮飛嚮如何其逢天百罹其究如之何百福是釐徴君吉甫玉爾溫如戀戀母慈兄弟于于和氣盈門厥慶乃餘鼻祖三章二章章六句一章章八句呼天孝子情迫也髙祖篤孝母病祈以身代弗得遂刲股救母弟信亦刲厥肱母食之遄愈孝誠動天也兒呼天兮天髙弗聞母氏誠死我何用生兒呼父兮父不我應母生獲延遑恤我命呼天二章章四句萬石長者恤民也吾蘇賦於民重矣罷不能償有司誅求急曾祖長區賦三十餘年寧自受責不忍鞭撻一人人亦不忍逋負之既歿如失慈母縣官召翁汝督萬石汝辦弗前死不償責翁退慰民汝勤罔佚樂輸奉公世忠於國翁顰以泣汝勞實多輸租已畢室中嗚嗚民各前喏儂忍纍翁我儉我勤我聊自充萬石四章章四句烏婦孝事姑也大母病風痺善飯不能自食吾母蒲伏哺之大母益充肥吾母抱扶不勝其重遺矢則親滌除勞甚弗敢自愛也大母語不慧然德吾母不忘每嘆曰吾命恃汝願天好還子孫多多孝汝老我齒齳兮我腹長鳴傴汝哺我兮死我復生老我齒齳兮我胃長虛傴汝哺我兮我瘠而肥人嘻笑吾老兒呱呱我謂冢婦人中之烏汝孝天知天胡然報之豫呌天以祈曰有子如烏曰有孫如烏曰孝且多烏四章三章章四句一章章六句王氏錢氏二譜附髙墟王氏族譜序校大母王淑人出自髙墟以賢德來興吾家自信義至於髙墟數里而近逮今嵗時往來猶之東西鄰也髙墟之氓力耕而好酒其始户口阜殷今耗焉散矣校童子時識其處宦遊而歸問其室廬皆已易主惟王氏故居獨存然多以酒病暴死校乃拊心歎曰吾蘇固彈丸地也而財賦上供居天下少半民竭力且不支矧重之以酒禍邪其母諉曰大政使然矣大母有姪春每過余輒醉醉則大呼曰若可為我譜以毋忘吾姑校惟王氏得姓逺矣則未知姬姓之王與媯姓之王與其居於吳則未知晉東渡者與宋南渡者與文獻一無可徵所可知者我太祖再造華夏乃洪武三年智凱占籍為民越明年户部家給一帖紙敝尚存後之人其有興乎文獻之可徵莫大於是矣古者治道各從其柢是故大司徒掌人民之版土地之圖我太祖令民版籍為定其政默與古合大司徒夫家之法實寓教養其中智凱編戶時少未有室其父福三無恙年猶未艾也有司者舍父而以其子毋乃以教化為迂邪校今考論世次定以福三為王氏始祖且勸之以孝弟力田毋荒於酒申之以孝弟之義曰哀哀父母至尊至親祖宗何人吾父所自生昆弟何人吾父之所生族昆弟何人吾祖之所生吾弗敬所尊自絶吾本根吾弗愛所親骨肉塗之人一樹千百枝葉葉落歸根一世二世三世四世五世六世七世八世九世按帖智凱父福三母閻逮事大母徐四口之家田不能十畝井地之法行福三當始受田至曾孫圭為餘夫生子乃别受田圭字廷佩校兒時及見王太公長而髯偉如也取牆裏張生一子四女長女為吾大母外王父張仲侃魁傑人也奇愛吾大母曰此女吾自主之一見吾大父謂有福德故以歸於我大母已嫁而孝不衰於父母故施及其子孫春嘗暴富有司攀為糧長幾破其家禮不下庶人小宗之法固通於民間也春為繼祖之宗而其宗之者鮮昶繼髙祖之宗也而宗之者亦鮮古人有言曰余寡兄弟而不忍也骨肉有幾其交相愛哉題吳越錢氏世譜會稽錢某氏吳越武肅王二十一世孫也視余以文僖公所修大宗譜因流光譜而增述之者也文僖而後則其子孫所續書然亦久廢莫之修矣武肅暴貴傳國且百年唐衰而建邦宋興而納土大有功德於生民異於夥涉之為王沉沉者非神明之胄詎克爾邪流光譜撰次世本起於帝軒轅氏代相承也其道千古若今日事乃無復闕有間者棐余所能知矣而某真為武肅苗裔於越人户知之我太祖嘗錫其家以銀圖書曰忠孝子孫今某寶藏惟謹天語褒嘉為龍為光逾於上世所受玉册矣一作何啻九鼎大吕某之父暉舉𢎞治已未進士以文行知名恆緘一篋固甚病革屬其妻曰吾子克肖乃授之勿輕也其後某長矣請於母欲觀之其母賢母也曰而謂篋中有物乎而父好施而不輕取瓶常無粟籝詎有金此必上世典籍也某固請之發篋乃流光大宗二譜也今兩浙之錢咸祖武肅相與通族然莫能通譜者多矣某問余譜法余嘉其孝行乃告以大義人本乎祖其初一身也分而千百其身骨肉同也古之人尊祖故敬宗敬宗故收族聫其骨肉使毋散也夫譜何為也哉所以尊祖敬宗而大合族油然生其孝友之心也非以夸美於人也非吾祖宗也謂吾所自出也微而冒他人之顯者是棄吾祖宗也其不孝上通於天矣非吾祖宗之子孫也謂他人顯而強攀附他人亦謂吾顯推而附吾是誣吾祖宗也其不孝亦上通於天矣譜法無他信以傳信著以傳著而疑以闕疑其贋者乎有削而無筆錢氏受姓考錢氏受姓謂本諸彭祖帝軒轅之苗裔曰陸終世為火正有子六人後皆為顯諸侯彭祖其三也此錢氏所從出之祖也彭祖之苗裔曰孚仕周為泉府因官為氏此錢氏所從受姓之祖也然莫知其為彭祖何别相傳在周之時而莫知在何王之世矣譜稱孚親彭祖之二十八子蓋彭祖生陶唐以前而孚生於周曠千有餘嵗而父子相繼乎斯已疏矣古者官有世功則有官族泉府士也於法不得賜氏豈自庶府登於大寮與或曰私氏也史不云乎居官者長子孫因以為氏今庫氏倉氏古倉庫吏之後也泉訛而為錢亦莫知何時錢讀若翦田器也詩云庤乃錢鎛國語周景王鑄大錢則其訛也久矣後世以錢代泉而全琮之後因居南陽白水乃更其姓為泉其貿亂有如此者謂白水為泉此自漢以後語耳古未有之也或曰籛彭祖姓也其名鏗或曰籛其名也後之人乃去竹而為錢夫籛俗書也古未之有也而古之人乃以為姓若名乎其下俚有如此者戰國有處士丹秦有御史大夫産此錢氏之始著見於史者也産子孫居下邳漢有廣陵守讓避王莽亂徙居烏程此錢氏始遷江東之祖也其在六朝晉有青州刺史端宋有太史令樂之然錢自得姓以來亦越至於武肅始大著所謂龍虎變化不測魁傑人者非邪世系古武肅王化家為國暨於忠懿王讓國以為家余謂某不宜混之於大宗譜某曰公有命我敢不從雖然未知此若言何謂也曰君臣禮異然則若之何曰周禮有之當奠其世系余讀太史公世表其猶有三代譜厯之遺法乎師其意可也余遂言曰大宗小宗者卿大夫之禮也援以斷國論則是未知大人世及以為禮也正統旁支者天子諸侯之禮也比而同之於有家則是使族人得以戚戚君也雖然則又有難者某曰此若言又何謂也曰適庶有定分吳越有國與五季相始終立子以賢不以長其舉常在於支得毋紊正統乎若為别之請問曰貴命世治則定於立適世亂則擇而舉賢權以達經者也變而不失其正國是以昌禮封君不臣諸父昆弟封君之子不臣諸父其昆弟則臣之矣雖適長也不得嗣為君則固臣於今君矣其視支庶均之為别子也宜各為圖附麗於後俾無干國統大宗譜封建滅井地裂細人無世業以活其大人乎無世祿以養而宗嗣乃輟是故國無世臣家無禮俗王澤易竭宋天子褒大忠懿王之烈與國同休世世官其子孫勿絶噫斯其世祿之遺意乎余語某繇忠懿王而下世系不可復列當為大宗譜以合族之人如領斯裳挈其法取諸蘇氏而世自為處也父子也别以著代也兄弟也合以連蒂也其曰適子某庶子某者於禮未盡愜今更之曰繼子某庶子某别子為祖大宗以繼别小宗以繼支孽語在宗法中在古魯有展氏亦越有栁下氏晉有荀氏亦越有知氏有輔氏皆支庶興為大夫於别之中又自為别者也忠懿之季惟演以文章為翰林學士官至使相是為文僖公仁宗降帝子嬪於文僖之孫景臻拜駙馬都尉生也封公死也封王於是大長公主老矣從髙宗南渡賜第天台諸若此者在禮皆當尊而為别或曰貴莫崇於王公胡以弗比古諸侯表其世系而乃下與卿大夫潔曰古今禮不相襲宋因唐制封建祇寄空名焉耳爵則有列土田實未有徹周禮內諸侯祿也外諸侯嗣也匪直邦君族人其將為之服斬乎無亦主於齊衰三月是故事貴正名名必與實協宗法大宗小宗圖大宗别子為祖繼别為宗百世不遷宗子統族人主始祖廟祭族人服之齊衰三月小宗祖遷於上宗易於下五世親盡則遷繼禰之小宗統其昆弟其相為服齊衰期年繼祖之小宗統其從父昆弟其相為服大功九月繼曾祖之小宗統其從祖昆弟其相為服小功五月繼髙祖之小宗統其族昆弟其相為服緦麻三月至玄孫之子親盡則遷愚按古者國於天地有與立焉是故並建親賢爰有世臣舊族禮家所稱别子者公子不敢上禰先君自我作祖别於尊也始興者亦稱别子自今起家别於舊也别子立廟百世不遷謂之太祖其繼别子者世為大宗統治族人有君道焉為之服齊衰三月尊之如君也封建廢天下無世家矣而宗法亦因以亡合族羣居勢當有所統一古猶今也禮可義起謂宜推本始祖一人世存墓祭放古之别子其世適放古繼别之宗族人雖不敢為服固當以所事大宗者事之乃若今制有爵延及後嗣者自當復古大宗之法宗譜嗚呼宋社之屋也已久矣我太祖肇立人極遺民之子始即於奠安余謂某宋既隕姓錢亦踣氏爾後不可為大宗譜矣然則若何曰為宗譜可也而其法則取於歐陽氏繇髙祖逮於元孫每五世則一更端也乃元孫復為髙祖以各綴其所生而禪於無窮期父子相仍兄弟聯次族之親疏咸在也而無失其倫親屬有服者各相邇也大宗小宗隱隱其中形分而氣連末異而本同余語某聞汝之先自台而遷其處者實惟大宗君道存焉上世鐵劵猶在也我太祖大封功臣嘗取以為式某今雖不敢以庶民為君之服服之乃其祇事之禮古今一也宜亟通譜嵗恆往來若也生不相聞死不相弔恝如行路之人矣所貴乎故家者謂其能惇孝弟也不邪謂其能崇禮讓也不邪然而弗大合族則是弗敬宗也弗能敬宗則是弗尊祖也無祖則是無天也水倍原而流竭木附幹而扶疏尚其念哉五服圖上殺父斬衰三年母齊衰三年祖父母齊衰期曾祖父母齊衰三月髙祖父母齊衰三月下殺父為長子斬衰三年庶子齊衰期孫大功九月曾孫緦麻三月元孫緦麻三月旁殺昆弟齊衰期從父昆弟大功九月從祖昆弟小功五月族昆弟緦麻三月世叔父母齊衰期從祖父母小功五月族祖父母緦麻三月從祖祖父母小功五月族祖祖父母緦麻三月族曾祖父母緦麻三月昆弟之子齊衰期從父昆弟之子小功五月從祖昆弟之子緦麻三月從弟之孫小功五月從父昆弟之孫緦麻三月昆弟之曾孫緦麻三月五世袒免為親同姓六世而親族始竭父母至親也故喪三年至痛極也此喪禮之大綱五服因是以生矣父母之於子其痛同而庶子以尊加之故降而期則以降為正服而長子三年為加隆焉耳以傳重也祖尊矣故自三年而期而孫以尊加之則為大功適子死則適孫為祖承重三年故於適孫加隆為期也曾髙祖尊同而恩殺矣故不以大功小功服之而為之齊衰則殺其數為三月也曾元孫緦同不可加其月數也此皆正統之親也昆弟一體也自吾父而推故期從父昆弟自吾祖而推故大功從祖昆弟自吾曾祖而推故小功族昆弟自吾髙祖而推故緦也世叔父自吾祖而推當大功矣以吾父一體則加隆而為期其報服與庶子同昆弟之子猶子也從祖父從祖祖父自吾曾祖而推也故小功族祖父族祖祖父族曾祖父皆自吾髙祖而推也故緦而報服同以旁尊不可加之也此皆旁親也尊卑之體適庶之分親疏逺近之等恩義曲盡矣第宅志作室以傳子孫古人所謂歌於斯哭於斯聚國族於斯非邪然其興也廢也大命在天小命在人其永命存乎積德矣志第宅以毋忘祖宗之舊陳思王角吟云起家難難難難保家難難難難可以一咏三慨其徙而之他者亦附見焉雖别散分離庶幾哉猶可復聚也丘墓志古者成民之事陵為之終志丘墓以系孝子慈孫之思嗟乎爾身何出祖考遺脈體魄攸藏其曷忍忘科第表古者鄉舉里選尚矣自有科舉也士始輕雖則云然士匪此則無以入仕顯親報君樹功揚名胥此塗出作科第表噫鳳凰翔於千仭兮覽德輝而後下自應不在此恩澤表宋以忠厚禮其大夫士大夫士亦忠厚以成風錢氏與宋一代相為始終其受天寵至渥也當時見謂忠孝子孫作恩澤表以為世勸其受恩於異代者悉書天寵一也莊渠遺書卷八
